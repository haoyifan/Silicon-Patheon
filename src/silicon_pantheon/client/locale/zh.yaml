# 帮助界面
help:
  title: "帮助 — SiliconPantheon"
  body: |
    欢迎来到 SiliconPantheon
    ========================

    AI代理之间的回合制战术棋盘对战。你可以观战（并可选择性地指导）
    两个由大语言模型驱动的玩家在棋盘上移动单位，以达成剧本的胜利条件。

    帮助界面不会阻塞游戏——回合、轮询和AI代理（如果你在托管）会在
    你阅读时继续运行。

    导航
    ----------

      Tab            在当前屏幕的面板之间循环切换焦点
      ↑ ↓ ← →        在焦点面板内移动（光标/滚动/按钮选择/输入）
      h j k l        同 ← ↓ ↑ →（vim 快捷键）
      Enter          激活焦点元素（按钮/地图上的单位/选择器中的剧本）
      Esc            关闭弹窗/下拉框/单位卡片
      q              退出（或关闭单位卡片）
      F2 / ?         切换帮助界面
      Esc            （帮助界面打开时）关闭

    每个面板在获得焦点时会在底部显示自己的快捷键 ——
    "[面板名] 面板专属快捷键   Tab 下一面板   q 退出"。

    地图面板
    -------------

    获得焦点时，地图面板会显示一个光标。使用方向键（或 h/j/k/l）移动。
    底部会显示当前格子的地形类型、移动消耗、防御加成和生命值效果。

    在单位所在的格子上按 Enter 打开其属性卡片。在卡片内：

      ← / h         上一个单位
      → / l         下一个单位
      Esc / Enter   关闭（光标停在显示的单位上）

    如果剧本提供了 ASCII 头像帧，卡片会自动播放动画（每2秒1帧）。

    单位属性说明
    ----------------------

      HP            当前生命值 / 最大生命值
      ATK           攻击力（物理单位对比敌方DEF，魔法单位对比敌方RES）
      DEF           物理防御力
      RES           魔法防御力
      SPD           速度——影响反击判定（速度快的攻击者可能二连击）
      MOVE          每回合可移动距离
      RANGE         最小–最大攻击距离
      type=magic    攻击使用RES而非DEF
      can_heal      可以治疗相邻友军而非攻击
      tags          特性/未来机制标签（vip, monk, demon, mount, …）

    地图符号说明
    ---------------

      K A C M       内置兵种：骑士/弓箭手/骑兵/法师
                    大写 = 蓝队，小写 = 红队
      *             堡垒（默认情况下占领敌方堡垒即获胜）
      f             森林（掩护，+DEF，进入消耗2点移动力）
      ^             山地（高掩护，大多数兵种无法进入）
      .             平原
      自定义符号    剧本可为每个兵种定义专属字母+颜色
                    （例如 T = 《西游记》中的唐僧）

    回合流程
    --------------------

    当前玩家的单位逐个行动：

      1. 移动：   选择MOVE范围内的目标位置，每经过一个格子
                  支付该地形的移动消耗。
      2. 行动：   攻击RANGE范围内的敌人，治疗相邻友军
                  （仅法师/剧本治疗者），或等待。
      3. 结束回合：交给对手。

    存活的防守方如果在范围内，可以在同一次交战中发起反击。

    胜利条件
    --------------

    每个剧本有自己的胜利条件。内置条件：

      任一方将单位移动到对方堡垒即获胜。
      任一方消灭所有敌方单位即获胜。
      达到回合上限时平局。

    剧本可添加自定义条件：

      protect_unit       特定单位阵亡则该方失败
      reach_tile         单位在特定格子结束回合则获胜
      hold_tile          连续占领特定格子N回合则获胜
      reach_goal_line    越过指定行/列则获胜

    说明面板始终以明确的文字列出当前剧本的实际规则
    （例如"唐僧阵亡则红方获胜"）。

    指导AI代理（游戏界面）
    --------------------------------

    Tab切换到教练面板，直接输入即可。Enter发送消息到你方AI的教练队列；
    AI会在下一回合开始时看到你的消息，并可能采纳建议。

    按 Esc 清除输入缓冲；Tab 只在缓冲为空时离开面板
    （防止输入消息到一半时意外切走）。

    再次按 F2 或 Esc 关闭帮助。

