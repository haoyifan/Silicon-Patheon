# 教程
tutorial:
  title: "教程"
  nav: "→/Enter 下一步   ← 上一步   s/Esc 跳过"
  lobby:
    welcome_title: "欢迎来到竞技场！⚔"
    welcome_body: |
      这是 Silicon Pantheon——AI 角斗士的终极战场！
      你来挑选大脑、选定战场，然后看它们厮杀！

      本教程带你熟悉操作。随时在大厅按 't' 重温。
    rooms_title: "作战指挥部"
    rooms_body: |
      这里是大厅——所有战斗的起点。

      用 ↑/↓ 或 j/k 巡视房间。Enter 冲进去，
      或按 'p' 先侦察一番。
    actions_title: "开设擂台"
    actions_body: |
      按 'n' 开一局新的！你就是擂主——选剧本、
      定规则，坐等挑战者上门。

      按 'r' 刷新房间列表。
    replay_title: "重温辉煌战绩"
    replay_body: |
      按 'w' 打开回放浏览器。逐步重温任何一场
      战斗——看看 AI 当时在想什么，找出翻车原因
      （或者欣赏自己的神操作）。

      每场比赛结束后自动保存回放。
  room:
    welcome_title: "指挥中心"
    welcome_body: |
      这里是你发号施令的地方！房主挑剧本、调规则、
      布置战场。双方都按下"准备"才能开打！
    map_title: "侦察地形"
    map_body: |
      战场全貌就在这里！地形、起始阵位、堡垒一览
      无余。方向键四处侦察，在单位上按 Enter 可以
      查看属性，知己知彼百战百胜。
    player_title: "摸清对手底细"
    player_body: |
      看看谁在擂台上——名字、AI模型、准备状态。
      对手入座后会出现在这里，先掂量掂量！
    description_title: "战前情报"
    description_body: |
      完整情报：故事背景、胜利条件、兵力配置和
      单位属性。用 j/k 滚动阅读。打仗之前先做功课！
    scenario_title: "挑选你的战场"
    scenario_body: |
      房主决定在哪里打。每个剧本都有独特的地图、
      军队和胜负规则——从小打小闹到史诗围城应有尽有。

      点"更换剧本"预览后再做决定。
    config_title: "微调规则"
    config_body: |
      房主还可以精调：
      - 战争迷雾：让敌人位置若隐若现（刺激！）
      - 队伍模式：固定阵营或抛硬币
      - 房主阵营：选你的颜色
      - 回合时间：给 AI 多少时间思考
    strategy_title: "秘密作战手册"
    strategy_body: |
      加载策略文件，在开战前给你的 AI 一份作战方案。
      就像是给你的机器人角斗士做赛前动员！

      各玩各的——对手偷看不到你的秘笈。
    lessons_title: "从失败（或胜利）中学习"
    lessons_body: |
      每场比赛后，AI 会写一份战术复盘报告。选择过往
      的经验教训注入未来比赛——你的 AI 真的会越打
      越聪明！

      打得越多，它学得越精。
    ready_title: "蓄势待发！"
    ready_body: |
      满意了？猛击"切换准备"按钮！
      显示 [蓄势待发！] 就说明你准备好了。

      双方就绪后倒计时启动，战斗一触即发！
      没有回头路了！
  game:
    welcome_title: "开战！⚔"
    welcome_body: |
      擂台已就位！你的 AI 角斗士将排兵布阵、
      冲锋陷阵——而你只需坐在后方看戏
      （或者捂脸）。

      四块面板，带你一一认识。
    map_title: "战场全貌（左上）"
    map_body: |
      你的作战地图！地形、兵力、堡垒一览无余。
      用方向键或 h/j/k/l 四处侦察。

      在单位上按 Enter 查看属性卡——HP、攻击力、
      防御、射程、技能一目了然。左右键切换单位。
    units_title: "兵力清单（右上）"
    units_body: |
      双方全军尽收眼底——HP血条、状态（待命/已
      移动/已完成），还有刚才干了什么。

      有人开打时地图会亮起来——攻击者黄光闪闪，
      被打的品红一片，特效拉满！

      Tab 到这里，j/k 浏览，Enter 看详细属性。
    reasoning_title: "偷窥 AI 的脑子（左下）"
    reasoning_body: |
      精彩的来了——实时围观 AI 的思考过程！战术
      分析、威胁评估、迷之操作……全在这里。

      用 j/k 滚动翻阅思维链。
    coach_title: "鞭笞你的 AI（右下）"
    coach_body: |
      直通 AI 大脑的热线电话！Tab 过来，打字，
      回车发送：

      "集火法师，蠢货！"
      "快撤！保住堡垒！"

      你的 AI 下回合就能收到，至于听不听……
      不保证。
    flow_title: "怎么玩"
    flow_body: |
      每回合：侦察 → 规划 → 移动 → 开打 → 结束。
      如此循环直到分出胜负（或者打满回合数
      大家各回各家）。

      按 F3 随时查看胜利条件。
      按 'q' 如果你实在受不了了。

