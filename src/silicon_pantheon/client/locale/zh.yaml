# 教程
tutorial:
  title: "教程"
  nav: "→/Enter 下一步   ← 上一步   s/Esc 跳过"
  lobby:
    welcome_title: "欢迎来到 Silicon Pantheon！"
    welcome_body: |
      这是一款战术棋盘对战游戏，AI 代理互相对战。
      你负责配置 AI、选择剧本，然后观看它们的战斗。

      本教程将带你了解基本操作。你可以随时在大厅
      按 't' 重新观看教程。
    rooms_title: "游戏大厅"
    rooms_body: |
      这里是游戏大厅，显示所有开放的游戏房间。

      使用 ↑/↓ 或 j/k 浏览房间。按 Enter 加入房间，
      或按 'p' 在加入前预览房间。
    actions_title: "创建和管理游戏"
    actions_body: |
      按 'n' 创建新的游戏房间。你将成为房主，可以
      配置剧本、战争迷雾、队伍分配和回合时间限制。

      按 'r' 刷新房间列表。
    replay_title: "观看回放"
    replay_body: |
      按 'w' 打开回放浏览器。你可以逐步回顾任何
      过去的比赛，检查单位属性，并阅读 AI 在每一步
      的推理过程。

      回放会在每场比赛结束后自动保存。
  room:
    welcome_title: "操作面板"
    welcome_body: |
      在这里配置比赛设置。房主可以更换剧本、战争迷雾、
      队伍模式和回合时间限制。双方玩家都必须点击
      "准备"后比赛才会开始。
    map_title: "地图预览"
    map_body: |
      此面板显示剧本地图，包括地形和初始单位位置。
      使用方向键移动光标查看地块。在单位上按 Enter
      可以查看属性。
    player_title: "玩家面板"
    player_body: |
      显示双方玩家的名称、AI 模型和准备状态。
      对手加入房间后会显示在这里。
    description_title: "剧本描述"
    description_body: |
      当前剧本的故事背景、胜利条件、军队配置和
      单位属性。使用 j/k 滚动查看完整描述。
      按 Tab 切换到此面板。
    scenario_title: "选择剧本"
    scenario_body: |
      房主可以选择剧本——每个剧本都有独特的地图、
      军队和胜利条件。

      使用操作面板中的"更换剧本"按钮。你可以预览
      地图、阅读单位描述和胜利条件。
    config_title: "游戏设置"
    config_body: |
      房主还可以配置：
      - 战争迷雾：隐藏敌方位置（关闭/经典/永久）
      - 队伍模式：固定队伍或随机分配
      - 房主队伍：房主玩哪一方
      - 回合时间限制：每回合最大秒数
    strategy_title: "策略文件"
    strategy_body: |
      你可以加载策略文件（来自 strategies/*.md），
      给 AI 代理一个预写的游戏计划。

      策略会在游戏开始时注入到代理的系统提示中。
      每个玩家设置自己的策略——不会影响对手。
    lessons_title: "过往比赛经验"
    lessons_body: |
      每场比赛结束后，AI 会写一篇战术复盘，总结
      什么策略有效、什么失败了。你可以选择过往的
      经验注入到代理的提示中。

      这让 AI 能够跨比赛学习，不断改进。
    ready_title: "准备就绪"
    ready_body: |
      当你对设置满意后，按"切换准备"按钮。
      按钮会显示 [已准备] 或 [未准备] 状态。

      当双方都准备好后，倒计时开始，
      比赛将自动开始。
  game:
    welcome_title: "战场"
    welcome_body: |
      比赛开始了！你的 AI 代理将轮流移动单位、
      攻击敌人，努力达成胜利条件。

      屏幕分为四个面板，让我们逐一了解。
    map_title: "地图面板（左上）"
    map_body: |
      地图显示带有地形和单位的网格。使用方向键
      或 h/j/k/l 移动光标。

      在单位上按 Enter 可以打开属性卡片——查看
      HP、攻击、防御、射程和技能。按左/右键在
      单位之间切换。
    units_title: "单位列表（右上）"
    units_body: |
      显示双方所有单位的 HP、状态（待命/已移动/
      已完成）和上一个动作。

      当单位攻击时，地图上会显示战斗高亮——
      攻击者黄色发光，目标品红色。

      按 Tab 切换到此面板，用 j/k 浏览单位。
      按 Enter 打开单位属性卡片。
    reasoning_title: "推理面板（左下）"
    reasoning_body: |
      实时显示 AI 的思维链推理过程。你可以看到
      代理在规划行动时的思考——战术分析、威胁
      评估等。

      使用 j/k 滚动浏览推理历史。
    coach_title: "教练面板（右下）"
    coach_body: |
      这是你与 AI 的直接沟通通道。输入消息并按
      Enter 发送比赛中的教练建议：

      "集火敌方法师！"
      "撤退保护堡垒！"

      代理会在下一回合接收你的消息，并将其
      纳入决策考虑。
    flow_title: "游戏流程"
    flow_body: |
      每个回合，代理会：观察棋盘 → 规划 →
      移动单位 → 攻击/治疗 → 结束回合。

      当达成胜利条件（占领堡垒、消灭 VIP、
      存活 N 回合等）或回合数达到上限时，
      比赛结束。

      按 'q' 退出。按 F3 在比赛中查看剧本
      描述和胜利条件。

