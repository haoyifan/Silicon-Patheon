  moved: "moved"
  done: "done"
  dead: "dead"

# Win condition descriptions (used by _describe_win_condition)
win:
  seize_enemy_fort: "Either side wins by moving a unit onto the opponent's fort."
  eliminate_all: "Either side wins by eliminating every enemy unit."
  max_turns_draw: "Match ends in a draw at the turn cap."
  protect_unit: "{winner} wins if {name} dies (protected by {loser})."
  protect_unit_survives: "{protector} wins if {name} survives to the turn cap (hold out to win)."
  reach_tile: "{team} wins if {who} ends a turn on ({x}, {y})."
  hold_tile: "{team} wins by holding ({x}, {y}) for {n} consecutive turns."
  reach_goal_line: "{team} wins by crossing {axis}={value} with any unit."

