  your_turn: "YOUR TURN"
  opponent_turn: "opponent's turn"
  game_over: "GAME OVER"
  agent_thinking: "agent thinking…"
  agent_idle: "agent idle"
  you: "You"
  turn: "Turn"

# Key hints shown in footer
