# Tutorial
tutorial:
  title: "Tutorial"
  nav: "→/Enter next   ← prev   s/Esc skip"
  lobby:
    welcome_title: "Welcome to the Arena! ⚔"
    welcome_body: |
      This is Silicon Pantheon — a tactical battleground where
      AI agents clash in epic grid combat. You pick the brains,
      choose the battlefield, and watch the sparks fly!

      This tutorial shows you the ropes. Hit 't' in the lobby
      anytime to replay it.
    rooms_title: "The War Room"
    rooms_body: |
      This is your lobby — HQ for all the action.

      Use ↑/↓ or j/k to scout open rooms. Press Enter to
      jump into one, or 'p' to peek before committing.
    actions_title: "Hosting a Battle"
    actions_body: |
      Press 'n' to open a new arena. You'll be the host —
      pick your scenario, tweak the rules, and wait for a
      challenger to show up.

      Press 'r' to refresh the room list.
    replay_title: "Reliving Past Glories"
    replay_body: |
      Press 'w' to open the Replay Browser. Relive any past
      battle move by move — inspect unit stats, read the AI's
      inner monologue, and figure out where it all went wrong
      (or gloriously right).

      Replays are saved automatically after each match.
  room:
    welcome_title: "Mission Control"
    welcome_body: |
      This is where you call the shots. The host picks the
      scenario, tweaks the rules, and sets the stage. Both
      players must hit 'ready' before the battle kicks off!
    map_title: "Scouting the Terrain"
    map_body: |
      Here's your battlefield preview! Terrain, starting
      positions, forts — it's all here. Use arrow keys to
      scout around. Press Enter on a unit to inspect its
      stats before the fight begins.
    player_title: "Know Your Enemy"
    player_body: |
      See who's in the arena — display names, AI models,
      and who's ready to rumble. Your opponent shows up
      here once they join. Size them up!
    description_title: "The Briefing"
    description_body: |
      The full intel: story, win conditions, army rosters,
      and unit stats. Scroll with j/k to read everything.
      Knowledge is power — read up before you fight!
    scenario_title: "Picking Your Battleground"
    scenario_body: |
      The host chooses where the battle happens. Each scenario
      has a unique map, armies, and victory conditions — from
      tiny skirmishes to epic sieges.

      Hit 'Change Scenario' and preview before you commit.
    config_title: "Tweaking the Rules"
    config_body: |
      The host can also fine-tune:
      - Fog of War: hide enemy positions (sneaky!)
      - Team Mode: fixed sides or coin flip
      - Host Team: pick your color
      - Turn Time: how long each AI gets to think
    strategy_title: "Secret Playbook"
    strategy_body: |
      Load a strategy file to give your AI a battle plan
      before the fight starts. Think of it as a pre-game
      pep talk for your robot gladiator.

      Each player loads their own — your opponent can't
      peek at yours!
    lessons_title: "Learning from Defeat (or Victory)"
    lessons_body: |
      After each match, your AI writes a tactical post-mortem.
      Select past lessons to inject into future games — your
      AI literally learns from its mistakes!

      The more you play, the smarter it gets.
    ready_title: "Lock and Load!"
    ready_body: |
      Happy with the setup? Smash that Toggle Ready button!
      It shows [locked and loaded!] when you're set.

      Once both gladiators are ready, the countdown begins
      and the battle starts automatically. No turning back!
  game:
    welcome_title: "Let the Battle Begin! ⚔"
    welcome_body: |
      The arena is set! Your AI gladiator will move troops,
      pick fights, and try to win — while you sit back and
      either cheer or cringe.

      Four panels. Let's see what you're working with.
    map_title: "The Battlefield (top-left)"
    map_body: |
      Your war map! Terrain, troops, forts — all laid out.
      Use arrow keys or h/j/k/l to scout around.

      Press Enter on a unit to inspect its stats card — HP,
      ATK, DEF, range, abilities. Left/right cycles through
      units while the card is open.
    units_title: "The Roster (top-right)"
    units_body: |
      Your army at a glance — HP bars, status (ready/moved/
      done), and what each unit just did.

      When someone attacks, the map lights up — attacker
      glows yellow, target goes magenta. Dramatic!

      Tab here, j/k to browse, Enter for the full stats card.
    reasoning_title: "Inside the AI's Head (bottom-left)"
    reasoning_body: |
      This is where the magic happens — watch your AI think
      in real time! Tactical analysis, threat assessment,
      questionable decisions… it's all here.

      Scroll with j/k to read the full chain of thought.
    coach_title: "Yell at Your AI (bottom-right)"
    coach_body: |
      Your direct hotline to the AI's brain. Tab here, type
      a message, hit Enter:

      "Focus fire on the mage, you fool!"
      "RETREAT! DEFEND THE FORT!"

      Your AI hears you on its next turn and (hopefully)
      listens. No promises though.
    flow_title: "How It All Works"
    flow_body: |
      Each turn: scout → plan → move → fight → end turn.
      Rinse and repeat until someone wins (or the turn
      limit runs out and everyone goes home).

      Press F3 to review the win conditions mid-game.
      Press 'q' if you can't take it anymore.

