# English UI strings — the default / fallback locale.
# Every key used by t() must exist here.

language_name: English

# Login / language picker
login:
  pick_language: "Pick Language"
  language_note: >
    Language affects all game text AND how the AI agent thinks.
    The agent's system prompt, reasoning, and strategic planning
    will be entirely in the selected language.

# Panel titles
panel:
  player: "Player"
  map: "Map"
  reasoning: "Reasoning"
  coach: "Coach"
  description: "Description"

# Game status
