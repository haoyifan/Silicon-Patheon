  page: "^f/^b page"
  half_page: "^d/^u ½page"
  top: "gg top"
  bottom: "G bottom"
  enter_details: "Enter details"
  move_cursor: "←↑↓→ (or h/j/k/l) move"

# Unit status names (engine uses English enums; display is localized)
