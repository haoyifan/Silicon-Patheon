schema_version: 1
license: public_domain
name: "Battle of Camlann — Arthurian Legend"
difficulty: 5
description: |
  Camlann, the twilight of Camelot. King Arthur leads his remaining
  Knights of the Round Table against the treacherous Mordred and his
  alliance of renegade knights and Saxon warriors. Merlin's magic
  clashes with Morgan le Fay's sorcery. An enchanted lake shimmers
  nearby, and the ruins of a once-great castle loom over the field.
  Arthur and Mordred must face each other — only one king can stand.
  Inspired by Arthurian legend, primarily Le Morte d'Arthur by Thomas Malory.

board:
  width: 20
  height: 16
  terrain:
    # === CAMELOT GATE — blue fort, southwest (y=13-15) ===
    - {x: 0, y: 13, type: camelot_gate}
    - {x: 1, y: 13, type: camelot_gate}
    - {x: 0, y: 14, type: camelot_gate}
    - {x: 1, y: 14, type: camelot_gate}
    - {x: 0, y: 15, type: camelot_gate}
    - {x: 1, y: 15, type: camelot_gate}

    # === MORDRED'S CAMP — red fort, northeast (y=0-2) ===
    - {x: 17, y: 0, type: mordred_camp}
    - {x: 18, y: 0, type: mordred_camp}
    - {x: 19, y: 0, type: mordred_camp}
    - {x: 17, y: 1, type: mordred_camp}
    - {x: 18, y: 1, type: mordred_camp}
    - {x: 19, y: 1, type: mordred_camp}

    # === CASTLE RUINS — scattered strongpoints ===
    # Southwest ruins (near Camelot)
    - {x: 0, y: 10, type: castle_ruins}
    - {x: 1, y: 10, type: castle_ruins}
    - {x: 2, y: 10, type: castle_ruins}
    - {x: 0, y: 11, type: castle_ruins}
    - {x: 1, y: 11, type: castle_ruins}
    # Northeast ruins (near Mordred's camp)
    - {x: 17, y: 4, type: castle_ruins}
    - {x: 18, y: 4, type: castle_ruins}
    - {x: 19, y: 4, type: castle_ruins}
    - {x: 18, y: 5, type: castle_ruins}
    - {x: 19, y: 5, type: castle_ruins}
    # Center ruins — old keep
    - {x: 9, y: 6, type: castle_ruins}
    - {x: 10, y: 6, type: castle_ruins}
    - {x: 9, y: 7, type: castle_ruins}

    # === STONE WALLS — impassable barriers channeling movement ===
    # West wall segment — forces units around or through the mud
    - {x: 4, y: 5, type: stone_wall}
    - {x: 4, y: 6, type: stone_wall}
    - {x: 4, y: 7, type: stone_wall}
    # Central wall — splits the battlefield
    - {x: 8, y: 3, type: stone_wall}
    - {x: 9, y: 3, type: stone_wall}
    - {x: 10, y: 3, type: stone_wall}
    - {x: 11, y: 3, type: stone_wall}
    # East wall segment
    - {x: 15, y: 8, type: stone_wall}
    - {x: 15, y: 9, type: stone_wall}
    - {x: 15, y: 10, type: stone_wall}

    # === ENCHANTED LAKE — impassable, center-east ===
    - {x: 12, y: 7, type: enchanted_lake}
    - {x: 13, y: 7, type: enchanted_lake}
    - {x: 14, y: 7, type: enchanted_lake}
    - {x: 12, y: 8, type: enchanted_lake}
    - {x: 13, y: 8, type: enchanted_lake}
    - {x: 14, y: 8, type: enchanted_lake}
    - {x: 13, y: 9, type: enchanted_lake}

    # === MUDDY GROUND — treacherous no-man's land ===
    # Wide muddy band across the center (y=7-9)
    - {x: 5, y: 7, type: muddy_ground}
    - {x: 6, y: 7, type: muddy_ground}
    - {x: 7, y: 7, type: muddy_ground}
    - {x: 8, y: 7, type: muddy_ground}
    - {x: 5, y: 8, type: muddy_ground}
    - {x: 6, y: 8, type: muddy_ground}
    - {x: 7, y: 8, type: muddy_ground}
    - {x: 8, y: 8, type: muddy_ground}
    - {x: 9, y: 8, type: muddy_ground}
    - {x: 10, y: 8, type: muddy_ground}
    - {x: 11, y: 8, type: muddy_ground}
    - {x: 5, y: 9, type: muddy_ground}
    - {x: 6, y: 9, type: muddy_ground}
    - {x: 7, y: 9, type: muddy_ground}
    - {x: 8, y: 9, type: muddy_ground}
    - {x: 9, y: 9, type: muddy_ground}
    - {x: 10, y: 9, type: muddy_ground}
    - {x: 11, y: 9, type: muddy_ground}
    - {x: 12, y: 9, type: muddy_ground}
    # Northern mud patches
    - {x: 6, y: 5, type: muddy_ground}
    - {x: 7, y: 5, type: muddy_ground}
    - {x: 13, y: 5, type: muddy_ground}
    - {x: 14, y: 5, type: muddy_ground}

    # === FALLEN BANNERS — scattered cover across the field ===
    - {x: 3, y: 4, type: fallen_banner}
    - {x: 7, y: 4, type: fallen_banner}
    - {x: 13, y: 4, type: fallen_banner}
    - {x: 16, y: 6, type: fallen_banner}
    - {x: 3, y: 8, type: fallen_banner}
    - {x: 16, y: 10, type: fallen_banner}
    - {x: 6, y: 11, type: fallen_banner}
    - {x: 12, y: 11, type: fallen_banner}
    - {x: 3, y: 12, type: fallen_banner}
    - {x: 16, y: 3, type: fallen_banner}

    # === ADDITIONAL CASTLE RUINS — southeast corner ===
    - {x: 17, y: 13, type: castle_ruins}
    - {x: 18, y: 13, type: castle_ruins}
    - {x: 19, y: 13, type: castle_ruins}
    - {x: 19, y: 14, type: castle_ruins}
  forts:
    - {x: 0, y: 14, owner: blue}
    - {x: 0, y: 15, owner: blue}
    - {x: 1, y: 15, owner: blue}
    - {x: 18, y: 0, owner: red}
    - {x: 19, y: 0, owner: red}
    - {x: 19, y: 1, owner: red}

terrain_types:
  castle_ruins:
    display_name: Castle Ruins
    move_cost: 2
    defense_bonus: 2
    glyph: "%"
    color: dim
    description: |
      Crumbling stone walls and fallen towers. Once-proud
      fortifications that still offer shelter to those who fight
      among the rubble.
  enchanted_lake:
    display_name: Enchanted Lake
    move_cost: 99
    defense_bonus: 0
    passable: false
    glyph: "~"
    color: blue
    description: |
      A shimmering lake of otherworldly power. Impassable, but its
      waters heal those who stand at its shores. The Lady of the
      Lake watches from below.
  stone_wall:
    display_name: Stone Wall
    move_cost: 99
    defense_bonus: 0
    passable: false
    glyph: "#"
    color: white
    description: |
      Ancient stone fortifications. Impassable barriers that channel
      the flow of battle across the field.
  camelot_gate:
    display_name: Camelot Gate
    move_cost: 1
    defense_bonus: 3
    glyph: "@"
    color: blue
    description: |
      The last gate of Camelot. Arthur's knights rally here,
      defending the remnants of their once-great kingdom.
  mordred_camp:
    display_name: "Mordred's Camp"
    move_cost: 1
    defense_bonus: 3
    glyph: "!"
    color: magenta
    description: |
      Mordred's war camp, flying the black banner of rebellion.
      A fortified command post for the usurper's forces.
  muddy_ground:
    display_name: Muddy Ground
    move_cost: 2
    defense_bonus: -1
    glyph: ","
    color: yellow
    description: |
      Rain-soaked earth churned by boots and hooves. The footing
      is treacherous and offers no shelter from attack.
  fallen_banner:
    display_name: Fallen Banner
    move_cost: 1
    defense_bonus: 1
    glyph: ">"
    color: dim
    description: |
      A tattered banner lies draped over broken weapons and the
      fallen. Provides scant cover amid the carnage.

unit_classes:
  arthur:
    display_name: King Arthur
    description: |
      The Once and Future King. Excalibur blazes in his hand, and
      his courage inspires all who follow him. He must face Mordred
      or Britain falls.
    hp_max: 32
    atk: 13
    defense: 8
    res: 6
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "A"
    color: bright_cyan

  lancelot:
    display_name: Sir Lancelot
    description: |
      The greatest knight who ever lived. His sword arm is peerless,
      his speed legendary. Even now, his loyalty to Arthur is absolute.
    hp_max: 28
    atk: 14
    defense: 6
    res: 4
    spd: 7
    move: 5
    rng_min: 1
    rng_max: 1
    glyph: "L"
    color: bright_cyan

  gawain:
    display_name: Sir Gawain
    description: |
      Arthur's nephew, the Knight of the Sun. His strength waxes
      with daylight. A devastating heavy hitter who shrugs off
      punishment, but his bulk slows him.
    hp_max: 30
    atk: 12
    defense: 7
    res: 3
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "G"
    color: bright_cyan

  percival:
    display_name: Sir Percival
    description: |
      The Grail Knight. Pure of heart, Percival hurls a blessed
      javelin that blazes with holy light, striking foes at range.
      His faith shields him from dark sorcery.
    hp_max: 22
    atk: 9
    defense: 4
    res: 7
    spd: 5
    move: 4
    rng_min: 2
    rng_max: 3
    glyph: "P"
    color: cyan

  galahad:
    display_name: Sir Galahad
    description: |
      The Perfect Knight, son of Lancelot. His purity grants him
      the power to channel the Grail's healing light, mending
      wounded allies. Resists magic and corruption.
    hp_max: 22
    atk: 7
    defense: 5
    res: 9
    spd: 5
    move: 4
    rng_min: 1
    rng_max: 1
    can_heal: true
    heal_amount: 5
    glyph: "H"
    color: cyan

  merlin:
    display_name: Merlin
    description: |
      The greatest wizard of the age. His spells strike from afar,
      his healing arts mend the wounded, and his counsel guides kings.
    hp_max: 20
    atk: 12
    defense: 2
    res: 10
    spd: 5
    move: 3
    rng_min: 2
    rng_max: 4
    is_magic: true
    can_heal: true
    heal_amount: 7
    glyph: "M"
    color: bright_cyan

  camelot_archer:
    display_name: Camelot Archer
    description: |
      Longbowmen of Camelot, trained on the castle battlements.
      Their arrows arc across the field with deadly precision,
      though they are vulnerable in close quarters.
    hp_max: 18
    atk: 10
    defense: 3
    res: 3
    spd: 5
    move: 4
    rng_min: 2
    rng_max: 4
    glyph: "B"
    color: cyan

  mordred:
    display_name: Mordred
    description: |
      Arthur's illegitimate son and betrayer. Consumed by ambition
      and spite, he has raised an army to seize the throne. His blade
      is destined to strike the fatal blow.
    hp_max: 30
    atk: 12
    defense: 7
    res: 5
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "X"
    color: bright_red

  morgan:
    display_name: Morgan le Fay
    description: |
      Arthur's half-sister and sorceress of terrible power. Her
      enchantments weaken and corrupt, and her healing arts sustain
      Mordred's forces.
    hp_max: 18
    atk: 11
    defense: 2
    res: 9
    spd: 5
    move: 3
    rng_min: 2
    rng_max: 4
    is_magic: true
    can_heal: true
    heal_amount: 6
    glyph: "F"
    color: bright_red

  agravaine:
    display_name: Sir Agravaine
    description: |
      Gawain's brother, a mounted knight turned traitor. He rides
      hard and strikes fast, flanking the enemy before they can
      form a line. His honour is long spent, but his lance is sharp.
    hp_max: 22
    atk: 10
    defense: 5
    res: 3
    spd: 7
    move: 5
    rng_min: 1
    rng_max: 1
    glyph: "V"
    color: bright_red

  saxon_skirmisher:
    display_name: Saxon Skirmisher
    description: |
      Pagan warriors from across the sea, allied with Mordred for
      plunder. They hurl javelins before closing to finish with axe,
      harassing the enemy from a distance.
    hp_max: 20
    atk: 8
    defense: 3
    res: 2
    spd: 5
    move: 4
    rng_min: 1
    rng_max: 3
    glyph: "S"
    color: red

  dark_knight:
    display_name: Dark Knight
    description: |
      Knights who have forsaken their oaths and joined Mordred's
      cause. Encased in black plate, they are walking fortresses —
      slow but nearly impossible to bring down.
    hp_max: 26
    atk: 8
    defense: 8
    res: 4
    spd: 3
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "D"
    color: red

armies:
  blue:
    # Main force — Arthur center-left
    - {class: arthur, pos: {x: 3, y: 13}}
    - {class: lancelot, pos: {x: 5, y: 12}}
    - {class: gawain, pos: {x: 2, y: 12}}
    # Support — Merlin and Galahad behind the line
    - {class: merlin, pos: {x: 1, y: 14}}
    - {class: galahad, pos: {x: 4, y: 14}}
    # Right flank — Percival and archers pushing east
    - {class: percival, pos: {x: 7, y: 13}}
    - {class: camelot_archer, pos: {x: 6, y: 14}}
    - {class: camelot_archer, pos: {x: 9, y: 12}}

  red:
    # Main force — Mordred center-right
    - {class: mordred, pos: {x: 16, y: 2}}
    - {class: morgan, pos: {x: 18, y: 2}}
    - {class: agravaine, pos: {x: 14, y: 3}}
    # West flank — Saxons pushing through the gap
    - {class: saxon_skirmisher, pos: {x: 12, y: 2}}
    - {class: saxon_skirmisher, pos: {x: 11, y: 4}}
    # Dark knights — armored anvil across the front
    - {class: dark_knight, pos: {x: 15, y: 4}}
    - {class: dark_knight, pos: {x: 17, y: 5}}
    - {class: dark_knight, pos: {x: 13, y: 5}}

rules:
  max_turns: 20
  first_player: red

win_conditions:
  - {type: protect_unit, unit_id: u_b_arthur_1, owning_team: blue}
  - {type: protect_unit, unit_id: u_r_mordred_1, owning_team: red}
  - {type: eliminate_all_enemy_units}
  - {type: seize_enemy_fort}
  - {type: max_turns_draw}

narrative:
  title: Battle of Camlann
  description: |
    Camlann, the final battle. King Arthur leads his loyal knights
    against Mordred's rebel army. The fate of Camelot and all of
    Britain hangs in the balance.
  intro: |
    Mist rolls across the field of Camlann. Two armies face each
    other in the grey dawn — father against son, knight against
    knight. Excalibur gleams. Mordred's black banner snaps in the
    wind. There will be no parley. Only steel.
  events:
    - trigger: on_turn_start
      turn: 5
      text: |
        Merlin's staff blazes with white fire. Morgan le Fay answers
        with a wall of shadow. The two sorceries collide in the air
        between the armies, crackling with power.
    - trigger: on_turn_start
      turn: 12
      text: |
        The field is strewn with the fallen. Arthur pushes forward,
        Excalibur raised. Across the carnage, Mordred waits. The
        prophecy draws them together like lodestone and iron.
    - trigger: on_unit_killed
      unit_id: u_r_mordred_1
      text: |
        Arthur drives Excalibur through Mordred's chest. But with
        his dying strength, Mordred strikes one last blow. The age
        of Camelot ends on this bloody field.
    - trigger: on_unit_killed
      unit_id: u_b_arthur_1
      text: |
        The King falls. Sir Bedivere carries him to the enchanted
        lake. A barge of silver appears in the mist. Arthur is borne
        away to Avalon, to sleep until Britain needs him again.
