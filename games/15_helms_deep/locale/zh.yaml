# 圣盔谷 — 中文本地化
name: 圣盔谷——号角堡之围 — 指环王
description: |
  暴雨倾盆。一万强兽人涌上深溪谷，扑向圣盔谷古堡。
  阿拉贡、莱戈拉斯、吉姆利和一队罗斯洛瑞恩精灵弓手
  与希优顿王的近卫军一起驻守深墙。强兽人带来了攻城梯、
  撞门锤，和一个携带爆炸物的狂战士瞄准排水沟。
  蓝方必须坚守到黎明——或在城墙上击溃敌军。

unit_classes:
  aragorn:
    display_name: 阿拉贡
    description: |
      登丹人的族长，西方的游侠。手持安都瑞尔重铸之剑，
      在深墙上独当一面。
  legolas:
    display_name: 莱戈拉斯
    description: |
      幽暗密林的精灵王子。在深墙城垛上，每一箭都夺命。
      在险境中与吉姆利比拼杀敌数——并且领先。
  gimli:
    display_name: 吉姆利
    description: |
      矮人战士，手持双斧。在城门处寸步不让，
      将敢于攻入的强兽人劈成碎片。
  theoden:
    display_name: 希优顿王
    description: |
      洛汗之王。从萨鲁曼的控制中苏醒后，选择在
      号角堡做最后的抵抗而非逃跑。他的陨落意味着
      洛汗的沦陷。
  haldir:
    display_name: 罗斯洛瑞恩的哈尔迪尔
    description: |
      精灵弓箭队长。率领精灵弓手支援号角堡，
      履行精灵与人类的古老同盟。
  eomer:
    display_name: 伊欧默
    description: |
      洛汗元帅。被放逐后率领骑兵从外围进攻，
      在绝望中给予圣盔谷最后的希望。
  ugluk:
    display_name: 乌格鲁克
    description: |
      强兽人指挥官。率领攻城部队，残暴高效。
  lurtz:
    display_name: 鲁兹
    description: |
      萨鲁曼的首席精英。弓箭与弯刀双修的混血兽人，
      在远近两种距离上都极具威胁。
  sharku:
    display_name: 夏库
    description: |
      骑乘座狼的斥候。绕过防线侧翼包抄。
  berserker:
    display_name: 强兽人狂战士
    description: |
      携带爆炸物的自杀式突击兵。以排水沟为目标——
      一旦到达就会炸开城墙。
  siege_captain:
    display_name: 攻城长 戈鲁尔
    description: |
      操控攻城撞锤的巨型强兽人。缓慢但坚如磐石。
      专为摧毁瓶颈而生。
  sapper:
    display_name: 强兽人工兵
    description: |
      携带萨鲁曼爆炸火药的工兵。缓慢且脆弱，但一旦
      到达排水沟，城墙就会崩塌。必须在他到达之前杀死他。
  crossbow_captain:
    display_name: 毛胡尔
    description: |
      强兽人弩手连队长。在城墙射程之外提供火力掩护。
      精准、耐心、对暴露的守军致命。
  ladder_captain:
    display_name: 嘎什纳克
    description: |
      北翼攻城梯队指挥。他的任务是用纯粹的数量优势
      淹没城垛上的精灵弓手。机动性高，中等护甲。

terrain_types:
  cliff:
    display_name: 山崖
  deeping_wall:
    display_name: 深墙
  fortress_gate:
    display_name: 城门
  culvert:
    display_name: 排水沟
  rampart:
    display_name: 城垛
  causeway:
    display_name: 甬道
  keep_wall:
    display_name: 内堡墙

narrative:
  title: 圣盔谷——号角堡之围
  description: |
    暴雨倾盆。一万强兽人涌上深溪谷。阿拉贡、莱戈拉斯和
    吉姆利在深墙上坚守。希优顿王在号角堡内等待黎明。
  intro: |
    雨夜。城墙上的弓手可以看到数不清的火把从谷底延伸到
    地平线。然后第一波攻城梯撞上了墙壁。
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        攻城梯砸上北墙。强兽人开始攀登。
        哈尔迪尔的弓手向人群中齐射。
    - trigger: on_turn_start
      turn: 5
      text: |
        工兵到达排水沟！爆炸火药在城墙下方引燃——
        如果缺口守不住，强兽人将蜂拥而入。
    - trigger: on_turn_start
      turn: 8
      text: |
        城门在撞锤下颤抖。阿拉贡和吉姆利在甬道上
        争取时间。城墙在呻吟。
    - trigger: on_turn_start
      turn: 12
      text: |
        东方山脊上出现一道白光。白袍甘道夫随黎明而来。
        围攻被打破了。
    - trigger: on_unit_killed
      unit_id: u_b_theoden_1
      text: |
        王陨落了。号角堡失去了它的心——守军崩溃了。
    - trigger: on_unit_killed
      unit_id: u_b_haldir_1
      text: |
        哈尔迪尔倒在城垛上，被强兽人的刀刃刺穿。
        精灵阵线动摇了。
