    - {x: 8, y: 9, type: causeway}
    - {x: 9, y: 9, type: cliff}
    - {x: 10, y: 9, type: cliff}
    - {x: 11, y: 9, type: cliff}
    - {x: 12, y: 9, type: ladder}
    - {x: 13, y: 9, type: cliff}
    - {x: 14, y: 9, type: cliff}
    - {x: 15, y: 9, type: ladder}
    - {x: 16, y: 9, type: cliff}
    - {x: 17, y: 9, type: ladder}
    - {x: 18, y: 9, type: ladder}
    - {x: 19, y: 9, type: cliff}
    - {x: 20, y: 9, type: cliff}
    - {x: 21, y: 9, type: cliff}

    # ── Left cliff wall (x=0, y=1-8) ──
    - {x: 0, y: 1, type: cliff}
    - {x: 0, y: 2, type: cliff}
    - {x: 0, y: 3, type: cliff}
    - {x: 0, y: 4, type: cliff}
    - {x: 0, y: 5, type: cliff}
    - {x: 0, y: 6, type: cliff}
    - {x: 0, y: 7, type: cliff}
    - {x: 0, y: 8, type: cliff}

    # ── Mountain walls east of fortress (y=1-2, x=13-21) ──
    - {x: 13, y: 1, type: cliff}
    - {x: 14, y: 1, type: cliff}
    - {x: 15, y: 1, type: cliff}
    - {x: 16, y: 1, type: cliff}
    - {x: 17, y: 1, type: cliff}
    - {x: 18, y: 1, type: cliff}
    - {x: 19, y: 1, type: cliff}
    - {x: 20, y: 1, type: cliff}
    - {x: 21, y: 1, type: cliff}

    # ── Inner keep walls (x=1, y=1-8 — gaps at y=3-6 for courtyard access) ──
    - {x: 1, y: 1, type: keep_wall}
    - {x: 1, y: 2, type: keep_wall}
    - {x: 1, y: 7, type: keep_wall}
    - {x: 1, y: 8, type: keep_wall}

    # ── Inner keep walls (x=5, y=1-2 and y=7-8 — courtyard partition) ──
    - {x: 5, y: 1, type: keep_wall}
