    - {x: 2, y: 0, type: cliff}
    - {x: 3, y: 0, type: cliff}
    - {x: 4, y: 0, type: cliff}
    - {x: 5, y: 0, type: cliff}
    - {x: 6, y: 0, type: cliff}
    - {x: 7, y: 0, type: cliff}
    - {x: 8, y: 0, type: cliff}
    - {x: 9, y: 0, type: cliff}
    - {x: 10, y: 0, type: cliff}
    - {x: 11, y: 0, type: cliff}
    - {x: 12, y: 0, type: cliff}
    - {x: 13, y: 0, type: cliff}
    - {x: 14, y: 0, type: cliff}
    - {x: 15, y: 0, type: cliff}
    - {x: 16, y: 0, type: cliff}
    - {x: 17, y: 0, type: cliff}
