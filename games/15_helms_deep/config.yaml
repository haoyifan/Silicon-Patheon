    - {x: 10, y: 6, type: deeping_wall}

    # ── Ramparts north (x=7-12, y=1-2 — atop the wall) ──
    - {x: 8, y: 1, type: rampart}
    - {x: 9, y: 1, type: rampart}
    - {x: 10, y: 1, type: rampart}
    - {x: 11, y: 1, type: rampart}
    - {x: 12, y: 1, type: rampart}
    - {x: 8, y: 2, type: rampart}
    - {x: 9, y: 2, type: rampart}
    - {x: 10, y: 2, type: rampart}
    - {x: 11, y: 2, type: rampart}
    - {x: 12, y: 2, type: rampart}

    # ── Ramparts south (x=7-12, y=7-8 — atop the wall) ──
    - {x: 8, y: 7, type: rampart}
    - {x: 9, y: 7, type: rampart}
    - {x: 10, y: 7, type: rampart}
    - {x: 11, y: 7, type: rampart}
