schema_version: 1
license: fan_work
fan_work_source: "The Lord of the Rings (J.R.R. Tolkien / Warner Bros.)"
name: "Helm's Deep — The Hornburg Siege — Lord of the Rings"
difficulty: 5
description: |
  Rain hammers the gorge. Ten thousand Uruk-hai pour up the
  Deeping Coomb toward the ancient fortress of Helm's Deep.
  Aragorn, Legolas, Gimli, and a company of Galadhrim elves
  man the Deeping Wall alongside King Théoden's household
  guard. The Uruks bring siege ladders, a battering ram for
  the gate, and a berserker with blasting fire for the
  culvert. Blue must hold the fortress until dawn — or break
  the host on the walls.
  Inspired by the Battle of Helm's Deep from The Lord of the Rings by J.R.R. Tolkien.

# ──────────────────────────────────────────────────────────
#  MAP LAYOUT  (22 wide x 14 tall)
#
#  y=0     ^ ^ ^ ^ ^ ^ ^ ^ ^ ^ ^ ^ ^ ^ ^ ^ ^ ^ ^ ^ ^ ^   North cliffs
#  y=1     ^ | . . . | . ; ; ; ; ; ; ^ ^ ^ ^ ^ ^ ^ ^ ^   Keep + ramparts
#  y=2     ^ | . . . | . ; ; ; ; ; ; . . . . . . . . .   Keep wall + ramparts
#  y=3     ^ | . . . . . # # . # # . . . . . . . . . .   Courtyard + wall
#  y=4     ^ | . . . . . # = . # # . . . . . . . . . .   Wall + gate (=)
#  y=5     ^ | . . . . . # = . # # . . . . . . . . . .   Wall + gate (=)
#  y=6     ^ | . . . . . # # . # # . . . . . . . . . .   Wall continues
#  y=7     ^ | . . . | . ; ; ; ; ; ; . . . . . . . . .   Keep wall + ramparts
#  y=8     ^ | . . . | . ; ; ; ; o ; . . . . . . . . .   Ramparts + culvert
#  y=9     ^ ^ ^ b b ^ ^ : : ^ ^ ^ l ^ ^ l ^ l l ^ ^ ^   Wall line w/ breaches
#  y=10    . . . . . . . : : . . . . . . . . . . . . .   Causeway approach
#  y=11    . . . . . . . . . . . . . . . . . . . . . .   Open field
#  y=12    . . . . . . . . . . . . . . . . . . . . . .   Uruk staging
#  y=13    . . . . . . . . . . . . . . . . . . . . . .   Uruk rear
#
#  The fortress occupies x=0-12, y=0-9 (within cliffs).
#  Inner keep: x=1-4, y=1-8 (keep walls at x=1 and x=5 partial).
#  Deeping Wall: x=7, y=1-8 (impassable, gate at y=4-5).
#  Ramparts: x=7-12, y=1-2 and y=7-8 (atop the wall).
#  Culvert: x=10, y=8.
#  Causeway: x=7-8, y=10 and x=7-8, y=9 (main ramp up to the gate).
#  Breach (b): x=3-4, y=9 — the culvert wall blown open by blasting fire.
#  Ladder (l): x=12, 15, 17, 18, y=9 — siege ladders on the Deeping Wall;
#    a double ladder at x=17-18 gives the eastern assault a foothold.
#  Cliffs fill the remaining spans of y=9, channeling attackers into
#  three distinct approaches (west breach / centre causeway / east ladders).
# ──────────────────────────────────────────────────────────

