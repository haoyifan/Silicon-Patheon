    # Ridge line along y=0 — full hilltop cover
    - {x: 0, y: 0, type: hill}
    - {x: 1, y: 0, type: hill}
    - {x: 2, y: 0, type: hill}
    - {x: 3, y: 0, type: hill}
    - {x: 4, y: 0, type: hill}
    - {x: 5, y: 0, type: hill}
    - {x: 6, y: 0, type: hill}
    - {x: 7, y: 0, type: hill}
    - {x: 8, y: 0, type: hill}
    - {x: 9, y: 0, type: hill}
    - {x: 10, y: 0, type: hill}
    - {x: 11, y: 0, type: hill}
    - {x: 12, y: 0, type: hill}
    - {x: 13, y: 0, type: hill}
    - {x: 14, y: 0, type: hill}
    - {x: 15, y: 0, type: hill}
    - {x: 16, y: 0, type: hill}
    - {x: 17, y: 0, type: hill}
    # Hill slopes at y=1 — partial cover as riders descend
    - {x: 0, y: 1, type: hill}
    - {x: 1, y: 1, type: hill}
    - {x: 2, y: 1, type: hill}
    - {x: 5, y: 1, type: hill}
    - {x: 6, y: 1, type: hill}
    - {x: 9, y: 1, type: hill}
    - {x: 10, y: 1, type: hill}
