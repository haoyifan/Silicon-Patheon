    - {x: 6, y: 2, type: hill}
    - {x: 13, y: 2, type: hill}
    # Scorpion emplacement — elevated western position Bronn must reach
    - {x: 0, y: 2, type: scorpion_position}

    # ── Open field / charge zone (y=3-4) ── brush for partial cover ──
