# 阿蒙汉——远征队的分裂 — 中文本地化
name: 阿蒙汉——远征队的分裂 — 指环王
description: |
  帕斯加兰，第三纪元3019年2月26日。远征队在阿蒙汉山脚、
  宁希索尔湖西岸歇息。佛罗多带着魔戒悄悄离去，但山姆
  还没来得及跟上，卢茨率领的强兽人就从森林中杀出。
  波罗米尔冲上去保护梅里和皮聘。阿拉贡、莱戈拉斯和
  金雳在树林中杀出血路。佛罗多必须在强兽人截断他之前
  到达东岸的渡口——系着小船的浅滩。

unit_classes:
  aragorn:
    display_name: 阿拉贡
    description: |
      伊西尔杜尔的后裔，在瑞文戴尔长大，在荒野中磨砺。
      以游侠长剑和一个已经失败了一个任务、不会再失败
      另一个的人的怒火战斗。
  legolas:
    display_name: 莱戈拉斯
    description: |
      密林王子。他的弓在树间唱起死亡之歌——每一箭都
      找到一个强兽人的咽喉。穿过森林如水过芦苇。
  gimli:
    display_name: 金雳
    description: |
      格洛因之子。他的战斧像劈柴一样劈开强兽人的盾。
      比其他人慢，但每一击都如雷霆。他数着每一个杀敌。
  boromir:
    display_name: 波罗米尔
    description: |
      白塔统领，摄政王长子。吹响刚铎号角冲入强兽人群中
      保护霍比特人。一支又一支箭射中他，但他不肯倒——
      只要他们还需要他。
  frodo:
    display_name: 佛罗多·巴金斯
    description: |
      持戒者。矮小、恐惧，口袋里承载着世界的重量。
      他必须到达东岸的小船独自渡河。使命系于此一举。
  sam:
    display_name: 山姆卫斯·甘吉
    description: |
      袋底洞的园丁。忠诚超出理性，比自己知道的更勇敢。
      他会跟佛罗多先生走进魔多再走回来。以王者之叶
      和稳健的双手治疗伤口。
  merry:
    display_name: 梅里亚达克·烈酒鹿
    description: |
      梅里——聪明、勇敢、矮小到被人低估。他用一把
      在邪恶面前微微发光的古墓短剑战斗。
  pippin:
    display_name: 皮瑞格林·图克
    description: |
      皮聘——远征队中最年轻的，好奇心重容易闯祸。
      关键时刻很勇敢，这已经超过大多数人了。
  lurtz:
    display_name: 卢茨
    description: |
      战斗型强兽人队长，在艾辛格的地坑中培育。
      巨大、凶残、目标明确。他带着巨弓和弯刀。
      命令很清楚——把半身人带给萨鲁曼。活的，完好的。
  ugluk:
    display_name: 乌格鲁克
    description: |
      强兽人队长，卢茨的副手。坚韧、残暴，聪明到足以
      管住普通兽人。
  mauhur:
    display_name: 毛胡尔
    description: |
      强兽人追踪者和侧翼奇兵。率领一支斥候小队
      切断森林中的逃跑路线。
  lugdush:
    display_name: 卢格杜什
    description: |
      强兽人狂战士。脸上涂着萨鲁曼的白手印。
      以不顾一切的狂怒冲锋。
  grishnakh:
    display_name: 格里什纳赫
    description: |
      依附于强兽人部队的魔多兽人。比强兽人矮小但更狡猾。
      为索伦效力，不为萨鲁曼。
  uruk_archer:
    display_name: 强兽人弩手
    description: |
      手持重型弩的强兽人。铁弩箭在射程内贯穿铠甲。
  uruk_shield:
    display_name: 强兽人盾兵
    description: |
      手持宽铁盾的强兽人。组成突击前线，极难击倒。

terrain_types:
  forest:
    display_name: 森林
    description: |
      西岸的古老橡树和榆树。树冠遮蔽冬日阳光。
      适合伏击——或逃跑。
  ruins:
    display_name: 废墟
    description: |
      阿蒙汉山上的废墟石座和雕刻石柱，努门诺尔人在
      刚铎辉煌时代所建，如今破败蔓草丛生。
  hilltop:
    display_name: 山顶
    description: |
      视见之丘。+2防御，移动消耗2。
  pillars:
    display_name: 倒塌石柱
    description: |
      倒塌的努门诺尔石柱，半埋在苔藓中。+2防御，移动消耗2。
  rocks:
    display_name: 碎石地
    description: |
      碎石和岩屑。+1防御，移动消耗2。
  river:
    display_name: 安都因河
    description: |
      安都因大河，寒冷湍急。无法通行。

narrative:
  title: 阿蒙汉——远征队的分裂
  description: |
    帕斯加兰，第三纪元3019年。艾辛格的强兽人在阿蒙汉
    山脚袭击远征队。佛罗多必须到达东岸的小船。
    同伴们必须为他争取时间。
  intro: |
    刚铎号角在树间回响——一次，两次，三次。波罗米尔
    在战斗。阿拉贡拔剑奔向声音的方向。透过冬日光秃的
    树枝，黑影以可怕的速度移动。萨鲁曼的白手印在
    他们的盾牌上。
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        波罗米尔再次吹响号角。它的呼声越过宁希索尔湖，
        在悬崖上回荡。他站在霍比特人身前，剑已染红到柄。
    - trigger: on_turn_start
      turn: 6
      text: |
        箭矢钉入波罗米尔周围的树干。强兽人从四面八方
        逼近。阿拉贡又砍倒两个，但每倒一个就冒出三个。
    - trigger: on_turn_start
      turn: 10
      text: |
        森林中满是铁器碰撞和垂死者的尖叫。佛罗多
        通往小船的路随每一刻过去都在变窄。
    - trigger: on_unit_killed
      unit_id: u_b_boromir_1
      text: |
        波罗米尔跪倒，身中数箭。他已赎回了自己。
        阿拉贡赶到他身边，临终的人低语道："我愿追随您，
        我的兄弟。我的统帅。我的王。"
    - trigger: on_unit_killed
      unit_id: u_r_lurtz_1
      text: |
        阿拉贡一剑斩下卢茨的头颅。强兽人队长倒下了，
        但他的部下继续推进——执行萨鲁曼的命令不需要首领。
