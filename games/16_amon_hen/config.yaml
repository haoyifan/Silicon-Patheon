terrain_types:
  forest:
    display_name: Forest
    description: Ancient oaks and elms. +2 DEF, good for ambush.
    move_cost: 1
    defense_bonus: 2
    glyph: "f"
    color: green
  ruins:
    display_name: Ruins
    description: Crumbling Numenorean ruins atop Amon Hen. +3 DEF, costs 2 movement.
    move_cost: 2
    defense_bonus: 3
    glyph: "%"
    color: yellow
  hilltop:
    display_name: Hilltop
    description: The Hill of Sight. +2 DEF, costs 2 movement.
    move_cost: 2
    defense_bonus: 2
    glyph: "^"
    color: yellow
  pillars:
    display_name: Fallen Pillars
    description: Toppled Numenorean columns, half-buried in moss. +2 DEF, costs 2 movement.
    move_cost: 2
    defense_bonus: 2
    glyph: "|"
    color: white
  rocks:
    display_name: Rocky Ground
    description: Broken stone and scree. +1 DEF, costs 2 movement.
    move_cost: 2
    defense_bonus: 1
    glyph: "o"
    color: white
  river:
    display_name: River Anduin
    description: The Anduin, cold and swift. Impassable.
    move_cost: 99
    passable: false
    glyph: "~"
    color: blue

unit_classes:
  aragorn:
    display_name: Aragorn
    description: |
      Heir of Isildur, Ranger of the North. Fights with a long
      sword and the fury of a man who will not fail another quest.
      The strongest melee fighter on the blue side.
    hp_max: 32
    atk: 12
    defense: 7
    res: 5
    spd: 7
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "A"
    color: white

  boromir:
    display_name: Boromir
    description: |
      Captain of the White Tower, eldest son of Denethor. He sounds
      the Horn of Gondor and charges the Uruks to protect the
      hobbits. VIP -- his death means the hobbits are taken.
    hp_max: 30
    atk: 11
    defense: 8
    res: 3
    spd: 5
    move: 4
    rng_min: 1
    rng_max: 1
    tags: [vip]
    glyph: "B"
    color: bright_cyan

  legolas:
    display_name: Legolas
    description: |
      Prince of the Woodland Realm. His bow sings among the trees --
      every arrow finds an Uruk throat. Fast and deadly at range.
    hp_max: 22
    atk: 10
    defense: 4
    res: 4
    spd: 8
    move: 4
    rng_min: 2
    rng_max: 4
    glyph: "L"
    color: green

  gimli:
    display_name: Gimli
    description: |
      Son of Gloin. His axe splits Uruk shields like kindling.
      Slower than the others but each blow is a thunderclap.
      He counts every kill.
    hp_max: 28
    atk: 11
    defense: 9
    res: 3
    spd: 3
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "G"
    color: yellow

  merry:
    display_name: Meriadoc Brandybuck
    description: |
      Merry -- clever, courageous, small enough to be underestimated.
      His Barrow-blade glows faintly in the presence of evil.
    hp_max: 10
    atk: 3
    defense: 2
    res: 3
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "M"
    color: green

  pippin:
    display_name: Peregrin Took
    description: |
      Pippin -- youngest of the Company, brave when it counts.
      Fights beside Merry under Boromir's protection.
    hp_max: 10
    atk: 3
    defense: 2
    res: 3
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "P"
    color: green

  lurtz:
    display_name: Lurtz
    description: |
      Captain of the Fighting Uruk-hai, bred in the pits of
      Isengard. Enormous, savage, single-minded. Carries a great
      bow and a scimitar. VIP for red -- his orders are to bring
      the Halflings to Saruman alive.
    hp_max: 30
    atk: 12
    defense: 6
    res: 3
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 3
    tags: [vip]
    glyph: "Z"
    color: bright_red

  ugluk:
    display_name: Ugluk
    description: |
      Uruk-hai captain, second to Lurtz. Tough, brutal, and smart
      enough to keep the common orcs in line.
    hp_max: 24
    atk: 10
    defense: 6
    res: 2
    spd: 5
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "U"
    color: bright_red

  mauhur:
    display_name: Mauhur
    description: |
      Uruk-hai tracker and flanker. Commands a scouting party that
      cuts off escape routes through the forest.
    hp_max: 20
    atk: 9
    defense: 4
    res: 2
    spd: 7
    move: 5
    rng_min: 1
    rng_max: 1
    glyph: "H"
    color: red

  lugdush:
    display_name: Lugdush
    description: |
      Uruk-hai berserker. White hand of Saruman painted on his
      face. Charges with reckless fury.
    hp_max: 22
    atk: 10
    defense: 4
    res: 2
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "D"
    color: red

  grishnakh:
    display_name: Grishnakh
    description: |
      Mordor orc attached to the Uruk force. Smaller and sneakier
      than the Uruks. Serves Sauron's interests, not Saruman's.
    hp_max: 16
    atk: 8
    defense: 3
    res: 3
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "K"
    color: red

  uruk_archer:
    display_name: Uruk Crossbowman
    description: |
      Uruk-hai with a heavy crossbow. Fires iron bolts that punch
      through armor at range.
    hp_max: 18
    atk: 9
    defense: 4
    res: 2
    spd: 4
    move: 3
    rng_min: 2
    rng_max: 3
    glyph: "X"
    color: red

  uruk_shield:
    display_name: Uruk Shieldbearer
    description: |
      Uruk-hai with a broad iron shield. Forms the front line of
      the assault. Hard to put down.
    hp_max: 22
    atk: 8
    defense: 7
    res: 2
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "S"
    color: red

armies:
  blue:
    # Fellowship in the center-south, near the ruins
    - {class: aragorn, pos: {x: 6, y: 5}}
    # Boromir defending hobbits
    - {class: boromir, pos: {x: 5, y: 6}}
    # Legolas on the ruins
    - {class: legolas, pos: {x: 7, y: 5}}
    # Gimli beside Aragorn
    - {class: gimli, pos: {x: 6, y: 6}}
    # Merry and Pippin near Boromir
    - {class: merry, pos: {x: 4, y: 7}}
    - {class: pippin, pos: {x: 5, y: 7}}

  red:
    # Lurtz and northern pincer from y=0-1
    - {class: lurtz, pos: {x: 6, y: 0}}
    - {class: ugluk, pos: {x: 4, y: 0}}
    - {class: uruk_archer, pos: {x: 8, y: 0}}
    - {class: uruk_shield, pos: {x: 5, y: 1}}
    # Southern pincer from y=11
    - {class: mauhur, pos: {x: 8, y: 11}}
    - {class: lugdush, pos: {x: 6, y: 11}}
    - {class: grishnakh, pos: {x: 5, y: 11}}

rules:
  max_turns: 16
  first_player: blue

win_conditions:
  - {type: protect_unit, unit_id: u_b_boromir_1, owning_team: blue}
  - {type: protect_unit, unit_id: u_r_lurtz_1, owning_team: red}
  - {type: eliminate_all_enemy_units}
  - {type: max_turns_draw}

narrative:
  title: "Amon Hen -- The Breaking of the Fellowship"
  description: |
    Parth Galen, T.A. 3019. The Uruk-hai of Isengard descend on
    the Fellowship. Boromir must survive to protect the hobbits.
  intro: |
    The Horn of Gondor echoes through the trees -- once, twice,
    three times. Boromir is fighting. Aragorn draws his sword
    and runs toward the sound. Through the winter-bare branches,
    dark shapes move with terrible speed. The white hand of
    Saruman is painted on their shields.
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        Boromir sounds the Horn again. Its cry rolls across Nen
        Hithoel and echoes from the cliffs. He stands over the
        hobbits, his sword red to the hilt.
    - trigger: on_turn_start
      turn: 6
      text: |
        Arrows thud into trees around Boromir. The Uruks close
        from every direction. Aragorn hacks through two more,
        but for every one that falls, three appear from the brush.
    - trigger: on_turn_start
      turn: 10
      text: |
        The forest is full of the crash of iron and the screams
        of the dying. Merry and Pippin throw stones from behind
        Boromir's shield.
    - trigger: on_unit_killed
      unit_id: u_b_boromir_1
      text: |
        Boromir sinks to his knees, pierced by many arrows. He
        whispers to Aragorn: "I would have followed you, my
        brother. My captain. My king."
    - trigger: on_unit_killed
      unit_id: u_r_lurtz_1
      text: |
        Aragorn's blade takes Lurtz's head. The Uruk captain
        falls, but his troops press on -- they need no leader
        to follow Saruman's command.
