schema_version: 1
license: fan_work
fan_work_source: "The Lord of the Rings (J.R.R. Tolkien / Warner Bros.)"
name: Amon Hen -- Breaking of the Fellowship
difficulty: 3
description: |
  Parth Galen, February 26 T.A. 3019. The Fellowship rests at the
  foot of Amon Hen. Lurtz's Uruk-hai strike from the forest. Boromir
  charges to defend Merry and Pippin. Aragorn, Legolas, and Gimli
  fight through the trees. Boromir is the VIP -- if he falls, the
  hobbits are taken and the quest is imperiled.
  Inspired by the Breaking of the Fellowship at Amon Hen from The Lord of the Rings by J.R.R. Tolkien.

