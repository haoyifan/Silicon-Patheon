# 圣盔谷之战 — 中文本地化
name: 圣盔谷之战
description: |
  萨鲁曼从艾辛格派出强兽人大军，目标只有一个——消灭
  洛汗人。塞奥顿王率家臣和一小队精灵弓箭手撤入号角堡
  古堡。万名强兽人在雨夜中涌入峡谷。深溪墙坚守到一名
  狂战士在排水沟中引爆炸药。阿拉贡在黎明线上争取时间；
  甘道夫在日出时分率伊奥默的骑兵冲上山路，击溃敌军。

unit_classes:
  theoden:
    display_name: 塞奥顿
    description: |
      洛汗之王。刚从萨鲁曼的魔咒中恢复。这一夜
      苍老了十岁，但死守城堡不退。
  aragorn:
    display_name: 阿拉贡
    description: |
      伊西尔杜尔的后裔，荒野中的游侠。在剑与弓之间
      灵活切换。
  legolas:
    display_name: 莱戈拉斯
    description: |
      木精灵王子。与金雳比赛杀敌数——把他留在城墙
      射程内，数字涨得很快。
  gimli:
    display_name: 金雳
    description: |
      孤山矮人。与莱戈拉斯比赛杀敌。会往任何近战
      里冲——这既是他的优势也是弱点。
  galadhrim_archer:
    display_name: 加拉德瑞姆弓箭手
    description: |
      加拉德瑞尔派来的洛斯罗瑞恩精灵战士。远程打击，
      轻甲，古老的优雅。近战活不了但能削弱强兽人攻势。
  rohirrim_footman:
    display_name: 洛汗步兵
    description: |
      骠骑之人——和平时是农夫，今夜是战士。矛与盾。
  gandalf:
    display_name: 甘道夫（白袍）
    description: |
      在第五天的黎明到来，骑影疾沿深溪谷冲上来，
      身后是伊奥默的骑兵。第12回合出现。
  eomer:
    display_name: 伊奥默
    description: |
      塞奥顿的侄子，东区元帅。与甘道夫在黎明时分
      一同到来。第12回合出现。
  rohirrim_cavalry:
    display_name: 洛汗骑兵
    description: |
      骠骑国骑马战士。与伊奥默在第12回合出现。
      在号角堡东面的开阔地上势不可挡。
  uruk_berserker:
    display_name: 强兽人狂战士
    description: |
      袖子卷到肩膀，不穿铠甲，最强壮的强兽人。
      在排水沟中引爆炸药的火炬手就是这类（由插件处理）。
  uruk_swordsman:
    display_name: 强兽人剑士
    description: |
      在艾辛格地坑中为战斗而生。重甲，双手剑，无所畏惧。
  uruk_crossbow:
    display_name: 强兽人弩手
    description: |
      钢弩弩箭。装填缓慢；对城墙守军杀伤力惊人。

terrain_types:
  deeping_wall:
    description: |
      深溪墙——不可通行，防御加成极高。
  deeping_gate:
    description: |
      深溪门——可通行的城门，高防御加成。
  cliff:
    description: |
      悬崖边缘——不可通行。

narrative:
  title: 圣盔谷之战
  description: |
    号角堡的夜间围城，在甘道夫到来的黎明中被打破。
  intro: |
    雨落峡谷。深溪在城墙下流淌成黑色。萨鲁曼的大军
    从悬崖延伸到悬崖，火把闪烁。塞奥顿登上城垛。
  events:
    - trigger: on_turn_start
      turn: 4
      text: |
        一名狂战士冲到排水沟！城墙向外爆炸。
    - trigger: on_turn_start
      turn: 12
      text: |
        深溪谷传来号角声。甘道夫与伊奥默在第一缕
        曙光中策马而来！
    - trigger: on_unit_killed
      unit_id: u_b_theoden_1
      text: |
        国王倒下了。城堡失去了它的灵魂。
