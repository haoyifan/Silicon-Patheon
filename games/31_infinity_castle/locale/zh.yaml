# 无限城之战 — 中文本地化
name: 无限城之战
description: |
  无限城——�的次元堡垒，随其意志变换扭曲。
  �的灭杀人队发起最终突击，将所有柱和有潜力的猎鬼人
  送入迷宫，在黎明前找到并杀死鬼王。如果炭治郎存活
  到回合上限，日出将瓦解鬼族。无惨的王座堡垒提供
  再生效果——必须将他引出或将他压倒。

unit_classes:
  tanjiro:
    display_name: 的门炭治郎
    description: |
      日之呼吸使用者，数百年来的第一人。他的决心和
      同理心使他成为唯一可能到达无惨身边的猎鬼人。
      如果他存活到黎明，太阳将完成他开始的事业。
  zenitsu:
    display_name: 我妻善逸
    description: |
      雷之呼吸，壹之型——霹雳一闪。在睡梦中以毁灭性
      速度战斗。一击，最大杀伤力。速度10。
  inosuke:
    display_name: 嘴平伊之助
    description: |
      兽之呼吸——双锯齿刀和野兽本能。由野猪抚养长大，
      以野性的不可预测性战斗。无惧，无犹豫。
  giyu:
    display_name: �的义勇
    description: |
      水柱。凪之技创造出绝对防御——无物可穿越。
      柱中最高防御力。
  shinobu:
    display_name: 胡蝶忍
    description: |
      蟲柱。体型太小无法斩首鬼，转而用注入紫藤毒的
      刺击毒杀。攻击为法术（毒素）伤害，绕过物理防御。
      医学知识让她能照料盟友伤口。
  mitsuri:
    display_name: 甘露寺蜜璃
    description: |
      恋柱。鞭状刀给她非同寻常的攻击距离，肌肉密度
      赋予超人力量——尽管她身材娇小。
  demon_slayer:
    display_name: 鬼杀队员
    description: |
      持日轮刀的队员。受过呼吸法训练，在城堡走廊的
      黑暗中与鬼战斗。
  muzan:
    display_name: 鬼舞辻无惨
    description: |
      鬼王。千年之龄，所有鬼的创造者。他的王座堡垒
      每回合提供再生——站在上面就能恢复。将他引出
      或将他压倒。
  kokushibo:
    display_name: 黑死牟
    description: |
      上弦之壹。四百年前从鬼猎人堕落为鬼。月之呼吸——
      十六型，每一型比前一型更致命。最强的上弦鬼。
  doma:
    display_name: 童磨
    description: |
      上弦之贰。冰冻系血鬼术——冰雾和冰分身。
      以宁静的微笑在远程战斗，掩盖着绝对的空虚。
      吸收信徒以再生，治愈自身和附近的鬼。
  akaza:
    display_name: 猗窝座
    description: |
      上弦之叁。以拳头战斗的武术家，追求与强者对决
      的快感。快速且无情——永不停止进攻。
  lower_moon:
    display_name: 下弦之鬼
    description: |
      十二鬼月中排名较低的鬼。个体实力不及上弦，
      但成群守卫城堡走廊。

terrain_types:
  castle_wall:
    description: |
      无限城变幻的墙壁。随无惨意志重新排列，
      创造不断变化的迷宫。
  wisteria:
    description: |
      紫藤花——对鬼有毒，对猎鬼人有恢复作用。
      鬼本能地避开这些区域。

narrative:
  title: 无限城之战
  description: |
    最终决战。鬼杀队降入无惨的无限城，终结千年的黑暗。
    所有柱，所有队员——在黎明前孤注一掷。
  intro: |
    地面塌陷。鬼杀队坠入无限城——一个由漂浮平台和
    变幻走廊构成的广阔不可能空间。在深处某处，
    无惨在他的王座上等待。
  events:
    - trigger: on_turn_start
      turn: 5
      text: |
        城堡变换。走廊旋转，楼梯折入墙壁。猎鬼人
        在迷乱的迷宫中前进，循着紫藤和血的气味。
    - trigger: on_turn_start
      turn: 12
      text: |
        第一缕黎明之光从城堡次元的裂缝中渗入。鬼族
        感觉到了——日出将至。无惨的再生开始减弱，
        光线渗入。
    - trigger: on_unit_killed
      unit_id: u_r_muzan_1
      text: |
        鬼舞辻无惨化为飞灰。千年恐怖，被一个额头
        带着日印、意志不可摧毁的少年终结。每一个
        由他之血衍生的鬼都开始崩碎。
    - trigger: on_unit_killed
      unit_id: u_b_tanjiro_1
      text: |
        炭治郎倒下了。日之呼吸熄灭——连同唯一能真正
        威胁无惨的技术。黎明还有数小时。太远了。
