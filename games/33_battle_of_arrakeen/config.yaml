    - {x: 10, y: 2, type: rock}
    - {x: 2, y: 5, type: rock}
    - {x: 3, y: 5, type: rock}
    - {x: 10, y: 5, type: rock}
    - {x: 11, y: 5, type: rock}
    - {x: 4, y: 7, type: rock}
    - {x: 9, y: 7, type: rock}
    # Spice fields
