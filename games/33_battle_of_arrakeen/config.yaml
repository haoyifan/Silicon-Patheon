  width: 14
  height: 10
  terrain:
    # Desert covers much of the map
    - {x: 0, y: 0, type: desert}
    - {x: 1, y: 0, type: desert}
    - {x: 2, y: 0, type: desert}
    - {x: 3, y: 0, type: desert}
    - {x: 4, y: 0, type: desert}
    - {x: 9, y: 0, type: desert}
    - {x: 10, y: 0, type: desert}
    - {x: 11, y: 0, type: desert}
    - {x: 12, y: 0, type: desert}
    - {x: 13, y: 0, type: desert}
    - {x: 0, y: 1, type: desert}
    - {x: 1, y: 1, type: desert}
    - {x: 2, y: 1, type: desert}
    - {x: 11, y: 1, type: desert}
    - {x: 12, y: 1, type: desert}
    - {x: 13, y: 1, type: desert}
    - {x: 0, y: 2, type: desert}
    - {x: 1, y: 2, type: desert}
    - {x: 12, y: 2, type: desert}
    - {x: 13, y: 2, type: desert}
    - {x: 0, y: 8, type: desert}
    - {x: 1, y: 8, type: desert}
    - {x: 12, y: 8, type: desert}
    - {x: 13, y: 8, type: desert}
    - {x: 0, y: 9, type: desert}
    - {x: 1, y: 9, type: desert}
    - {x: 2, y: 9, type: desert}
    - {x: 11, y: 9, type: desert}
    - {x: 12, y: 9, type: desert}
    - {x: 13, y: 9, type: desert}
    # Rock formations
    - {x: 3, y: 2, type: rock}
