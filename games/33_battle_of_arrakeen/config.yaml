schema_version: 1
license: fan_work
fan_work_source: "Dune (Frank Herbert estate / Legendary / Warner Bros.)"
name: Battle of Arrakeen
difficulty: 4
description: |
  Arrakis, 10191 AG. House Atreides has been betrayed by the Emperor
  and House Harkonnen. Paul Atreides, now Muad'Dib, leads his Fremen
  warriors against Baron Harkonnen's occupation of Arrakeen. Lady
  Jessica wields the Voice, Duncan Idaho fights like ten men, and the
  desert itself is the Fremen's greatest ally. Seize the palace or
  slay the Baron. The spice must flow.
  Inspired by Dune by Frank Herbert.

