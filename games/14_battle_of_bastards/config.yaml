schema_version: 1
license: fan_work
fan_work_source: "Game of Thrones (George R.R. Martin / HBO)"
name: Battle of the Bastards
difficulty: 4
description: |
  Winterfell, 303 AC. Jon Snow, risen from the dead, rides north
  with a ragtag force of Free Folk, minor Stark bannermen, and one
  giant named Wun Wun to reclaim Winterfell from Ramsay Bolton.
  Ramsay has more men, better armor, and a cruel tactical mind.
  His pikemen form a shield wall that threatens to crush the Stark
  force in a closing vice. Jon must hold out long enough for
  Sansa's letter to bring the Knights of the Vale — or kill Ramsay
  before the trap closes.
  Inspired by the Battle of the Bastards from Game of Thrones by George R.R. Martin.

board:
  width: 12
  height: 10
  terrain:
    # ── Corpse piles (impassable walls forming the trap) ──
    # Western corpse wall — blocks retreat to the left
    - {x: 2, y: 3, type: corpse_wall}
    - {x: 2, y: 4, type: corpse_wall}
    - {x: 2, y: 5, type: corpse_wall}
    - {x: 2, y: 6, type: corpse_wall}
    # Eastern corpse wall — blocks retreat to the right
    - {x: 9, y: 3, type: corpse_wall}
    - {x: 9, y: 4, type: corpse_wall}
    - {x: 9, y: 5, type: corpse_wall}
    - {x: 9, y: 6, type: corpse_wall}
    # Northern corpse ridge — funnels the Stark force south
    - {x: 3, y: 3, type: corpse_wall}
    - {x: 8, y: 3, type: corpse_wall}
    # ── Forest flanks ──
    # West forest
    - {x: 0, y: 3, type: forest}
    - {x: 0, y: 4, type: forest}
    - {x: 0, y: 5, type: forest}
    - {x: 0, y: 6, type: forest}
    - {x: 0, y: 7, type: forest}
    - {x: 1, y: 4, type: forest}
    - {x: 1, y: 5, type: forest}
    - {x: 1, y: 6, type: forest}
    # East forest
    - {x: 11, y: 3, type: forest}
    - {x: 11, y: 4, type: forest}
    - {x: 11, y: 5, type: forest}
    - {x: 11, y: 6, type: forest}
    - {x: 11, y: 7, type: forest}
    - {x: 10, y: 4, type: forest}
    - {x: 10, y: 5, type: forest}
    - {x: 10, y: 6, type: forest}
    # ── Bolton shield wall terrain (+DEF line across row 2) ──
    - {x: 3, y: 2, type: shield_wall}
    - {x: 4, y: 2, type: shield_wall}
    - {x: 5, y: 2, type: shield_wall}
    - {x: 6, y: 2, type: shield_wall}
    - {x: 7, y: 2, type: shield_wall}
    - {x: 8, y: 2, type: shield_wall}
  forts: []

terrain_types:
  corpse_wall:
    display_name: Corpse Pile
    description: |
      Mountains of the dead from the opening cavalry charge. Bodies
      stacked higher than a man — impassable. They form the walls
      of Ramsay's trap, penning in Jon's force.
    move_cost: 99
    passable: false
    defense_bonus: 0
    glyph: "+"
    color: bright_black

  forest:
    display_name: Forest
    description: |
      Dense northern woodland on the flanks of the battlefield.
      Costs 2 movement. +1 DEF from cover.
    move_cost: 2
    defense_bonus: 1
    glyph: "T"
    color: green

  shield_wall:
    display_name: Shield Wall Line
    description: |
      Defensive fortification where Bolton pikemen have dug in
      with interlocking shields. +3 DEF for any unit on this tile.
    move_cost: 1
    defense_bonus: 3
    glyph: "="
    color: red

unit_classes:
  # ═══════════════════════════════════════════════
  #  BLUE — Stark (7 units)
  # ═══════════════════════════════════════════════
  jon_snow:
    display_name: Jon Snow
    description: |
      The White Wolf, risen from the dead by the Red Woman. Fights
      with Longclaw, a Valyrian steel bastard sword. Charges alone
      to save Rickon and nearly dies before his men reach him.
    hp_max: 35
    atk: 12
    defense: 8
    res: 5
    spd: 7
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "J"
    color: white

  tormund:
    display_name: Tormund Giantsbane
    description: |
      Wildling chieftain. Fights like a bear, bites like one too.
      His Free Folk follow him because he's the last man standing
      after every battle.
    hp_max: 30
    atk: 13
    defense: 5
    res: 3
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "G"
    color: bright_red

  wun_wun:
    display_name: Wun Wun
    description: |
      The last giant south of the Wall. Towers over every man on
      the field. Swings a tree trunk. Nearly unkillable — but
      slow. Historically punches through the Winterfell gate.
    hp_max: 60
    atk: 15
    defense: 6
    res: 2
    spd: 2
    move: 2
    rng_min: 1
    rng_max: 2
    glyph: "W"
    color: bright_yellow

  sansa:
    display_name: Sansa Stark
    description: |
      Lady of Winterfell. No warrior herself, but her presence
      rallies the northern cause. Adjacent allies fight harder
      knowing what they fight for. Heals adjacent units through
      morale and sheer force of will.
    hp_max: 14
    atk: 3
    defense: 2
    res: 6
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    can_heal: true
    heal_amount: 5
    glyph: "S"
    color: bright_cyan

  davos:
    display_name: Davos Seaworth
    description: |
      The Onion Knight. Former smuggler, now Jon's most trusted
      commander. Directs troops from behind the line with a
      crossbow and a sailor's pragmatism. Ranged attacker who
      sees the whole field.
    hp_max: 22
    atk: 9
    defense: 5
    res: 4
    spd: 5
    move: 3
    rng_min: 2
    rng_max: 3
    glyph: "D"
    color: cyan

  lyanna_mormont:
    display_name: Lyanna Mormont
    description: |
      The ten-year-old She-Bear of Bear Island. Sixty-two fighting
      men, and every one worth ten mainlanders. Fierce but fragile —
      charges without hesitation, even at giants.
    hp_max: 14
    atk: 11
    defense: 3
    res: 4
    spd: 7
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "L"
    color: bright_green

  melisandre:
    display_name: Melisandre
    description: |
      The Red Woman. Priestess of R'hllor who brought Jon Snow back
      from the dead. Her fire magic heals allies and scorches foes.
    hp_max: 16
    atk: 7
    defense: 2
    res: 8
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    can_heal: true
    heal_amount: 6
    glyph: "M"
    color: red

  # ═══════════════════════════════════════════════
  #  RED — Bolton (8 units)
  # ═══════════════════════════════════════════════
  ramsay:
    display_name: Ramsay Bolton
    description: |
      The Bastard of Bolton. Cruel, calculating, and cowardly —
      stays behind his lines and lets his men do the dying. A
      decent archer with a sadistic streak.
    hp_max: 20
    atk: 10
    defense: 3
    res: 3
    spd: 4
    move: 3
    rng_min: 2
    rng_max: 4
    glyph: "R"
    color: bright_red

  smalljon_umber:
    display_name: Smalljon Umber
    description: |
      Lord of Last Hearth. Massive, brutal, and fearless. Betrayed
      the Starks for Ramsay and fights like a man with nothing to
      lose. Berserker — high ATK, reckless DEF.
    hp_max: 28
    atk: 14
    defense: 4
    res: 2
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "U"
    color: red

  harald_karstark:
    display_name: Harald Karstark
    description: |
      Lord of Karhold. Rides with Bolton cavalry on the flanks.
      Fast-moving horseman who closes the encirclement from the
      wings. Solid lance charge, poor on foot.
    hp_max: 22
    atk: 10
    defense: 5
    res: 3
    spd: 7
    move: 5
    rng_min: 1
    rng_max: 1
    glyph: "K"
    color: red

  shield_wall_captain:
    display_name: Bolton Shield Wall Captain
    description: |
      Commander of the Bolton pike formation. Armored head to toe,
      drilled in interlocking shield discipline. Extremely hard to
      kill, but slow and hits modestly.
    hp_max: 28
    atk: 7
    defense: 10
    res: 4
    spd: 3
    move: 2
    rng_min: 1
    rng_max: 1
    glyph: "P"
    color: red

  pikeman_captain:
    display_name: Bolton Pikeman Captain
    description: |
      Veteran sergeant of the pike line. Keeps the wall moving
      forward in lockstep. Longer reach than the shield captain,
      but less armored.
    hp_max: 24
    atk: 8
    defense: 8
    res: 3
    spd: 3
    move: 2
    rng_min: 1
    rng_max: 2
    glyph: "Q"
    color: red

  archer_captain:
    display_name: Bolton Archer Captain
    description: |
      Commands Ramsay's archers who rain arrows indiscriminately —
      even into the melee where their own men are fighting, because
      Ramsay doesn't care about friendly casualties.
    hp_max: 18
    atk: 9
    defense: 3
    res: 2
    spd: 4
    move: 3
    rng_min: 2
    rng_max: 4
    glyph: "A"
    color: red

  steelshanks:
    display_name: Steelshanks Walton
    description: |
      Veteran Bolton man-at-arms named for the steel greaves he
      never removes. Reliable, disciplined, and ruthlessly efficient.
      One of Roose Bolton's old guard.
    hp_max: 24
    atk: 9
    defense: 7
    res: 3
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "E"
    color: red

  ben_bones:
    display_name: Ben Bones
    description: |
      Ramsay's kennel master. Lean, scarred, and vicious — fights
      with a long hunting knife and the desperate savagery of a man
      who knows what Ramsay does to failures.
    hp_max: 20
    atk: 10
    defense: 4
    res: 2
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "B"
    color: red

  vale_knight:
    display_name: Knight of the Vale
    description: |
      Heavy cavalry of the Eyrie, led by Littlefinger at Sansa's
      request. Fresh, armored, and devastating on the charge.
      They arrive late — but they arrive.
    hp_max: 28
    atk: 11
    defense: 7
    res: 4
    spd: 6
    move: 5
    rng_min: 1
    rng_max: 1
    glyph: "V"
    color: bright_cyan

armies:
  blue:
    # ── Blue starts south, spread across rows 7-9 ──
    # Jon Snow — front center, charging ahead as always.
    - {class: jon_snow, pos: {x: 5, y: 7}}
    # Tormund — beside Jon, right flank.
    - {class: tormund, pos: {x: 7, y: 7}}
    # Wun Wun — center, lumbering forward.
    - {class: wun_wun, pos: {x: 6, y: 8}}
    # Sansa — rear, safe behind the line.
    - {class: sansa, pos: {x: 5, y: 9}}
    # Davos — rear ranged position, directing troops.
    - {class: davos, pos: {x: 8, y: 9}}
    # Lyanna Mormont — forward, fearless.
    - {class: lyanna_mormont, pos: {x: 4, y: 8}}
    # Melisandre — rear support.
    - {class: melisandre, pos: {x: 3, y: 9}}

  red:
    # ── Red starts north with encirclement capability ──
    # Ramsay — far back, safe behind his lines.
    - {class: ramsay, pos: {x: 6, y: 0}}
    # Archer Captain — second row, raining arrows.
    - {class: archer_captain, pos: {x: 4, y: 1}}
    # Shield Wall Captain — on the shield wall defensive line.
    - {class: shield_wall_captain, pos: {x: 5, y: 2}}
    # Pikeman Captain — holding the wall center.
    - {class: pikeman_captain, pos: {x: 7, y: 2}}
    # Smalljon Umber — forward berserker, ready to charge.
    - {class: smalljon_umber, pos: {x: 6, y: 2}}
    # Harald Karstark — far right flank, cavalry encirclement.
    - {class: harald_karstark, pos: {x: 10, y: 1}}
    # Steelshanks — left flank, closing the vice.
    - {class: steelshanks, pos: {x: 1, y: 1}}
    # Ben Bones — right side, supporting the trap.
    - {class: ben_bones, pos: {x: 8, y: 1}}

rules:
  max_turns: 18
  first_player: blue

win_conditions:
  # Jon dies -> blue loses immediately.
  - {type: protect_unit, unit_id: u_b_jon_snow_1, owning_team: blue}
  # Ramsay dies -> red loses immediately (blue's primary objective).
  - {type: protect_unit, unit_id: u_r_ramsay_1, owning_team: red}
  # Jon survives the turn cap -> the Vale saved them. Blue wins.
  - {type: protect_unit_survives, unit_id: u_b_jon_snow_1, owning_team: blue}
  # Either side wins by total elimination.
  - {type: eliminate_all_enemy_units}
  # Backstop (shouldn't fire — protect_unit_survives precedes).
  - {type: max_turns_draw}

plugin_hooks:
  on_turn_start:
    - vale_reinforcements

narrative:
  title: Battle of the Bastards
  description: |
    Winterfell, 303 AC. The White Wolf versus the Mad Dog. Jon
    Snow's ragged force of Free Folk and Northern loyalists faces
    Ramsay Bolton's disciplined army on the open field before
    Winterfell's walls.
  intro: |
    Dawn. The two armies face each other across a field already
    littered with the dead from the opening cavalry charge. Jon
    stands alone between the lines, Longclaw in hand, as Ramsay's
    archers nock their arrows. Mountains of corpses line the flanks
    — there is no retreat, only forward into the teeth of the trap.
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        The Bolton shield wall begins to close. Pikemen advance
        from both flanks, their long spears a forest of steel.
    - trigger: on_turn_start
      turn: 8
      text: |
        The crush tightens. Jon's men are pressed together so
        tightly they can barely swing their swords. Bodies pile
        up underfoot. Tormund bites a man's throat.
    - trigger: on_turn_start
      turn: 10
      text: |
        A horn sounds from the south. Banners with the falcon
        and moon — the Knights of the Vale charge into the
        Bolton rear! Six fresh heavy cavalry crash into the
        encirclement.
    - trigger: on_unit_killed
      unit_id: u_r_ramsay_1
      text: |
        Ramsay's face goes blank as he realizes there's nowhere
        left to run. Jon beats him bloody in the mud of
        Winterfell's courtyard.
    - trigger: on_unit_killed
      unit_id: u_b_wun_wun_1
      text: |
        Wun Wun crashes through the gates of Winterfell,
        bristling with arrows. The last giant falls.
