# 司法岛——营救罗宾 — 中文本地化
name: 司法岛——营救罗宾
description: |
  司法岛。草帽海贼团强攻犹豫之桥，从CP9和世界政府手中
  营救妮可·罗宾。路飞的伙伴们必须击败精英暗杀者，在罗宾
  被拖过正义之门永远消失之前到达斯潘达姆身边。

unit_classes:
  luffy:
    display_name: 蒙奇·D·路飞
    description: |
      橡胶船长。身体能伸缩、弹跳、反弹。二档状态下
      速度和力量爆发。他会救出罗宾或死在路上。
  zoro:
    display_name: 罗罗诺亚·索隆
    description: |
      三刀流大师。每只手一把刀，嘴里一把刀。
      没有什么能挡住他——他能斩断钢铁和岩石。
  sanji:
    display_name: 山治
    description: |
      黑足山治。完全以毁灭性踢技战斗。草帽团中最快——
      恶魔风脚以摩擦力点燃他的腿。
  nami:
    display_name: 娜美
    description: |
      小贼猫兼航海士。天候棒操控天气——闪电、幻觉、
      雷云。脆弱但远程危险。
  usopp:
    display_name: 乌索普
    description: |
      狙击之王。胆小但瞄准完美。狙击弹弓能以爆炸弹药
      击中荒谬距离的目标。
  chopper:
    display_name: 托尼托尼·乔巴
    description: |
      船医。吃了人人果实的驯鹿。在战斗和治疗形态间变形。
      会救任何人，无论敌友。
  franky:
    display_name: 弗兰奇
    description: |
      改造人船匠。以可乐为动力，钢铁装甲。
      风来炮和铁拳让他成为行走的战舰。
  lucci:
    display_name: 罗布·路奇
    description: |
      CP9有史以来最强的探员。豹形态动物系能力者。
      六式体术和六王枪冲击波使他成为杀戮机器。
      道力值4000——是其他CP9探员的两倍。
  kaku:
    display_name: 卡库
    description: |
      CP9探员，长颈鹿动物系能力者。长脖子将剑的
      攻击范围延伸到荒谬的长度。尽管动物形态滑稽
      但出人意料地危险。
  jabra:
    display_name: 加布拉
    description: |
      CP9探员，狼形态动物系能力者。狼形态快速凶猛。
      使用铁块拳法——铁身体术配合攻击。
  blueno:
    display_name: 布鲁诺
    description: |
      CP9探员，门门果实能力者。能在任何东西上开门——
      墙壁、空气、甚至人。防御专家。
  spandam:
    display_name: 斯潘达姆
    description: |
      CP9的无能指挥官。战力值9——最弱的反派。
      但他手中有罗宾和世界政府的权力。
  marine_guard:
    display_name: 海军卫兵
    description: |
      司法岛驻军海军。守卫司法岛的职业军人。

terrain_types:
  bridge:
    description: |
      犹豫之桥。横跨通向正义之门的无底瀑布上方的
      狭窄通道。
  water:
    description: |
      犹豫之桥下方的无底瀑布。掉下去必死无疑。
  tower_wall:
    description: |
      正义之塔。世界政府堡垒不可通行的石墙。

narrative:
  title: 司法岛——营救罗宾
  description: |
    司法岛。草帽团向世界政府宣战，为了拯救他们的
    考古学家。路飞在犹豫之桥上面对CP9最强者——罗布·路奇。
  intro: |
    "我想活下去！"罗宾的呼喊回荡在瀑布上空。路飞站在
    法院屋顶上，狙击王的旗帜在身后燃烧。他望向正义之塔，
    说出了改变一切的话："说你想活下去！"
  events:
    - trigger: on_turn_start
      turn: 4
      text: |
        路飞启动二档。蒸汽从他身上升起，血液以超人速度
        泵送。犹豫之桥在他攻击的力量下颤抖。
    - trigger: on_turn_start
      turn: 10
      text: |
        战斗在桥上激烈展开。CP9倾尽全力，但草帽团
        拒绝倒下。每个人都在为罗宾的自由而战。
    - trigger: on_unit_killed
      unit_id: u_r_lucci_1
      text: |
        路奇撞穿塔墙。路飞站在他身上，拳头仍然举着，
        然后倒下了。"罗宾……我赢了。"
