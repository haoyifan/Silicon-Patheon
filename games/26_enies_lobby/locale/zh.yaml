# 司法岛 — 中文本地化
name: 司法岛 — 营救罗宾 — 海贼王
description: |
  司法岛，世界政府的司法之岛。草帽海贼团强攻犹豫之桥，
  从CP9和世界政府手中营救妮可·罗宾。路飞的船员们必须
  击败精英暗杀者，在罗宾被拖过正义之门之前到达斯潘达姆身边。

unit_classes:
  luffy:
    display_name: 蒙奇·D·路飞
    description: |
      橡皮船长。他的身体能伸缩、弹跳、反弹。开启二档后，
      速度和力量爆发。他要救出罗宾，否则死战到底。
  zoro:
    display_name: 罗罗诺亚·索隆
    description: |
      三刀流剑士。双手各持一刀，口衔一刀。无物能挡其路——
      钢铁与石头他都能一刀两断。
  sanji:
    display_name: 山治
    description: |
      黑足山治。只用毁灭性的踢技战斗。草帽团最快的战士——
      恶魔风脚通过摩擦让腿部燃烧。
  nami:
    display_name: 娜美
    description: |
      猫贼与航海士。她的天候棒能操控天气——闪电、幻影、
      雷云。身体脆弱但远程攻击威力惊人。
  usopp:
    display_name: 乌索普
    description: |
      狙击之王。一个胆小鬼却拥有完美的射术。他的大兜
      弹弓能在惊人的距离上用爆炸弹药精准命中目标。
  chopper:
    display_name: 托尼托尼·乔巴
    description: |
      船医。一只吃了人人果实的驯鹿。能在战斗形态和
      治疗形态之间变换。不论敌友，他都会救治任何人。
  robin:
    display_name: 妮可·罗宾
    description: |
      他们前来拯救的考古学家。花花果实能力者，能从任何
      表面生出肢体——远程擒拿和关节技，造成魔法伤害。
  franky:
    display_name: 弗兰奇
    description: |
      改造人船匠。以可乐为动力，钢铁铠甲。他的风来炮
      和铁拳使他成为行走的战舰。
  lucci:
    display_name: 罗布·路奇
    description: |
      CP9史上最强特工。豹形动物系能力者。六式体术和
      六王枪冲击波使他成为杀戮机器。道力值4000——是
      其他任何CP9特工的两倍。
  kaku:
    display_name: 卡库
    description: |
      CP9特工，长颈鹿动物系能力者。他的长脖子将剑的
      攻击范围延伸到荒谬的长度。尽管动物形态滑稽，
      却出奇地危险。
  jabra:
    display_name: 加布拉
    description: |
      CP9特工，狼形动物系能力者。狼形态下快速而凶猛。
      使用铁块拳法——在保持钢铁般防御的同时发动攻击。
  blueno:
    display_name: 布鲁诺
    description: |
      CP9特工，门门果实能力者。能在任何物体上创造门——
      墙壁、空气，甚至人体。防御型专家。
  kalifa:
    display_name: 卡莉法
    description: |
      泡泡果实能力者。她的肥皂泡吸取力量、消磨抵抗。
      魔法伤害输出者，接触时削弱对手。
  kumadori:
    display_name: 熊猫人
    description: |
      歌舞伎风格的CP9特工。生命回归让他能控制身体的每一
      个细胞——头发也能成为武器。戏剧化、耐久且出人意料
      地坚韧。
  fukurou:
    display_name: 福克罗
    description: |
      猫头鹰般的CP9特工。剃的速度和指枪的穿透力打击力
      十足。气压拳的远程攻击能绕过铠甲。
  spandam:
    display_name: 斯潘达姆
    description: |
      CP9的无能长官。可以想象的最弱反派——战斗力仅9。
      将罗宾锁在铁链中，背后依仗世界政府的权威。
  marine_guard:
    display_name: 海军卫兵
    description: |
      司法岛驻防海军。守卫司法之岛的职业军人。

terrain_types:
  bridge:
    display_name: 桥梁
    description: |
      犹豫之桥。横跨无底瀑布通往正义之门的狭窄通道。
  water:
    display_name: 水域
    description: |
      犹豫之桥下的无底瀑布。落入其中必死无疑。
  tower_wall:
    display_name: 塔壁
    description: |
      司法之塔。世界政府堡垒不可逾越的石壁。
  tower_floor:
    display_name: 塔内
    description: |
      司法之塔内部。石柱提供一定掩护。
  plaza:
    display_name: 法院广场
    description: |
      司法岛法院的开阔庭院。铺石地面，毫无掩护。
      草帽团在此集结发起突击。
  collapsed:
    display_name: 断桥
    description: |
      犹豫之桥被屠魔令轰击击断的桥段。不可通行——
      迫使单位绕路。
  tower_stairs:
    display_name: 塔楼阶梯
    description: |
      连接司法之塔上下层的螺旋阶梯。通行缓慢（消耗3移动），
      但是到达上层的唯一通道。
  tunnel:
    display_name: 水下隧道
    description: |
      瀑布下方的维护隧道。阴暗潮湿。比桥慢（消耗2移动）
      但隐蔽——一条侧翼通道。
  sniper_perch:
    display_name: 狙击高台
    description: |
      法院屋顶——居高临下的射击阵地。极佳的防御掩护（+3防御）
      和俯瞰桥面的视野。
  courthouse_rubble:
    display_name: 法院废墟
    description: |
      屠魔令轰击后的碎石瓦砾。减缓移动但为突击部队
      提供有用的掩护。
  fountain:
    display_name: 喷泉
    description: |
      广场中央的世界政府装饰喷泉。不可通行——
      迫使单位绕行。
  gates_of_justice:
    display_name: 正义之门
    description: |
      正义之门。一旦罗宾通过此门，她将永远失去。

narrative:
  title: 司法岛 — 营救罗宾
  description: |
    司法岛，司法之岛。草帽团向世界政府宣战，只为拯救他们的
    考古学家。路飞在犹豫之桥上面对CP9最强者——罗布·路奇。
  intro: |
    "我想活下去！"罗宾的呐喊在瀑布上空回荡。路飞站在法院
    屋顶，身后狙击王的旗帜在燃烧。他望向对面的司法之塔，
    说出了改变一切的话："说你想活下去！"
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        路飞开启二档。蒸汽从他的身体升腾而起，血液以超人的
        速度泵动。犹豫之桥在他攻击的力量下颤抖。
    - trigger: on_turn_start
      turn: 6
      text: |
        战斗在桥上和塔中同时激烈进行。索隆三刀流碰上卡库的
        四刀流。山治在空中与加布拉交锋。
    - trigger: on_turn_start
      turn: 12
      text: |
        CP9倾尽全力，但草帽团拒绝倒下。
        每一个人都在为罗宾的自由而战。
    - trigger: on_turn_start
      turn: 16
      text: |
        战斗在塔中白热化。CP9殊死抵抗，但草帽团
        不会停下。每个人都在为罗宾的自由而战。
    - trigger: on_unit_killed
      unit_id: u_r_lucci_1
      text: |
        路奇撞穿了塔壁。路飞站在他上方，拳头仍然高举，
        随即倒下。"罗宾……我赢了。"
