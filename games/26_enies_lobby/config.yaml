schema_version: 1
license: fan_work
fan_work_source: "One Piece (Eiichiro Oda / Shueisha)"
name: "Enies Lobby — Rescue Robin — One Piece"
difficulty: 3
description: |
  Enies Lobby, the Judicial Island. The Straw Hat Pirates storm the
  Tower of Justice to rescue Nico Robin from CP9. Each Straw Hat
  faces their matched opponent in a battle that will define the
  crew. Luffy must defeat Rob Lucci and reach Robin before she is
  dragged through the Gates of Justice.
  Inspired by the Enies Lobby arc from One Piece by Eiichiro Oda.

