schema_version: 1
license: fan_work
fan_work_source: "One Piece (Eiichiro Oda / Shueisha)"
name: "Enies Lobby — Rescue Robin"
difficulty: 3
description: |
  Enies Lobby, the Judicial Island. The Straw Hat Pirates storm the
  Tower of Justice to rescue Nico Robin from CP9. Each Straw Hat
  faces their matched opponent in a battle that will define the
  crew. Luffy must defeat Rob Lucci and reach Robin before she is
  dragged through the Gates of Justice.
  Inspired by the Enies Lobby arc from One Piece by Eiichiro Oda.

board:
  width: 14
  height: 12
  terrain:
    # Bridge of Hesitation (y=5-6, x=2-8)
    - {x: 2, y: 5, type: bridge}
    - {x: 3, y: 5, type: bridge}
    - {x: 4, y: 5, type: bridge}
    - {x: 5, y: 5, type: bridge}
    - {x: 6, y: 5, type: bridge}
    - {x: 7, y: 5, type: bridge}
    - {x: 8, y: 5, type: bridge}
    - {x: 2, y: 6, type: bridge}
    - {x: 3, y: 6, type: bridge}
    - {x: 4, y: 6, type: bridge}
    - {x: 5, y: 6, type: bridge}
    - {x: 6, y: 6, type: bridge}
    - {x: 7, y: 6, type: bridge}
    - {x: 8, y: 6, type: bridge}
    # Water / waterfall — impassable flanks
    - {x: 0, y: 4, type: water}
    - {x: 1, y: 4, type: water}
    - {x: 2, y: 4, type: water}
    - {x: 3, y: 4, type: water}
    - {x: 4, y: 4, type: water}
    - {x: 5, y: 4, type: water}
    - {x: 6, y: 4, type: water}
    - {x: 7, y: 4, type: water}
    - {x: 8, y: 4, type: water}
    - {x: 9, y: 4, type: water}
    - {x: 0, y: 7, type: water}
    - {x: 1, y: 7, type: water}
    - {x: 2, y: 7, type: water}
    - {x: 3, y: 7, type: water}
    - {x: 4, y: 7, type: water}
    - {x: 5, y: 7, type: water}
    - {x: 6, y: 7, type: water}
    - {x: 7, y: 7, type: water}
    - {x: 8, y: 7, type: water}
    - {x: 9, y: 7, type: water}
    # Tower of Justice (east side)
    - {x: 10, y: 3, type: tower_wall}
    - {x: 10, y: 4, type: tower_wall}
    - {x: 10, y: 7, type: tower_wall}
    - {x: 10, y: 8, type: tower_wall}
    - {x: 13, y: 3, type: tower_wall}
    - {x: 13, y: 4, type: tower_wall}
    - {x: 13, y: 7, type: tower_wall}
    - {x: 13, y: 8, type: tower_wall}
    # Tower interior
    - {x: 11, y: 5, type: tower_floor}
    - {x: 12, y: 5, type: tower_floor}
    - {x: 11, y: 6, type: tower_floor}
    - {x: 12, y: 6, type: tower_floor}
    # Gates of Justice (far east)
    - {x: 13, y: 5, type: gates_of_justice}
    - {x: 13, y: 6, type: gates_of_justice}
  forts: []

terrain_types:
  bridge:
    display_name: Bridge
    move_cost: 1
    defense_bonus: 0
    glyph: "="
    color: yellow
    description: |
      The Bridge of Hesitation. A narrow crossing over the
      bottomless waterfall leading to the Gates of Justice.
  water:
    display_name: Water
    move_cost: 1
    defense_bonus: 0
    passable: false
    glyph: "~"
    color: bright_blue
    description: |
      The bottomless waterfall beneath the bridge.
      Falling in means certain death.
  tower_wall:
    display_name: Tower Wall
    move_cost: 1
    defense_bonus: 0
    passable: false
    glyph: "#"
    color: bright_black
    description: |
      Impassable stone walls of the Tower of Justice.
  tower_floor:
    display_name: Tower Floor
    move_cost: 1
    defense_bonus: 1
    glyph: "T"
    color: dim
    description: |
      Interior of the Tower of Justice. Some cover from
      the stone columns.
  gates_of_justice:
    display_name: Gates of Justice
    move_cost: 1
    defense_bonus: 0
    glyph: "G"
    color: bright_red
    description: |
      The Gates of Justice. Once Robin passes through,
      she is lost forever.

unit_classes:
  luffy:
    display_name: Monkey D. Luffy
    description: |
      The Rubber Captain in Gear Second. His body stretches,
      bounces, and deflects. He will rescue Robin or die trying.
      VIP — if Luffy falls, the rescue fails.
    hp_max: 34
    atk: 13
    defense: 5
    res: 4
    spd: 7
    move: 5
    rng_min: 1
    rng_max: 2
    tags: [vip]
    glyph: "L"
    color: bright_yellow

  zoro:
    display_name: Roronoa Zoro
    description: |
      Three-Sword Style master. Cuts through steel and stone.
      His Asura technique creates the illusion of three-headed,
      six-armed devastation.
    hp_max: 28
    atk: 14
    defense: 6
    res: 3
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "Z"
    color: green

  sanji:
    display_name: Sanji
    description: |
      Black Leg Sanji. Fights exclusively with devastating kicks.
      Diable Jambe sets his leg ablaze — fire damage bypasses
      physical defense.
    hp_max: 26
    atk: 12
    defense: 5
    res: 3
    spd: 8
    move: 5
    rng_min: 1
    rng_max: 1
    is_magic: true
    glyph: "S"
    color: yellow

  nami:
    display_name: Nami
    description: |
      The Cat Burglar. Her Clima-Tact controls weather —
      lightning bolts, thunderclouds, and mirages. Fragile but
      devastating magic damage at range.
    hp_max: 16
    atk: 9
    defense: 2
    res: 6
    spd: 5
    move: 3
    rng_min: 2
    rng_max: 3
    is_magic: true
    glyph: "N"
    color: bright_yellow

  usopp:
    display_name: Usopp (Sogeking)
    description: |
      The Sniper King. A coward with perfect aim. His Kabuto
      slingshot hits from absurd range with explosive pellets.
    hp_max: 16
    atk: 10
    defense: 2
    res: 3
    spd: 4
    move: 3
    rng_min: 3
    rng_max: 5
    glyph: "U"
    color: yellow

  robin:
    display_name: Nico Robin
    description: |
      The archaeologist they came to save. Her Hana Hana Fruit
      sprouts limbs from any surface — ranged grapples and joint
      locks that deal magic damage.
    hp_max: 18
    atk: 8
    defense: 2
    res: 6
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 3
    is_magic: true
    glyph: "R"
    color: bright_magenta

  franky:
    display_name: Franky
    description: |
      The cyborg shipwright. Powered by cola, armored with steel.
      Coup de Vent air cannon and iron fists. Walking battleship.
    hp_max: 30
    atk: 11
    defense: 7
    res: 2
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 2
    glyph: "F"
    color: cyan

  # --- RED: CP9 ---

  lucci:
    display_name: Rob Lucci
    description: |
      CP9's strongest agent in history. Leopard Zoan user with
      Rokuogan shockwave. 4000 doriki — double any other agent.
      VIP — if Lucci falls, CP9 crumbles.
    hp_max: 34
    atk: 14
    defense: 6
    res: 4
    spd: 7
    move: 4
    rng_min: 1
    rng_max: 1
    tags: [vip]
    glyph: "X"
    color: bright_red

  kaku:
    display_name: Kaku
    description: |
      Giraffe Zoan user. His impossibly long neck extends his
      Rankyaku air blades to absurd range. Surprisingly lethal.
    hp_max: 26
    atk: 11
    defense: 5
    res: 3
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 2
    glyph: "K"
    color: red

  jabra:
    display_name: Jabra
    description: |
      Wolf Zoan user. Tekkai Kenpo lets him maintain iron-body
      defense while attacking. Fast and savage in wolf form.
    hp_max: 24
    atk: 10
    defense: 5
    res: 2
    spd: 7
    move: 5
    rng_min: 1
    rng_max: 1
    glyph: "J"
    color: red

  blueno:
    display_name: Blueno
    description: |
      Door-Door Fruit user. Creates doors in walls, air, and
      even people. A defensive specialist who controls space.
    hp_max: 26
    atk: 9
    defense: 7
    res: 4
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "B"
    color: red

  kalifa:
    display_name: Kalifa
    description: |
      Bubble-Bubble Fruit user. Her soap bubbles sap strength
      and smooth away resistance. Magic damage dealer who
      weakens opponents on contact.
    hp_max: 20
    atk: 8
    defense: 3
    res: 6
    spd: 6
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "Q"
    color: red

  kumadori:
    display_name: Kumadori
    description: |
      Kabuki-themed CP9 agent. Life Return lets him control
      every cell in his body — his hair becomes a weapon.
      Dramatic, durable, and surprisingly tough.
    hp_max: 26
    atk: 9
    defense: 5
    res: 4
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "M"
    color: red

  fukurou:
    display_name: Fukurou
    description: |
      The owl-like CP9 agent. His Soru speed and Jugon punches
      hit hard. Also has a big mouth — literally and figuratively.
      Ranged air pressure attacks bypass armor.
    hp_max: 22
    atk: 9
    defense: 4
    res: 3
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "O"
    color: red

armies:
  blue:
    - {class: luffy, pos: {x: 1, y: 5}}
    - {class: zoro, pos: {x: 2, y: 6}}
    - {class: sanji, pos: {x: 1, y: 6}}
    - {class: nami, pos: {x: 0, y: 5}}
    - {class: usopp, pos: {x: 0, y: 6}}
    - {class: robin, pos: {x: 0, y: 2}}
    - {class: franky, pos: {x: 0, y: 9}}

  red:
    - {class: lucci, pos: {x: 9, y: 5}}
    - {class: kaku, pos: {x: 9, y: 6}}
    - {class: jabra, pos: {x: 11, y: 5}}
    - {class: blueno, pos: {x: 7, y: 5}}
    - {class: kalifa, pos: {x: 11, y: 6}}
    - {class: kumadori, pos: {x: 12, y: 5}}
    - {class: fukurou, pos: {x: 12, y: 6}}

rules:
  max_turns: 16
  first_player: blue

win_conditions:
  # A Straw Hat reaches the Gates of Justice -> rescue!
  - {type: reach_tile, team: blue, pos: {x: 13, y: 5}}
  # Luffy dies -> blue loses
  - {type: protect_unit, unit_id: u_b_luffy_1, owning_team: blue}
  # Either side wins by total elimination
  - {type: eliminate_all_enemy_units}
  # Backstop
  - {type: max_turns_draw}

narrative:
  title: "Enies Lobby — Rescue Robin"
  description: |
    Enies Lobby, the Judicial Island. The Straw Hats declare war
    on the World Government to save their archaeologist. Each crew
    member faces their matched CP9 opponent.
  intro: |
    "I WANT TO LIVE!" Robin's cry echoes across the waterfall.
    Luffy stands on the courthouse roof, Sogeking's flag burning
    behind him. He looks across at the Tower of Justice and says
    the words that change everything: "SAY YOU WANT TO LIVE!"
  events:
    - trigger: on_turn_start
      turn: 4
      text: |
        Luffy activates Gear Second. Steam rises from his body
        as his blood pumps at superhuman speed. The bridge
        trembles under the force of his attacks.
    - trigger: on_turn_start
      turn: 10
      text: |
        The battle rages across the bridge. CP9 fights with
        everything they have, but the Straw Hats refuse to fall.
        Each one fights for Robin's freedom.
    - trigger: on_unit_killed
      unit_id: u_r_lucci_1
      text: |
        Lucci crashes through the tower wall. Luffy stands over
        him, fist still raised, and collapses. "Robin... I won."
