armies:
  blue:
    # === MAIN ASSAULT FORCE — courthouse plaza ===
    - {class: luffy, pos: {x: 3, y: 5}}    # Center plaza, leads the charge
    - {class: zoro, pos: {x: 2, y: 6}}     # South of Luffy, ready to split
    - {class: sanji, pos: {x: 2, y: 4}}    # North of Luffy, fast flanker
    - {class: franky, pos: {x: 4, y: 6}}   # Armored vanguard for bridge push
    - {class: nami, pos: {x: 3, y: 7}}     # Behind the front line, ranged support
    - {class: usopp, pos: {x: 3, y: 2}}    # Sniper perch — covers bridge approach
    # === RESCUE TARGET — isolated at Gates of Justice ===
    - {class: robin, pos: {x: 19, y: 7}}   # At the Gates, guarded by CP9

  red:
    # === BRIDGE DEFENSE — blocking the main approach ===
    - {class: lucci, pos: {x: 15, y: 6}}   # Tower entry hall, the final wall
    - {class: kaku, pos: {x: 17, y: 3}}    # Upper north room, ranged threat
    # === TOWER INTERIOR — spread across rooms ===
    - {class: jabra, pos: {x: 16, y: 9}}   # Lower hall, fast interceptor
    - {class: kalifa, pos: {x: 17, y: 6}}  # Inner tower, near Gates passage
    # === SECONDARY ROUTE DEFENSE ===
    - {class: blueno, pos: {x: 7, y: 10}}  # Guards the water tunnel entrance
    # === GATES GUARD — Robin's captors ===
    - {class: kumadori, pos: {x: 18, y: 7}} # Right next to Robin at Gates
    - {class: fukurou, pos: {x: 17, y: 12}} # Lower tower, mobile reserve

rules:
  max_turns: 20
  first_player: blue

win_conditions:
  # A Straw Hat reaches the Gates of Justice -> rescue!
  - {type: reach_tile, team: blue, pos: {x: 19, y: 7}}
  # Luffy dies -> blue loses
  - {type: protect_unit, unit_id: u_b_luffy_1, owning_team: blue}
  # Either side wins by total elimination
  - {type: eliminate_all_enemy_units}
  # Backstop
  - {type: max_turns_draw}

narrative:
  title: "Enies Lobby — Rescue Robin"
  description: |
    Enies Lobby, the Judicial Island. The Straw Hats declare war
    on the World Government to save their archaeologist. Each crew
    member faces their matched CP9 opponent.
  intro: |
    "I WANT TO LIVE!" Robin's cry echoes across the waterfall.
    Luffy stands on the courthouse roof, Sogeking's flag burning
    behind him. He looks across at the Tower of Justice and says
    the words that change everything: "SAY YOU WANT TO LIVE!"
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        The Straw Hats reach the Bridge of Hesitation. The
        waterfall roars below — a bottomless chasm with no
        return. Across the bridge, the Tower of Justice looms.
    - trigger: on_turn_start
      turn: 6
      text: |
        Luffy activates Gear Second. Steam rises from his body
        as his blood pumps at superhuman speed. The bridge
        trembles under the force of his attacks.
    - trigger: on_turn_start
      turn: 12
      text: |
        The Buster Call has been activated. Warships encircle
        the island. The bridge is crumbling. There is no time
        left — reach Robin NOW or lose her forever.
    - trigger: on_turn_start
      turn: 16
      text: |
        The battle rages through the tower. CP9 fights with
        everything they have, but the Straw Hats refuse to fall.
        Each one fights for Robin's freedom.
    - trigger: on_unit_killed
      unit_id: u_r_lucci_1
      text: |
        Lucci crashes through the tower wall. Luffy stands over
        him, fist still raised, and collapses. "Robin... I won."
