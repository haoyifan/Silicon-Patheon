terrain_types:
  plaza:
    display_name: Courthouse Plaza
    move_cost: 1
    defense_bonus: 0
    glyph: "."
    color: white
    description: |
      The open courtyard of Enies Lobby's courthouse. Paved stone,
      no cover. The Straw Hats gather here before the assault.
  bridge:
    display_name: Bridge of Hesitation
    move_cost: 1
    defense_bonus: -1
    glyph: "="
    color: yellow
    description: |
      The Bridge of Hesitation. Narrow, exposed, no cover.
      Units here are sitting ducks for ranged attacks.
      Two tiles wide, stretching over the bottomless waterfall.
  collapsed:
    display_name: Collapsed Bridge
    move_cost: 99
    defense_bonus: 0
    passable: false
    glyph: "X"
    color: bright_black
    description: |
      A collapsed section of the Bridge of Hesitation. The
      Buster Call's bombardment shattered these spans. Impassable —
      forces a detour through the Tower's lower levels.
  water:
    display_name: Waterfall
    move_cost: 99
    defense_bonus: 0
    passable: false
    glyph: "~"
    color: bright_blue
    description: |
      The bottomless waterfall surrounding Enies Lobby.
      Falling in means certain death.
  tower_wall:
    display_name: Tower Wall
    move_cost: 99
    defense_bonus: 0
    passable: false
    glyph: "#"
    color: bright_black
    description: |
      Impassable stone walls of the Tower of Justice.
      Thick masonry built to withstand siege weapons.
  tower_floor:
    display_name: Tower Interior
    move_cost: 1
    defense_bonus: 2
    glyph: "T"
    color: dim
    description: |
      Interior rooms of the Tower of Justice. Stone columns
      and furniture provide solid cover. Narrow doorways
      create natural 1v1 duel arenas.
  tower_stairs:
    display_name: Tower Stairs
    move_cost: 3
    defense_bonus: 0
    glyph: "/"
    color: dim
    description: |
      Spiral staircase connecting the tower's upper and lower
      levels. Slow to traverse (costs 3 movement), but the
      only way to bypass the collapsed bridge section.
  tunnel:
    display_name: Water Tunnel
    move_cost: 2
    defense_bonus: 1
    glyph: "_"
    color: cyan
    description: |
      A maintenance tunnel running beneath the waterfall.
      Narrow and damp. Slower than the bridge (costs 2 movement)
      but hidden from direct fire. Blueno's territory.
  sniper_perch:
    display_name: Sniper Perch
    move_cost: 2
    defense_bonus: 3
    glyph: "^"
    color: green
    description: |
      The courthouse rooftop — an elevated firing position.
      Excellent defensive cover (+3 DEF) and sightlines down
      the bridge. Costs 2 movement to climb up.
  courthouse_rubble:
    display_name: Courthouse Rubble
    move_cost: 2
    defense_bonus: 1
    glyph: "%"
    color: dim
    description: |
      Shattered masonry from the courthouse bombardment. Slows
      movement but provides useful cover for the incoming assault.
  fountain:
    display_name: Fountain
    move_cost: 99
    passable: false
    glyph: "O"
    color: bright_cyan
    description: |
      An ornate World Government fountain in the plaza center.
      Impassable — forces units to route around it.
  gates_of_justice:
    display_name: Gates of Justice
    move_cost: 1
    defense_bonus: 0
    glyph: "G"
    color: bright_red
    description: |
