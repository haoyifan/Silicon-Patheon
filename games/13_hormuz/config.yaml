schema_version: 1
license: fan_work
fan_work_source: "Age of Empires / Portuguese colonial history"
name: Strait of Hormuz
difficulty: 3
description: |
  1507 — Afonso de Albuquerque leads a Portuguese armada into the
  Persian Gulf to seize the island fortress of Hormuz, gateway to
  the spice trade. The Sultan of Hormuz, backed by Ottoman naval
  support, defends the harbor with war galleys, shore batteries,
  and palace guards. Albuquerque must break the chain, silence the
  guns, and storm the citadel before reinforcements arrive.
  Inspired by the Portuguese conquest of Hormuz (1507).

board:
  width: 14
  height: 10
  terrain:
    # Harbor water (impassable shallows flanking the channel)
    - {x: 5, y: 0, type: reef}
    - {x: 6, y: 0, type: reef}
    - {x: 5, y: 9, type: reef}
    - {x: 6, y: 9, type: reef}
    # Hormuz island fortifications (east side)
    - {x: 9, y: 1, type: damaged_wall}
    - {x: 10, y: 0, type: fort_wall}
    - {x: 10, y: 1, type: fort_wall}
    - {x: 10, y: 8, type: fort_wall}
    - {x: 10, y: 9, type: fort_wall}
    - {x: 9, y: 8, type: fort_wall}
    # Citadel interior
    - {x: 11, y: 3, type: citadel}
    - {x: 12, y: 3, type: citadel}
    - {x: 11, y: 6, type: citadel}
    - {x: 12, y: 6, type: citadel}
    - {x: 11, y: 4, type: citadel}
    - {x: 11, y: 5, type: citadel}
    - {x: 12, y: 4, type: citadel}
    - {x: 12, y: 5, type: citadel}
    - {x: 13, y: 3, type: citadel}
    - {x: 13, y: 4, type: citadel}
    - {x: 13, y: 5, type: citadel}
    - {x: 13, y: 6, type: citadel}
    # Harbor chain (slows movement through the narrows)
    - {x: 7, y: 4, type: harbor_chain}
    - {x: 7, y: 5, type: harbor_chain}
  forts:
    - {x: 12, y: 5, owner: red}

terrain_types:
  reef:
    display_name: Reef
    description: Shallow coral reef. Impassable.
    move_cost: 99
    passable: false
    glyph: "~"
    color: bright_black
  fort_wall:
    display_name: Fort Wall
    description: Stone fortification wall. Impassable.
    move_cost: 99
    passable: false
    glyph: "#"
    color: bright_black
  citadel:
    display_name: Citadel
    description: Interior of the Hormuz citadel. +2 DEF.
    move_cost: 1
    defense_bonus: 2
    glyph: "C"
    color: yellow
  damaged_wall:
    display_name: Damaged Wall
    description: |
      A section of the citadel wall weakened by age and prior bombardment.
      Passable but slow to climb through — an alternative breach point
      for a determined assault.
    move_cost: 3
    defense_bonus: 0
    passable: true
    glyph: "%"
    color: yellow
  harbor_chain:
    display_name: Harbor Chain
    description: Iron chain across the harbor mouth. Costs 3 movement.
    move_cost: 3
    defense_bonus: 0
    glyph: "="
    color: bright_black

unit_classes:
  albuquerque:
    display_name: Afonso de Albuquerque
    description: |
      The Portuguese Lion of the Sea. Brilliant admiral and ruthless
      conqueror. Commands from his flagship with sword and cannon.
      VIP — if he falls, the expedition is over.
    hp_max: 28
    atk: 10
    defense: 5
    res: 5
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    tags: [vip, leader]
    glyph: "A"
    color: bright_cyan

  joao_de_nova:
    display_name: "Joao de Nova"
    description: |
      Veteran captain of the carrack Flor de la Mar. Experienced
      naval gunner — his broadsides are devastating at range.
    hp_max: 22
    atk: 11
    defense: 4
    res: 3
    spd: 5
    move: 3
    rng_min: 2
    rng_max: 4
    glyph: "J"
    color: cyan

  duarte_pacheco:
    display_name: Duarte Pacheco
    description: |
      The Achilles of the Indies. Legendary soldier-captain who
      fights in the vanguard with pike and buckler.
    hp_max: 26
    atk: 12
    defense: 6
    res: 3
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "D"
    color: cyan

  padre_miguel:
    display_name: Padre Miguel
    description: |
      Jesuit chaplain accompanying the fleet. His prayers bolster
      the wounded. Channels divine healing magic.
    hp_max: 18
    atk: 7
    defense: 3
    res: 7
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    can_heal: true
    heal_amount: 5
    glyph: "P"
    color: bright_cyan

  gaspar_almada:
    display_name: Gaspar de Almada
    description: |
      Portuguese bombardier. Specialist in Greek fire and incendiary
      weapons — his fire pots deal magic damage that ignores armor.
    hp_max: 20
    atk: 10
    defense: 3
    res: 4
    spd: 5
    move: 3
    rng_min: 2
    rng_max: 3
    is_magic: true
    glyph: "G"
    color: cyan

  # --- RED: Hormuz + Ottoman ---

  sultan_sayf:
    display_name: Sultan Sayf ad-Din
    description: |
      Sultan of Hormuz. Fights from the citadel with his personal
      guard. Cunning diplomat turned desperate defender.
    hp_max: 24
    atk: 9
    defense: 5
    res: 5
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 2
    glyph: "S"
    color: bright_red

  ottoman_admiral:
    display_name: Reis Amir
    description: |
      Ottoman naval commander sent to reinforce Hormuz. Commands a
      war galley with skilled archers and rams.
    hp_max: 26
    atk: 11
    defense: 5
    res: 3
    spd: 5
    move: 4
    rng_min: 1
    rng_max: 2
    glyph: "R"
    color: red

  hormuz_sorcerer:
    display_name: Vizier Rashid
    description: |
      Court sorcerer and vizier. Wields alchemical fire and wind
      magic to shatter sails and burn hulls. Bypasses armor entirely.
    hp_max: 18
    atk: 10
    defense: 2
    res: 8
    spd: 4
    move: 3
    rng_min: 2
    rng_max: 3
    is_magic: true
    glyph: "V"
    color: bright_red

  hormuz_corsair:
    display_name: Corsair Tariq
    description: |
      Fast corsair captain. His dhow darts between larger ships,
      boarding and setting fires. Melee assassin on the waves.
    hp_max: 20
    atk: 10
    defense: 3
    res: 3
    spd: 8
    move: 5
    rng_min: 1
    rng_max: 1
    glyph: "T"
    color: red

  shore_gunner:
    display_name: Gunner Hassan
    description: |
      Commander of the shore battery. His fixed cannons hammer
      ships in the harbor channel with devastating long-range fire.
    hp_max: 22
    atk: 12
    defense: 4
    res: 3
    spd: 3
    move: 0
    rng_min: 3
    rng_max: 5
    glyph: "H"
    color: red

  palace_guard:
    display_name: Captain Farid
    description: |
      Elite palace guard captain. Heavily armored melee defender
      of the citadel gates. Wields a two-handed scimitar.
    hp_max: 26
    atk: 9
    defense: 7
    res: 3
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "F"
    color: red

  ottoman_janissary:
    display_name: Janissary Kemal
    description: |
      Ottoman elite infantry musketeer. His matchlock musket deals
      magic-type damage at range, piercing Portuguese plate armor.
    hp_max: 20
    atk: 9
    defense: 4
    res: 4
    spd: 5
    move: 3
    rng_min: 2
    rng_max: 3
    is_magic: true
    glyph: "K"
    color: red

armies:
  blue:
    - {class: albuquerque,    pos: {x: 1, y: 4}}
    - {class: joao_de_nova,   pos: {x: 0, y: 3}}
    - {class: duarte_pacheco, pos: {x: 2, y: 5}}
    - {class: padre_miguel,   pos: {x: 0, y: 5}}
    - {class: gaspar_almada,  pos: {x: 1, y: 6}}

  red:
    - {class: sultan_sayf,       pos: {x: 12, y: 5}}
    - {class: ottoman_admiral,   pos: {x: 8, y: 3}}
    - {class: hormuz_sorcerer,   pos: {x: 11, y: 4}}
    - {class: hormuz_corsair,    pos: {x: 8, y: 6}}
    - {class: shore_gunner,      pos: {x: 10, y: 2}}
    - {class: palace_guard,      pos: {x: 11, y: 5}}
    - {class: ottoman_janissary, pos: {x: 10, y: 7}}

rules:
  max_turns: 14
  first_player: blue

win_conditions:
  - {type: seize_enemy_fort}
  - {type: protect_unit, unit_id: u_b_albuquerque_1, owning_team: blue}
  - {type: eliminate_all_enemy_units}
  - {type: max_turns_draw}

narrative:
  title: "Strait of Hormuz (1507)"
  description: |
    Afonso de Albuquerque leads the Portuguese armada to seize the
    island fortress of Hormuz, key to the spice trade. The Sultan
    and his Ottoman allies defend the citadel.
  intro: |
    The Portuguese fleet rounds the headland into the harbor of
    Hormuz. Iron chains stretch across the channel. Shore batteries
    open fire. Albuquerque raises his sword: "For God, King, and
    the spice trade — break the chain!"
  events:
    - trigger: on_turn_start
      turn: 5
      text: |
        Smoke chokes the harbor. Ottoman galleys maneuver behind
        the chain while Portuguese broadsides hammer the shore
        batteries. The citadel still stands.
    - trigger: on_turn_start
      turn: 10
      text: |
        The harbor chain is breached! Portuguese carracks push
        through the narrows under withering fire. The citadel
        gates loom ahead.
