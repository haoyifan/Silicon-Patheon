schema_version: 1
name: Strait of Hormuz
difficulty: 4
description: |
  February 2026 — the United States and Israel open "Operation
  Epic Fury" with nearly 900 coordinated strikes on Iranian
  leadership, missile infrastructure, and nuclear facilities in
  twelve hours. Ayatollah Ali Khamenei is assassinated in Tehran
  on day 1; Iran confirms his death on 1 March. The IRGC retaliates
  by closing the Strait of Hormuz with speedboat swarms, Shahed
  drones, coastal-missile batteries, and sea mines.

  This scenario compresses the opening act into a ten-turn race:
  a US/Israeli strike package must push through the Strait,
  finish the decapitation of the regime, and plant boots on a
  hardened enriched-uranium (the user's "condensed uranium")
  bunker in the Iranian interior before the IRGC bleeds them dry.

  Blue (US/Israel): fast air (F-35, B-2), naval firepower (Arleigh-
  Burke destroyer, Tomahawk sub), special forces (Navy SEAL team,
  Shayetet 13), and two VIP leaders — the US President and the
  Israeli PM — whose loss ends the operation.

  Red (Iran): Khamenei is deliberately placed forward on a
  vulnerable IRGC craft at HP 1 — a historical echo of his day-1
  death, and a free kill for blue on turn 1 if they spend the
  shot there. IRGC speedboat swarms, Shahed drones, two stationary
  coastal-missile batteries, a Basij infantry line, an IRGC
  commando core around the bunker, and sea mines in the Strait
  corridor that damage any unit stepping on them.
  Inspired by modern geopolitical tensions in the Strait of Hormuz.

board:
  width: 18
  height: 10
  terrain:
    # --- Strait of Hormuz chokepoint (x=6..9) ---
    # Islands at the Omani peninsula (north) and Hormuz island (south)
    # squeeze naval traffic into the middle y-band.
    - {x: 6, y: 0, type: island}
    - {x: 7, y: 0, type: island}
    - {x: 8, y: 0, type: island}
    - {x: 6, y: 1, type: island}
    - {x: 7, y: 1, type: island}
    - {x: 6, y: 9, type: island}
    - {x: 7, y: 9, type: island}
    - {x: 8, y: 9, type: island}
    - {x: 7, y: 8, type: island}
    # --- Iranian coast (x=13..14) ---
    - {x: 13, y: 0, type: beach}
    - {x: 13, y: 1, type: beach}
    - {x: 13, y: 2, type: beach}
    - {x: 13, y: 7, type: beach}
    - {x: 13, y: 8, type: beach}
    - {x: 13, y: 9, type: beach}
    # --- Iranian interior (x=14..17, y in {0..4, 6..9}) ---
    # Desert inland, with the uranium bunker on the central row at
    # (15, 5). Hostile mountains flank it north and south.
    - {x: 14, y: 0, type: desert}
    - {x: 14, y: 1, type: desert}
    - {x: 14, y: 2, type: desert}
    - {x: 14, y: 3, type: mountain}
    - {x: 14, y: 4, type: desert}
    - {x: 14, y: 6, type: desert}
    - {x: 14, y: 7, type: mountain}
    - {x: 14, y: 8, type: desert}
    - {x: 14, y: 9, type: desert}
    - {x: 15, y: 0, type: desert}
    - {x: 15, y: 1, type: desert}
    - {x: 15, y: 2, type: mountain}
    - {x: 15, y: 3, type: desert}
    - {x: 15, y: 4, type: desert}
    - {x: 15, y: 5, type: uranium_bunker}
    - {x: 15, y: 6, type: desert}
    - {x: 15, y: 7, type: desert}
    - {x: 15, y: 8, type: mountain}
    - {x: 15, y: 9, type: desert}
    - {x: 16, y: 0, type: desert}
    - {x: 16, y: 1, type: desert}
    - {x: 16, y: 2, type: desert}
    - {x: 16, y: 3, type: desert}
    - {x: 16, y: 4, type: desert}
    - {x: 16, y: 5, type: desert}
    - {x: 16, y: 6, type: desert}
    - {x: 16, y: 7, type: desert}
    - {x: 16, y: 8, type: desert}
    - {x: 16, y: 9, type: desert}
    - {x: 17, y: 0, type: desert}
    - {x: 17, y: 1, type: desert}
    - {x: 17, y: 2, type: desert}
    - {x: 17, y: 3, type: desert}
    - {x: 17, y: 4, type: desert}
    - {x: 17, y: 5, type: desert}
    - {x: 17, y: 6, type: desert}
    - {x: 17, y: 7, type: desert}
    - {x: 17, y: 8, type: desert}
    - {x: 17, y: 9, type: desert}
    # --- Sea mines ---
    # IRGC-laid contact mines in the strait corridor. Step on one
    # and the effects plugin lights you up for 6 damage.
    - {x: 8, y: 3, type: sea_mine}
    - {x: 8, y: 6, type: sea_mine}
    - {x: 9, y: 2, type: sea_mine}
    - {x: 9, y: 7, type: sea_mine}
  forts:
    # The uranium bunker is owned by Iran. The engine's seize-enemy-
    # fort rule is NOT listed in win_conditions below — the plugin
    # gates victory on seize AND Khamenei-killed.
    - {x: 15, y: 5, owner: red}

terrain_types:
  island:
    display_name: Island
    description: Impassable island.
    move_cost: 99
    passable: false
    glyph: "^"
    color: bright_black
  beach:
    display_name: Beach
    description: Coastal shore. Costs 2 movement. +1 DEF.
    move_cost: 2
    defense_bonus: 1
    glyph: "~"
    color: yellow
  desert:
    display_name: Desert
    move_cost: 1
    glyph: "."
    color: yellow
  mountain:
    display_name: Mountain
    description: Impassable mountain.
    move_cost: 99
    passable: false
    glyph: "M"
    color: bright_black
  uranium_bunker:
    display_name: Uranium Bunker
    description: Hardened bunker. Costs 2 movement. +5 DEF.
    # Fortified bunker — hard to root defenders out, but the prize
    # tile for blue. Not impassable: blue needs to step on it.
    move_cost: 2
    defense_bonus: 5
    glyph: "U"
    color: bright_magenta
  sea_mine:
    display_name: Sea Mine
    description: Contact mine. Damages any unit entering the tile.
    move_cost: 1
    glyph: "*"
    color: bright_red
    effects_plugin: sea_mine_effect

unit_classes:
  # ----- BLUE: US + Israel -----

  trump:
    display_name: US President (Trump)
    description: |
      Commander-in-chief aboard the carrier group, directing the
      strike from CENTCOM feeds. Barely combat-capable himself —
      if he dies, the operation loses political cover and ends.
    hp_max: 22
    atk: 5
    defense: 4
    res: 3
    spd: 4
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [vip, leader, us]
    sight: 5
    glyph: T
    color: bright_cyan

  netanyahu:
    display_name: Israeli PM (Netanyahu)
    description: |
      The Israeli prime minister, coordinating the strike via the
      war cabinet. Same brittle VIP profile as the US President —
      losing him ends Israeli participation and the operation.
    hp_max: 22
    atk: 5
    defense: 4
    res: 3
    spd: 4
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [vip, leader, israel]
    sight: 5
    glyph: N
    color: bright_cyan

  f35:
    display_name: F-35 Stealth Fighter
    description: |
      Fifth-generation stealth multirole. Fast, mid-range, decent
      damage — the main swing piece for clearing mines, drones,
      and speedboats before the heavies move up.
    hp_max: 24
    atk: 12
    defense: 4
    res: 4
    spd: 9
    rng_min: 2
    rng_max: 4
    move: 7
    tags: [air, stealth]
    sight: 6
    glyph: "F"
    color: cyan

  b2:
    display_name: B-2 Spirit Bomber
    description: |
      The only blue unit with enough punch to threaten the
      uranium-bunker defenders at stand-off range. Slow to
      reposition once committed; keep it behind the F-35 screen.
    hp_max: 30
    atk: 18
    defense: 5
    res: 5
    spd: 5
    rng_min: 3
    rng_max: 5
    move: 5
    tags: [air, bomber, stealth]
    sight: 6
    glyph: B
    color: cyan

  destroyer:
    display_name: Arleigh-Burke Destroyer
    description: |
      Aegis destroyer with Tomahawk cruise missiles. Strong ranged
      platform but slow through the Strait — mines and coastal
      batteries are its nightmare.
    hp_max: 40
    atk: 11
    defense: 6
    res: 4
    spd: 4
    rng_min: 3
    rng_max: 6
    move: 3
    tags: [naval, us]
    sight: 5
    glyph: D
    color: cyan

  tomahawk_sub:
    display_name: Tomahawk Sub
    description: |
      Submerged Tomahawk platform. Paper-thin armor but big
      stand-off reach — the scenario's long-arm.
    hp_max: 22
    atk: 10
    defense: 3
    res: 4
    spd: 5
    rng_min: 4
    rng_max: 7
    move: 4
    tags: [naval, submarine, us]
    sight: 5
    glyph: S
    color: cyan

  navy_seal:
    display_name: Navy SEAL Team
    description: |
      The only realistic unit for actually boarding the uranium
      bunker and raising the flag there. Melee, fast-moving, very
      squishy if the Basij close.
    hp_max: 20
    atk: 10
    defense: 4
    res: 3
    spd: 7
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [infantry, special_forces, us]
    sight: 4
    glyph: E
    color: cyan

  shayetet:
    display_name: Shayetet 13
    description: |
      Israeli naval commandos. Paired role with the SEALs — one
      decoys, one boards. Marginally tougher than a SEAL in melee.
    hp_max: 22
    atk: 11
    defense: 4
    res: 3
    spd: 7
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [infantry, special_forces, israel]
    sight: 4
    glyph: H
    color: cyan

  # ----- RED: Iran -----

  khamenei:
    display_name: Supreme Leader (Khamenei)
    description: |
      Scenario kickoff: Khamenei is aboard a forward IRGC craft at
      the western mouth of the Strait with HP 1 — a historical-echo
      placement meant to be killed turn 1. Blue must spend a shot
      on him, or the operation cannot win even if the bunker falls.
    hp_max: 1
    atk: 1
    defense: 0
    res: 0
    spd: 3
    rng_min: 1
    rng_max: 1
    move: 2
    tags: [vip, leader, iran]
    sight: 4
    glyph: K
    color: bright_red

  irgc_speedboat:
    display_name: IRGC Speedboat
    description: |
      Cheap swarm unit. Low HP, fast, melee-ranged. Dangerous in
      numbers against isolated blue naval or SEAL craft.
    hp_max: 12
    atk: 8
    defense: 2
    res: 2
    spd: 9
    rng_min: 1
    rng_max: 1
    move: 6
    tags: [naval, swarm, iran]
    sight: 3
    glyph: b
    color: red

  shahed_drone:
    display_name: Shahed Drone
    description: |
      One-way attack drone. Fragile, but with enough range to harry
      the rear of the blue column. Functionally kamikaze on hit.
    hp_max: 8
    atk: 11
    defense: 1
    res: 2
    spd: 7
    rng_min: 2
    rng_max: 4
    move: 6
    tags: [air, drone, iran]
    sight: 5
    glyph: d
    color: red

  coastal_missile:
    display_name: Coastal Missile Battery
    description: |
      Stationary anti-ship / anti-air launcher on the Iranian
      littoral. Move 0 — it doesn't reposition. Long reach, heavy
      hit.
    hp_max: 22
    atk: 14
    defense: 5
    res: 3
    spd: 3
    rng_min: 3
    rng_max: 6
    move: 0
    tags: [artillery, iran]
    sight: 5
    glyph: M
    color: red

  basij:
    display_name: Basij Infantry
    description: |
      Paramilitary militia. Nothing special stat-wise, but cheap
      and numerous — the line defenders around the bunker.
    hp_max: 18
    atk: 7
    defense: 4
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry, iran]
    sight: 3
    glyph: i
    color: red

  irgc_commando:
    display_name: IRGC Commando
    description: |
      Professional Revolutionary Guard ground force. The SEAL/
      Shayetet counter around the bunker — similar stats to the
      blue specops, without the long reach of air or naval.
    hp_max: 24
    atk: 10
    defense: 5
    res: 3
    spd: 6
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [infantry, special_forces, iran]
    sight: 4
    glyph: C
    color: red

armies:
  blue:
    # US/Israeli strike group deploys at the western (Gulf of Oman)
    # edge. Two VIP leaders in the rear.
    - {class: trump,         pos: {x: 0, y: 4}}
    - {class: netanyahu,     pos: {x: 0, y: 5}}
    - {class: destroyer,     pos: {x: 1, y: 3}}
    - {class: destroyer,     pos: {x: 1, y: 6}}
    - {class: tomahawk_sub,  pos: {x: 1, y: 4}}
    - {class: f35,           pos: {x: 2, y: 2}}
    - {class: f35,           pos: {x: 2, y: 7}}
    - {class: b2,            pos: {x: 1, y: 5}}
    - {class: navy_seal,     pos: {x: 2, y: 4}}
    - {class: shayetet,      pos: {x: 2, y: 5}}

  red:
    # Khamenei deliberately placed forward, HP 1 — a free kill for
    # blue if they want it.
    - {class: khamenei,        pos: {x: 4, y: 5}}
    # Speedboat screen harassing the western approach.
    - {class: irgc_speedboat,  pos: {x: 5, y: 3}}
    - {class: irgc_speedboat,  pos: {x: 5, y: 4}}
    - {class: irgc_speedboat,  pos: {x: 5, y: 5}}
    - {class: irgc_speedboat,  pos: {x: 5, y: 6}}
    # Drone swarm from inland airfields.
    - {class: shahed_drone,    pos: {x: 10, y: 2}}
    - {class: shahed_drone,    pos: {x: 10, y: 7}}
    - {class: shahed_drone,    pos: {x: 11, y: 4}}
    - {class: shahed_drone,    pos: {x: 11, y: 5}}
    # Coastal batteries on the Iranian shore (static).
    - {class: coastal_missile, pos: {x: 13, y: 3}}
    - {class: coastal_missile, pos: {x: 13, y: 6}}
    # Basij line defending the approaches to the bunker.
    - {class: basij,           pos: {x: 14, y: 4}}
    - {class: basij,           pos: {x: 14, y: 5}}
    - {class: basij,           pos: {x: 14, y: 6}}
    # IRGC commando core inside the bunker complex.
    - {class: irgc_commando,   pos: {x: 15, y: 4}}
    - {class: irgc_commando,   pos: {x: 15, y: 6}}
    - {class: irgc_commando,   pos: {x: 16, y: 5}}

rules:
  max_turns: 10
  fog_of_war: classic
  first_player: blue

win_conditions:
  # Blue needs BOTH halves of the Operation Epic Fury strike
  # package: reach the enriched-uranium bunker AND kill Khamenei.
  # Red wins if the ten-turn budget expires without the compound
  # goal met, or if either US/Israeli VIP dies (handled by the
  # protect_unit rules below). The plugin is the single source of
  # truth for blue-victory — don't add seize_enemy_fort here or
  # blue would trigger a premature win from reaching the bunker
  # alone.
  - {type: plugin, module: rules, check_fn: enriched_uranium_strike_check}
  # Safety nets that the plugin defers to:
  - {type: protect_unit, unit_id: u_b_trump_1,      owning_team: blue}
  - {type: protect_unit, unit_id: u_b_netanyahu_1,  owning_team: blue}
  - {type: eliminate_all_enemy_units}

narrative:
  title: Strait of Hormuz (Operation Epic Fury, 2026)
  description: |
    A ten-turn compressed version of the February 2026 US/Israel
    strike on Iran: push through the Strait, finish the
    decapitation begun on day 1, and plant boots on the
    enriched-uranium bunker.
  intro: |
    28 February 2026. Khamenei has just been hit in Tehran but
    not yet confirmed dead; his escort craft is still at the mouth
    of the Strait. B-2s are feet-wet over the Gulf of Oman. The
    IRGC has mined the Strait and rolled out its coastal-missile
    regiments. Ten turns to the bunker.
  events:
    - trigger: on_unit_killed
      unit_id: u_r_khamenei_1
      text: "Supreme Leader KIA confirmed. Half the strike package is delivered — now the bunker."
