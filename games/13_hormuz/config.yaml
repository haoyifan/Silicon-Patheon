schema_version: 1
license: fan_work
fan_work_source: "Fictional speculative scenario inspired by 2020s Iran / US / Israel tensions. Not endorsed by or affiliated with any named figure, government, or military service."
name: "Strait of Hormuz — Operation Epic Fury 2026 — Modern Fiction"
difficulty: 5
description: |
  February 2026. In a speculative escalation of the long-running
  Iran / Israel / US crisis, a combined American-Israeli strike
  package has kicked off "Operation Epic Fury" — nearly nine
  hundred coordinated strikes against Iranian leadership, missile
  infrastructure, and the underground uranium enrichment complex.
  The IRGC retaliates by mining the Strait of Hormuz, surging its
  speedboat swarms, launching Shahed drones, and lighting up its
  coastal anti-ship batteries.

  This scenario compresses the opening twelve hours into a sixteen-
  turn race: the US/Israeli strike force must push across the
  strait, finish the decapitation begun on day one, and plant a
  demolition charge inside the hardened uranium bunker on Larak
  Island before the Revolutionary Guard grinds them down.

  Fictional. Any resemblance to specific real-world operations is
  speculative — treat as near-future alternate history in the vein
  of a Tom Clancy technothriller.

# ───────────────────────────────────────────────────────────────────
#  MAP LAYOUT  (22 wide x 16 tall)
#
#  Western 7 columns (x=0-6)  — open sea: the strait approach.
#                               Naval mines scattered as hazards.
#  Middle strip  (x=7-14)     — Larak-inspired island: beaches on
#                               the west side, desert interior,
#                               mountain spine (impassable), and
#                               the hardened URANIUM BUNKER
#                               complex at the eastern edge.
#  Eastern 7 columns (x=15-21)— Iranian mainland coast: beach,
#                               coastal missile emplacements,
#                               desert inland, mountain backstop.
#
#  Objectives:
#    • BLUE wins by reaching any uranium_bunker tile (demolition).
#    • BLUE also wins by eliminating all red.
#    • RED wins by holding until turn 16 (bunker survives),
#      by killing Trump (political collapse), or by wiping blue.
# ───────────────────────────────────────────────────────────────────

