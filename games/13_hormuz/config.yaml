terrain_types:
  reef:
    display_name: Reef
    description: |
      Shallow coral and rock — too dangerous for any hull and
      impassable to infantry. Blocks movement entirely.
    move_cost: 99
    passable: false
    glyph: "~"
    color: bright_black

  sea_mine:
    display_name: Naval Mine
    description: |
      IRGC-laid contact mine drifting in the strait. Traversable
      but extremely costly — any unit crossing a mined tile takes
      a beating from the blast. Passable but slow.
    move_cost: 4
    defense_bonus: -2
    passable: true
    glyph: "*"
    color: magenta

  beach:
    display_name: Beach
    description: |
      Sandy landing zone. Slight cover from dunes and debris.
      Amphibious forces must cross here to reach inland terrain.
    move_cost: 1
    defense_bonus: 1
    glyph: "."
    color: yellow

  desert:
    display_name: Desert
    description: |
      Sun-baked open ground, a mix of hardpan and rocky flats.
      No cover but no penalty either. The strategic connective
      tissue of the island and mainland.
    move_cost: 1
    defense_bonus: 0
    glyph: ","
    color: yellow

  mountain:
    display_name: Mountain
    description: |
      Sheer volcanic rock. Impassable to ground units and too
      rough for helicopters to set down in. Blocks movement and
      line-of-sight around the map's north/south caps.
    move_cost: 99
    passable: false
    glyph: "^"
    color: bright_black

  fort_wall:
    display_name: Bunker Wall
    description: |
      Reinforced concrete and rebar around the enrichment
      complex. Impassable — the assault team must breach
      through a damaged section.
    move_cost: 99
    passable: false
    glyph: "#"
    color: bright_black

  damaged_wall:
    display_name: Damaged Emplacement
    description: |
      A section of bunker wall or shore battery shattered by
      earlier B-2 strikes on day one of Epic Fury. Passable
      but slow — climbing rubble under fire.
    move_cost: 3
    defense_bonus: 1
    passable: true
    glyph: "%"
    color: yellow

  uranium_bunker:
    display_name: Uranium Enrichment Bunker
    description: |
      The heart of the Iranian enrichment program: hardened
      underground halls full of centrifuges. Huge defensive
      bonus. A SEAL or Shayetet 13 operator reaching any
      bunker tile can plant the demolition charge and end
      the mission.
    move_cost: 2
    defense_bonus: 4
    glyph: "U"
    color: bright_yellow

unit_classes:
  # ─────────── BLUE: US / Israel strike force ───────────
  trump:
    display_name: President Trump
    description: |
      Commander-in-Chief directing the operation from the
      carrier strike group via CENTCOM datalink. Barely
      combat-capable in person but bolsters the team with
      real-time coordination (heals). If he falls, political
      backing collapses and the operation aborts.
    hp_max: 22
    atk: 5
    defense: 3
    res: 4
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 2
    can_heal: true
    heal_amount: 6
    tags: [vip, leader]
    glyph: "P"
    color: bright_cyan

  netanyahu:
    display_name: Prime Minister Netanyahu
    description: |
      Israeli prime minister coordinating the strike package
      through the war cabinet. As fragile as the US president
      and equally political — useful as an offboard handler
      in class definitions, not deployed on this sortie.
    hp_max: 20
    atk: 5
    defense: 3
    res: 4
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    tags: [vip, leader]
    glyph: "N"
    color: bright_cyan

  b2:
    display_name: B-2 Spirit Bomber
    description: |
      Flying wing stealth bomber. The only blue platform with
      enough throw weight to crack hardened shore emplacements
      at standoff range. Devastating ATK, long range, but
      paper-thin armor — keep it behind the F-35 screen.
    hp_max: 22
    atk: 13
    defense: 2
    res: 3
    spd: 5
    move: 4
    rng_min: 3
    rng_max: 5
    tags: [flying, aircraft]
    glyph: "B"
    color: bright_cyan

  f35:
    display_name: F-35 Stealth Fighter
    description: |
      Fifth-generation multirole fighter. Fast, mid-range,
      serious damage — the workhorse against mines, drones,
      and speedboats. Can project deep behind the line in a
      single turn.
    hp_max: 22
    atk: 10
    defense: 3
    res: 5
    spd: 8
    move: 6
    rng_min: 2
    rng_max: 3
    tags: [flying, aircraft]
    glyph: "F"
    color: bright_cyan

  destroyer:
    display_name: Arleigh Burke Destroyer
    description: |
      Aegis destroyer with Tomahawk cruise missiles. A
      heavily armored ranged platform but slow through the
      strait — mines and coastal missiles are its worst
      enemies.
    hp_max: 38
    atk: 10
    defense: 8
    res: 5
    spd: 4
    move: 3
    rng_min: 2
    rng_max: 4
    tags: [naval, ship]
    glyph: "D"
    color: cyan

  tomahawk_sub:
    display_name: Tomahawk Submarine
    description: |
      Submerged cruise-missile launch platform. Paper-thin
      armor but the longest reach in the fleet. Picks off
      hardened emplacements from deep water.
    hp_max: 20
    atk: 11
    defense: 3
    res: 4
    spd: 4
    move: 2
    rng_min: 4
    rng_max: 6
    tags: [naval, submarine]
    glyph: "S"
    color: cyan

  navy_seal:
    display_name: Navy SEAL Team Leader
    description: |
      The only unit that can actually step inside the uranium
      bunker and plant the demolition charge. Melee, fast,
      and fragile if basij or IRGC commandos get hands on
      them — use air cover to keep the lane clear.
    hp_max: 26
    atk: 11
    defense: 5
    res: 4
    spd: 7
    move: 4
    rng_min: 1
    rng_max: 1
    tags: [infantry, special_forces]
    glyph: "E"
    color: bright_cyan

  shayetet:
    display_name: Shayetet 13 Commando
    description: |
      Israeli naval special forces. Pairs with the SEAL team
      — one to distract, one to breach. Fast, lethal in
      close, but will fold under sustained fire.
    hp_max: 24
    atk: 11
    defense: 4
    res: 4
    spd: 8
    move: 5
    rng_min: 1
    rng_max: 2
    tags: [infantry, special_forces]
    glyph: "H"
    color: bright_cyan

  # ─────────── RED: Iranian defense ───────────
  khamenei:
    display_name: Supreme Leader Khamenei
    description: |
      Caught aboard an IRGC patrol boat at the western mouth
      of the strait with only 1 HP — an echo of the day-one
      decapitation strike that left his fate uncertain. Blue
      can finish him turn 1 if they push hard.
    hp_max: 1
    atk: 4
    defense: 1
    res: 1
    spd: 3
    move: 2
    rng_min: 1
    rng_max: 1
    tags: [vip, leader]
    glyph: "K"
    color: bright_red

  irgc_commando:
    display_name: IRGC Saberin Commando
    description: |
      Iran's Revolutionary Guard professional ground force.
      Heavily armored bunker defender roughly matched with
      blue special forces — the last wall between a SEAL
      team and the centrifuges.
    hp_max: 30
    atk: 10
    defense: 7
    res: 4
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    tags: [infantry, special_forces]
    glyph: "C"
    color: bright_red

  coastal_missile:
    display_name: Coastal Anti-Ship Battery
    description: |
      Fixed Noor/Qader coastal anti-ship and SAM launcher on
      the Iranian coast. Zero movement — never redeploys.
      Long range, heavy magic-type damage (missiles pierce
      conventional armor).
    hp_max: 24
    atk: 12
    defense: 4
    res: 3
    spd: 3
    move: 0
    rng_min: 3
    rng_max: 5
    is_magic: true
    tags: [emplacement, missile]
    glyph: "M"
    color: red

  irgc_speedboat:
    display_name: IRGC Speedboat
    description: |
      Cheap swarm unit. Low HP, very fast, close-range only.
      Dangerous in groups to isolated blue ships; disposable
      on its own.
    hp_max: 16
    atk: 9
    defense: 2
    res: 2
    spd: 8
    move: 5
    rng_min: 1
    rng_max: 1
    tags: [naval, boat]
    glyph: "G"
    color: red

  shahed_drone:
    display_name: Shahed-136 Drone
    description: |
      One-way attack drone. Fragile but with enough reach to
      harass the back of blue's column. Plunging warhead
      deals magic-type damage.
    hp_max: 14
    atk: 8
    defense: 1
    res: 2
    spd: 6
    move: 4
    rng_min: 2
    rng_max: 4
    is_magic: true
    tags: [flying, drone]
    glyph: "V"
    color: red

  basij:
    display_name: Basij Militia
    description: |
      Paramilitary volunteers. Mediocre stats but cheap and
      numerous — the tripwire defense around the bunker and
      coastal positions.
    hp_max: 20
    atk: 7
    defense: 4
    res: 2
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    tags: [infantry, militia]
    glyph: "I"
    color: red

armies:
  blue:
    # Trump on the carrier strike group, way in the rear
    - {class: trump,        pos: {x: 0, y: 7}}
    # B-2 standoff — far back, pushes forward behind the F-35 screen
    - {class: b2,           pos: {x: 1, y: 4}}
    # F-35 forward air patrol — fast enough to reach Khamenei's boat on turn 1
    - {class: f35,          pos: {x: 2, y: 6}}
    # Destroyer in the deep strait
    - {class: destroyer,    pos: {x: 0, y: 10}}
    # Tomahawk sub — lurking south
    - {class: tomahawk_sub, pos: {x: 1, y: 12}}
    # SEAL team staging for amphibious landing (center)
    - {class: navy_seal,    pos: {x: 3, y: 6}}
    # Shayetet 13 — southern insertion
    - {class: shayetet,     pos: {x: 3, y: 9}}

  red:
    # Khamenei on a patrol boat at the western strait mouth — 1 HP.
    # Distance to nearest blue (f35 at x=2 y=7) = |6-2| + |7-7| = 4 (the minimum).
    - {class: khamenei,       pos: {x: 6, y: 7}}
    # IRGC Saberin commando in the bunker courtyard
    - {class: irgc_commando,  pos: {x: 13, y: 7}}
    # Two coastal anti-ship batteries along the Iranian mainland
    - {class: coastal_missile, pos: {x: 19, y: 4}}
    - {class: coastal_missile, pos: {x: 19, y: 12}}
    # Speedboat patrolling the strait between island and mainland
    - {class: irgc_speedboat, pos: {x: 15, y: 8}}
    # Shahed drone loitering inland
    - {class: shahed_drone,   pos: {x: 18, y: 8}}
    # Basij militia dug in on the bunker's outer wall
    - {class: basij,          pos: {x: 12, y: 9}}

rules:
  max_turns: 16
  first_player: blue

win_conditions:
  # Demolition charge: any blue unit ending its turn on a bunker
  # tile wins. The bunker is a 3x4 zone (x=12-14, y=6-9). A single
  # reach_tile rule with a `positions` list collapses what used to
  # be 12 rules into one line on the scoreboard.
  - type: reach_tile
    team: blue
    positions:
      - {x: 12, y: 6}
      - {x: 12, y: 7}
      - {x: 12, y: 8}
      - {x: 12, y: 9}
      - {x: 13, y: 6}
      - {x: 13, y: 7}
      - {x: 13, y: 8}
      - {x: 13, y: 9}
      - {x: 14, y: 6}
      - {x: 14, y: 7}
      - {x: 14, y: 8}
      - {x: 14, y: 9}
  # Trump dies -> political collapse, blue loses
  - {type: protect_unit, unit_id: u_b_trump_1, owning_team: blue}
  # Total elimination either way
  - {type: eliminate_all_enemy_units}
  # Turn cap -> bunker survives, red wins by default (draw-to-red)
  - {type: max_turns_draw}

narrative:
  title: "Strait of Hormuz (Operation Epic Fury, 2026)"
  description: |
    A compressed, sixteen-turn version of the opening hours of
    Operation Epic Fury: force the strait, finish the
    decapitation begun on day one, and seize the uranium
    enrichment bunker before IRGC defenses regroup.
  intro: |
    28 February 2026. Khamenei has been struck in Tehran but not
    yet confirmed killed; his escort boat is still at the mouth
    of the strait. A B-2 has already crossed the Gulf of Oman.
    The IRGC has mined the strait and lit up coastal anti-ship
    batteries along the Iranian shoreline. Sixteen turns to the
    bunker.
  events:
    - trigger: on_turn_start
      turn: 4
      text: |
        Smoke rolls off Larak. F-35s push through the first
        mine belt while the destroyer hammers the northern
        shore battery. The bunker still stands, its defenders
        dug in around the damaged wall.
    - trigger: on_turn_start
      turn: 8
      text: |
        Shahed drones corkscrew over the strait. IRGC
        speedboats fan out from the mainland. The SEAL team
        is halfway across the island's western desert, ducking
        between dunes as coastal missiles reach for the
        destroyer behind them.
    - trigger: on_turn_start
      turn: 13
      text: |
        Last light over the strait. The bunker's outer wall is
        cracked wide by standoff fire. If the breach team is
        going in, it has to go in now — Tehran's reinforcements
        are hours away.
    - trigger: on_unit_killed
      unit_id: u_r_khamenei_1
      text: |
        Supreme Leader KIA confirmed. Half the strike plan is
        done. Now the bunker.
    - trigger: on_unit_killed
      unit_id: u_b_trump_1
      text: |
        The White House has just gone dark on the datalink.
        Without political cover the operation cannot continue.
        Epic Fury is over.
