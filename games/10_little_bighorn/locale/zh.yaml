# 小大角河之战 — 中文本地化
name: 小大角河之战 — 1876年，大苏族战争
description: |
  1876年6月25日。乔治·阿姆斯特朗·卡斯特中校率领第七骑兵团
  袭击小大角河畔的拉科塔和夏延人庞大营地——有史以来最大的
  平原印第安人集会，精神领袖为坐牛，战场指挥为疯马。卡斯特
  将兵力分为三个营，以一比三的劣势发起进攻。他的营在一处
  低矮山脊上被包围，全军覆没。"卡斯特的最后抵抗。"

unit_classes:
  custer:
    display_name: 乔治·A·卡斯特
    description: |
      美国第七骑兵团中校。金发、张扬、勇敢到轻率。
      决定不等另外两个营就发起攻击。
  trooper:
    display_name: 骑兵
    description: |
      单发春田卡宾枪、柯尔特左轮、很少使用的军刀。
      内战老兵或新兵；无论如何，今天都寡不敌众。
  cav_sharpshooter:
    display_name: 骑兵神射手
    description: |
      骑马侦察射手，持夏普斯步枪。远程打击，近战脆弱。
  sitting_bull:
    display_name: 坐牛
    description: |
      亨克帕帕拉科塔族圣人和酋长。战前曾有"士兵像蝗虫般
      从天而降"的异象。不亲自战斗，但他的存在稳定军心。
  crazy_horse:
    display_name: 疯马
    description: |
      奥格拉拉拉科塔族战争酋长。率领冲锋突破骑兵防线。
      据说不可能被伤到——全场最高战斗属性。
  lakota_warrior:
    display_name: 拉科塔战士
    description: |
      骑马、持矛与弓，熟悉这里每一寸地形。
      在速度和机动性上全面碾压骑兵。
  cheyenne_warrior:
    display_name: 夏延战士
    description: |
      北夏延族战士，战争彩绘上身。快速、凶猛，
      八年前沃希塔屠杀的仇恨仍在燃烧——那正是
      卡斯特干的。
  reno:
    display_name: 里诺少校
    description: |
      第一个向营地发起攻击的营指挥官。冲锋在猛烈
      火力下瓦解，他撤退到悬崖上。沉稳但已动摇。
  benteen:
    display_name: 本廷上尉
    description: |
      指挥预备营的资深上尉。收到卡斯特最后的信——
      "快来，带弹药"——但为时已晚。临危不乱。
  keogh:
    display_name: 基奥上尉
    description: |
      爱尔兰裔军官，I连连长。他的战马科曼奇是
      山脊上发现的唯一幸存者。持军刀和左轮作战。
  calhoun:
    display_name: 卡尔霍恩中尉
    description: |
      卡斯特的妹夫，指挥L连守南面散兵线。
      他的阵地在盖尔的冲锋下最先崩溃。
  cooke:
    display_name: 库克中尉
    description: |
      卡斯特的副官，以一把夸张的络腮胡闻名。
      携卡斯特最后的信去找本廷。夏普斯卡宾枪神射手。
  gall:
    display_name: 盖尔
    description: |
      亨克帕帕战争酋长。率先发起冲锋击溃里诺营，
      随后北上碾碎卡斯特的侧翼。他的两个妻子
      在开场攻击中被杀，怒不可遏。
  rain_in_the_face:
    display_name: 雨打脸
    description: |
      亨克帕帕拉科塔战士，与卡斯特兄弟有私仇。
      快速、凶猛，复仇心切。
  two_moons:
    display_name: 双月
    description: |
      北夏延族酋长。率领夏延战士从西面完成包围。
      战争彩绘满身，八年前沃希塔屠杀的仇恨仍在
      燃烧——而那正是卡斯特所为。
  wooden_leg:
    display_name: 木腿
    description: |
      年轻的北夏延族战士。最先冲上卡斯特山脊的
      人之一。手持长矛与弓。
  white_bull:
    display_name: 白牛
    description: |
      明尼康朱拉科塔战士，坐牛的侄子。自称在
      肉搏中亲手杀死了卡斯特。精通骑射。
  low_dog:
    display_name: 矮狗
    description: |
      奥格拉拉拉科塔族战争首领。与疯马并肩从北翼
      发起侧翼攻击。曾说骑兵冲锋来时"像受惊的
      野牛群"。
  native_archer:
    display_name: 原住民弓手
    description: |
      快射弓手，骑马全速射击精准无比。被射的士兵
      根本分不清箭从哪里飞来。

terrain_types:
  river:
    display_name: 河流
    description: |
      小大角河——不可通行。
  ford:
    display_name: 浅滩
    description: |
      浅滩渡口。
  bluff:
    display_name: 断崖
    description: |
      俯瞰山谷的陡峭悬崖。防御+3，移动力消耗2。
  ridge:
    display_name: 山脊
    description: |
      最后抵抗之丘——堡垒级高防御地形。
  ravine:
    display_name: 沟壑
    description: |
      穿过丘陵的深沟。防御+2，移动力消耗2。绝佳伏击地形。
  hill:
    display_name: 丘陵
    description: |
      起伏丘陵——提供防御加成。

narrative:
  title: 小大角河之战
  description: |
    卡斯特的最后抵抗。三比一的劣势，而且越来越糟。
  intro: |
    酷热的午后，火药河地区。卡斯特的营从悬崖上
    进入一个帐篷多到超出任何活着的士兵所见的山谷。
  events:
    - trigger: on_turn_start
      turn: 4
      text: |
        疯马率领战士从河边冲上来。骑兵左翼开始崩溃。
    - trigger: on_turn_start
      turn: 10
      text: |
        卡斯特的骑兵在山脊上围成圆圈。死马是唯一的掩体。
    - trigger: on_turn_start
      turn: 15
      text: |
        尘埃落定。枪声渐歇。
    - trigger: on_unit_killed
      unit_id: u_b_custer_1
      text: |
        卡斯特倒在山脊上。他的部队全军覆没。
