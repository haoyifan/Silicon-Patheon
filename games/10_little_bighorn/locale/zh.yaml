# 小大角河之战 — 中文本地化
name: 小大角河之战
description: |
  1876年6月25日。乔治·阿姆斯特朗·卡斯特中校率领第七骑兵团
  袭击小大角河畔的拉科塔和夏延人庞大营地——有史以来最大的
  平原印第安人集会，精神领袖为坐牛，战场指挥为疯马。卡斯特
  将兵力分为三个营，以一比三的劣势发起进攻。他的营在一处
  低矮山脊上被包围，全军覆没。"卡斯特的最后抵抗。"

unit_classes:
  custer:
    display_name: 乔治·A·卡斯特
    description: |
      美国第七骑兵团中校。金发、张扬、勇敢到轻率。
      决定不等另外两个营就发起攻击。
  trooper:
    display_name: 骑兵
    description: |
      单发春田卡宾枪、柯尔特左轮、很少使用的军刀。
      内战老兵或新兵；无论如何，今天都寡不敌众。
  cav_sharpshooter:
    display_name: 骑兵神射手
    description: |
      骑马侦察射手，持夏普斯步枪。远程打击，近战脆弱。
  sitting_bull:
    display_name: 坐牛
    description: |
      亨克帕帕拉科塔族圣人和酋长。战前曾有"士兵像蝗虫般
      从天而降"的异象。不亲自战斗，但他的存在稳定军心。
  crazy_horse:
    display_name: 疯马
    description: |
      奥格拉拉拉科塔族战争酋长。率领冲锋突破骑兵防线。
      据说不可能被伤到——全场最高战斗属性。
  lakota_warrior:
    display_name: 拉科塔战士
    description: |
      骑马、持矛与弓，熟悉这里每一寸地形。
      在速度和机动性上全面碾压骑兵。
  cheyenne_warrior:
    display_name: 夏延战士
    description: |
      北夏延族战士，战争彩绘上身。快速、凶猛，
      八年前沃希塔屠杀的仇恨仍在燃烧——那正是
      卡斯特干的。
  native_archer:
    display_name: 原住民弓手
    description: |
      快射弓手，骑马全速射击精准无比。被射的士兵
      根本分不清箭从哪里飞来。

terrain_types:
  river:
    description: |
      小大角河——不可通行。
  ford:
    description: |
      浅滩渡口。
  hill:
    description: |
      起伏丘陵——提供防御加成。
  ridge:
    description: |
      最后抵抗之丘——堡垒级高防御地形。

narrative:
  title: 小大角河之战
  description: |
    卡斯特的最后抵抗。三比一的劣势，而且越来越糟。
  intro: |
    酷热的午后，火药河地区。卡斯特的营从悬崖上
    进入一个帐篷多到超出任何活着的士兵所见的山谷。
  events:
    - trigger: on_turn_start
      turn: 4
      text: |
        疯马率领战士从河边冲上来。骑兵左翼开始崩溃。
    - trigger: on_turn_start
      turn: 10
      text: |
        卡斯特的骑兵在山脊上围成圆圈。死马是唯一的掩体。
    - trigger: on_turn_start
      turn: 15
      text: |
        尘埃落定。枪声渐歇。
    - trigger: on_unit_killed
      unit_id: u_b_custer_1
      text: |
        卡斯特倒在山脊上。他的部队全军覆没。
