schema_version: 1
license: public_domain
name: "Little Bighorn — 1876, Great Sioux War"
difficulty: 5
description: |
  June 25, 1876. Lt. Colonel George Armstrong Custer leads five
  companies of the 7th Cavalry against the largest gathering of
  Plains Indians ever assembled along the Little Bighorn River.
  Sitting Bull's vision of soldiers falling like grasshoppers has
  drawn Lakota, Cheyenne, and Arapaho warriors by the thousands.
  Crazy Horse and Gall strike from ravines on both flanks. Custer's
  battalion is surrounded on a low ridge and annihilated to the
  last man. Reno and Benteen hold a separate hilltop miles away,
  unable to reach him.
  Inspired by the Battle of Little Bighorn (1876), American frontier history.

board:
  width: 14
  height: 18
  terrain:
    # Little Bighorn River along x=2 with two fords
    - {x: 2, y: 0, type: river}
    - {x: 2, y: 1, type: river}
    - {x: 2, y: 2, type: river}
    - {x: 2, y: 3, type: river}
    - {x: 2, y: 4, type: ford}
    - {x: 2, y: 5, type: river}
    - {x: 2, y: 6, type: river}
    - {x: 2, y: 7, type: river}
    - {x: 2, y: 8, type: river}
    - {x: 2, y: 9, type: river}
    - {x: 2, y: 10, type: river}
    - {x: 2, y: 11, type: ford}
    - {x: 2, y: 12, type: river}
    - {x: 2, y: 13, type: river}
    - {x: 2, y: 14, type: river}
    - {x: 2, y: 15, type: river}
    - {x: 2, y: 16, type: river}
    - {x: 2, y: 17, type: river}
    # Bluffs along the east side
    - {x: 11, y: 6, type: bluff}
    - {x: 12, y: 6, type: bluff}
    - {x: 11, y: 7, type: bluff}
    - {x: 12, y: 7, type: bluff}
    # Custer's Last Stand ridge -- center
    - {x: 7, y: 7, type: ridge}
    - {x: 8, y: 7, type: ridge}
    - {x: 7, y: 8, type: ridge}
    - {x: 8, y: 8, type: ridge}
    # Ravines cutting through the terrain
    - {x: 5, y: 5, type: ravine}
    - {x: 6, y: 6, type: ravine}
    - {x: 10, y: 10, type: ravine}
    - {x: 11, y: 11, type: ravine}
    # Rolling hills
    - {x: 5, y: 3, type: hill}
    - {x: 6, y: 3, type: hill}
    - {x: 5, y: 13, type: hill}
    - {x: 6, y: 13, type: hill}
  forts: []

terrain_types:
  river:
    display_name: River
    description: The Little Bighorn -- impassable except at fords.
    move_cost: 99
    passable: false
    glyph: "~"
    color: blue
  ford:
    display_name: Ford
    description: Shallow river crossing. Costs 2 movement.
    move_cost: 2
    glyph: "="
    color: yellow
  bluff:
    display_name: Bluff
    description: Steep bluffs overlooking the valley. +3 DEF, costs 2 movement.
    move_cost: 2
    defense_bonus: 3
    glyph: "^"
    color: yellow
  ridge:
    display_name: Ridge
    description: Last Stand Hill. Costs 2 movement. +4 DEF.
    move_cost: 2
    defense_bonus: 4
    glyph: "*"
    color: yellow
  ravine:
    display_name: Ravine
    description: Deep coulees cutting through the hills. +2 DEF, costs 2 movement. Good ambush terrain.
    move_cost: 2
    defense_bonus: 2
    glyph: "v"
    color: green
  hill:
    display_name: Hill
    description: Rolling grassland hills. +2 DEF, costs 2 movement.
    move_cost: 2
    defense_bonus: 2
    glyph: "h"
    color: green

unit_classes:
  custer:
    display_name: George A. Custer
    description: |
      Lt. Colonel of the 7th Cavalry. Yellow-haired, theatrical,
      brave to the point of recklessness. Divided his command and
      charged into a force three times his size. VIP -- if he falls,
      the cavalry is finished.
    hp_max: 30
    atk: 11
    defense: 5
    res: 3
    spd: 7
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [vip, officer]
    sight: 5
    glyph: C
    color: bright_cyan

  reno:
    display_name: Major Reno
    description: |
      Commander of the first battalion to attack the village. His
      charge broke under withering fire and he retreated to the
      bluffs. Steady but shaken.
    hp_max: 24
    atk: 9
    defense: 5
    res: 3
    spd: 6
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [officer, cavalry]
    sight: 4
    glyph: R
    color: cyan

  benteen:
    display_name: Captain Benteen
    description: |
      Senior captain commanding the reserve battalion. Received
      Custer's final message -- "Come quick, bring pacs" -- but
      arrived too late. Cool under fire.
    hp_max: 24
    atk: 9
    defense: 6
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [officer, cavalry]
    sight: 4
    glyph: B
    color: cyan

  keogh:
    display_name: Captain Keogh
    description: |
      Irish-born officer of I Company. His horse Comanche was the
      only survivor found on the ridge. Fights with saber and revolver.
    hp_max: 22
    atk: 9
    defense: 4
    res: 3
    spd: 6
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [officer, cavalry]
    sight: 3
    glyph: K
    color: cyan

  calhoun:
    display_name: Lt. Calhoun
    description: |
      Custer's brother-in-law, commanding L Company on the southern
      skirmish line. His position collapsed first under Gall's charge.
    hp_max: 20
    atk: 8
    defense: 4
    res: 2
    spd: 6
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [officer, cavalry]
    sight: 3
    glyph: L
    color: cyan

  cooke:
    display_name: Lt. Cooke
    description: |
      Custer's adjutant, famous for his enormous dundreary whiskers.
      Carried Custer's last message to Benteen. Sharpshooter with
      a Sharps carbine.
    hp_max: 18
    atk: 10
    defense: 3
    res: 2
    spd: 5
    rng_min: 2
    rng_max: 3
    move: 4
    tags: [ranged, officer]
    sight: 4
    glyph: W
    color: cyan

  sitting_bull:
    display_name: Sitting Bull
    description: |
      Hunkpapa Lakota holy man and chief. His vision of soldiers
      falling like grasshoppers drew the nations together. Does not
      fight personally but his presence inspires every warrior on
      the field.
    hp_max: 28
    atk: 8
    defense: 5
    res: 5
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [chief, holy_man]
    sight: 5
    glyph: S
    color: bright_red

  crazy_horse:
    display_name: Crazy Horse
    description: |
      Oglala Lakota war chief. Led the flanking charge that broke
      the cavalry line from the north. Said to be impossible to
      wound. The most dangerous warrior on the field.
    hp_max: 32
    atk: 12
    defense: 5
    res: 3
    spd: 9
    rng_min: 1
    rng_max: 1
    move: 6
    tags: [chief, warrior]
    sight: 4
    glyph: "Q"
    color: bright_red

  gall:
    display_name: Gall
    description: |
      Hunkpapa war chief. Led the initial charge that routed Reno's
      battalion, then swept north to crush Custer's flank. Furious --
      two of his wives were killed in the opening attack.
    hp_max: 28
    atk: 11
    defense: 5
    res: 3
    spd: 8
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [chief, warrior]
    sight: 4
    glyph: G
    color: bright_red

  rain_in_the_face:
    display_name: Rain-in-the-Face
    description: |
      Hunkpapa Lakota warrior with a personal grudge against the
      Custer brothers. Fast, relentless, and driven by vengeance.
    hp_max: 24
    atk: 10
    defense: 4
    res: 3
    spd: 8
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [warrior]
    sight: 3
    glyph: F
    color: red

  two_moons:
    display_name: Two Moons
    description: |
      Northern Cheyenne chief. Led Cheyenne warriors in the
      encirclement from the west. Painted for war and burning with
      grief from the Washita massacre eight years prior.
    hp_max: 24
    atk: 10
    defense: 4
    res: 3
    spd: 7
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [chief, warrior]
    sight: 4
    glyph: T
    color: red

  wooden_leg:
    display_name: Wooden Leg
    description: |
      Young Northern Cheyenne warrior. One of the first to reach
      Custer's ridge. Armed with lance and bow.
    hp_max: 20
    atk: 9
    defense: 3
    res: 3
    spd: 7
    rng_min: 1
    rng_max: 2
    move: 5
    tags: [warrior]
    sight: 3
    glyph: Y
    color: red

  white_bull:
    display_name: White Bull
    description: |
      Minneconjou Lakota warrior, nephew of Sitting Bull. Claimed
      to have personally killed Custer in hand-to-hand combat.
      Expert mounted archer.
    hp_max: 22
    atk: 10
    defense: 3
    res: 3
    spd: 7
    rng_min: 1
    rng_max: 2
    move: 5
    tags: [warrior, archer]
    sight: 4
    glyph: E
    color: red

  low_dog:
    display_name: Low Dog
    description: |
      Oglala Lakota war leader. Fought alongside Crazy Horse in the
      northern flanking attack. Said "they came like a stampede of
      buffalo" about the cavalry charge.
    hp_max: 22
    atk: 9
    defense: 4
    res: 3
    spd: 7
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [warrior]
    sight: 3
    glyph: D
    color: red

armies:
  blue:
    # Custer's command on the ridge (y=7-9)
    - {class: custer, pos: {x: 7, y: 7}}
    - {class: keogh, pos: {x: 8, y: 8}}
    - {class: calhoun, pos: {x: 7, y: 9}}
    - {class: cooke, pos: {x: 9, y: 7}}
    # Reno and Benteen on the bluffs
    - {class: reno, pos: {x: 11, y: 7}}
    - {class: benteen, pos: {x: 12, y: 6}}
  red:
    # Crazy Horse from the north (y=0-2)
    - {class: crazy_horse, pos: {x: 7, y: 1}}
    - {class: low_dog, pos: {x: 8, y: 2}}
    # Gall from the south (y=15-16)
    - {class: gall, pos: {x: 6, y: 15}}
    - {class: rain_in_the_face, pos: {x: 7, y: 16}}
    # Two Moons and Cheyenne from the southwest (y=14)
    - {class: two_moons, pos: {x: 4, y: 14}}
    - {class: wooden_leg, pos: {x: 5, y: 14}}
    # White Bull from the south-east
    - {class: white_bull, pos: {x: 10, y: 15}}
    # Sitting Bull in the encampment
    - {class: sitting_bull, pos: {x: 5, y: 17}}

rules:
  max_turns: 25
  first_player: blue

win_conditions:
  - {type: protect_unit, unit_id: u_b_custer_1, owning_team: blue}
  - {type: eliminate_all_enemy_units}
  - {type: max_turns_draw}

narrative:
  title: Little Bighorn
  description: |
    Custer's Last Stand. Surrounded on a ridge above the Little
    Bighorn, outnumbered three to one and getting worse every minute.
  intro: |
    Sweltering afternoon in the Powder River country. Custer's
    battalion descends from the bluffs into a valley fuller of
    teepees than any soldier alive has seen. Dust rises from every
    direction. The trap is closing.
  events:
    - trigger: on_turn_start
      turn: 4
      text: "Crazy Horse leads warriors down from the north. Gall's Hunkpapa pour up from the river. The cavalry's flanks crumble."
    - trigger: on_turn_start
      turn: 10
      text: "Custer's troopers form a circle on the ridge. Their dead horses are the only cover."
    - trigger: on_turn_start
      turn: 15
      text: "The dust settles. The shooting slows. Few cavalrymen remain standing."
    - trigger: on_unit_killed
      unit_id: u_b_custer_1
      text: "Custer falls on the ridge. His command is finished."
