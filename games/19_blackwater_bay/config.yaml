schema_version: 1
license: fan_work
fan_work_source: "Game of Thrones (George R.R. Martin / HBO)"
name: Blackwater Bay
difficulty: 4
description: |
  King's Landing, 299 AC. Stannis Baratheon's fleet sails into
  Blackwater Bay to seize the Iron Throne. Tyrion Lannister, acting
  Hand of the King, has laid a wildfire trap in the bay and must hold
  the Mud Gate until Tywin's host arrives from the Kingsroad. Stannis
  leads from the front. The bay burns green but the assault presses on.
  Inspired by the Battle of the Blackwater from Game of Thrones by George R.R. Martin.

board:
  width: 16
  height: 14
  terrain:
    # ── Blackwater Bay — deep water, impassable (columns 0-2) ──
    - {x: 0, y: 0, type: water}
    - {x: 1, y: 0, type: water}
    - {x: 2, y: 0, type: water}
    - {x: 0, y: 1, type: water}
    - {x: 1, y: 1, type: water}
    - {x: 2, y: 1, type: water}
    - {x: 0, y: 2, type: water}
    - {x: 1, y: 2, type: water}
    - {x: 2, y: 2, type: water}
    - {x: 0, y: 3, type: water}
    - {x: 1, y: 3, type: water}
    - {x: 2, y: 3, type: water}
    - {x: 0, y: 4, type: water}
    - {x: 1, y: 4, type: water}
    - {x: 2, y: 4, type: water}
    - {x: 0, y: 5, type: water}
    - {x: 1, y: 5, type: water}
    - {x: 2, y: 5, type: water}
    - {x: 0, y: 6, type: water}
    - {x: 1, y: 6, type: water}
    - {x: 2, y: 6, type: water}
    - {x: 0, y: 7, type: water}
    - {x: 1, y: 7, type: water}
    - {x: 2, y: 7, type: water}
    - {x: 0, y: 8, type: water}
    - {x: 1, y: 8, type: water}
    - {x: 2, y: 8, type: water}
    - {x: 0, y: 9, type: water}
    - {x: 1, y: 9, type: water}
    - {x: 2, y: 9, type: water}
    - {x: 0, y: 10, type: water}
    - {x: 1, y: 10, type: water}
    - {x: 2, y: 10, type: water}
    - {x: 0, y: 11, type: water}
    - {x: 1, y: 11, type: water}
    - {x: 2, y: 11, type: water}
    - {x: 0, y: 12, type: water}
    - {x: 1, y: 12, type: water}
    - {x: 2, y: 12, type: water}
    - {x: 0, y: 13, type: water}
    - {x: 1, y: 13, type: water}
    - {x: 2, y: 13, type: water}
    # ── Beach landing zones — soft sand along the shore (column 3) ──
    - {x: 3, y: 0, type: beach}
    - {x: 3, y: 1, type: beach}
    - {x: 3, y: 2, type: beach}
    - {x: 3, y: 3, type: beach}
    - {x: 3, y: 4, type: beach}
    - {x: 3, y: 5, type: beach}
    - {x: 3, y: 6, type: beach}
    - {x: 3, y: 7, type: beach}
    - {x: 3, y: 8, type: beach}
    - {x: 3, y: 9, type: beach}
    - {x: 3, y: 10, type: beach}
    - {x: 3, y: 11, type: beach}
    - {x: 3, y: 12, type: beach}
    - {x: 3, y: 13, type: beach}
    - {x: 4, y: 0, type: beach}
    - {x: 4, y: 13, type: beach}
    # ── Wildfire zone — the burning bay, a diagonal barrier ──
    # Forces blue to route north or south around it
