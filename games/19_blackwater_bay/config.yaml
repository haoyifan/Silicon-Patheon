    # ── Burning wreckage — debris from wildfire ships ──
    - {x: 5, y: 4, type: wreckage}
    - {x: 6, y: 3, type: wreckage}
    - {x: 6, y: 8, type: wreckage}
    - {x: 5, y: 7, type: wreckage}
    - {x: 9, y: 5, type: wreckage}
    # ── Docks — wooden piers along the shore, north and south ──
