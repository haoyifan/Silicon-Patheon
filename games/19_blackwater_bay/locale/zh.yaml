# 黑水湾之战 — 中文本地化
name: 黑水湾之战 — 权力的游戏
description: |
  君临城，299年。史坦尼斯·拜拉席恩的舰队驶入黑水湾
  夺取铁王座。代理国王之手提利昂·兰尼斯特准备了一个
  惊喜——一艘装满野火的船将海湾变成绿色地狱。但史坦尼斯
  强行登陆。提利昂必须守住城墙直到泰温大军到来。

unit_classes:
  stannis:
    display_name: 史坦尼斯·拜拉席恩
    description: |
      合法的国王——依法而非依爱。刻板、不屈，手持利剑
      第一个踏上海滩。从前线指挥。
  davos:
    display_name: 达沃斯·海沃斯
    description: |
      洋葱骑士。走私者变国王之手。对史坦尼斯忠诚到
      超出理性。率领舰队驶入海湾。快速灵活——是水手，不是士兵。
  salladhor_saan:
    display_name: 萨拉赫·萨恩
    description: |
      狭海之王——海盗、雇佣水手，达沃斯的老朋友。
      他的战船从海湾提供远程火力支援。
      如果战局无望，他会逃跑。
  melisandre:
    display_name: 梅丽珊卓
    description: |
      红袍女巫。拉赫洛女祭司。她的火焰能预见未来
      却守不住一堵墙。脆弱但危险——魔法攻击无视护甲。
  ser_guyard:
    display_name: 圭亚德·莫里根爵士
    description: |
      史坦尼斯彩虹护卫的骑士。手持利刃、高举雄鹿旗帜
      率领海滩突击。
  ser_rolland:
    display_name: 罗兰·风暴爵士
    description: |
      夜歌城私生子。史坦尼斯最凶猛的骑士之一——
      在海滩上以不顾一切的狂怒作战。
  ser_parmen:
    display_name: 帕曼·克莱恩爵士
    description: |
      史坦尼斯彩虹护卫的另一位骑士。沉稳、有纪律，
      坚守他负责的防线。
  tyrion:
    display_name: 提利昂·兰尼斯特
    description: |
      小恶魔。半个人，两倍的智慧。代理国王之手，野火
      陷阱的设计者。在猎狗崩溃时亲自率领突击队穿过地道。
  the_hound:
    display_name: 桑铎·克里冈
    description: |
      猎狗。恐惧火焰，剑术致命。城墙上最危险的人。
      巨大的生命值、巨大的攻击力——泥门前的单人毁灭机器。
  podrick:
    display_name: 波德瑞克·佩恩
    description: |
      提利昂的侍从。年轻、忠诚、被低估。在突击波之间
      为附近的盟友提供治疗支援。
  cersei:
    display_name: 瑟曦·兰尼斯特
    description: |
      摄政王后。不是战士，但她的存在坚定了守军的意志。
      脆弱——让她待在城墙后面。
  joffrey:
    display_name: 乔佛里·拜拉席恩
    description: |
      少年国王。残忍、懦弱，在战斗中毫无用处。但他头戴
      王冠——如果他死了，政治后果将是灾难性的。
  tywin:
    display_name: 泰温·兰尼斯特
    description: |
      老狮子。凯岩城之主。第五回合率领精锐骑兵从国王大道
      赶到。他的旗帜出现时，战局逆转。
  bronn:
    display_name: 波隆
    description: |
      佣兵变骑士。射出点燃野火船的那一箭的人。
      远近皆致命。
  tyrell_knight:
    display_name: 提利尔骑士
    description: |
      高庭重骑兵，随泰温·兰尼斯特到来。精力充沛、
      装甲齐全、摧枯拉朽。战局逆转。

terrain_types:
  water:
    display_name: 水域
    description: |
      黑水湾的海水。深不可测，步行无法通过。
  wildfire:
    display_name: 野火
    description: |
      野火——炼金术士行会最可怕的武器。烧绿色、烧高温、
      烧一切。站在上面的单位每回合受到巨大伤害。
  beach:
    display_name: 海滩
    description: |
      黑水湾沿岸的沙滩。部队涉水上岸，在碎浪和砂砾中
      艰难前行。缓慢但可通行。
  wreckage:
    display_name: 燃烧残骸
    description: |
      被野火引爆的船只残骸。阴燃的木材和扭曲的船体——
      穿越危险但可充当掩护。
  dock:
    display_name: 码头
    description: |
      伸入海湾的木栈桥。远离燃烧中心的清晰登陆点——
      一条侧翼迂回路线。
  rubble:
    display_name: 攻城废墟
    description: |
      投石机轰击留下的碎石和断木。困难地形但为推进中的
      部队提供良好掩护。
  battlement:
    display_name: 城垛
    description: |
      城墙顶部的防御塔楼。视野开阔，为远程单位提供
      极佳保护。波隆在此点燃了信号箭。
  city_wall:
    display_name: 城墙
    description: |
      君临城城墙。百年历史，厚重石料。

narrative:
  title: 黑水湾之战
  description: |
    君临城，299年。史坦尼斯·拜拉席恩的舰队攻击首都。
    提利昂·兰尼斯特只有一次机会守住这座城。
  intro: |
    夜晚。拜拉席恩的舰队驶入黑水湾。一艘船向他们
    漂来，泄漏着绿色液体。波隆搭上了火箭。
  events:
    - trigger: on_turn_start
      turn: 2
      text: |
        野火。海湾在绿色火焰中爆发。船只粉碎。
        人在燃烧。但史坦尼斯继续推进——登陆战开始了。
    - trigger: on_turn_start
      turn: 5
      text: |
        猎狗扔下了剑——"去他的御林铁卫，去他的这座城，
        去他的国王。"就在同一刻，国王大道传来号角。
        泰温的旗帜翻过山脊，提利尔骑士与老狮子直扑东墙。
        提利昂仍须亲自率领突击，但他祈祷的援军已经到了。
    - trigger: on_unit_killed
      unit_id: u_r_tyrion_1
      text: |
        提利昂倒下，脸上被砍了一刀。没有他，
        君临城的城墙守不住。
    - trigger: on_unit_killed
      unit_id: u_b_stannis_1
      text: |
        史坦尼斯在海滩上被斩杀。进攻动摇了，
        拜拉席恩大军开始溃散。
