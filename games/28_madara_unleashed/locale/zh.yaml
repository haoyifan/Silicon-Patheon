# 宇智波斑的暴走 — 中文本地化
name: 宇智波斑的暴走 — 火影忍者
description: |
  第四次忍界大战。宇智波斑已被秽土转生复活，独自一人面对
  整个忍者联军。凭借轮回眼和近乎无限的查克拉，他就是一支
  军队。仙人模式下的鸣人与五影必须坚持到封印术准备完毕。
  杀死斑几乎不可能——联军靠的是耐力，而非蛮力。

unit_classes:
  naruto:
    display_name: 漩涡鸣人
    description: |
      九喇嘛查克拉模式，金色九尾查克拉包裹全身。大玉螺旋丸
      变体和尾兽强化攻击。联军最强战力，封印术的关键。
  sasuke:
    display_name: 宇智波佐助
    description: |
      永恒万花筒写轮眼持有者。天照能烧穿一切——不可闪避的
      黑色火焰造成魔法伤害。须佐能乎提供防御支援。
  kakashi:
    display_name: 旗木卡卡西
    description: |
      拷贝忍者。神威将目标传送至异空间。写轮眼赋予他无与
      伦比的战术洞察力和上千种拷贝忍术。
  guy:
    display_name: 迈特·凯
    description: |
      碧色猛兽。体术大师，能开启八门遁甲。第八门模式下
      他是最强的物理战斗者——但代价是生命。超高攻击力的
      脆皮近战。
  gaara:
    display_name: 我爱罗
    description: |
      第五代风影。他的砂之盾提供无与伦比的防御，砂瀑棺
      可以从远处攻击。联军的防御支柱。
  onoki:
    display_name: 大野木
    description: |
      第三代土影。他的尘遁能在分子层面瓦解一切——战场上
      射程最远的忍术。年迈而脆弱，但毁灭性极强。
  tsunade:
    display_name: 千手纲手
    description: |
      第五代火影。创造再生术和医疗忍术让联军持续战斗。
      同时还能一拳打穿山脉。联军的治疗者。
  minato:
    display_name: 波风水门
    description: |
      第四代火影，通过秽土转生复活。黄色闪光——飞雷神之术
      使他成为忍者史上最快的忍者。飞雷神斩击无视位置限制。
  raikage:
    display_name: 雷影
    description: |
      第四代雷影。雷遁铠甲使他成为最快的忍者。他的雷犁
      热刀如同货运列车般猛击。全速前进，毫无花招。
  mei:
    display_name: 照美冥
    description: |
      第五代水影。双血继限界——熔遁和沸遁。她的腐蚀性雾气
      和熔岩流在中距离控制空间。
  allied_shinobi:
    display_name: 忍者联军士兵
    description: |
      来自五大国的普通忍者，史上首次联合作战。他们知道自己
      无法击败斑——但他们可以争取时间。
  madara:
    display_name: 宇智波斑
    description: |
      传奇宇智波，轮回眼再临。须佐能乎、陨石召唤。VIP超级
      坦克——极高血量和防御，但对魔法伤害（忍术）较为脆弱。
      魔抗明显低于物理防御。
  obito:
    display_name: 宇智波带土
    description: |
      战争幕后的面具人。神威使他能虚化——通过高速度实现
      高闪避。木遁和写轮眼幻术在远程造成魔法伤害。
  tentails_head:
    display_name: 十尾本体
    description: |
      十尾兽的主体。巨大且毁灭性——尾兽玉是远程魔法
      攻击，摧毁一切。缓慢但致命。
  tentails_arm:
    display_name: 十尾分裂体·臂
    description: |
      十尾的分裂分身。巨大的抓取肢体，如拍苍蝇般拍飞
      忍者。纯粹的物理毁灭力。
  tentails_maw:
    display_name: 十尾分裂体·口
    description: |
      形如巨口的十尾分裂分身。吞噬查克拉与血肉。其噬咬
      造成魔法伤害，同时吸取生命力。
  white_zetsu:
    display_name: 白绝分身
    description: |
      斑的军队量产的植物士兵。虚弱且可消耗——它们的存在
      只为分散注意力，以绝对数量压制。
  reanimated_ninja:
    display_name: 秽土转生忍者
    description: |
      通过秽土转生复活的忍者。保留生前的忍术，以远程忍术
      攻击。比白绝更难击杀。
  zetsu_medic:
    display_name: 白绝医疗型
    description: |
      白绝变体，能与其他白绝分身融合并修复它们。治疗能力
      弱，但能维持炮灰的战斗力。

terrain_types:
  rock:
    display_name: 岩石地形
    description: |
      被土遁忍术掀起的巨大岩板。完全不可通行——
      利用它们作为掩护和引导敌人的障碍。
  crater:
    display_name: 尾兽弹坑
    description: |
      尾兽玉轰炸留下的弹坑。凹陷提供少许掩护但减缓移动。
  scorched:
    display_name: 焦土
    description: |
      被天照或尾兽查克拉烧焦的地面。崎岖不平，无防御价值。
  forest:
    display_name: 树林
    description: |
      战场边缘幸存的树木。减缓移动但提供隐蔽和防御优势。

narrative:
  title: 宇智波斑的暴走
  description: |
    第四次忍界大战。宇智波斑在全盛时期复活，独自面对整个
    忍者联军。五影和鸣人必须坚持到封印术准备完毕。
  intro: |
    天空暗了下来。一个身影独立于山脊之上，轮回眼泛着紫色
    光芒。宇智波斑微微一笑——他已经几十年没有痛快战斗过了。
    在他身后，白绝大军绵延至天际。
  events:
    - trigger: on_turn_start
      turn: 4
      text: |
        斑从天空召唤了两颗陨石。五影勉强偏转——大野木在重压
        下背部咔咔作响。"就这点本事吗，大野木？"
    - trigger: on_turn_start
      turn: 7
      text: |
        凯开启第七门。绿色查克拉从体内喷涌而出。
        "若不能以体术击败他，就没有人能。"
    - trigger: on_turn_start
      turn: 9
      text: |
        鸣人与佐助联合攻击——螺旋丸与天照融合为
        旋转的烈焰风暴。连斑也退了半步。
    - trigger: on_unit_killed
      unit_id: u_b_naruto_1
      text: |
        鸣人倒下了。金色查克拉消散。没有了九尾人柱力，
        封印术无法完成。战争输了。
    - trigger: on_unit_killed
      unit_id: u_r_madara_1
      text: |
        斑踉跄后退，轮回眼闪烁不定。传奇宇智波第一次
        露出了惊讶的表情。"有意思……你们竟然真的
        超越了我。"
