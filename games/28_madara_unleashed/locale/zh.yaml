# 斑的解放 — 中文本地化
name: 斑的解放
description: |
  第四次忍界大战。宇智波斑被秽土转生复活，独自面对
  整个忍者联军。拥有轮回眼和近乎无限的查克拉，他就是
  一支军队。五影和仙人模式的鸣人必须存活到封印术准备完毕。
  杀死斑几乎不可能——联军以耐力而非武力取胜。

unit_classes:
  naruto:
    display_name: 漩涡鸣人
    description: |
      仙人模式，与自然能量融合。螺旋丸变体和影分身
      使他成为联军最强的战士。如果他存活，封印术将
      终结战争。
  gaara:
    display_name: 我爱罗
    description: |
      第五代风影。沙之盾提供无与伦比的防御，沙棺在远程
      打击。联军的防御支柱。
  onoki:
    display_name: 大野木
    description: |
      第三代土影。尘遁能在分子层面瓦解一切——全场
      最远射程的忍术。年迈脆弱，但毁灭性极强。
  tsunade:
    display_name: 纲手
    description: |
      第五代火影。创造再生术和医疗忍术维持联军战斗力。
      同时能一拳打穿山。
  raikage:
    display_name: 雷影
    description: |
      第四代雷影。雷遁铠甲使他成为最快的忍者。
      雷犁热刀如同货运列车撞击。全速度，无心机。
  mei:
    display_name: 照美冥
    description: |
      第五代水影。双血继限界——熔遁和沸遁。腐蚀性
      雾气和熔岩流在中距离控制空间。
  allied_shinobi:
    display_name: 联军忍者
    description: |
      来自五大国的普通忍者，有史以来第一次并肩作战。
      他们知道无法击败斑——但他们可以争取时间。
  madara:
    display_name: 宇智波斑
    description: |
      传奇宇智波。轮回眼、须佐能乎、陨石召唤、
      无限月读——有史以来最强的忍者。故意设计为
      超强。这是一场BOSS战。
  white_zetsu:
    display_name: 白绝分身
    description: |
      量产的植物士兵。弱小且可消耗——它们的存在
      只是为了分散注意力，以数量压倒。
  reanimated_ninja:
    display_name: 秽土转生忍者
    description: |
      通过秽土转生术复活的忍者。保留生前的忍术，
      以远程忍术攻击。比白绝更难杀。
  zetsu_medic:
    display_name: 白绝医疗型
    description: |
      能与其他白绝分身融合并修复的白绝变体。
      治疗力弱但能维持炮灰存活。

terrain_types:
  rock:
    description: |
      先前忍术冲击推起的锯齿状岩石阵。难以穿越但
      提供绝佳掩护。

narrative:
  title: 斑的解放
  description: |
    第四次忍界大战。宇智波斑以全盛状态复活，面对
    整个忍者联军。五影和鸣人必须存活到封印术准备完毕。
  intro: |
    天空变暗。一个身影站在山脊上，轮回眼闪耀紫光。
    宇智波斑微笑了——他已经几十年没有真正战斗过了。
    在他身后，白绝大军延伸至天际。
  events:
    - trigger: on_turn_start
      turn: 4
      text: |
        斑从天空扔下两颗陨石。五影勉强偏转——大野木
        在重压下脊椎嘎嘎作响。"这就是你们的全部了吗，大野木？"
    - trigger: on_turn_start
      turn: 10
      text: |
        斑启动完全体须佐能乎。一尊巨大的装甲武者
        在他周围实体化，巨刃斩断山脉。联军踉跄后退。
    - trigger: on_unit_killed
      unit_id: u_b_naruto_1
      text: |
        鸣人倒下了。仙人模式的查克拉从他眼中消逝。
        没有九尾人柱力，封印术无法完成。战争输了。
