# 北方水族围攻战 — 中文本地化
name: 北方水族围攻战 — 降世神通
description: |
  北方水族，最后的御水术重镇。赵提督的火烈国舰队经过
  数周围攻终于抵达冰墙。安昂、卡塔拉、索卡和帕库大师
  守卫堡垒，而赵试图到达灵泉绿洲杀死月灵。如果安昂
  存活到回合上限，神通状态将释放海洋之灵，终结围攻。

unit_classes:
  aang:
    display_name: 安昂
    description: |
      神通——精通御气术，正在学习御水术。年少却是连接
      现实世界与灵界的桥梁。只要他活下来，神通状态将使
      他与海洋之灵合一，将火烈国军队扫入大海。
  katara:
    display_name: 卡塔拉
    description: |
      南方水族的御水术师。她的治愈能力和日益精进的战斗
      技巧使她不可或缺。满月增幅她的御术至巅峰。
  sokka:
    display_name: 索卡
    description: |
      南方水族的战士与军师。不会御术，但他的战略头脑和
      回旋镖足以弥补。策划了外墙的防御方案。
  pakku:
    display_name: 帕库大师
    description: |
      北方水族御水术宗师。满月之下，他的御术威力惊人——
      冰矛和水鞭能击碎火烈国的装甲。
  hahn:
    display_name: 韩
    description: |
      北方水族战士，月亮公主的未婚夫。自大但勇敢。率领
      突击队袭击火烈国战舰。快速莽撞——冲锋猛烈但不耐久。
  sangok:
    display_name: 桑戈克
    description: |
      北方水族年轻战士。索卡最可靠的盟友。以骨盾和战棍
      坚守冰墙。坚韧而迟缓——是一堵墙，不是一把刀。
  water_tribe_warrior:
    display_name: 水族战士
    description: |
      北方水族的守卫者。手持棍棒和长矛，驻守冰墙，
      在运河中作战。
  waterbender:
    display_name: 御水术师
    description: |
      北方水族御水术师，满月赋予力量。他们的冰系攻击
      在远处控制战场。
  zhao:
    display_name: 赵提督
    description: |
      痴迷于荣耀的火烈国提督。他的真正目标是灵泉绿洲中
      的月灵——杀死它将永远剥夺所有御水术师的力量。
  zuko:
    display_name: 祖科王子
    description: |
      被放逐的王子，在荣誉与执念之间挣扎。精通御火术，
      擅长使用双刀。他的立场……很复杂。
  iroh:
    display_name: 艾洛将军
    description: |
      西方之龙。退役将军，祖科的叔叔。与火烈国并肩作战
      但反对赵杀死月灵的计划。战场上最强的御火术师。
  fire_nation_soldier:
    display_name: 火烈国士兵
    description: |
      赵的入侵部队中训练有素的步兵。装甲精良、训练有素，
      但在极地环境中处于劣势。
  firebender:
    display_name: 御火术师
    description: |
      火烈国的御术师。满月之下御水术增强，他们的火焰
      威力减弱，但中距离攻击仍然危险。
  fire_sage:
    display_name: 火之贤者
    description: |
      火烈国贤者，以灵性之火治愈伤口。他们的治疗火焰
      恢复盟友的同时，战斗御火术也依然强大。
  komodo_rhino:
    display_name: 科莫多犀牛
    description: |
      火烈国的装甲战兽。体型庞大的骑兵，能撞破冰墙
      工事、踩踏守卫者。

terrain_types:
  ice_wall:
    display_name: 冰墙
    description: |
      世代御水术师历经数百年加固的巨大冰墙。除城门外
      不可逾越。
  canal:
    display_name: 水道
    description: |
      纵横交错于堡垒前方的冰冷极地水道。涉水通过十分缓慢。
  spirit_oasis:
    display_name: 灵泉绿洲
    description: |
      月灵和海洋之灵化为锦鲤游弋的圣池。若火烈国到达
      此地，月灵将死。
  ice_tower:
    display_name: 冰塔
    description: |
      御水术师建造的城门两侧哨塔。+4防御。
  snow_barricade:
    display_name: 雪墙工事
    description: |
      进攻区域中压实的雪墙防御工事。+2防御，消耗2移动力。
  ice_rampart:
    display_name: 冰壁
    description: |
      主墙后方的御水术加固内壁。+3防御。

narrative:
  title: 北方水族围攻战
  description: |
    北方水族遭受围攻。赵提督的舰队攻击冰墙堡垒，暗中密谋
    杀死月灵，永远终结御水术。
  intro: |
    满月低悬于极地上空。火烈国战舰布满港湾，引擎搅碎海冰。
    冰墙之上，御水术师汲取月光之力，准备迎战。
  events:
    - trigger: on_turn_start
      turn: 4
      text: |
        火烈国以集中御火术突破了外墙。士兵们从缺口涌入，
        御水术师拼命用冰封堵缺口。
    - trigger: on_turn_start
      turn: 8
      text: |
        月亮变红了。灵泉绿洲出了什么问题。安昂感受到
        灵界的召唤——海洋之灵在池中躁动。
    - trigger: on_turn_start
      turn: 12
      text: |
        安昂感受到灵界的召唤。海洋之灵在池中涌动，
        等待着神通。
    - trigger: on_unit_killed
      unit_id: u_r_zhao_1
      text: |
        海洋之灵的巨手将赵拖入波涛之下。他对荣耀的执念
        终结于冰层下的黑暗之中。
    - trigger: on_unit_killed
      unit_id: u_b_aang_1
      text: |
        神通倒下了。失去了通往灵界的桥梁，海洋之灵无法
        显现。水族最后的希望沉入冰层之下。
