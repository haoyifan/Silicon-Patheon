schema_version: 1
license: fan_work
fan_work_source: "Avatar: The Last Airbender (Nickelodeon / Paramount)"
name: "Siege of the North — Avatar: The Last Airbender"
difficulty: 4
description: |
  The Northern Water Tribe, the last great waterbending stronghold.
  Admiral Zhao's Fire Nation armada reaches the ice walls after weeks
  of siege. Aang, Katara, Sokka, and Master Pakku defend the fortress
  while Zhao seeks the Spirit Oasis to kill the Moon Spirit. Zuko
  infiltrates alone. Iroh stands with the Fire Nation but may turn
  against Zhao if the Moon Spirit is threatened. If Aang survives,
  the Avatar State will unleash the Ocean Spirit and end the siege.
  Inspired by the Siege of the North from Avatar: The Last Airbender.

board:
  width: 22
  height: 16
  terrain:
    # === FIRE NATION FLEET ZONE — open water and ice floes (y=0-3) ===
    # Open water along south edge where ships anchor
    - {x: 0, y: 0, type: canal}
    - {x: 1, y: 0, type: canal}
    - {x: 2, y: 0, type: canal}
    - {x: 5, y: 0, type: canal}
    - {x: 6, y: 0, type: canal}
    - {x: 15, y: 0, type: canal}
    - {x: 16, y: 0, type: canal}
    - {x: 19, y: 0, type: canal}
    - {x: 20, y: 0, type: canal}
    - {x: 21, y: 0, type: canal}
    - {x: 0, y: 1, type: canal}
    - {x: 1, y: 1, type: canal}
    - {x: 20, y: 1, type: canal}
    - {x: 21, y: 1, type: canal}

    # === APPROACH ZONE — snow and ice terrain (y=3-6) ===
    # West canal system — natural corridor
    - {x: 4, y: 3, type: canal}
    - {x: 4, y: 4, type: canal}
    - {x: 4, y: 5, type: canal}
    - {x: 4, y: 6, type: canal}
    # Center canal — splits the approach
    - {x: 10, y: 3, type: canal}
    - {x: 10, y: 4, type: canal}
    - {x: 11, y: 4, type: canal}
    - {x: 11, y: 3, type: canal}
    # East canal system
    - {x: 17, y: 3, type: canal}
    - {x: 17, y: 4, type: canal}
    - {x: 17, y: 5, type: canal}
    - {x: 17, y: 6, type: canal}

    # === SNOW BARRICADES — contested cover in the approach ===
    # West flank barricades
    - {x: 1, y: 4, type: snow_barricade}
    - {x: 2, y: 4, type: snow_barricade}
    - {x: 2, y: 6, type: snow_barricade}
    - {x: 3, y: 6, type: snow_barricade}
    # Center barricades
    - {x: 7, y: 5, type: snow_barricade}
    - {x: 8, y: 5, type: snow_barricade}
    - {x: 13, y: 5, type: snow_barricade}
    - {x: 14, y: 5, type: snow_barricade}
    # East flank barricades
    - {x: 19, y: 4, type: snow_barricade}
    - {x: 20, y: 4, type: snow_barricade}
    - {x: 18, y: 6, type: snow_barricade}
    - {x: 19, y: 6, type: snow_barricade}

    # === ICE TOWERS — forward watchtowers (y=7) ===
    - {x: 3, y: 7, type: ice_tower}
    - {x: 10, y: 7, type: ice_tower}
    - {x: 11, y: 7, type: ice_tower}
    - {x: 18, y: 7, type: ice_tower}

    # === OUTER ICE WALL — main fortress wall (y=8) ===
    # Left section
    - {x: 0, y: 8, type: ice_wall}
    - {x: 1, y: 8, type: ice_wall}
    - {x: 2, y: 8, type: ice_wall}
    - {x: 3, y: 8, type: ice_wall}
    - {x: 4, y: 8, type: ice_wall}
    - {x: 5, y: 8, type: ice_wall}
    - {x: 6, y: 8, type: ice_wall}
    - {x: 7, y: 8, type: ice_wall}
    - {x: 8, y: 8, type: ice_wall}
    # GATE at x=9,10,11,12
    # Right section
    - {x: 13, y: 8, type: ice_wall}
    - {x: 14, y: 8, type: ice_wall}
    - {x: 15, y: 8, type: ice_wall}
    - {x: 16, y: 8, type: ice_wall}
    - {x: 17, y: 8, type: ice_wall}
    - {x: 18, y: 8, type: ice_wall}
    - {x: 19, y: 8, type: ice_wall}
    - {x: 20, y: 8, type: ice_wall}
    - {x: 21, y: 8, type: ice_wall}

    # === INNER RAMPARTS — second defensive line (y=9-10) ===
    - {x: 2, y: 9, type: ice_rampart}
    - {x: 3, y: 9, type: ice_rampart}
    - {x: 4, y: 9, type: ice_rampart}
    - {x: 17, y: 9, type: ice_rampart}
    - {x: 18, y: 9, type: ice_rampart}
    - {x: 19, y: 9, type: ice_rampart}
    # Inner canal network — city waterways
    - {x: 7, y: 10, type: canal}
    - {x: 8, y: 10, type: canal}
    - {x: 13, y: 10, type: canal}
    - {x: 14, y: 10, type: canal}
    - {x: 7, y: 11, type: canal}
    - {x: 14, y: 11, type: canal}
    # Inner ice walls — secondary barriers
    - {x: 6, y: 10, type: ice_wall}
    - {x: 15, y: 10, type: ice_wall}
    - {x: 6, y: 11, type: ice_wall}
    - {x: 15, y: 11, type: ice_wall}

    # === ICE BRIDGES — crossing the inner canals ===
    - {x: 8, y: 11, type: snow_barricade}
    - {x: 13, y: 11, type: snow_barricade}

    # === INNER CITY — buildings and streets (y=11-13) ===
    - {x: 2, y: 11, type: ice_rampart}
    - {x: 3, y: 11, type: ice_rampart}
    - {x: 18, y: 11, type: ice_rampart}
    - {x: 19, y: 11, type: ice_rampart}
    - {x: 0, y: 12, type: ice_wall}
    - {x: 21, y: 12, type: ice_wall}
    - {x: 0, y: 13, type: ice_wall}
    - {x: 21, y: 13, type: ice_wall}

    # === SPIRIT OASIS — deep inside the city (y=14-15) ===
    - {x: 9, y: 14, type: spirit_oasis}
    - {x: 10, y: 14, type: spirit_oasis}
    - {x: 11, y: 14, type: spirit_oasis}
    - {x: 12, y: 14, type: spirit_oasis}
    - {x: 10, y: 15, type: spirit_oasis}
    - {x: 11, y: 15, type: spirit_oasis}
    # Walls protecting the Oasis flanks
    - {x: 8, y: 14, type: ice_wall}
    - {x: 13, y: 14, type: ice_wall}
    - {x: 8, y: 15, type: ice_wall}
    - {x: 9, y: 15, type: ice_wall}
    - {x: 12, y: 15, type: ice_wall}
    - {x: 13, y: 15, type: ice_wall}
  forts: []

terrain_types:
  ice_wall:
    display_name: Ice Wall
    description: Massive waterbent ice walls. Impassable.
    move_cost: 99
    passable: false
    glyph: "#"
    color: bright_cyan
  canal:
    display_name: Canal
    description: Freezing arctic canals. Costs 2 movement. Waterbenders fight well here.
    move_cost: 2
    glyph: "~"
    color: bright_cyan
  spirit_oasis:
    display_name: Spirit Oasis
    description: |
      Sacred pool where the Moon and Ocean spirits swim as koi fish.
      If the Fire Nation reaches this tile, the Moon Spirit dies.
    move_cost: 1
    defense_bonus: 2
    glyph: "O"
    color: bright_cyan
  ice_tower:
    display_name: Ice Tower
    description: Waterbent guard towers flanking the gate. +4 DEF.
    move_cost: 2
    defense_bonus: 4
    glyph: "T"
    color: bright_cyan
  snow_barricade:
    display_name: Snow Barricade
    description: Packed snow fortifications in the approach zone. +2 DEF, costs 2 movement.
    move_cost: 2
    defense_bonus: 2
    glyph: "="
    color: white
  ice_rampart:
    display_name: Ice Rampart
    description: Inner waterbent ramparts behind the main wall. +3 DEF.
    move_cost: 2
    defense_bonus: 3
    glyph: "^"
    color: bright_cyan

unit_classes:
  aang:
    display_name: Aang
    description: |
      The Avatar -- master of air, learning water. If he survives,
      the Avatar State fuses him with the Ocean Spirit to sweep
      the Fire Nation into the sea. VIP for blue.
    hp_max: 24
    atk: 10
    defense: 4
    res: 8
    spd: 8
    move: 5
    rng_min: 1
    rng_max: 3
    is_magic: true
    tags: [vip]
    glyph: "A"
    color: bright_yellow

  katara:
    display_name: Katara
    description: |
      Southern Water Tribe waterbender. The full moon amplifies
      her bending. Healer and fighter in equal measure.
    hp_max: 20
    atk: 9
    defense: 3
    res: 7
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 2
    is_magic: true
    can_heal: true
    heal_amount: 6
    glyph: "K"
    color: bright_blue

  sokka:
    display_name: Sokka
    description: |
      Southern Water Tribe warrior and tactician. No bending, but
      a sharp mind and a sharper boomerang. Plans the gate defense.
    hp_max: 20
    atk: 8
    defense: 5
    res: 3
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    glyph: "S"
    color: cyan

  pakku:
    display_name: Master Pakku
    description: |
      Grandmaster waterbender of the Northern Tribe. Under the full
      moon, his ice spears and water whips are devastating. The
      most powerful bender defending the fortress.
    hp_max: 22
    atk: 12
    defense: 3
    res: 9
    spd: 4
    move: 3
    rng_min: 2
    rng_max: 3
    is_magic: true
    glyph: "P"
    color: blue

  hahn:
    display_name: Hahn
    description: |
      Northern Water Tribe warrior and Yue's fiance. Arrogant but
      brave. Leads a commando raid against the Fire Nation ships.
      Fast and reckless -- hits hard on the charge but folds quickly.
    hp_max: 16
    atk: 9
    defense: 3
    res: 2
    spd: 7
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "H"
    color: cyan

  sangok:
    display_name: Sangok
    description: |
      Young Northern Water Tribe warrior. Sokka's steadiest ally
      in the defense. Fights with bone shield and war club, holding
      the line on the ice walls. Tough and slow -- a wall, not a blade.
    hp_max: 22
    atk: 6
    defense: 7
    res: 4
    spd: 3
    move: 2
    rng_min: 1
    rng_max: 1
    glyph: "G"
    color: cyan

  zhao:
    display_name: Admiral Zhao
    description: |
      Fire Nation admiral obsessed with glory. His true target is
      the Moon Spirit in the Spirit Oasis. Killing it would strip
      all waterbenders of their power forever. VIP for red.
    hp_max: 26
    atk: 10
    defense: 5
    res: 5
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    tags: [vip]
    glyph: "Z"
    color: bright_red

  zuko:
    display_name: Prince Zuko
    description: |
      The banished prince. Infiltrates the fortress alone, seeking
      the Avatar. Skilled firebender and dual dao swordsman. His
      loyalties are conflicted.
    hp_max: 22
    atk: 9
    defense: 5
    res: 5
    spd: 7
    move: 4
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "!"
    color: red

  iroh:
    display_name: General Iroh
    description: |
      The Dragon of the West. Retired general and Zuko's uncle.
      Fights with the Fire Nation but opposes Zhao's plan to kill
      the Moon Spirit. The most powerful firebender on the field.
    hp_max: 28
    atk: 11
    defense: 5
    res: 7
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "I"
    color: bright_red

  fire_nation_soldier:
    display_name: Commander Shinu
    description: |
      Fire Nation garrison commander. Well-armored and disciplined,
      leads the infantry assault through the breached walls.
    hp_max: 20
    atk: 8
    defense: 6
    res: 3
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "N"
    color: red

  firebender:
    display_name: Lieutenant Jee
    description: |
      Fire Nation naval officer and firebender. Served under Zuko
      on his ship. Competent and professional.
    hp_max: 18
    atk: 9
    defense: 3
    res: 4
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "J"
    color: red

  komodo_rhino:
    display_name: Komodo Rhino Rider
    description: |
      Armored war beast of the Fire Nation. Heavy cavalry that
      smashes through ice barricades and tramples defenders.
    hp_max: 28
    atk: 9
    defense: 7
    res: 2
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "R"
    color: red

  fire_sage:
    display_name: Fire Sage
    description: |
      A Fire Nation sage who channels spiritual flame to heal
      allies. Their combat firebending remains formidable.
    hp_max: 16
    atk: 7
    defense: 3
    res: 6
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    is_magic: true
    can_heal: true
    heal_amount: 5
    glyph: "F"
    color: bright_red

armies:
  blue:
    # Aang — near the Spirit Oasis, deep inside
    - {class: aang, pos: {x: 10, y: 13}}
    # Katara — beside Aang
    - {class: katara, pos: {x: 11, y: 13}}
    # Sokka — commanding the gate defense
    - {class: sokka, pos: {x: 10, y: 9}}
    # Pakku — on the wall, west tower
    - {class: pakku, pos: {x: 3, y: 7}}
    # Hahn — aggressive forward position, east
    - {class: hahn, pos: {x: 18, y: 7}}
    # Sangok — inner rampart, blocking the path to the Oasis
    - {class: sangok, pos: {x: 11, y: 11}}

  red:
    # Zhao — behind the center assault force
    - {class: zhao, pos: {x: 10, y: 2}}
    # Zuko — infiltrating alone, far east flank
    - {class: zuko, pos: {x: 20, y: 2}}
    # Iroh — near center, conflicted loyalties
    - {class: iroh, pos: {x: 12, y: 1}}
    # Assault force — spread across three approach lanes
    - {class: fire_nation_soldier, pos: {x: 6, y: 1}}
    - {class: firebender, pos: {x: 14, y: 1}}
    - {class: komodo_rhino, pos: {x: 8, y: 2}}
    - {class: fire_sage, pos: {x: 3, y: 1}}

rules:
  max_turns: 16
  first_player: red

win_conditions:
  - {type: protect_unit, unit_id: u_b_aang_1, owning_team: blue}
  - {type: protect_unit, unit_id: u_r_zhao_1, owning_team: red}
  - {type: protect_unit_survives, unit_id: u_b_aang_1, owning_team: blue}
  - {type: reach_tile, team: red, pos: {x: 10, y: 14}}
  - {type: eliminate_all_enemy_units}
  - {type: max_turns_draw}

narrative:
  title: Siege of the North
  description: |
    The Northern Water Tribe under siege. Admiral Zhao's armada
    attacks the ice fortress while secretly plotting to kill the
    Moon Spirit and end waterbending forever.
  intro: |
    The full moon hangs low over the arctic. Fire Nation warships
    fill the harbor, engines churning through sea ice. On the walls,
    waterbenders draw power from the moon and prepare for the final
    assault.
  events:
    - trigger: on_turn_start
      turn: 4
      text: |
        The Fire Nation breaches the outer wall with concentrated
        firebending. Soldiers pour through the gap.
    - trigger: on_turn_start
      turn: 8
      text: |
        The moon turns red. Something is wrong at the Spirit Oasis.
        Zhao is close. Iroh warns: "Whatever you do to that spirit,
        I will unleash on you tenfold."
    - trigger: on_turn_start
      turn: 12
      text: |
        Aang feels the spirit world calling. The Ocean Spirit stirs
        in its pool, waiting for the Avatar.
    - trigger: on_unit_killed
      unit_id: u_r_zhao_1
      text: |
        The Ocean Spirit's hand drags Zhao beneath the waves. His
        obsession with glory ends in darkness beneath the ice.
    - trigger: on_unit_killed
      unit_id: u_b_aang_1
      text: |
        The Avatar falls. Without the bridge to the spirit world,
        the Ocean Spirit cannot manifest. The Water Tribe's last
        hope sinks beneath the ice.
