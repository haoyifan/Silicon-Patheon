# 无限城 — 中文本地化
name: 无限城 — 鬼灭之刃
description: |
  无限城——由琵琶鬼�的�的鬼·�的·操控的不断变幻的迷宫。鬼杀队
  发起对鬼舞辻无惨和残存上弦之鬼的最终突袭。炭治郎、
  善逸、伊之助和柱们在鬼的领地中战斗。
  必须在黎明前消灭无惨，否则他将永远逃入黑暗。

unit_classes:
  tanjiro:
    display_name: 的门炭治郎
    description: |
      火之神神乐的继承者。背负着灭杀无惨的使命，
      手持日轮刀追寻姐姐祢豆子的治愈之法。
  zenitsu:
    display_name: 我妻善逸
    description: |
      雷之呼吸使用者。清醒时胆小如鼠，昏睡后化身
      闪电般的杀戮机器。霹雳一闪，快若雷霆。
  inosuke:
    display_name: 嘴平伊之助
    description: |
      戴着猪头面具的野孩子。双刀兽之呼吸使用者，
      触觉灵敏到能感知空气的震动。
  mitsuri:
    display_name: 甘露寺蜜璃
    description: |
      恋柱。恋之呼吸创始人，柔软的身体蕴含着
      超越常人八倍的肌肉密度。
  muichiro:
    display_name: 时透无一郎
    description: |
      霞柱。年仅十四岁的天才剑士。霞之呼吸朦胧如雾，
      剑锋却锐利无比。
  gyomei:
    display_name: �的明寺行冥
    description: |
      岩柱，鬼杀队最强之人。双目失明却以锁链铁球
      和手斧横扫一切。
  muzan:
    display_name: 鬼舞辻无惨
    description: |
      千年鬼王，一切鬼的始祖。拥有近乎无限的再生能力
      和压倒性的力量。必须在日出前被消灭。
  kokushibo:
    display_name: 黑死牟
    description: |
      上弦之壹。继国�的的一化身为鬼的剑客，
      月之呼吸的创始人。六眼的恐怖。
  akaza:
    display_name: 猗窝座
    description: |
      上弦之参。纯粹的武斗派，只尊重强者。
      拳法凌厉，破�的阵式足以粉碎一切防御。
  doma:
    display_name: 童磨
    description: |
      上弦之贰。笑容满面的邪教教主，冰之血鬼术
      可以冻结一切生物。
  nakime:
    display_name: 鸣女
    description: |
      操控无限城结构的琵琶鬼。弹奏琵琶即可
      改变房间布局，是无限城的核心。
  hantengu:
    display_name: 半天狗
    description: |
      上弦之肆。分裂型血鬼术——被砍后分裂成
      多个具有不同能力的分身。

terrain_types:
  castle_wall:
    display_name: 城壁
  staircase:
    display_name: 阶梯
  tatami:
    display_name: 和室
  pillar:
    display_name: 柱子

narrative:
  title: 无限城
  description: |
    无限城——鬼舞辻无惨的巢穴。鬼杀队全力突入，
    柱与上弦之鬼在不断变换的迷宫中展开最终决战。
  intro: |
    脚下的地面突然崩塌。无限城的全貌展现在眼前——
    无数的房间、走廊和阶梯在虚空中悬浮，
    鬼的世界向鬼杀队敞开了大门。
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        房间开始移动。阶梯折叠又重组。鸣女的琵琶声
        在城中回荡，将鬼杀队员们分隔开来。
    - trigger: on_turn_start
      turn: 7
      text: |
        黑死牟拔刀。六只眼睛在黑暗中闪烁。
        月之呼吸——新月形刀刃充满走廊。
    - trigger: on_turn_start
      turn: 12
      text: |
        无惨从王座上站起。他的身体扭曲变形，触手
        向四面八方猛烈鞭打。最终之战开始了。
    - trigger: on_unit_killed
      unit_id: u_r_muzan_1
      text: |
        无惨在日出中灰飞烟灭。千年的恐怖终结。
        鬼杀队完成了它的使命。
