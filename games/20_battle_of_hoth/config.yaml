schema_version: 1
license: fan_work
fan_work_source: "Star Wars (Lucasfilm / Disney)"
name: "Battle of Hoth — Star Wars"
difficulty: 4
description: |
  Hoth, 3 ABY. The Galactic Empire has found the Rebel Alliance's
  hidden base on the ice planet Hoth. General Veers leads a ground
  assault with AT-AT walkers toward the shield generator. The
  Rebels must hold long enough for the transports to escape.
  Snowspeeders weave between walker legs while the trench line
  holds against the Imperial advance.
  Inspired by the Battle of Hoth from Star Wars: The Empire Strikes Back.

