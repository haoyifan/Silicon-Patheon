terrain_types:
  trench:
    display_name: Trench
    move_cost: 1
    defense_bonus: 2
    glyph: "="
    color: green
    description: |
      Snow trenches dug by Rebel engineers. Strong defensive
      positions with good cover against blaster fire and walker
      cannons. The Rebels' best chance to hold.

  ice_plain:
    display_name: Ice Plain
    move_cost: 1
    defense_bonus: -1
    glyph: "."
    color: bright_blue
    description: |
      Featureless frozen wasteland. No cover whatsoever — anyone
      caught in the open is fully exposed to fire. Slippery
      footing reduces defensive capability.

  ice_ridge:
    display_name: Ice Ridge
    move_cost: 2
    defense_bonus: 2
    glyph: "^"
    color: bright_white
    description: |
      Jagged ridges of compressed ice along the western approach.
      Slow going but the frozen formations provide solid cover —
      a viable flanking route for infantry and light walkers.

  echo_base:
    display_name: Echo Base
    move_cost: 1
    defense_bonus: 1
    glyph: "#"
    color: bright_white
    description: |
      Interior corridors of Echo Base carved into the ice. Narrow
      passages offer some protection but the walls are crumbling
      under bombardment.

unit_classes:
  luke:
    display_name: Luke Skywalker
    description: |
      Rogue Leader. Jedi-in-training and hero of Yavin. Flies a
      snowspeeder into the teeth of the walker assault. When his
      speeder goes down, he takes on an AT-AT alone with a
      lightsaber and a thermal detonator.
    hp_max: 24
    atk: 10
    defense: 4
    res: 6
    spd: 8
    move: 5
    rng_min: 1
    rng_max: 2
    tags: [flying]
    glyph: "L"
    color: bright_yellow

  leia:
    display_name: Princess Leia
    description: |
      Commander of the Rebel base. She coordinates the evacuation
      from the command center, refusing to leave until the last
      transport is away. If she falls, the evacuation collapses.
    hp_max: 20
    atk: 7
    defense: 3
    res: 7
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    glyph: "P"
    color: white

  han:
    display_name: Han Solo
    description: |
      The fastest smuggler in the galaxy. His ship is broken down
      and he should have left weeks ago, but here he is — blaster
      drawn, running toward the explosions. Again.
    hp_max: 22
    atk: 11
    defense: 4
    res: 3
    spd: 7
    move: 5
    rng_min: 1
    rng_max: 2
    glyph: "H"
    color: white

  chewie:
    display_name: Chewbacca
    description: |
      Two-hundred-year-old Wookiee warrior. Towers over everyone,
      absorbs punishment that would kill a human, and his bowcaster
      hits like a cannon. Han's co-pilot and lifelong partner.
    hp_max: 32
    atk: 10
    defense: 7
    res: 3
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 2
    glyph: "C"
    color: yellow

  wedge:
    display_name: Wedge Antilles
    description: |
      Rogue Three. The best pilot in the Rebellion after Luke.
      His snowspeeder's tow cable brings down an AT-AT — the
      first walker to fall on Hoth. Cool under impossible pressure.
    hp_max: 20
    atk: 10
    defense: 3
    res: 4
    spd: 8
    move: 5
    rng_min: 2
    rng_max: 3
    tags: [flying]
    glyph: "W"
    color: bright_cyan

  dak:
    display_name: Dak Ralter
    description: |
      Luke's gunner and rear man. Young and eager — "I feel like
      I could take on the whole Empire myself." His enthusiasm
      keeps morale alive in the freezing trenches.
    hp_max: 16
    atk: 7
    defense: 3
    res: 4
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    can_heal: true
    heal_amount: 5
    glyph: "D"
    color: bright_cyan

  vader:
    display_name: Darth Vader
    description: |
      Dark Lord of the Sith. He has come to Hoth personally — not
      for the Rebels, but for Luke. The Force radiates from him
      like a black sun. His lightsaber and telekinesis make him
      devastating at any range.
    hp_max: 34
    atk: 13
    defense: 6
    res: 8
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "V"
    color: bright_red

  veers:
    display_name: General Veers
    description: |
      Imperial general commanding the ground assault from the
      lead AT-AT. Methodical and ruthless. His target is the
      shield generator, and nothing will stop his advance.
      Rides an AT-AT — massively armored, slow, devastating.
    hp_max: 44
    atk: 13
    defense: 12
    res: 2
    spd: 1
    move: 1
    rng_min: 2
    rng_max: 4
    glyph: "G"
    color: bright_red

  piett:
    display_name: Admiral Piett
    description: |
      Newly promoted after Vader's displeasure with Admiral Ozzel.
      Commands fire support from orbit, directing turbolaser
      strikes with nervous precision. Long-range specialist.
    hp_max: 18
    atk: 10
    defense: 3
    res: 4
    spd: 4
    move: 2
    rng_min: 3
    rng_max: 5
    glyph: "A"
    color: red

  blizzard_scout:
    display_name: Captain Lennox
    description: |
      AT-ST scout walker commander. Flanks the Rebel trenches in
      a two-legged walker, fast enough to exploit gaps in the line
      but lightly armored compared to the AT-ATs.
    hp_max: 26
    atk: 9
    defense: 7
    res: 2
    spd: 4
    move: 3
    rng_min: 2
    rng_max: 3
    glyph: "T"
    color: red

  blizzard_two:
    display_name: Major Marquand
    description: |
      Second AT-AT pilot. His walker advances on the right flank,
      laying down suppressive fire to pin Rebel troopers in their
      trenches. Heavy armor, devastating cannons.
    hp_max: 40
    atk: 12
    defense: 11
    res: 2
    spd: 1
    move: 1
    rng_min: 2
    rng_max: 4
    glyph: "M"
    color: bright_red

  snowtrooper_sgt:
    display_name: Sergeant Edian
    description: |
      Snowtrooper squad leader. Leads the infantry screen that
      advances behind the walkers, clearing trenches and securing
      ground the AT-ATs have passed.
    hp_max: 20
    atk: 8
    defense: 5
    res: 2
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 2
    glyph: "s"
    color: red

  snowtrooper_heavy:
    display_name: Corporal Drazin
    description: |
      Heavy weapons snowtrooper. Carries an E-Web repeating
      blaster that can shred trench fortifications. Slow to set
      up but devastating once in position.
    hp_max: 22
    atk: 10
    defense: 4
    res: 2
    spd: 3
    move: 2
    rng_min: 2
    rng_max: 4
    glyph: "e"
    color: red

armies:
  blue:
    # Luke in snowspeeder — forward, flying
    - {class: luke, pos: {x: 8, y: 5}}
    # Leia deep in Echo Base command center
    - {class: leia, pos: {x: 10, y: 13}}
    # Han near the base perimeter
    - {class: han, pos: {x: 14, y: 9}}
    # Chewie holding the forward trench line
    - {class: chewie, pos: {x: 6, y: 6}}
    # Wedge in snowspeeder — flanking east, flying
    - {class: wedge, pos: {x: 16, y: 5}}
    # Dak — support behind the rear trench
    - {class: dak, pos: {x: 9, y: 9}}

  red:
    # Vader — advancing from the north, center
    - {class: vader, pos: {x: 10, y: 0}}
    # Veers — lead AT-AT, left-center
    - {class: veers, pos: {x: 6, y: 0}}
    # Piett — rear fire support, far north
    - {class: piett, pos: {x: 10, y: 1}}
    # Second AT-AT — right flank
    - {class: blizzard_two, pos: {x: 15, y: 0}}
    # AT-ST scout — western flanking
    - {class: blizzard_scout, pos: {x: 2, y: 2}}
    # Snowtrooper infantry — spread behind walkers
    - {class: snowtrooper_sgt, pos: {x: 8, y: 2}}
    - {class: snowtrooper_heavy, pos: {x: 18, y: 1}}

rules:
  max_turns: 14
  first_player: red

win_conditions:
  # Any red unit reaches shield generator -> red wins
  - {type: reach_tile, team: red, pos: {x: 10, y: 11}}
  # Leia dies -> evacuation fails, blue loses
  - {type: protect_unit, unit_id: u_b_leia_1, owning_team: blue}
  # Leia survives the turn cap -> transports escape, blue wins
  - {type: protect_unit_survives, unit_id: u_b_leia_1, owning_team: blue}
  # Either side wins by total elimination
  - {type: eliminate_all_enemy_units}
  # Backstop
  - {type: max_turns_draw}

narrative:
  title: Battle of Hoth
  description: |
    Hoth, 3 ABY. The Empire strikes at the hidden Rebel base.
    AT-AT walkers advance across the frozen plain toward the shield
    generator. The Rebels must buy time for the evacuation transports.
  intro: |
    The ground shakes. Through the blowing snow, shapes emerge —
    massive, four-legged silhouettes walking in formation. Imperial
    walkers. "All troops will debark for ground assault." The Rebels
    scramble to their positions in the trenches.
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        "Distance to power generators?" "One-seven, decimal two-eight."
        The lead AT-AT fires. A section of trench erupts in a geyser
        of ice and frozen earth.
    - trigger: on_turn_start
      turn: 6
      text: |
        Wedge wraps a tow cable around an AT-AT's legs. The walker
        topples like a felled tree, crashing into the snow plain.
        A cheer goes up from the trenches. But more walkers keep coming.
    - trigger: on_turn_start
      turn: 10
      text: |
        "Begin retreat!" The last transports are loading. The ion
        cannon fires overhead, clearing a path through the Star
        Destroyers. Just a little more time.
    - trigger: on_unit_killed
      unit_id: u_b_leia_1
      text: |
        The command center takes a direct hit. Princess Leia is
        buried in the rubble. Without coordination, the evacuation
        collapses. The remaining transports are easy prey.
    - trigger: on_unit_killed
      unit_id: u_r_veers_1
      text: |
        The lead AT-AT shudders and lists to one side. General Veers'
        cockpit crumples as the walker crashes to the ice. The
        Imperial advance falters without its commander.
