    - {x: 19, y: 0, type: cavern_wall}
    - {x: 19, y: 1, type: cavern_wall}
    - {x: 19, y: 5, type: cavern_wall}
    - {x: 19, y: 6, type: cavern_wall}
    # Center rock pillars — force routing decisions
    - {x: 9, y: 3, type: cavern_wall}
    - {x: 10, y: 3, type: cavern_wall}
    - {x: 9, y: 4, type: cavern_wall}
    - {x: 10, y: 4, type: cavern_wall}

    # === TUNNELS — flanking corridors along the sides (y=2-5) ===
