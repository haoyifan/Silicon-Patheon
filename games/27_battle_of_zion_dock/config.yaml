schema_version: 1
license: fan_work
fan_work_source: "The Matrix (The Wachowskis / Warner Bros.)"
name: "Battle of Zion Dock — The Matrix"
difficulty: 4
description: |
  Zion, the last human city. The machines have breached the dock
  ceiling and sentinels pour in by the thousand. Captain Mifune
  commands the APU defense while Niobe races to reach the gate
  controls. Five desperate humans against a swarm of machines.
  Neo is buying time in the Machine City — Zion just has to
  survive long enough for him to succeed.
  Inspired by the Battle of Zion from The Matrix Revolutions.

