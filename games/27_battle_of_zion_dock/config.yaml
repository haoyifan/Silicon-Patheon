    - {x: 4, y: 5, type: dock_bay}
    - {x: 5, y: 5, type: dock_bay}
    - {x: 6, y: 5, type: dock_bay}
    - {x: 7, y: 5, type: dock_bay}
    - {x: 8, y: 5, type: dock_bay}
