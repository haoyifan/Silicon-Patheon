terrain_types:
  breach_ceiling:
    display_name: Breach Ceiling
    move_cost: 1
    defense_bonus: -2
    glyph: "!"
    color: magenta
    description: |
      The shattered dock ceiling where sentinels are breaking through.
      Debris rains down and machines pour in from above — anyone
      standing here is dangerously exposed. A kill zone.

  dock_bay:
    display_name: Dock Bay
    move_cost: 1
    defense_bonus: 0
    glyph: "."
    color: dim
    description: |
      The cavernous main dock of Zion. Open ground beneath a
      shattered ceiling — sentinels pour through the breach above.
      No cover in the open bay.

  cavern_wall:
    display_name: Cavern Wall
    move_cost: 99
    defense_bonus: 0
    passable: false
    glyph: "#"
    color: bright_black
    description: |
      Solid rock walls of the dock cavern. Impassable natural
      stone that channels movement through the open bays.

  loading_crane:
    display_name: Loading Crane
    move_cost: 2
    defense_bonus: 2
    glyph: "C"
    color: yellow
    description: |
      Massive industrial cranes used for loading hovercrafts.
      The steel framework provides solid cover but is difficult
      to move through.

  ammo_platform:
    display_name: Ammo Platform
    move_cost: 1
    defense_bonus: 2
    glyph: "A"
    color: yellow
    description: |
      Ammunition resupply platforms stacked with crates of shells.
      Good cover and the ammunition keeps the APUs firing.

  mech_bay:
    display_name: Mech Bay
    move_cost: 1
    defense_bonus: 2
    glyph: "M"
    color: cyan
    description: |
      APU storage bays along the dock walls. Heavy machinery and
      ammunition crates provide excellent cover. The exoskeletons
      are bolted in here for maximum firepower.

  tunnel:
    display_name: Tunnel
    move_cost: 1
    defense_bonus: 1
    glyph: "o"
    color: bright_black
    description: |
      Maintenance tunnels running along the dock perimeter. Narrow
      and dark — machines can use them to flank the defensive line
      but the confined space limits their swarm advantage.

  gate:
    display_name: Gate
    move_cost: 1
    defense_bonus: 2
    glyph: "G"
    color: yellow
    description: |
      The reinforced gate separating the dock from the city proper.
      If the machines breach this, Zion's civilian levels are
      exposed. The last line of defense.

  defense_platform:
    display_name: Defense Platform
    move_cost: 1
    defense_bonus: 1
    glyph: "="
    color: yellow
    description: |
      Elevated firing platforms with metal barricades. Designed for
      the APU defensive line — good fields of fire and some
      protection from the sentinel swarm.

unit_classes:
  niobe:
    display_name: Niobe
    description: |
      Captain of the Logos and the fastest pilot in the fleet.
      VIP — she must survive to relay Neo's message. Agile and
      resourceful, she fights her way through the chaos with a
      sidearm and sheer determination.
    hp_max: 20
    atk: 8
    defense: 3
    res: 6
    spd: 8
    move: 5
    rng_min: 1
    rng_max: 2
    glyph: "N"
    color: white

  mifune:
    display_name: Captain Mifune
    description: |
      Commander of the dock defense, fighting from the lead APU.
      A mountain of a man who refuses to retreat even as ammunition
      runs dry. His courage holds the line when all seems lost.
      Massive armor, devastating firepower, limited mobility.
    hp_max: 36
    atk: 13
    defense: 8
    res: 2
    spd: 3
    move: 2
    rng_min: 1
    rng_max: 3
    glyph: "Z"
    color: bright_cyan

  zee:
    display_name: Zee
    description: |
      Ammunition loader turned combat engineer. She reloads the
      APUs under fire and patches wounded fighters. Her hands
      shake but she never stops working.
    hp_max: 16
    atk: 6
    defense: 3
    res: 5
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 1
    can_heal: true
    heal_amount: 6
    glyph: "E"
    color: bright_yellow

  kid:
    display_name: Kid
    description: |
      The Kid who self-substantiated from the Matrix. Scrappy,
      fearless, and desperate to prove himself. He fights with
      more heart than skill, but heart counts for a lot when
      the world is ending.
    hp_max: 18
    atk: 8
    defense: 4
    res: 4
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 2
    glyph: "K"
    color: bright_green

  link:
    display_name: Link
    description: |
      Operator of the Nebuchadnezzar. Monitors the battlefield
      from a terminal, calling out machine positions and
      coordinating the defense. His information saves lives.
    hp_max: 16
    atk: 7
    defense: 3
    res: 5
    spd: 4
    move: 3
    rng_min: 2
    rng_max: 3
    glyph: "L"
    color: bright_blue

  sentinel_alpha:
    display_name: Sentinel Alpha
    description: |
      Lead sentinel — larger and more heavily armored than the
      standard swarm units. Coordinates the machine assault with
      cold machine intelligence. Its red optics scan for weak
      points in the human defense.
    hp_max: 22
    atk: 9
    defense: 4
    res: 2
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 2
    glyph: "X"
    color: bright_red

  sentinel_bomber:
    display_name: Sentinel Bomber
    description: |
      A sentinel variant that carries tow-bombs — explosive
      payloads it drops into the defensive line from above.
      Devastating at range but fragile once engaged.
    hp_max: 14
    atk: 11
    defense: 2
    res: 1
    spd: 7
    move: 5
    rng_min: 2
    rng_max: 4
    glyph: "B"
    color: red

  sentinel_tunneler:
    display_name: Sentinel Tunneler
    description: |
      A burrowing sentinel designed to breach walls and flanking
      through maintenance shafts. Slower than the flyers but
      heavily armored with reinforced tentacles for digging.
    hp_max: 20
    atk: 8
    defense: 6
    res: 1
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "T"
    color: red

  sentinel_swarm:
    display_name: Sentinel Swarm
    description: |
      A dense cluster of dozens of sentinels moving as one —
      a writhing ball of metal tentacles. Far tougher than
      individual sentinels, overwhelming in close quarters.
    hp_max: 26
    atk: 10
    defense: 4
    res: 1
    spd: 5
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "S"
    color: bright_red

  digger_heavy:
    display_name: Digger Heavy
    description: |
      Massive boring machine designed to breach Zion's shell.
      Slow and ponderous but nearly indestructible. Its drill
      head can tear through reinforced gates like paper.
    hp_max: 34
    atk: 9
    defense: 10
    res: 1
    spd: 1
    move: 1
    rng_min: 1
    rng_max: 1
    glyph: "D"
    color: bright_red

  digger_light:
    display_name: Digger Scout
    description: |
      Smaller boring machine that clears paths for the heavier
      units. Faster than its larger cousin but still formidable.
      Its cutting arms shred anything in melee range.
    hp_max: 24
    atk: 8
    defense: 7
    res: 1
    spd: 2
    move: 2
    rng_min: 1
    rng_max: 1
    glyph: "d"
    color: red

  flyer_interceptor:
    display_name: Flyer Interceptor
    description: |
      Fast-attack flying machine that dives through the dock
      breach at high speed. Strikes hard and retreats — hit
      and run tactics that harass the defensive line.
    hp_max: 12
    atk: 8
    defense: 2
    res: 1
    spd: 8
    move: 5
    rng_min: 1
    rng_max: 2
    glyph: "f"
    color: red

  flyer_hunter:
    display_name: Flyer Hunter
    description: |
      Heavier flying machine armed with sustained-fire beam
      weapons. Slower than the interceptor but hits harder
      and survives more punishment. Targets APU pilots.
    hp_max: 18
    atk: 10
    defense: 3
    res: 1
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 3
    glyph: "F"
    color: bright_red

armies:
  blue:
    # Niobe — VIP, near the gate
    - {class: niobe, pos: {x: 9, y: 12}}
    # Mifune — center mech bay, anchoring the line
    - {class: mifune, pos: {x: 9, y: 8}}
    # Zee — support behind center line
    - {class: zee, pos: {x: 8, y: 10}}
    # Kid — mobile defender, west flank
    - {class: kid, pos: {x: 3, y: 10}}
    # Link — operator position, east platform
    - {class: link, pos: {x: 15, y: 10}}

  red:
    # West breach assault
    - {class: sentinel_alpha, pos: {x: 5, y: 1}}
    - {class: sentinel_bomber, pos: {x: 4, y: 0}}
    - {class: digger_heavy, pos: {x: 6, y: 0}}
    - {class: flyer_interceptor, pos: {x: 3, y: 2}}
    # East breach assault
    - {class: sentinel_swarm, pos: {x: 14, y: 1}}
    - {class: flyer_hunter, pos: {x: 15, y: 0}}
    - {class: digger_light, pos: {x: 13, y: 2}}
    # Tunnel flankers
    - {class: sentinel_tunneler, pos: {x: 0, y: 2}}

rules:
  max_turns: 10
  first_player: red

win_conditions:
  # Any red unit reaches the gate -> red wins (breach)
  - {type: reach_tile, team: red, pos: {x: 9, y: 12}}
  - {type: reach_tile, team: red, pos: {x: 10, y: 12}}
  # Niobe dies -> blue loses (no one to relay Neo's signal)
  - {type: protect_unit, unit_id: u_b_niobe_1, owning_team: blue}
  # Niobe survives the turn cap -> Neo succeeds, blue wins
  - {type: protect_unit_survives, unit_id: u_b_niobe_1, owning_team: blue}
  # Either side wins by total elimination
  - {type: eliminate_all_enemy_units}
  # Backstop
  - {type: max_turns_draw}

narrative:
  title: Battle of Zion Dock
  description: |
    The machines have breached Zion's dock. Sentinels flood through
    the ceiling while diggers bore toward the gate. Five defenders
    hold the line while Neo fights in the Machine City. Survive
    ten turns and the war ends.
  intro: |
    Klaxons howl through the dock as the ceiling buckles. Metal
    tentacles writhe through the breach — the sentinels have arrived.
    Captain Mifune's APU powers up, ammunition belts feeding into
    twin cannons. "If it's our time to die, it's our time. All I
    ask is: if we have to give these bastards our lives, we give
    'em hell before we do!"
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        Ammunition belts run dry on the outer positions. The
        sentinels keep coming — an endless metal tide pouring
        through the breach above. Zee sprints between APUs,
        reloading under fire.
    - trigger: on_turn_start
      turn: 6
      text: |
        The digger machines grind forward, shaking the dock floor.
        Mifune screams for his people to hold the line — they
        cannot let those machines reach the gate.
    - trigger: on_turn_start
      turn: 9
      text: |
        The swarm thickens. Every sensor in the dock is screaming.
        But somewhere far above, in the Machine City, Neo faces
        the Source. Just one more turn.
    - trigger: on_unit_killed
      unit_id: u_b_mifune_1
      text: |
        Mifune's APU crashes to its knees, torn apart by sentinels.
        The captain fires his sidearm until the swarm engulfs him.
        "For Zion..."
    - trigger: on_unit_killed
      unit_id: u_b_niobe_1
      text: |
        Niobe falls amid the chaos. Without her, there is no one
        to open the gate for the Hammer's EMP. The dock defense
        crumbles.
