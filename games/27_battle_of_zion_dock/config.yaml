    # West breach
    - {x: 4, y: 0, type: breach_ceiling}
    - {x: 5, y: 0, type: breach_ceiling}
    - {x: 6, y: 0, type: breach_ceiling}
    - {x: 5, y: 1, type: breach_ceiling}
    # East breach
    - {x: 13, y: 0, type: breach_ceiling}
    - {x: 14, y: 0, type: breach_ceiling}
    - {x: 15, y: 0, type: breach_ceiling}
    - {x: 14, y: 1, type: breach_ceiling}

    # === CAVERN WALLS — impassable rock pillars throughout the dock ===
    # Left cavern wall
    - {x: 0, y: 0, type: cavern_wall}
    - {x: 1, y: 0, type: cavern_wall}
    - {x: 0, y: 1, type: cavern_wall}
    - {x: 0, y: 5, type: cavern_wall}
    - {x: 0, y: 6, type: cavern_wall}
    # Right cavern wall
