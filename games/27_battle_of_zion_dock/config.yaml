    - {x: 17, y: 2, type: dock_bay}
    - {x: 11, y: 3, type: dock_bay}
    - {x: 12, y: 3, type: dock_bay}
    - {x: 13, y: 3, type: dock_bay}
    - {x: 14, y: 3, type: dock_bay}
