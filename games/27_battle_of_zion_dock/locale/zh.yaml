# 锡安码头之战 — 中文本地化
name: 锡安码头之战
description: |
  锡安，人类最后的城市。机器大军突破了码头天花板，
  哨兵如潮水般涌入。APU驾驶员操纵外骨骼沿防线开火，
  弹链倾泻向机器群。米弗涅上尉指挥防御，尼奥比在混战中
  奔向电力终端以恢复城市的EMP网格。两台巨型钻机向锡安
  核心碾压而来——只要有一台到达，城市就完了。

unit_classes:
  mifune:
    display_name: 米弗涅上尉
    description: |
      锡安防御指挥官。从先导APU中战斗，即使弹药耗尽
      也拒绝撤退。他的勇气在一切似乎失去希望时
      守住了防线。
  apu_pilot:
    display_name: APU驾驶员
    description: |
      装甲人员单元操作员。外骨骼被固定在码头地板上——
      静止的火力平台向哨兵群倾泻弹幕。高火力，零机动。
  niobe:
    display_name: 尼奥比
    description: |
      逻各斯号船长。舰队中最快的气垫艇驾驶员，
      现在在码头中徒步奔跑。她必须到达电力终端
      恢复EMP防御网格。
  zion_infantry:
    display_name: 锡安步兵
    description: |
      手持火箭筒的志愿防御者。轻装甲但决心保卫自己的
      家园——人类种族最后的庇护所。
  medic:
    display_name: 锡安军医
    description: |
      锡安医疗队的战地军医。在码头战斗的混乱中
      维持伤员存活。
  sentinel:
    display_name: 哨兵
    description: |
      机器乌贼——触手杀戮机器，以压倒性数量蜂拥而至。
      单个脆弱，但速度和数量使其致命。从码头天花板
      的缺口中涌入。
  sentinel_cluster:
    display_name: 哨兵集群
    description: |
      密集聚合成一体的哨兵群——数十个融合成扭动的
      金属触手球。比单个哨兵坚韧得多。
  drill_machine:
    display_name: 钻探机
    description: |
      设计用来钻穿锡安外壳的巨型钻探机器。缓慢、
      重甲、如果到达核心就不可阻挡。码头防御存在
      的意义就是阻止这些东西。

terrain_types:
  machine_wall:
    description: |
      结构支柱和码头内部的扭曲残骸。即使哨兵也无法通过。
  catwalk:
    description: |
      横跨码头的高架金属走道。制高点提供轻微防御优势。
  power_conduit:
    description: |
      沿码头墙壁通向终端的暴露电力管道。
      尼奥比必须沿着这些到达目标。

narrative:
  title: 锡安码头之战
  description: |
    机器大军突破了锡安的码头。哨兵从天花板涌入，
    钻探机向城市核心掘进。米弗涅上尉率领APU防御，
    尼奥比奔向恢复电力。
  intro: |
    警报在码头中嚎叫，天花板弯曲变形。金属触手从缺口中
    扭动而出——哨兵来了。APU驾驶员启动外骨骼开火。
  events:
    - trigger: on_turn_start
      turn: 5
      text: |
        外围APU的弹链耗尽。哨兵不断涌来，无尽的金属
        潮水从头顶的缺口倾泻而下。
    - trigger: on_turn_start
      turn: 10
      text: |
        钻探机碾压前进，震动码头地板。米弗涅嘶吼着
        让部下守住防线——不能让那些机器到达核心。
    - trigger: on_unit_killed
      unit_id: u_b_mifune_1
      text: |
        米弗涅的APU跪倒，被哨兵撕裂。上尉用手枪
        射击直到机器群将他吞没。"为了锡安……"
