# 斯特灵桥之战 — 中文本地化
name: 斯特灵桥之战
description: |
  1297年9月11日。萨里伯爵率领的英军逼近福斯河的斯特灵——
  高地与低地之间最低的渡河点。唯一的桥是一座仅容两匹马
  并行的木桥。威廉·华莱士和安德鲁·莫瑞将苏格兰步兵
  埋伏在修道院山上，放英军先锋过桥。当纵队过半时，苏格兰人
  冲下山坡。桥成了英军无法后退也无法增援的瓶颈。他们被
  消灭在自己的河流面前。

unit_classes:
  wallace:
    display_name: 威廉·华莱士
    description: |
      苏格兰骑士兼法外之徒。二十七岁。率领苏格兰人
      打一场本不该赢的仗。失去他，防线就会瓦解。
  andrew_moray:
    display_name: 安德鲁·莫瑞
    description: |
      华莱士的联合指挥官，实际上的军事头脑。
      历史上莫瑞在斯特灵桥战役中负致命伤。
  scots_spearman:
    display_name: 苏格兰枪兵
    description: |
      持十二英尺长矛的普通征召兵——枪阵的脊梁。
      慢，但能竖起枪林。射程1-2可以隔一排刺击。
  highland_swordsman:
    display_name: 高地剑士
    description: |
      挥舞阔刃大剑的高地氏族战士。比低地枪兵攻击力
      更强、更灵活，但防御较低。
  english_knight:
    display_name: 英格兰骑士
    description: |
      重型骑枪加马铠。在开阔地毁天灭地——但在一格宽的
      桥上完全施展不开。没有空间冲锋。苏格兰长矛
      找到了铠甲的每一处缝隙。
  english_longbowman:
    display_name: 英格兰长弓手
    description: |
      威尔士和英格兰自耕农，持大战弓。远程毁灭性打击，
      近战脆弱。苏格兰人会冲上去找他们。
  english_man_at_arms:
    display_name: 英格兰武装步兵
    description: |
      中等英军步兵——锁子甲、剑和盾。萨里军队的主力。

terrain_types:
  river:
    description: |
      福斯河——不可通行，将地图一分为二。
  bridge:
    description: |
      仅此一座木桥——斯特灵桥，死亡陷阱般的咽喉。
  high_ground:
    description: |
      修道院山——华莱士埋伏军队的制高点。
  marsh:
    description: |
      南岸沼泽——减缓英军展开速度。

narrative:
  title: 斯特灵桥之战
  description: |
    华莱士在福斯河的伏击——一座木桥化作死亡陷阱。
  intro: |
    福斯河上的黎明。华莱士和莫瑞带着五千步兵蹲伏在
    修道院山上。桥下，英军先锋开始踏上桥面。
  events:
    - trigger: on_turn_start
      turn: 4
      text: |
        英军纵队越来越密。两千人已在桥上或北岸。
    - trigger: on_turn_start
      turn: 6
      text: |
        华莱士发出信号。枪阵从山上冲下。
    - trigger: on_unit_killed
      unit_id: u_b_wallace_1
      text: |
        华莱士倒下了。苏格兰人失去了他们的灵魂。
