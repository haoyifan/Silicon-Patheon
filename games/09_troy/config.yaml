schema_version: 1
license: public_domain
name: "Troy — Bronze Age, Trojan War"
difficulty: 4
description: |
  The ninth year of the siege. Achilles, consumed by grief and rage
  after Hector killed Patroclus, returns to the battlefield with
  divine armor forged by Hephaestus. The Greeks surge forward behind
  their champion. Hector waits before the Scaean Gate with Troy's
  finest warriors. The Scamander river divides the plain. Ajax
  anchors the Greek line while Odysseus and Diomedes seek flanking
  positions. Paris watches from the walls with his bow -- the arrow
  that will find Achilles's heel.
  Inspired by the Trojan War, Homer's Iliad, ancient Greece.

board:
  width: 14
  height: 16
  terrain:
    # Troy's walls -- north edge (y=0) with Scaean Gate at (7, 0)
    - {x: 0, y: 0, type: troy_wall}
    - {x: 1, y: 0, type: troy_wall}
    - {x: 2, y: 0, type: troy_wall}
    - {x: 3, y: 0, type: troy_wall}
    - {x: 4, y: 0, type: troy_wall}
    - {x: 5, y: 0, type: troy_wall}
    - {x: 6, y: 0, type: troy_wall}
    # Scaean Gate at (7, 0) -- fort tile
    - {x: 8, y: 0, type: troy_wall}
    - {x: 9, y: 0, type: troy_wall}
    - {x: 10, y: 0, type: troy_wall}
    - {x: 11, y: 0, type: troy_wall}
    - {x: 12, y: 0, type: troy_wall}
    - {x: 13, y: 0, type: troy_wall}
    # Scamander river -- y=8 running east-west with two fords
    - {x: 0, y: 8, type: scamander}
    - {x: 1, y: 8, type: scamander}
    - {x: 2, y: 8, type: scamander}
    - {x: 3, y: 8, type: scamander}
    - {x: 4, y: 8, type: ford}
    - {x: 5, y: 8, type: scamander}
    - {x: 6, y: 8, type: scamander}
    - {x: 7, y: 8, type: scamander}
    - {x: 8, y: 8, type: scamander}
    - {x: 9, y: 8, type: ford}
    - {x: 10, y: 8, type: scamander}
    - {x: 11, y: 8, type: scamander}
    - {x: 12, y: 8, type: scamander}
    - {x: 13, y: 8, type: scamander}
    # Greek ships beached on south edge
    - {x: 5, y: 15, type: greek_ship}
    - {x: 6, y: 15, type: greek_ship}
    - {x: 7, y: 15, type: greek_ship}
    - {x: 8, y: 15, type: greek_ship}
  forts:
    - {x: 7, y: 0, owner: red}

terrain_types:
  troy_wall:
    display_name: Wall of Troy
    description: The walls of Ilium. Impassable.
    move_cost: 99
    passable: false
    glyph: "#"
    color: yellow
  scamander:
    display_name: Scamander River
    description: The river Xanthus/Scamander. Impassable except at fords.
    move_cost: 99
    passable: false
    glyph: "~"
    color: blue
  ford:
    display_name: Ford
    description: Shallow crossing. Costs 2 movement.
    move_cost: 2
    glyph: "="
    color: yellow
  greek_ship:
    display_name: Greek Ship
    description: Beached warships of the Achaean fleet. +2 DEF.
    move_cost: 1
    defense_bonus: 2
    glyph: "M"
    color: yellow

unit_classes:
  achilles:
    display_name: Achilles
    description: |
      Son of Peleus and Thetis, dipped in the Styx. Invulnerable
      everywhere but the heel. Wearing divine armor forged by
      Hephaestus. The greatest warrior alive.
    hp_max: 50
    atk: 16
    defense: 8
    res: 5
    spd: 9
    rng_min: 1
    rng_max: 1
    move: 6
    tags: [hero, demigod]
    sight: 5
    glyph: A
    color: bright_cyan

  ajax:
    display_name: Ajax the Greater
    description: |
      Son of Telamon. Tower-shield bearer, immovable in defense.
      Single-handedly held the Trojans from burning the ships.
    hp_max: 34
    atk: 10
    defense: 9
    res: 3
    spd: 4
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [hero]
    sight: 3
    glyph: J
    color: cyan

  odysseus:
    display_name: Odysseus
    description: |
      King of Ithaca. Cleverest of the Achaeans. Flanker and
      strategist -- where brute force fails, cunning prevails.
    hp_max: 26
    atk: 9
    defense: 5
    res: 5
    spd: 7
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [hero]
    sight: 4
    glyph: O
    color: cyan

  diomedes:
    display_name: Diomedes
    description: |
      The one who wounded Ares and Aphrodite. Second only to
      Achilles in raw fighting ability. Calm, powerful, relentless.
    hp_max: 30
    atk: 11
    defense: 6
    res: 4
    spd: 7
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [hero]
    sight: 4
    glyph: D
    color: cyan

  patroclus:
    display_name: Patroclus
    description: |
      Achilles's closest companion. Fights in borrowed armor,
      beloved by the Myrmidons. In this telling, he still lives --
      for now.
    hp_max: 24
    atk: 9
    defense: 5
    res: 3
    spd: 6
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [hero]
    sight: 3
    glyph: P
    color: cyan

  nestor:
    display_name: Nestor
    description: |
      King of Pylos, oldest of the Greek commanders. Too old to
      fight in the front rank but his counsel and presence steady
      the line. Ranged support with javelin.
    hp_max: 18
    atk: 7
    defense: 4
    res: 6
    spd: 3
    rng_min: 1
    rng_max: 2
    move: 3
    tags: [advisor]
    sight: 4
    glyph: N
    color: cyan

  hector:
    display_name: Hector
    description: |
      Prince of Troy, defender of the city, husband to Andromache.
      VIP -- his death spells Troy's doom. The noblest warrior on
      either side.
    hp_max: 45
    atk: 14
    defense: 8
    res: 5
    spd: 7
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [vip, hero, prince]
    sight: 5
    glyph: H
    color: bright_red

  paris:
    display_name: Paris
    description: |
      Hector's brother, who started the war by taking Helen. Skilled
      archer -- the arrow that eventually kills Achilles is his,
      guided by Apollo.
    hp_max: 18
    atk: 10
    defense: 3
    res: 3
    spd: 6
    rng_min: 2
    rng_max: 4
    move: 4
    tags: [archer, prince]
    sight: 5
    glyph: R
    color: red

  aeneas:
    display_name: Aeneas
    description: |
      Son of Anchises and Aphrodite. Will survive Troy's fall to
      found Rome. Second-in-command after Hector, a hero in his
      own right.
    hp_max: 30
    atk: 10
    defense: 6
    res: 4
    spd: 6
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [hero]
    sight: 4
    glyph: E
    color: red

  sarpedon:
    display_name: Sarpedon
    description: |
      King of Lycia, son of Zeus. Leads the Lycian allies who fight
      for Troy. A demigod-tier warrior, one of the strongest on the
      Trojan side.
    hp_max: 32
    atk: 11
    defense: 6
    res: 4
    spd: 6
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [hero, demigod]
    sight: 4
    glyph: S
    color: red

  glaucus:
    display_name: Glaucus
    description: |
      Sarpedon's cousin and co-commander of the Lycians. Once
      traded gold armor for bronze with Diomedes in a moment of
      divine madness. Solid fighter.
    hp_max: 24
    atk: 9
    defense: 5
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [hero]
    sight: 3
    glyph: G
    color: red

  deiphobus:
    display_name: Deiphobus
    description: |
      Another of Priam's sons, third-best warrior of Troy after
      Hector and Aeneas. Fights with spear and shield.
    hp_max: 24
    atk: 9
    defense: 5
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [prince]
    sight: 3
    glyph: B
    color: red

  trojan_archer:
    display_name: Pandarus
    description: |
      Lycian archer who broke the truce by shooting Menelaus. Expert
      bowman fighting from behind the Trojan line.
    hp_max: 16
    atk: 9
    defense: 2
    res: 2
    spd: 5
    rng_min: 2
    rng_max: 3
    move: 4
    tags: [archer]
    sight: 4
    glyph: X
    color: red

armies:
  blue:
    # Greeks -- south of the Scamander, near the beached ships
    - {class: achilles, pos: {x: 6, y: 12}}
    - {class: ajax, pos: {x: 5, y: 13}}
    - {class: odysseus, pos: {x: 7, y: 13}}
    - {class: diomedes, pos: {x: 8, y: 12}}
    - {class: patroclus, pos: {x: 7, y: 12}}
    - {class: nestor, pos: {x: 6, y: 14}}
  red:
    # Trojans -- north of the Scamander, before the Scaean Gate
    - {class: hector, pos: {x: 7, y: 3}}
    - {class: paris, pos: {x: 6, y: 1}}
    - {class: aeneas, pos: {x: 8, y: 3}}
    - {class: sarpedon, pos: {x: 5, y: 3}}
    - {class: glaucus, pos: {x: 6, y: 4}}
    - {class: deiphobus, pos: {x: 8, y: 4}}
    - {class: trojan_archer, pos: {x: 9, y: 2}}

rules:
  max_turns: 30
  fog_of_war: false
  first_player: blue

win_conditions:
  - {type: protect_unit, unit_id: u_r_hector_1, owning_team: red}
  - {type: seize_enemy_fort}
  - {type: reach_goal_line, team: red, axis: y, value: 15}
  - {type: eliminate_all_enemy_units}
  - {type: max_turns_draw}

narrative:
  title: "Troy -- Achilles and Hector"
  description: |
    The duel that ends the Iliad. Two great warriors, the Scamander
    between them, the walls of Troy as backdrop.
  intro: |
    Dawn outside the Scaean Gate. Patroclus lives, but for how long?
    Achilles strides forward in divine armor. Hector waits before
    his father's city. The Scamander runs cold between them.
  events:
    - trigger: on_turn_start
      turn: 3
      text: "Achilles strides toward the ford. The Greeks part to let him pass."
    - trigger: on_turn_start
      turn: 7
      text: "Hector and Achilles lock eyes across the river. The moment is at hand."
    - trigger: on_turn_start
      turn: 15
      text: "The plain is thick with dust and blood. The Scamander runs red."
    - trigger: on_unit_killed
      unit_id: u_r_hector_1
      text: "Hector falls. Andromache cries out from the wall. Troy is doomed."
    - trigger: on_unit_killed
      unit_id: u_b_achilles_1
      text: "Achilles is down. Paris's arrow found the heel after all."
