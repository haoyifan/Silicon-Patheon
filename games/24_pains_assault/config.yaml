schema_version: 1
license: fan_work
fan_work_source: "Naruto (Masashi Kishimoto / Shueisha)"
name: "Pain's Assault on Konoha"
difficulty: 4
description: |
  The Hidden Leaf Village. The Six Paths of Pain -- puppets controlled
  by Nagato -- descend upon Konoha with godlike power. Naruto, in
  Sage Mode, leads the defense alongside Kakashi, Tsunade, Shikamaru,
  Hinata, Sakura, and Konohamaru. The Deva Path controls gravity
  itself. The village must destroy all six Paths to win, or protect
  Naruto until the turn cap when he can locate Nagato's true body.
  Inspired by Pain's Assault on Konoha from Naruto Shippuden by Masashi Kishimoto.

board:
  width: 14
  height: 12
  terrain:
    # Village buildings -- scattered cover
    - {x: 2, y: 3, type: building}
    - {x: 3, y: 3, type: building}
    - {x: 6, y: 3, type: building}
    - {x: 7, y: 3, type: building}
    - {x: 10, y: 3, type: building}
    - {x: 11, y: 3, type: building}
    - {x: 1, y: 5, type: building}
    - {x: 5, y: 5, type: building}
    - {x: 8, y: 5, type: building}
    - {x: 12, y: 5, type: building}
    - {x: 3, y: 7, type: building}
    - {x: 4, y: 7, type: building}
    - {x: 9, y: 7, type: building}
    - {x: 10, y: 7, type: building}
    # Shinra Tensei crater -- center of the village (open ground)
    - {x: 6, y: 5, type: crater}
    - {x: 7, y: 5, type: crater}
    - {x: 6, y: 6, type: crater}
    - {x: 7, y: 6, type: crater}
    # Hokage Monument -- northern cliff
    - {x: 5, y: 0, type: monument}
    - {x: 6, y: 0, type: monument}
    - {x: 7, y: 0, type: monument}
    - {x: 8, y: 0, type: monument}
  forts: []

terrain_types:
  building:
    display_name: Building
    description: Konoha village buildings. +3 DEF, costs 2 movement.
    move_cost: 2
    defense_bonus: 3
    glyph: "#"
    color: yellow
  crater:
    display_name: Crater
    description: |
      Shinra Tensei impact crater. Open ground with no cover.
      The center of destruction.
    move_cost: 1
    defense_bonus: 0
    glyph: "o"
    color: bright_black
  monument:
    display_name: Hokage Monument
    description: The carved cliff faces of past Hokage. Impassable terrain.
    move_cost: 99
    passable: false
    glyph: "M"
    color: bright_yellow

unit_classes:
  naruto:
    display_name: Naruto Uzumaki
    description: |
      The Nine-Tails Jinchuriki in Sage Mode. Nature energy
      amplifies his speed, strength, and senses beyond anything
      the Paths of Pain have faced. Rasenshuriken obliterates at
      range. VIP -- if he falls, Konoha is lost.
    hp_max: 40
    atk: 14
    defense: 6
    res: 8
    spd: 8
    move: 5
    rng_min: 1
    rng_max: 2
    tags: [vip]
    glyph: "!"
    color: bright_yellow

  kakashi:
    display_name: Kakashi Hatake
    description: |
      The Copy Ninja. Sharingan user who has copied over a thousand
      jutsu. Konoha's tactical genius. Kamui can warp attacks but
      drains his chakra fast.
    hp_max: 26
    atk: 11
    defense: 5
    res: 7
    spd: 7
    move: 4
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "K"
    color: white

  tsunade:
    display_name: Tsunade
    description: |
      The Fifth Hokage and legendary healer. One of the three
      Sannin. Keeps the village alive with medical ninjutsu while
      directing the defense. Superhuman strength in melee.
    hp_max: 30
    atk: 10
    defense: 4
    res: 8
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 1
    is_magic: true
    can_heal: true
    heal_amount: 8
    glyph: "T"
    color: yellow

  shikamaru:
    display_name: Shikamaru Nara
    description: |
      Shadow tactician with an IQ over 200. His shadow techniques
      paralyze enemies at range. The brain of Konoha's defense.
    hp_max: 20
    atk: 7
    defense: 4
    res: 6
    spd: 6
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "S"
    color: dim

  hinata:
    display_name: Hinata Hyuga
    description: |
      Byakugan user and Gentle Fist practitioner. Steps between
      Pain and Naruto without hesitation. Her 360-degree vision
      and chakra-blocking strikes make her dangerous up close.
    hp_max: 20
    atk: 9
    defense: 4
    res: 5
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "H"
    color: bright_cyan

  sakura:
    display_name: Sakura Haruno
    description: |
      Tsunade's apprentice. Medical ninja with chakra-enhanced
      punches that crack the ground. Healer and close-range
      powerhouse.
    hp_max: 22
    atk: 9
    defense: 4
    res: 6
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 1
    can_heal: true
    heal_amount: 6
    glyph: "R"
    color: bright_red

  konohamaru:
    display_name: Konohamaru Sarutobi
    description: |
      The Third Hokage's grandson. Still a genin but hits above
      his weight with a surprising Rasengan that takes down one
      of Pain's bodies. Brave beyond his rank.
    hp_max: 16
    atk: 8
    defense: 3
    res: 4
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "C"
    color: cyan

  deva:
    display_name: Deva Path
    description: |
      The main body of Pain. Controls gravity -- Shinra Tensei
      repels everything, Chibaku Tensei creates a black hole.
      The most dangerous of the Six Paths. VIP for red.
    hp_max: 36
    atk: 14
    defense: 6
    res: 8
    spd: 5
    move: 3
    rng_min: 2
    rng_max: 4
    is_magic: true
    tags: [vip]
    glyph: "D"
    color: bright_red

  animal:
    display_name: Animal Path
    description: |
      Summons giant creatures to fight. Each summon shares the
      Rinnegan's linked vision, making ambushes impossible.
    hp_max: 28
    atk: 10
    defense: 5
    res: 6
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "A"
    color: red

  asura:
    display_name: Asura Path
    description: |
      A mechanical body bristling with weapons. Fires missiles,
      extends extra arms. Pain's heavy artillery platform.
    hp_max: 30
    atk: 12
    defense: 7
    res: 3
    spd: 4
    move: 3
    rng_min: 2
    rng_max: 3
    glyph: "U"
    color: red

  human:
    display_name: Human Path
    description: |
      Reads minds and tears out souls with a touch. A single grab
      means instant death. Fast and terrifying.
    hp_max: 24
    atk: 13
    defense: 4
    res: 5
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    is_magic: true
    glyph: "M"
    color: red

  preta:
    display_name: Preta Path
    description: |
      Absorbs all chakra-based attacks. Ninjutsu is useless --
      only physical attacks can damage it.
    hp_max: 30
    atk: 7
    defense: 5
    res: 12
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "P"
    color: red

  naraka:
    display_name: Naraka Path
    description: |
      Summons the King of Hell to heal and restore destroyed Paths.
      Must be eliminated to prevent Pain from regenerating.
    hp_max: 22
    atk: 6
    defense: 4
    res: 6
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    is_magic: true
    can_heal: true
    heal_amount: 7
    glyph: "N"
    color: red

armies:
  blue:
    # Naruto at the village center
    - {class: naruto, pos: {x: 7, y: 8}}
    # Kakashi on the front line
    - {class: kakashi, pos: {x: 6, y: 7}}
    # Tsunade behind the lines
    - {class: tsunade, pos: {x: 7, y: 10}}
    # Shikamaru providing support
    - {class: shikamaru, pos: {x: 9, y: 8}}
    # Hinata near Naruto
    - {class: hinata, pos: {x: 8, y: 8}}
    # Sakura with Tsunade
    - {class: sakura, pos: {x: 6, y: 10}}
    # Konohamaru flanking
    - {class: konohamaru, pos: {x: 5, y: 8}}

  red:
    # Six Paths of Pain approaching from the north
    - {class: deva, pos: {x: 7, y: 1}}
    - {class: animal, pos: {x: 4, y: 2}}
    - {class: asura, pos: {x: 10, y: 2}}
    - {class: human, pos: {x: 3, y: 1}}
    - {class: preta, pos: {x: 11, y: 1}}
    - {class: naraka, pos: {x: 7, y: 2}}

plugin_hooks:
  on_turn_start:
    - naruto_reinforcement

rules:
  max_turns: 20
  first_player: red

win_conditions:
  - {type: protect_unit, unit_id: u_b_naruto_1, owning_team: blue}
  - {type: protect_unit, unit_id: u_r_deva_1, owning_team: red}
  - {type: protect_unit_survives, unit_id: u_b_naruto_1, owning_team: blue}
  - {type: eliminate_all_enemy_units}
  - {type: max_turns_draw}

narrative:
  title: "Pain's Assault on Konoha"
  description: |
    The Hidden Leaf Village, Land of Fire. Six bodies with the
    Rinnegan descend from the sky. Pain has come for the Nine-Tails.
  intro: |
    Explosions tear through the village. The Six Paths of Pain
    drop from the sky like gods of destruction. But this time,
    Naruto is already here -- standing in Sage Mode atop the
    great toad Gamabunta. "I am the Fourth Hokage's legacy.
    I won't let you destroy my home."
  events:
    - trigger: on_turn_start
      turn: 4
      text: |
        Shinra Tensei! The Deva Path unleashes a gravity pulse.
        Buildings crumble. The village center is flattened into
        a crater.
    - trigger: on_turn_start
      turn: 8
      text: |
        Hinata steps between Pain and the fallen Naruto. "I'm not
        afraid to die protecting you, because... I love you."
    - trigger: on_turn_start
      turn: 12
      text: |
        The battle reaches its climax. Naruto's Sage Mode clones
        engage the remaining Paths across the ruins.
    - trigger: on_unit_killed
      unit_id: u_r_deva_1
      text: |
        The Deva Path crumbles. Somewhere in the trees beyond the
        village, Nagato coughs blood. The real Pain still hides,
        but his strongest puppet is broken.
    - trigger: on_unit_killed
      unit_id: u_b_naruto_1
      text: |
        Naruto falls. The Nine-Tails stirs inside the seal.
        Without the jinchuriki, Konoha has nothing left to stop
        Pain from leveling the village.
