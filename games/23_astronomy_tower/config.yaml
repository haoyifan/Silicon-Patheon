terrain_types:
  stone_wall:
    display_name: Stone Wall
    move_cost: 99
    defense_bonus: 0
    passable: false
    glyph: "#"
    color: white
    description: |
      Hogwarts castle stone — ancient, enchanted, and impassable.
      A thousand years of magic hold these walls together.
  tower_parapet:
    display_name: Tower Parapet
    move_cost: 1
    defense_bonus: 3
    glyph: "^"
    color: bright_cyan
    description: |
      The crenellated top of the Astronomy Tower. Stone
      battlements provide excellent cover and a commanding view
      of the grounds below.
  moving_staircase:
    display_name: Moving Staircase
    move_cost: 3
    defense_bonus: 0
    glyph: "~"
    color: bright_yellow
    description: |
      Hogwarts' enchanted staircases shift without warning.
      Crossing takes time — they like to move while you're
      on them.
  classroom:
    display_name: Classroom
    move_cost: 1
    defense_bonus: 1
    glyph: "="
    color: cyan
    description: |
      An abandoned classroom with overturned desks and scattered
      chairs. Modest cover — good enough to duck behind.
  library_shelves:
    display_name: Library Shelves
    move_cost: 2
    defense_bonus: 2
    glyph: "|"
    color: yellow
    description: |
      Towering bookshelves of the Hogwarts library. Heavy cover
      but difficult to move through — the Restricted Section
      books bite.
  secret_passage:
    display_name: Secret Passage
    move_cost: 1
    defense_bonus: 0
    glyph: "."
    color: dim
    description: |
      One of Hogwarts' hidden passages — fast to traverse but
      narrow, offering no cover. Only those who know the castle
      well can exploit these shortcuts.
  room_of_requirement:
    display_name: Room of Requirement
    move_cost: 1
    defense_bonus: 1
    glyph: "?"
    color: bright_magenta
    description: |
      The Room of Requirement. It becomes whatever the occupant
      needs most — right now, it's become a breach point.
  vanishing_cabinet:
    display_name: Vanishing Cabinet
    move_cost: 1
    defense_bonus: 0
    glyph: "V"
    color: dim
    description: |
      The Vanishing Cabinet in the Room of Requirement — twin
      to the one in Borgin and Burkes. The Death Eaters' entry
      point into Hogwarts.

unit_classes:
  dumbledore:
    display_name: Albus Dumbledore
    description: |
      The greatest wizard of the age — but weakened by a cursed
      ring and the cave potion. Even diminished, his spells are
      devastating. VIP — if he falls, blue loses.
    hp_max: 22
    atk: 14
    defense: 3
    res: 9
    spd: 4
    move: 2
    rng_min: 1
    rng_max: 3
    is_magic: true
    tags: [vip]
    glyph: "D"
    color: bright_cyan

  harry:
    display_name: Harry Potter
    description: |
      Hidden under his Invisibility Cloak atop the tower, frozen
      by Dumbledore's spell. A skilled duelist with Expelliarmus
      and Patronus charms.
    hp_max: 20
    atk: 10
    defense: 3
    res: 7
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "H"
    color: bright_yellow

  ginny:
    display_name: Ginny Weasley
    description: |
      Fierce DA member with a powerful Bat-Bogey Hex. Quick on
      her feet and fights with controlled aggression.
    hp_max: 18
    atk: 9
    defense: 3
    res: 6
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "G"
    color: cyan

  neville:
    display_name: Neville Longbottom
    description: |
      The bravest of them all. Fights with stubborn determination
      and surprising toughness. Channels raw courage into his
      Shield Charms.
    hp_max: 22
    atk: 8
    defense: 5
    res: 6
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    is_magic: true
    glyph: "N"
    color: cyan

  luna:
    display_name: Luna Lovegood
    description: |
      Dreamy but deadly. Her unorthodox spells catch enemies off
      guard. Stunners and jinxes from unexpected angles.
    hp_max: 16
    atk: 9
    defense: 2
    res: 8
    spd: 5
    move: 3
    rng_min: 2
    rng_max: 3
    is_magic: true
    glyph: "L"
    color: bright_magenta

  snape:
    display_name: Severus Snape
    description: |
      The double agent. Master of Occlumency, Legilimency, and
      dark curses. Fights for blue but his true allegiance is
      ambiguous. A terrifyingly skilled wizard.
    hp_max: 24
    atk: 12
    defense: 4
    res: 8
    spd: 6
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "S"
    color: white

  # --- RED: Death Eaters ---

  draco:
    display_name: Draco Malfoy
    description: |
      The conflicted boy with the Dark Mark. Tasked with killing
      Dumbledore but unable to do it. His hexes are competent but
      his heart wavers.
    hp_max: 18
    atk: 7
    defense: 3
    res: 5
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "Z"
    color: bright_red

  bellatrix:
    display_name: Bellatrix Lestrange
    description: |
      The Dark Lord's most devoted servant. Her Cruciatus and
      Killing Curses make her the deadliest witch alive. Savage,
      fast, and utterly ruthless.
    hp_max: 24
    atk: 13
    defense: 3
    res: 7
    spd: 7
    move: 4
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "B"
    color: bright_red

  fenrir:
    display_name: Fenrir Greyback
    description: |
      The savage werewolf. Not a wizard — just a monster who
      enjoys violence. Fights with claws and teeth. Physical
      damage only, but devastating up close.
    hp_max: 28
    atk: 12
    defense: 6
    res: 2
    spd: 7
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "F"
    color: bright_red

  amycus:
    display_name: Amycus Carrow
    description: |
      Death Eater who specializes in the Cruciatus Curse. A
      sadistic bully with genuine dark arts skill.
    hp_max: 20
    atk: 9
    defense: 3
    res: 5
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "A"
    color: red

  alecto:
    display_name: Alecto Carrow
    description: |
      Amycus's sister and fellow Death Eater. Her hexes focus on
      binding and immobilization. Fights dirty.
    hp_max: 20
    atk: 8
    defense: 3
    res: 5
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "E"
    color: red

  yaxley:
    display_name: Yaxley
    description: |
      Senior Death Eater and Imperius Curse specialist. Tall,
      brutal, and experienced. A dangerous melee combatant with
      dark magic backup.
    hp_max: 24
    atk: 10
    defense: 5
    res: 5
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 1
    is_magic: true
    glyph: "Y"
    color: red

  gibbon:
    display_name: Gibbon
    description: |
      Death Eater who cast the Dark Mark over the tower. A
      competent duelist specializing in fire curses.
    hp_max: 18
    atk: 9
    defense: 3
    res: 4
    spd: 5
    move: 3
    rng_min: 2
    rng_max: 3
    is_magic: true
    glyph: "X"
    color: red

armies:
  blue:
    # Dumbledore on the Astronomy Tower parapet — the VIP
    - {class: dumbledore, pos: {x: 6, y: 0}}
    # Harry on the tower beside him (frozen under the cloak)
    - {class: harry, pos: {x: 7, y: 0}}
    # Snape on the tower landing — arrives last, climbs fast
    - {class: snape, pos: {x: 5, y: 1}}
    # Ginny guards the main corridor (mid-castle)
    - {class: ginny, pos: {x: 5, y: 6}}
    # Neville holds the grand corridor — the stubborn wall
    - {class: neville, pos: {x: 3, y: 8}}
    # Luna watches from the west classroom — ranged support
    - {class: luna, pos: {x: 2, y: 5}}

  red:
    # Death Eaters emerge from the Vanishing Cabinet (south)
    # Draco leads — he must reach the tower
    - {class: draco, pos: {x: 5, y: 14}}
    # Bellatrix in the approach hall — main corridor assault
    - {class: bellatrix, pos: {x: 6, y: 14}}
    # Fenrir at the east edge — fast flanker via secret passage
    - {class: fenrir, pos: {x: 7, y: 15}}
    # Amycus pushing through the west wing
    - {class: amycus, pos: {x: 4, y: 15}}
    # Alecto alongside her brother
    - {class: alecto, pos: {x: 5, y: 15}}
    # Yaxley — bruiser up the main corridor
    - {class: yaxley, pos: {x: 6, y: 15}}
    # Gibbon — ranged support from the rear
    - {class: gibbon, pos: {x: 7, y: 14}}

rules:
  max_turns: 20
  first_player: red

win_conditions:
  # Dumbledore dies -> blue loses
  - {type: protect_unit, unit_id: u_b_dumbledore_1, owning_team: blue}
  # Dumbledore survives the turn cap -> blue wins (he escapes)
  - {type: protect_unit_survives, unit_id: u_b_dumbledore_1, owning_team: blue}
  # Either side wins by total elimination
  - {type: eliminate_all_enemy_units}
  # Backstop
  - {type: max_turns_draw}

narrative:
  title: The Astronomy Tower
  description: |
    Hogwarts, June 1997. Death Eaters have breached the castle
    through a Vanishing Cabinet. Dumbledore, weakened from
    retrieving a Horcrux, faces Draco Malfoy on the tower while
    his allies fight below.
  intro: |
    The Dark Mark hangs over the Astronomy Tower. Spells flash
    in the corridors below. Dumbledore stands at the parapet,
    his cursed hand hidden beneath his robes. Draco's wand hand
    trembles. In the shadows, Snape moves with purpose — but
    whose purpose?
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        Boot-steps echo through the lower corridors. The Death
        Eaters fan out — some heading west through the classrooms,
        others east toward the library. Fenrir sniffs the air and
        finds the secret passage.
    - trigger: on_turn_start
      turn: 6
      text: |
        Fenrir Greyback howls through the corridors. The sound
        of breaking stone echoes as curses blow holes in the
        castle walls. Bellatrix's cackle rings out above the din.
    - trigger: on_turn_start
      turn: 12
      text: |
        The fighting grows desperate. Luna's Patronus flashes
        silver through the smoke. Neville bleeds but refuses
        to fall. The moving staircases groan and shift, slowing
        the assault on the tower.
    - trigger: on_unit_killed
      unit_id: u_b_dumbledore_1
      text: |
        The greatest wizard of the age falls from the tower.
        The defenders' morale shatters. The Dark Mark burns
        brighter overhead.
