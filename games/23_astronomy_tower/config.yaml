schema_version: 1
license: fan_work
fan_work_source: "Harry Potter (J.K. Rowling / Warner Bros.)"
name: "Astronomy Tower — Harry Potter"
difficulty: 3
description: |
  Hogwarts, June 1997. Death Eaters breach the castle through a
  Vanishing Cabinet. Draco Malfoy confronts a weakened Dumbledore
  atop the Astronomy Tower while Bellatrix, Fenrir, and other dark
  wizards fight through the corridors below. The DA and Order
  members must protect Dumbledore long enough for him to escape.
  Snape moves among both sides — whose side is he truly on?
  Inspired by the Battle of the Astronomy Tower from Harry Potter by J.K. Rowling.

board:
  # 14 wide x 16 tall — vertical castle layout.
  # North (y=0): Astronomy Tower.  South (y=15): Vanishing Cabinet.
  #
  # LEGEND (see terrain_types below)
  #   #  stone_wall        (impassable)
  #   ^  tower_parapet      (+3 DEF)
  #   ~  moving_staircase   (cost 3, +0 DEF — slow but connects floors)
  #   =  classroom          (+1 DEF, overturned desks)
  #   |  library_shelves    (+2 DEF, cost 2 — heavy cover, slow)
  #   .  secret_passage     (cost 1, +0 DEF — fast but exposed)
  #   V  vanishing_cabinet  (cost 1, +0 DEF — red entry point)
  #   ?  room_of_requirement (+1 DEF)
  #
  # Approximate map (# = wall, spaces = open floor):
  #
  #  y0   ######^^##__##        Astronomy Tower (parapet center)
  #  y1   ####__####__##        Tower landing
  #  y2   ###~~~~#__####        Staircase down from tower
  #  y3   ##__..____####        Upper corridor + secret passage west
  #  y4   ##__##__##||##        Corridor forks; library east
  #  y5   #===#__###||##        West wing classroom; library continues
  #  y6   #===____###..#        Classroom; secret passage east entry
  #  y7   ##__##~~##__##        Moving staircase (mid-castle)
  #  y8   ##____####__##        Grand corridor opens up
  #  y9   #===#__####__#        West classroom 2
  # y10   #===____##||##        Corridor; east library 2
  # y11   ##__##__##||##        Lower corridor junction
  # y12   ###__..____###        Lower secret passage segment
  # y13   ####____######        Approach hall
  # y14   ####??__######        Room of Requirement (cabinet room)
  # y15   ####VV__######        Vanishing Cabinet — red spawn
  #
  width: 14
  height: 16
  terrain:
    # ── ASTRONOMY TOWER (y=0–1) ──────────────────────────────
    # Parapet — Dumbledore's perch (+3 DEF)
    - {x: 6, y: 0, type: tower_parapet}
    - {x: 7, y: 0, type: tower_parapet}
    # Tower walls
    - {x: 0, y: 0, type: stone_wall}
