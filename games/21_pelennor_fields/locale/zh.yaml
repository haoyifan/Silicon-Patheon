# 帕兰诺平原之战 — 中文本地化
name: 帕兰诺平原之战 — 指环王
description: |
  米那斯提力斯，第三纪元3019年3月15日。魔多大军围攻白城。
  安格玛巫王率领庞大的兽人、哈拉德人和战象大军猛攻刚铎
  城墙。甘道夫守住城门。阿拉贡在帕兰诺平原上奋战。
  如果兽人攻破城池，中洲将陷落——除非洛汗骑兵赶来救援。

unit_classes:
  gandalf:
    display_name: 甘道夫（白袍）
    description: |
      白袍巫师。从死亡中归来，挥舞敌击剑和安诺之光。
      他的法杖在米那斯提力斯城门前大放光明。法术型。
  aragorn:
    display_name: 阿拉贡
    description: |
      伊西尔杜尔的后裔，挥舞重铸的安都瑞尔。
      这个时代最伟大的剑士，鼓舞着刚铎的守军。
  legolas:
    display_name: 莱戈拉斯
    description: |
      密林王子。箭无虚发。在世界燃烧时和金雳比赛杀敌数。
  eowyn:
    display_name: 伊欧玟
    description: |
      洛汗的盾女，化名德赫姆。"吾非男儿。"
      迅速而致命，被无畏的勇气驱动。
  eomer:
    display_name: 伊欧默
    description: |
      洛汗骑兵统帅。重骑兵指挥官，冲锋时势不可挡。
      他的长矛粉碎盾牌。
  gimli:
    display_name: 金雳
    description: |
      格洛因之子。他的战斧比他的吹嘘声音更响。
      重甲，近战毁灭性。
  imrahil:
    display_name: 印拉希尔亲王
    description: |
      多尔安罗斯亲王，刚铎最高贵的领主。统领天鹅骑士。
      无与伦比的枪术和坚不可摧的盾墙。
  gondor_soldier:
    display_name: 刚铎士兵
    description: |
      白城子弟。塔楼卫队和守军，为城墙后的家园和亲人
      而战。
  gondor_archer:
    display_name: 刚铎弓箭手
    description: |
      刚铎弓手。从城墙和帕兰诺平原向推进的兽人射箭如雨。
  gondor_knight:
    display_name: 刚铎骑士
    description: |
      多尔安罗斯的天鹅骑士和帕兰诺的骑士。
      重骑兵，忠于摄政王。
  healer_of_gondor:
    display_name: 刚铎治疗师
    description: |
      米那斯提力斯治愈之殿的治疗师。精通王者之叶
      和草药学的古老医术，在盾墙后方照料伤员。
  rohirrim:
    display_name: 洛汗骑兵
    description: |
      洛汗骠骑，响应刚铎的召唤。冲锋势不可挡的快速骑兵。
      "冲锋吧！为毁灭和世界的终结而冲！"
  witch_king:
    display_name: 安格玛巫王
    description: |
      戒灵之首，索伦最强大的仆人。骑在堕落兽上
      俯瞰战场。他的存在摧毁人类的意志。法术型。
  gothmog:
    display_name: 哥斯莫格
    description: |
      米那斯魔窟的兽人副官。丑陋、狡猾、残忍。
      以蛮力效率指挥围攻。
  guritz:
    display_name: 古里兹
    description: |
      黑门的奥洛格-海队长。比普通巨魔高出数倍，
      身披魔多铁甲。指挥攻城武器。
  suladan:
    display_name: 苏拉丹
    description: |
      哈拉德人的蛇王。一位狡诈的将军，率领南方战士。
      精通弯刀格斗。
  mumakil:
    display_name: 猛犸巨象
    description: |
      哈拉德人的战争猛犸象，由马胡德战首领德拉格骑乘。
      行走的攻城塔——重装甲、极其缓慢、几乎不可能击倒。
  zagduf:
    display_name: 扎格杜夫
    description: |
      来自戈尔格罗斯的兽人攻城队长。操作攻城锤格隆德
      和攻城塔。他到之处，城墙崩塌。
  khamul:
    display_name: 卡穆尔
    description: |
      第二戒灵，东方之影。不如巫王强大，
      但迅速而无情。法术型——伤害由魔抗减免。
  gorbag:
    display_name: 戈尔巴格
    description: |
      米那斯魔窟的兽人队长。凶残的好斗者，率领兽人先锋。
      在兽人中算快的，即使以兽人标准也算奸诈。
  zagdûf:
    display_name: 扎格杜夫
    description: |
      来自戈洛斯的兽人攻城队长。操纵格隆德和攻城塔。
      他到之处，城墙必倒。
  shagrat:
    display_name: 沙格拉特
    description: |
      西力斯昂格尔的乌鲁克队长。皮厚甲重，
      对索伦绝对忠诚。残暴的前线战士。
  orc:
    display_name: 兽人
    description: |
      魔多兽人。无数、可消耗、被对主人的恐惧驱使。
      技术不足，数量弥补。
  haradrim:
    display_name: 哈拉德人
    description: |
      哈拉德的战士，骑着猛犸象——巨大的战象，
      践踏面前一切。缓慢但极为坚韧。
  siege_troll:
    display_name: 攻城洞穴巨魔
    description: |
      在魔多深坑中培育的战争巨魔。比兽人高出数倍，
      挥舞巨锤。用于撞破城门和粉碎阵型。

terrain_types:
  city_wall:
    display_name: 城墙
    description: |
      米那斯提力斯的白色城墙。七层石墙，人类最伟大的
      堡垒。除城门外不可通行。
  ruins:
    display_name: 废墟
    description: |
      帕兰诺上的废弃农舍和瞭望塔。残垣断壁提供些许掩护。
  osgiliath_ruins:
    display_name: 奥斯吉利亚斯废墟
    description: |
      安都因河畔破碎的奥斯吉利亚斯城。密集的废墟
      提供强大的防御阵地。
  marsh:
    display_name: 沼泽
    description: |
      帕兰诺南部靠近哈隆德的泥沼地带。
      泥泞和积水减缓一切行动。
  rammas_wall:
    display_name: 拉马斯墙
    description: |
      帕兰诺平原的外墙——拉马斯·艾霍尔。摇摇欲坠
      但仍然不可通行，除非在敌军已突破之处。
  river:
    display_name: 河流
    description: |
      安都因大河。深邃湍急，不可通行。

narrative:
  title: 帕兰诺平原之战
  description: |
    米那斯提力斯，第三纪元3019年。魔多大军围攻白城。
    甘道夫守卫城门。阿拉贡在帕兰诺平原上战斗。
    洛汗骠骑南下——但他们能及时赶到吗？
  intro: |
    天空变暗。魔多大军如黑色潮水般铺满帕兰诺平原。
    攻城锤格隆德猛撞城门。巫王的堕落兽在头顶尖啸。
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        "格隆德！格隆德！格隆德！"攻城锤猛击米那斯提力斯
        城门。石头开裂。甘道夫骑着影疾奔来，法杖光芒闪耀。
    - trigger: on_turn_start
      turn: 7
      text: |
        北方传来号角声——深沉、浑厚，回荡在帕兰诺平原上。
        "洛汗来了！"伊欧默举起长矛。冲锋开始了。
    - trigger: on_unit_killed
      unit_id: u_r_witch_king_1
      text: |
        "吾非男儿。"巫王的王冠空空如也坠落在地。
        戒灵之首已不复存在。
    - trigger: on_unit_killed
      unit_id: u_b_gandalf_1
      text: |
        甘道夫的光芒熄灭。米那斯提力斯城门无人守卫。
        黑暗涌入城中。
    - trigger: on_unit_killed
      unit_id: u_r_mumakil_1
      text: |
        巨大的战象踉跄着，痛苦地嘶吼，然后轰然倒地。
        大地在一英里内都在震颤。
