  forts:
    # Minas Tirith gate — blue fort
    - {x: 0, y: 4, owner: blue}

terrain_types:
  city_wall:
    display_name: City Wall
    move_cost: 99
    defense_bonus: 0
    passable: false
    glyph: "#"
    color: white
    description: |
      The white walls of Minas Tirith. Seven tiers of stone, the
      greatest fortress of Men. Impassable except through the gate.
  rammas_wall:
    display_name: Rammas Echor
    move_cost: 99
    defense_bonus: 0
    passable: false
    glyph: "#"
    color: bright_black
    description: |
      The outer wall of the Pelennor — the Rammas Echor. Crumbling
      but still impassable except where the enemy has breached it.
      A forward defensive position if the defenders choose to hold it.

  ruins:
    display_name: Ruins
    move_cost: 2
    defense_bonus: 1
    glyph: "."
    color: bright_black
    description: |
      Ruined farmsteads and watchtowers on the Pelennor. Crumbling
      stone offers some cover.
  osgiliath_ruins:
    display_name: Osgiliath Ruins
    move_cost: 2
    defense_bonus: 2
    glyph: "%"
    color: bright_black
    description: |
      The shattered city of Osgiliath on the banks of the Anduin.
      Dense rubble provides strong defensive positions.
  marsh:
    display_name: Marsh
    move_cost: 3
    defense_bonus: 0
    glyph: "~"
    color: bright_green
    description: |
      Boggy ground along the southern Pelennor near the Harlond.
      Mud and standing water slow all movement.

unit_classes:
  # ═══════════════════════════════════════════════════════
  #  BLUE — Gondor & Rohan (7 units)
  # ═══════════════════════════════════════════════════════

  aragorn:
    display_name: Aragorn
    description: |
      Heir of Isildur, wielding the reforged Anduril. The greatest
      swordsman of the age, rallying the defenders of Gondor.
    hp_max: 32
    atk: 12
    defense: 7
    res: 5
    spd: 7
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "A"
    color: bright_cyan

  gandalf:
    display_name: Gandalf the White
    description: |
      The White Wizard. Returned from death, wielding Glamdring and
      the light of Anor. His staff blazes at the gate of Minas
      Tirith. Magic-class — damage mitigated by RES.
    hp_max: 28
    atk: 11
    defense: 4
    res: 9
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 3
    is_magic: true
    glyph: "G"
    color: bright_cyan

  eowyn:
    display_name: Éowyn
    description: |
      Shieldmaiden of Rohan, disguised as Dernhelm. "I am no man."
      Fast and deadly, driven by fierce courage.
    hp_max: 22
    atk: 10
    defense: 5
    res: 5
    spd: 8
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "E"
    color: bright_cyan

  eomer:
    display_name: Éomer
    description: |
      Marshal of the Riddermark. Heavy cavalry commander, furious in
      the charge. His spear shatters shields.
    hp_max: 26
    atk: 11
    defense: 6
    res: 3
    spd: 7
    move: 5
    rng_min: 1
    rng_max: 1
    glyph: "M"
    color: bright_cyan

  legolas:
    display_name: Legolas
    description: |
      Prince of the Woodland Realm. His bow never misses. Counting
      kills against Gimli while the world burns.
    hp_max: 20
    atk: 10
    defense: 4
    res: 4
    spd: 8
    move: 4
    rng_min: 2
    rng_max: 4
    glyph: "L"
    color: green

  gimli:
    display_name: Gimli
    description: |
      Son of Gloin. His axe speaks louder than his boasts.
      Heavily armored, devastating in melee.
    hp_max: 28
    atk: 11
    defense: 9
    res: 3
    spd: 3
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "D"
    color: yellow

  imrahil:
    display_name: Prince Imrahil
    description: |
      Prince of Dol Amroth, noblest of Gondor's lords. Commands the
      Swan Knights. A peerless lance and an unbreakable shield-wall.
    hp_max: 26
    atk: 9
    defense: 8
    res: 4
    spd: 5
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "I"
    color: cyan

  # ═══════════════════════════════════════════════════════
  #  RED — Mordor (9 units)
  # ═══════════════════════════════════════════════════════

  witch_king:
    display_name: Witch-King of Angmar
    description: |
      Lord of the Nazgul, greatest of Sauron's servants. Rides a
      fell beast above the battlefield — flying, ignores terrain
      movement costs. His presence breaks men's will.
      Magic-class — damage mitigated by RES.
    hp_max: 36
    atk: 13
    defense: 6
    res: 8
    spd: 5
    move: 5
    rng_min: 1
    rng_max: 2
    is_magic: true
    tags: [flying]
    glyph: "W"
    color: bright_red

  gothmog:
    display_name: Gothmog
    description: |
      Orc lieutenant of Minas Morgul. Ugly, cunning, and ruthless.
      Directs the siege with brutal efficiency.
    hp_max: 26
    atk: 10
    defense: 6
    res: 3
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "K"
    color: red

  guritz:
    display_name: Guritz
    description: |
      Olog-hai captain from the Black Gate. Towers over lesser trolls,
      clad in Mordor iron. Commands the siege engines.
    hp_max: 34
    atk: 12
    defense: 7
    res: 2
    spd: 2
    move: 2
    rng_min: 1
    rng_max: 1
    glyph: "T"
    color: bright_red

  suladan:
    display_name: Suladân
    description: |
      Serpent Lord of the Haradrim. A cunning general who leads his
      warriors from the south. Skilled with a curved blade.
    hp_max: 24
    atk: 9
    defense: 5
    res: 4
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "S"
    color: red

  mumakil:
    display_name: Mumakil
    description: |
      War-oliphaunt of the Haradrim, ridden by Mahûd war-chief Drâgh.
      A walking siege tower — massively armored, crushingly slow,
      nearly impossible to bring down.
    hp_max: 48
    atk: 14
    defense: 10
    res: 1
    spd: 1
    move: 2
    rng_min: 1
    rng_max: 1
    glyph: "O"
    color: bright_red

  zagdûf:
    display_name: Zagdûf
    description: |
      Orc siege captain from Gorgoroth. Operates Grond and the siege
      towers. Where he goes, walls fall.
    hp_max: 22
    atk: 9
    defense: 5
    res: 2
    spd: 3
    move: 3
    rng_min: 1
    rng_max: 2
    glyph: "Z"
    color: red

  khamul:
    display_name: Khamûl the Easterling
    description: |
      Second of the Nazgul, the Shadow of the East. Less powerful
      than the Witch-King but swift and relentless.
      Magic-class — damage mitigated by RES.
    hp_max: 28
    atk: 10
    defense: 5
    res: 7
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "N"
    color: bright_red

  gorbag:
    display_name: Gorbag
    description: |
      Orc captain from Minas Morgul. A vicious brawler who leads the
      orc vanguard. Fast for an orc, treacherous even by their standards.
    hp_max: 20
    atk: 8
    defense: 5
    res: 2
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "g"
    color: red

  shagrat:
    display_name: Shagrat
    description: |
      Uruk captain of Cirith Ungol. Thick-skinned, heavily armored,
      absolutely loyal to Sauron. A brutal frontline fighter.
    hp_max: 24
    atk: 9
    defense: 7
    res: 2
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "H"
    color: red

armies:
  blue:
    # Gandalf — at the gate, holding the line
    - {class: gandalf, pos: {x: 2, y: 4}}
    # Aragorn — forward on the Pelennor near the Rammas breach
    - {class: aragorn, pos: {x: 5, y: 4}}
    # Gimli — beside the gate, anchored
    - {class: gimli, pos: {x: 3, y: 5}}
    # Legolas — elevated position, raining arrows
    - {class: legolas, pos: {x: 3, y: 2}}
    # Prince Imrahil — mobile reserve, south sector
    - {class: imrahil, pos: {x: 4, y: 7}}
    # Éomer — cavalry arriving from the northwest
    - {class: eomer, pos: {x: 3, y: 0}}
    # Éowyn — with the Rohirrim, riding beside Éomer
    - {class: eowyn, pos: {x: 5, y: 1}}

  red:
    # Witch-King — airborne, circling over the center field
    - {class: witch_king, pos: {x: 15, y: 5}}
    # Gothmog — commanding the center push
    - {class: gothmog, pos: {x: 14, y: 4}}
    # Guritz (troll captain) — heading for the gate
    - {class: guritz, pos: {x: 16, y: 3}}
    # Zagduf — siege captain, targeting the gate
    - {class: zagdûf, pos: {x: 14, y: 2}}
    # Khamul — flanking from Osgiliath, northeastern approach
    - {class: khamul, pos: {x: 19, y: 3}}
    # Gorbag — vanguard scout, fast, central
    - {class: gorbag, pos: {x: 12, y: 7}}
    # Shagrat — armored advance, south of Rammas
    - {class: shagrat, pos: {x: 13, y: 6}}
    # Suladan — Haradrim commander, approaching from the far south
    - {class: suladan, pos: {x: 20, y: 13}}
    # Mumakil — super-tank from the deep south, slow advance
    - {class: mumakil, pos: {x: 18, y: 15}}

rules:
  max_turns: 14
  first_player: blue

plugin_hooks:
  on_turn_start:
    - rohirrim_reinforcement

win_conditions:
  # Gandalf dies -> blue loses (he's holding the gate).
  - {type: protect_unit, unit_id: u_b_gandalf_1, owning_team: blue}
  # Gandalf survives the turn cap -> Blue wins, the siege is broken.
  - {type: protect_unit_survives, unit_id: u_b_gandalf_1, owning_team: blue}
  # Red reaches the city gate -> red wins, Minas Tirith falls.
  - {type: reach_tile, team: red, pos: {x: 0, y: 4}}
  # Either side wins by total elimination.
  - {type: eliminate_all_enemy_units}
  # Backstop.
  - {type: max_turns_draw}

narrative:
  title: Battle of the Pelennor Fields
  description: |
    Minas Tirith, T.A. 3019. The forces of Mordor lay siege to the
    White City. Gandalf holds the gate. Aragorn fights on the
    Pelennor. Seven heroes against nine terrors of Mordor.
  intro: |
    The sky darkens. Mordor's host stretches across the Pelennor
    like a black tide. Grond hammers the gate. The Witch-King's
    fell beast screams overhead. The Mumakil shake the earth.
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        "Grond! Grond! Grond!" The battering ram strikes the gate
        of Minas Tirith. The stone cracks. Gandalf rides forward
        on Shadowfax, staff blazing.
    - trigger: on_turn_start
      turn: 5
      text: |
        A horn sounds from the north — deep, resonant, echoing
        across the Pelennor. "Rohan has come!" Éomer raises his
        spear. The charge begins.
    - trigger: on_unit_killed
      unit_id: u_r_witch_king_1
      text: |
        "I am no man." The Witch-King's crown clatters empty to
        the ground. The Lord of the Nazgul is no more.
    - trigger: on_unit_killed
      unit_id: u_b_gandalf_1
      text: |
        Gandalf's light goes out. The gate of Minas Tirith stands
        undefended. Darkness sweeps into the city.
    - trigger: on_unit_killed
      unit_id: u_r_mumakil_1
      text: |
        The great oliphaunt staggers, trumpeting in agony, then
        crashes to the earth. The ground shakes for a mile.
