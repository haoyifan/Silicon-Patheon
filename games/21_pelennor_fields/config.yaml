schema_version: 1
license: fan_work
fan_work_source: "The Lord of the Rings (J.R.R. Tolkien / Warner Bros.)"
name: "Pelennor Fields — Lord of the Rings"
difficulty: 5
description: |
  Minas Tirith, March 15, T.A. 3019. The forces of Mordor besiege
  the White City. The Witch-King of Angmar leads orcs, Haradrim, and
  a Mumakil against the walls of Gondor. Gandalf holds the gate while
  Aragorn rallies the defenders. If the siege breaks through, Middle-
  earth falls — unless the heroes can hold.
  Inspired by the Battle of the Pelennor Fields from The Lord of the Rings by J.R.R. Tolkien.

# ──────────────────────────────────────────────────────────
#  MAP LAYOUT  (24 wide x 16 tall)
#
#  y=0   # # . . . . . . . . . . . . . . . . % % % % % %   City wall + Osgiliath
#  y=1   # # . . . . . . . . . . . . . . . . % % % % % %   City wall + Osgiliath
#  y=2   # # . . . . . . . . . . . . . . . . % % % % % %   City wall + Osgiliath
#  y=3   # # . . . . . . . # # # . . . . . . . . . . . .   City wall + Rammas
#  y=4   . . . . . . . . . # . # . . . . . . . . . . . .   Gate + Rammas (breach)
#  y=5   # # . . . . . . . # # # . . . . . . . . . . . .   City wall + Rammas
#  y=6   # # . . . . . . . . . . . . . . . . . . . . . .   City wall
#  y=7   # # . . . . . . . . . . . . . . . . . . . . . .   City wall
#  y=8   # # . . . . . . . . . . . . . . . . . . . . . .   Open Pelennor
#  y=9   # # . . . . . . . . . . . . . . . . . . . . . .   Open Pelennor
#  y=10  # # . . . . . . . . . . . . . . . . . . . . . .   Open Pelennor
#  y=11  . . . . . . . . . . . . . . . . . . . . . . . .   Open field
#  y=12  . . . . . . . . . . . . . . . . . . . . . . . .   Harad approach
#  y=13  . . . . . . . . . . . . . . . . . . . . . . . .   Open south
#  y=14  ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ . . . . . . . . . .   Marsh / Harlond
#  y=15  ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ ~ . . . . . . . .   Marsh extends
# ──────────────────────────────────────────────────────────

