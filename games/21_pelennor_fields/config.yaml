    - {x: 21, y: 0, type: osgiliath_ruins}
    - {x: 22, y: 0, type: osgiliath_ruins}
    - {x: 23, y: 0, type: osgiliath_ruins}
    - {x: 18, y: 1, type: osgiliath_ruins}
    - {x: 19, y: 1, type: osgiliath_ruins}
    - {x: 20, y: 1, type: osgiliath_ruins}
    - {x: 21, y: 1, type: osgiliath_ruins}
    - {x: 22, y: 1, type: osgiliath_ruins}
    - {x: 23, y: 1, type: osgiliath_ruins}
    - {x: 18, y: 2, type: osgiliath_ruins}
