terrain_types:
  building:
    move_cost: 2
    defense_bonus: 3
    glyph: "#"
    color: yellow
    description: |
      Marineford plaza structures. Provide solid cover during
      the chaotic battle.
  ice:
    move_cost: 1
    defense_bonus: -1
    glyph: "="
    color: bright_blue
    description: |
      Frozen bay created by Admiral Aokiji. Slippery surface
      offers no cover — but the pirates can cross it.
  platform:
    move_cost: 1
    defense_bonus: 2
    glyph: "^"
    color: bright_yellow
    description: |
      The execution platform where Portgas D. Ace awaits death.
      Reaching this tile means freedom.

unit_classes:
  whitebeard:
    display_name: Edward Newgate (Whitebeard)
    description: |
      The Strongest Man in the World. His Gura Gura no Mi can
      shatter the air itself and create tsunamis. Old and sick,
      but still terrifying. One punch can crack the world.
    hp_max: 55
    atk: 15
    defense: 7
    res: 5
    spd: 3
    move: 2
    rng_min: 1
    rng_max: 2
    glyph: "W"
    color: white

  marco:
    display_name: Marco the Phoenix
    description: |
      First Division Commander. His phoenix flames heal his wounds
      and allies alike. Nearly impossible to kill — blue fire
      regenerates any damage.
    hp_max: 26
    atk: 10
    defense: 4
    res: 7
    spd: 7
    move: 5
    rng_min: 1
    rng_max: 2
    is_magic: true
    can_heal: true
    heal_amount: 5
    glyph: "M"
    color: bright_cyan

  jozu:
    display_name: Diamond Jozu
    description: |
      Third Division Commander. His body turns to diamond,
      making him nearly indestructible. The ultimate tank.
    hp_max: 35
    atk: 10
    defense: 12
    res: 2
    spd: 3
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "J"
    color: cyan

  vista:
    display_name: Vista
    description: |
      Fifth Division Commander. The Flower Swordsman who can
      match even Mihawk blade for blade. Fast and elegant.
    hp_max: 24
    atk: 11
    defense: 6
    res: 4
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "V"
    color: cyan

  whitebeard_commander:
    display_name: WB Commander
    description: |
      Division commanders of the Whitebeard Pirates. Each one
      is a formidable pirate captain in their own right.
    hp_max: 22
    atk: 9
    defense: 5
    res: 3
    spd: 5
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "p"
    color: cyan

  whitebeard_pirate:
    display_name: WB Pirate
    description: |
      Rank-and-file members of the Whitebeard fleet. Loyal to
      the old man unto death.
    hp_max: 18
    atk: 7
    defense: 4
    res: 2
    spd: 5
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "q"
    color: cyan

  akainu:
    display_name: Admiral Akainu
    description: |
      Sakazuki, the Magma Admiral. Absolute justice incarnate.
      His lava fists can burn through anything — even fire itself.
      The deadliest offensive force the Marines possess.
    hp_max: 38
    atk: 15
    defense: 6
    res: 5
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "A"
    color: bright_red

  aokiji:
    display_name: Admiral Aokiji
    description: |
      Kuzan, the Ice Admiral. Froze the entire bay so the pirates
      could cross — and the Marines could fight them on it. Lazy
      but lethally powerful at range.
    hp_max: 34
    atk: 12
    defense: 5
    res: 8
    spd: 5
    move: 3
    rng_min: 2
    rng_max: 3
    is_magic: true
    glyph: "O"
    color: bright_blue

  kizaru:
    display_name: Admiral Kizaru
    description: |
      Borsalino, the Light Admiral. Moves at the speed of light.
      The fastest man alive, firing laser beams from his fingertips
      with a bored expression.
    hp_max: 32
    atk: 11
    defense: 4
    res: 6
    spd: 9
    move: 5
    rng_min: 2
    rng_max: 3
    is_magic: true
    glyph: "K"
    color: bright_yellow

  sengoku:
    display_name: Fleet Admiral Sengoku
    description: |
      Sengoku the Buddha. The man who orchestrated Ace's execution
      to draw out Whitebeard. A strategic genius with the power
      of the Human-Human Fruit, Model: Buddha.
    hp_max: 30
    atk: 10
    defense: 7
    res: 7
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "S"
    color: red

  mihawk:
    display_name: Dracule Mihawk
    description: |
      The Greatest Swordsman in the World. Wields Yoru, the
      strongest black blade. Cuts through everything with casual
      elegance. Here as a Warlord, not by choice.
    hp_max: 28
    atk: 14
    defense: 5
    res: 4
    spd: 7
    move: 4
    rng_min: 1
    rng_max: 2
    glyph: "X"
    color: bright_black

  marine_captain:
    display_name: Marine Captain
    description: |
      Marine officers defending Marineford. Well-trained and
      disciplined, but outclassed by the New World pirates.
    hp_max: 20
    atk: 7
    defense: 6
    res: 3
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "m"
    color: red

  marine_soldier:
    display_name: Marine Soldier
    description: |
      Rank-and-file Marines. Brave but ordinary men facing
      monsters with Devil Fruit powers.
    hp_max: 16
    atk: 6
    defense: 5
    res: 2
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "n"
    color: red

  marine_medic:
    display_name: Marine Medic
    description: |
      A field medic attached to the Marine forces at Marineford.
      Keeps wounded Marines fighting through the chaos of battle.
    hp_max: 16
    atk: 5
    defense: 4
    res: 4
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    can_heal: true
    heal_amount: 5
    glyph: "h"
    color: red

