  red:
    # Akainu — guarding the plaza
    - {class: akainu, pos: {x: 9, y: 4}}
    # Aokiji — ranged support
    - {class: aokiji, pos: {x: 5, y: 2}}
    # Kizaru — fast flanker
    - {class: kizaru, pos: {x: 14, y: 2}}
    # Sengoku — near the execution platform
    - {class: sengoku, pos: {x: 9, y: 2}}
    # Mihawk — forward attacker
    - {class: mihawk, pos: {x: 9, y: 6}}
    # Marine captains — defensive line
    - {class: marine_captain, pos: {x: 2, y: 4}}
    - {class: marine_captain, pos: {x: 4, y: 4}}
    - {class: marine_captain, pos: {x: 7, y: 4}}
    - {class: marine_captain, pos: {x: 11, y: 4}}
    - {class: marine_captain, pos: {x: 13, y: 4}}
    - {class: marine_captain, pos: {x: 15, y: 4}}
    - {class: marine_captain, pos: {x: 3, y: 6}}
    - {class: marine_captain, pos: {x: 15, y: 6}}
    # Marine soldiers — front line
    - {class: marine_soldier, pos: {x: 5, y: 8}}
    - {class: marine_soldier, pos: {x: 8, y: 8}}
    - {class: marine_soldier, pos: {x: 11, y: 8}}
    - {class: marine_medic, pos: {x: 14, y: 8}}
    - {class: marine_soldier, pos: {x: 7, y: 6}}

rules:
  max_turns: 20
  first_player: blue

win_conditions:
  # A blue unit reaches the execution platform -> Ace is freed!
  - {type: reach_tile, team: blue, pos: {x: 9, y: 1}}
  # Whitebeard dies -> blue loses.
  - {type: protect_unit, unit_id: u_b_whitebeard_1, owning_team: blue}
  # Sengoku survives the turn cap -> Marines hold. Red wins.
  - {type: protect_unit_survives, unit_id: u_r_sengoku_1, owning_team: red}
  # Either side wins by total elimination.
  - {type: eliminate_all_enemy_units}
  # Backstop.
  - {type: max_turns_draw}

narrative:
  title: Marineford — Summit War
  description: |
    Marineford, the seat of Marine power. Whitebeard's fleet appears
    in the bay. The Summit War — the greatest battle of the era — begins.
  intro: |
    The frozen bay cracks and groans. Whitebeard's bisento slashes
    the air and the sea itself splits. Across the ice, the pirate
    fleet charges toward the execution platform where Ace kneels
    in chains. Three admirals rise to meet them.
  events:
    - trigger: on_turn_start
      turn: 5
      text: |
        Whitebeard tilts his bisento and punches the air. The
        quake ripples across Marineford — buildings crack, the
        ground splits. The Strongest Man in the World has entered
        the fray.
    - trigger: on_turn_start
      turn: 12
      text: |
        The plaza is chaos. Pirates and Marines clash across
        every inch of frozen bay and crumbling stone. The
        execution platform looms above it all.
    - trigger: on_unit_killed
      unit_id: u_b_whitebeard_1
      text: |
        The old man falls — but standing, his back unbowed. Even
        in death, Edward Newgate does not retreat a single step.
