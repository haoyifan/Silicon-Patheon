schema_version: 1
name: Red Cliffs
description: |
  Winter, 208 AD. The Han dynasty is collapsing. Cao Cao has united
  the north under his banner and brings 800,000 men (he claims) and
  a massive fleet down the Yangtze to crush the southern warlords
  Sun Quan and Liu Bei. The two southerners ally. Their joint
  strategist Zhuge Liang predicts an east wind. Their veteran admiral
  Huang Gai feigns defection — letting his fire ships drift toward
  Cao Cao's chained northern fleet on a borrowed wind. The Yangtze
  burns through the night and most of Cao Cao's army with it. The
  Three Kingdoms era begins for real.

