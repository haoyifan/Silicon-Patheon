  height: 10
  terrain:
    # The Yangtze fills the middle four rows.
    - {x: 0, y: 3, type: river}
    - {x: 1, y: 3, type: river}
    - {x: 2, y: 3, type: river}
    - {x: 3, y: 3, type: river}
    - {x: 4, y: 3, type: river}
    - {x: 5, y: 3, type: river}
    - {x: 6, y: 3, type: river}
    - {x: 7, y: 3, type: river}
    - {x: 8, y: 3, type: river}
    - {x: 9, y: 3, type: river}
    - {x: 15, y: 3, type: river}
    - {x: 16, y: 3, type: river}
    - {x: 17, y: 3, type: river}
    - {x: 0, y: 5, type: river}
    - {x: 1, y: 5, type: river}
    - {x: 2, y: 5, type: river}
    - {x: 3, y: 5, type: river}
    - {x: 4, y: 5, type: river}
    - {x: 5, y: 5, type: river}
    - {x: 6, y: 5, type: river}
    - {x: 7, y: 5, type: river}
    - {x: 8, y: 5, type: river}
    - {x: 9, y: 5, type: river}
    - {x: 15, y: 5, type: river}
    - {x: 16, y: 5, type: river}
    - {x: 17, y: 5, type: river}
    - {x: 0, y: 6, type: river}
    - {x: 1, y: 6, type: river}
    - {x: 2, y: 6, type: river}
    - {x: 3, y: 6, type: river}
    - {x: 4, y: 6, type: river}
    - {x: 5, y: 6, type: river}
    - {x: 6, y: 6, type: river}
    - {x: 7, y: 6, type: river}
    - {x: 8, y: 6, type: river}
    - {x: 9, y: 6, type: river}
    - {x: 15, y: 6, type: river}
    - {x: 16, y: 6, type: river}
    - {x: 17, y: 6, type: river}
    # Cao Cao's chained fleet — a row of ship tiles spanning x=10..14
    # at y=4 and y=5. Walkable for red, blocking for blue. The
    # fire-spread plugin will mutate them into "burning_ship" tiles.
    - {x: 10, y: 4, type: ship}
    - {x: 11, y: 4, type: ship}
    - {x: 12, y: 4, type: ship}
    - {x: 13, y: 4, type: ship}
    - {x: 14, y: 4, type: ship}
    - {x: 10, y: 5, type: ship}
    - {x: 11, y: 5, type: ship}
    - {x: 12, y: 5, type: ship}
    - {x: 13, y: 5, type: ship}
    - {x: 14, y: 5, type: ship}
  forts: []

terrain_types:
  river:
    move_cost: 99
    passable: false
    glyph: "~"
    color: blue
  ship:
    # Cao Cao's chained ships — walkable to north troops only.
    move_cost: 1
    passable: true
    glyph: "M"
    color: yellow
    class_overrides:
      huang_gai:
        passable: true
      zhou_yu:
        passable: false
      guan_yu:
        passable: false
      zhuge_liang:
        passable: false
      wu_archer:
        passable: false

unit_classes:
  zhuge_liang:
    display_name: Zhuge Liang
    description: |
      Strategist and proto-Daoist sage. The man who "borrows the
      east wind" — calls the weather change that makes the fire
      attack possible. Magical attack profile reflects his ritual
      role in this battle.
    hp_max: 22
    atk: 6
    defense: 4
    res: 8
    spd: 6
    rng_min: 1
    rng_max: 2
    move: 4
    is_magic: true
    tags: [strategist, magic, vip]
    sight: 5
    glyph: Z
    color: bright_cyan

  zhou_yu:
    display_name: Zhou Yu
    description: |
      Sun Quan's young admiral and the actual battlefield commander
      of the alliance. Brilliant, beautiful, jealous of Zhuge Liang.
    hp_max: 30
    atk: 10
    defense: 6
    res: 4
    spd: 7
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [hero, admiral]
    sight: 4
    glyph: Y
    color: cyan

  guan_yu:
    display_name: Guan Yu
    description: |
      Liu Bei's sworn brother — godlike warrior, two-meter beard,
      green dragon crescent blade. Worth a small army on his own.
      Later deified as the Chinese god of war.
    hp_max: 42
    atk: 13
    defense: 7
    res: 4
    spd: 6
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [hero, legend]
    sight: 4
    glyph: G
    color: cyan

  huang_gai:
    display_name: Huang Gai
    description: |
      Sun Quan's veteran admiral. Volunteers for the suicide ploy:
      take a beating from Zhou Yu in public so Cao Cao believes his
      defection is real, then sail straight at the chained fleet
      with ships full of oil and reeds. Stay adjacent to a ship
      tile from turn 5 to set the fire.
    hp_max: 26
    atk: 9
    defense: 5
    res: 3
    spd: 6
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [hero, fire_lighter]
    sight: 4
    glyph: U
    color: bright_yellow

  wu_archer:
    display_name: Wu Archer
    description: |
      Sun Quan's bowmen — riverside levies who've trained their
      whole lives shooting from rocking decks.
    hp_max: 16
    atk: 9
    defense: 2
    res: 3
    spd: 5
    rng_min: 2
    rng_max: 3
    move: 4
    tags: [archer]
    sight: 4
    glyph: A
    color: cyan

  cao_cao:
    display_name: Cao Cao
    description: |
      Chancellor of Han. Brilliant administrator, ruthless general,
      eventual founder of Wei. Has chained his ships together so
      his northern troops don't get seasick. About to learn the
      cost of that engineering decision.
    hp_max: 36
    atk: 11
    defense: 7
    res: 5
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [vip, chancellor]
    sight: 5
    glyph: C
    color: bright_red

  cao_guard:
    display_name: Tiger Guard
    description: |
      Cao Cao's elite household troops. Best soldiers north of
      the Yellow River.
    hp_max: 26
    atk: 9
    defense: 6
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [elite, guard]
    sight: 3
    glyph: T
    color: red

  northern_infantry:
    display_name: Northern Infantry
    description: |
      Conscripts from the central plains. Don't know how to swim.
      Don't want to be on a boat.
    hp_max: 18
    atk: 7
    defense: 4
    res: 2
    spd: 4
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry]
    sight: 3
    glyph: N
    color: red

armies:
  blue:
    # Alliance staging on the south bank.
    - {class: zhuge_liang, pos: {x: 4, y: 8}}
    - {class: zhou_yu, pos: {x: 5, y: 8}}
    - {class: guan_yu, pos: {x: 6, y: 8}}
    - {class: huang_gai, pos: {x: 9, y: 7}}
    - {class: wu_archer, pos: {x: 3, y: 8}}
    - {class: wu_archer, pos: {x: 7, y: 8}}
    - {class: wu_archer, pos: {x: 4, y: 9}}
    - {class: wu_archer, pos: {x: 5, y: 9}}
    - {class: wu_archer, pos: {x: 6, y: 9}}
    - {class: wu_archer, pos: {x: 8, y: 8}}
  red:
    # Cao Cao's command on the north bank, troops on the chained
    # fleet.
    - {class: cao_cao, pos: {x: 12, y: 1}}
    - {class: cao_guard, pos: {x: 11, y: 2}}
    - {class: cao_guard, pos: {x: 12, y: 2}}
    - {class: cao_guard, pos: {x: 13, y: 2}}
    - {class: northern_infantry, pos: {x: 10, y: 4}}
    - {class: northern_infantry, pos: {x: 11, y: 4}}
    - {class: northern_infantry, pos: {x: 12, y: 4}}
    - {class: northern_infantry, pos: {x: 13, y: 4}}
    - {class: northern_infantry, pos: {x: 14, y: 4}}
    - {class: northern_infantry, pos: {x: 10, y: 5}}
    - {class: northern_infantry, pos: {x: 11, y: 5}}
    - {class: northern_infantry, pos: {x: 12, y: 5}}
    - {class: northern_infantry, pos: {x: 13, y: 5}}
    - {class: northern_infantry, pos: {x: 14, y: 5}}

rules:
  max_turns: 25
  fog_of_war: false
  first_player: blue

win_conditions:
  - {type: protect_unit, unit_id: u_r_cao_cao_1, owning_team: red}
  - {type: eliminate_all_enemy_units}
  - {type: max_turns_draw}

plugin_hooks:
  on_turn_start:
    - light_fire

narrative:
  title: Red Cliffs
  description: |
    The fire attack at Chibi. The night the Yangtze burned and the
    Three Kingdoms era began.
  intro: |
    Dusk on the Yangtze. The wind has been blowing west from the
    sea for weeks; Cao Cao's chained fleet rocks in the chop. Zhuge
    Liang lights an incense stick and waits. Huang Gai's signal
    flag goes up.
  events:
    - trigger: on_turn_start
      turn: 5
      text: "The wind turns east. Zhuge Liang smiles: 'It is time.'"
    - trigger: on_turn_start
      turn: 7
      text: "Huang Gai's lead fire ship rams the chain. Flames leap to the next deck."
    - trigger: on_turn_start
      turn: 12
      text: "The river is bright as noon. Cao Cao's army screams in the smoke."
    - trigger: on_unit_killed
      unit_id: u_r_cao_cao_1
      text: "Cao Cao falls. The north shatters."
