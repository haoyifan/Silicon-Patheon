# 赤壁之战 — 中文本地化
name: 赤壁之战 — 公元208年，三国
description: |
  建安十三年冬。汉室倾颓，曹操统一北方，号称八十万大军
  顺长江而下，欲一举灭吴并刘。孙权与刘备结盟，联合军师
  诸葛亮预言东风将至。老将黄盖诈降——驾满载油脂芦苇的
  火船，借东风直冲曹操铁索连环的北方舰队。长江上火光照天，
  曹军大半葬身火海。三国鼎立之势由此奠定。

unit_classes:
  zhuge_liang:
    display_name: 诸葛亮
    description: |
      卧龙先生，蜀汉军师。"借东风"之人——祭坛祈风，
      使火攻得以实施。法术型角色。
  zhou_yu:
    display_name: 周瑜
    description: |
      孙权麾下年轻的大都督，联军实际战场指挥官。
      才华横溢，风度翩翩，与诸葛亮暗中较劲。
  huang_gai:
    display_name: 黄盖
    description: |
      孙权帐下老将。主动请缨执行苦肉计：当众被周瑜
      杖打，使曹操相信他的投降是真的，然后驾火船
      直冲铁索连环的战舰。
  cao_cao:
    display_name: 曹操
    description: |
      汉丞相。才略过人，雄才大略，魏国奠基人。下令将
      战船铁索连环以防北方士兵晕船。即将为这个工程决策
      付出代价。
  lu_su:
    display_name: 鲁肃
    description: |
      孙权麾下首席外交官，促成孙刘联盟。性格沉稳，
      既是可靠的谋士也是合格的战士。联盟的粘合剂。
  gan_ning:
    display_name: 甘宁
    description: |
      海贼出身的吴国猛将。铠甲上系着铃铛，冲锋时
      叮当作响。擅长夜袭和接舷战，作战勇猛无畏。
  cheng_pu:
    display_name: 程普
    description: |
      三朝元老——先后侍奉孙坚、孙策、孙权。
      经验丰富的老将，铁矛在手沉稳如山。
  xiahou_dun:
    display_name: 夏侯惇
    description: |
      曹操最忠诚的将领，独眼将军。箭射入眼窝后
      拔箭吞睛，悍勇无比，对主公誓死效忠。
  zhang_liao:
    display_name: 张辽
    description: |
      曾为吕布部将，后归曹操，成为其麾下最出色的将领。
      日后以八百破十万威震合肥。战术天才，武艺超群。
  cao_ren:
    display_name: 曹仁
    description: |
      曹操族弟，擅长防御战。指挥北岸后卫部队。
      盾阵森严，纪律严明。
  xu_huang:
    display_name: 徐晃
    description: |
      曹操帐下可靠的持斧将军。冷静、职业、致命。
      守卫舰队北翼。
  cai_mao:
    display_name: 蔡瑁
    description: |
      荆州水军都督，训练曹操北方士兵水上作战。
      后被曹操以通敌嫌疑处斩——但在本场景中仍统领舰队。
  northern_archer:
    display_name: 北方弓弩手
    description: |
      中原弩手。在铁索连环的稳固甲板上射击精准。
      不会游泳。

terrain_types:
  river:
    display_name: 长江
    description: |
      滔滔长江——不可通行。
  ship:
    display_name: 铁索连环战船
    description: |
      曹操铁索连环的战船——北军可在其上行走。
  wind:
    display_name: 东风
    description: |
      借来的东风。站在此处的单位攻击力+2。
  fire_ship:
    display_name: 火攻区
    description: |
      黄盖的进攻路线。甲板浸透了油脂、堆满了引火物。
      此处的单位暴露在火焰中。防御-2。
  small_boat:
    display_name: 舢板
    description: |
      小型江上舢板——勉强能站稳，只能单人通行。
      移动消耗2点。毫无掩护。
  palisade:
    display_name: 栅栏
    description: |
      北岸的木栅栏工事。曹操后卫在此掩护。防御+2。
  command_tent:
    display_name: 中军大帐
    description: |
      曹操的中军大帐。魏旗飘扬。周围路障提供防御+1。
  altar:
    display_name: 七星坛
    description: |
      诸葛亮借东风的七星祭坛。石台上燃着火盆。
      防御+1，攻击+1。
  woods:
    display_name: 岸边林地
    description: |
      南岸茂密的树林。吴军利用林木掩护集结突击。
      防御+2，移动消耗2点。

narrative:
  title: 赤壁之战
  description: |
    赤壁火攻。长江燃烧的那一夜，三国时代由此开启。
  intro: |
    长江之上，暮色降临。数周以来西风从海上吹来，
    曹操铁索连环的舰队在江面上起伏。诸葛亮点燃
    一柱清香，静待天时。黄盖的信号旗升起了。
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        旗帜微动。东南方传来一阵风。诸葛亮在祭坛上睁开眼睛：
        "风向已转。"周瑜拔剑："给黄盖发信号。全军——进攻！"
    - trigger: on_turn_start
      turn: 5
      text: |
        东风呼啸。黄盖的火船扬满帆疾冲而出，船头已起火舌。
        曹军瞭望兵高声示警，可铁索连环的舰队无法四散。
    - trigger: on_turn_start
      turn: 8
      text: |
        黄盖的火船撞上铁链。火焰顺着铁链从一艘船跃向另一艘。
        长江自身仿佛在燃烧。士兵跳入黑水，在重甲中沉没。
    - trigger: on_turn_start
      turn: 14
      text: |
        江面亮如白昼。曹操大军在浓烟中哀嚎。
        铁索连环——他最得意的创新——如今成了他的葬身柴堆。
    - trigger: on_unit_killed
      unit_id: u_r_cao_cao_1
      text: |
        曹操在燃烧的甲板上倒下。统一北方的丞相，死于长江之上。
        三国鼎立由此开始。
