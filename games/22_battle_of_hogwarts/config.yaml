terrain_types:
  forest:
    move_cost: 1
    defense_bonus: 2
    glyph: "f"
    color: green
    description: |
      The Forbidden Forest. Dense trees provide cover but harbour
      dark creatures loyal to Voldemort.
  stone_wall:
    move_cost: 1
    defense_bonus: 0
    passable: false
    glyph: "#"
    color: white
    description: |
      Ancient Hogwarts castle walls, enchanted for centuries.
      Impassable barrier.

unit_classes:
  harry:
    display_name: Harry Potter
    description: |
      The Boy Who Lived. Master of the Elder Wand, bearer of the
      Invisibility Cloak, and the only one who can end Voldemort.
    hp_max: 28
    atk: 11
    defense: 3
    res: 8
    spd: 6
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "H"
    color: bright_yellow

  hermione:
    display_name: Hermione Granger
    description: |
      The brightest witch of her age. Her vast spell repertoire
      and quick thinking have saved Harry countless times.
    hp_max: 22
    atk: 10
    defense: 3
    res: 9
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "h"
    color: yellow

  ron:
    display_name: Ron Weasley
    description: |
      Harry's best friend. Loyal, brave when it counts, and
      surprisingly resourceful under pressure.
    hp_max: 22
    atk: 9
    defense: 4
    res: 6
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "R"
    color: bright_red

  mcgonagall:
    display_name: Minerva McGonagall
    description: |
      Deputy Headmistress and Transfiguration master. Animates
      the castle's stone guardians and duels with lethal precision.
    hp_max: 26
    atk: 12
    defense: 4
    res: 8
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 3
    is_magic: true
    glyph: "M"
    color: green

  neville:
    display_name: Neville Longbottom
    description: |
      Once the timid boy who lost his toad. Now he wields the
      Sword of Gryffindor and stands against the Dark Lord himself.
    hp_max: 24
    atk: 9
    defense: 6
    res: 5
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    is_magic: true
    glyph: "N"
    color: green

  kingsley:
    display_name: Kingsley Shacklebolt
    description: |
      Senior Auror and Order member. Calm, powerful, and deadly
      accurate with both shield charms and offensive spells.
    hp_max: 26
    atk: 11
    defense: 5
    res: 7
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "K"
    color: cyan

  da_member:
    display_name: DA Member
    description: |
      Student mages from Dumbledore's Army, trained in secret by
      Harry. Young but determined defenders of their school.
    hp_max: 18
    atk: 7
    defense: 3
    res: 5
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "d"
    color: cyan

  order_member:
    display_name: Order Member
    description: |
      Adult witches and wizards of the Order of the Phoenix.
      Experienced fighters against the Dark Arts.
    hp_max: 22
    atk: 9
    defense: 4
    res: 6
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "o"
    color: white

  pomfrey:
    display_name: Madam Pomfrey
    description: |
      Hogwarts matron and master healer. She has mended every bone
      Harry has ever broken. Tonight she tends the wounded in the
      Great Hall — and fights when she must.
    hp_max: 16
    atk: 5
    defense: 2
    res: 7
    spd: 3
    move: 3
    rng_min: 1
    rng_max: 1
    is_magic: true
    can_heal: true
    heal_amount: 7
    glyph: "P"
    color: white

  voldemort:
    display_name: Lord Voldemort
    description: |
      The Dark Lord. Tom Marvolo Riddle. The most feared dark
      wizard in history, wielding the Killing Curse with casual ease.
    hp_max: 40
    atk: 14
    defense: 3
    res: 10
    spd: 6
    move: 3
    rng_min: 1
    rng_max: 3
    is_magic: true
    glyph: "V"
    color: bright_red

  bellatrix:
    display_name: Bellatrix Lestrange
    description: |
      Voldemort's most devoted follower. Unhinged, sadistic, and
      terrifyingly skilled. Killed Sirius Black and tortured the
      Longbottoms into madness.
    hp_max: 24
    atk: 13
    defense: 2
    res: 6
    spd: 7
    move: 4
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "B"
    color: magenta

  nagini:
    display_name: Nagini
    description: |
      Voldemort's great serpent and final Horcrux. While she lives,
      the Dark Lord cannot truly be defeated. Neville must destroy her.
    hp_max: 16
    atk: 6
    defense: 2
    res: 3
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "S"
    color: green

  death_eater:
    display_name: Death Eater
    description: |
      Masked followers of the Dark Lord. Dark wizards who revel
      in cruelty and the Unforgivable Curses.
    hp_max: 20
    atk: 8
    defense: 3
    res: 5
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "x"
    color: bright_black

  snatcher:
    display_name: Snatcher
    description: |
      Low-level thugs who hunt Muggle-borns for bounties. Weak
      and cowardly, but numerous.
    hp_max: 14
    atk: 6
    defense: 3
    res: 2
    spd: 5
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "s"
    color: dim

  giant:
    display_name: Giant
    description: |
      Massive brutes swayed to Voldemort's cause. Devastating in
      melee but dim-witted and slow.
    hp_max: 45
    atk: 12
    defense: 6
    res: 1
    spd: 2
    move: 2
    rng_min: 1
    rng_max: 1
    glyph: "G"
    color: bright_red

armies:
  blue:
    # Harry — in the courtyard
    - {class: harry, pos: {x: 7, y: 8}}
    # Hermione and Ron — flanking Harry
    - {class: hermione, pos: {x: 6, y: 8}}
    - {class: ron, pos: {x: 8, y: 8}}
    # McGonagall — commanding from near the gate
    - {class: mcgonagall, pos: {x: 7, y: 9}}
    # Neville — near the gate, ready to face Nagini
    - {class: neville, pos: {x: 6, y: 9}}
    # Kingsley — defending the courtyard
    - {class: kingsley, pos: {x: 9, y: 8}}
    # DA members — spread across the courtyard
    - {class: da_member, pos: {x: 4, y: 7}}
    - {class: da_member, pos: {x: 5, y: 7}}
    - {class: da_member, pos: {x: 8, y: 7}}
    - {class: da_member, pos: {x: 9, y: 7}}
    - {class: da_member, pos: {x: 10, y: 7}}
    - {class: pomfrey, pos: {x: 11, y: 7}}
    # Order members — rear guard inside castle
    - {class: order_member, pos: {x: 3, y: 9}}
    - {class: order_member, pos: {x: 5, y: 8}}
    - {class: order_member, pos: {x: 10, y: 9}}
    - {class: order_member, pos: {x: 10, y: 8}}

  red:
    # Voldemort — commanding from the forest edge
    - {class: voldemort, pos: {x: 7, y: 1}}
    # Bellatrix — beside her master
    - {class: bellatrix, pos: {x: 6, y: 1}}
    # Nagini — protected near Voldemort
    - {class: nagini, pos: {x: 8, y: 1}}
    # Death Eaters — main assault force
    - {class: death_eater, pos: {x: 2, y: 2}}
    - {class: death_eater, pos: {x: 4, y: 2}}
    - {class: death_eater, pos: {x: 5, y: 3}}
    - {class: death_eater, pos: {x: 6, y: 3}}
    - {class: death_eater, pos: {x: 8, y: 3}}
    - {class: death_eater, pos: {x: 9, y: 3}}
    - {class: death_eater, pos: {x: 10, y: 2}}
    - {class: death_eater, pos: {x: 12, y: 2}}
    - {class: death_eater, pos: {x: 7, y: 4}}
    # Snatchers — flanking force
    - {class: snatcher, pos: {x: 1, y: 3}}
    - {class: snatcher, pos: {x: 3, y: 4}}
    - {class: snatcher, pos: {x: 11, y: 4}}
    - {class: snatcher, pos: {x: 13, y: 3}}
    # Giants — slow heavy hitters
    - {class: giant, pos: {x: 3, y: 0}}
    - {class: giant, pos: {x: 11, y: 0}}

rules:
  max_turns: 22
  first_player: red

win_conditions:
  # Harry dies -> blue loses immediately.
  - {type: protect_unit, unit_id: u_b_harry_1, owning_team: blue}
  # Voldemort dies -> red loses (blue wins).
  - {type: protect_unit, unit_id: u_r_voldemort_1, owning_team: red}
  # Nagini dies -> red loses (both VIPs must die for full victory,
  # but mechanically killing either VIP ends the game).
  - {type: protect_unit, unit_id: u_r_nagini_1, owning_team: red}
  # Either side wins by total elimination.
  - {type: eliminate_all_enemy_units}
  # Backstop.
  - {type: max_turns_draw}

narrative:
  title: Battle of Hogwarts
  description: |
    Hogwarts, May 1998. Lord Voldemort's forces lay siege to the
    ancient school. Harry Potter and the defenders — students,
    teachers, and Order members — make their final stand.
  intro: |
    The protective enchantments shatter. Death Eaters pour from the
    Forbidden Forest. Giants lumber toward the walls. Inside,
    students grip their wands and prepare to fight for their school,
    their friends, and the wizarding world.
  events:
    - trigger: on_turn_start
      turn: 5
      text: |
        Spells light up the night sky like fireworks. The castle
        trembles as giants batter the walls. Stone guardians march
        to meet them.
    - trigger: on_turn_start
      turn: 12
      text: |
        The defenders are being pushed back. Voldemort's voice
        echoes across the grounds: "Give me Harry Potter, and
        none shall be harmed."
    - trigger: on_unit_killed
      unit_id: u_r_nagini_1
      text: |
        Neville swings the Sword of Gryffindor. Nagini's head
        separates from her body. The last Horcrux is destroyed.
        Voldemort screams.
    - trigger: on_unit_killed
      unit_id: u_r_voldemort_1
      text: |
        The Dark Lord's own Killing Curse rebounds. Tom Riddle's
        body crumples, mortal and mundane. It is over.
