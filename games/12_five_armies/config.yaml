rules:
  max_turns: 30
  fog_of_war: false
  first_player: red

win_conditions:
  - {type: protect_unit, unit_id: u_b_thorin_1, owning_team: blue}
  - {type: protect_unit, unit_id: u_r_bolg_1, owning_team: red}
  # Red wins by seizing the Lonely Mountain gate.
  - {type: seize_enemy_fort}
  - {type: eliminate_all_enemy_units}
  - {type: max_turns_draw}

plugin_hooks:
  on_turn_start:
    - second_goblin_wave
    - eagles_arrive
    - beorn_arrives

narrative:
  title: Battle of the Five Armies
  description: |
    Dwarves, elves, and men against goblins and wargs at the foot
    of the Lonely Mountain — with surprise reinforcements from the
    sky and the wood.
  intro: |
    Morning at the foot of Erebor. Three peoples stand on the
    edge of war with each other. A horn from the north stops them
    all in their tracks: goblins, in their tens of thousands.
  events:
    - trigger: on_turn_start
      turn: 5
      text: "More goblins pour from the mountain gates."
    - trigger: on_turn_start
      turn: 15
      text: "A great cry rings out: 'The Eagles! The Eagles are coming!'"
    - trigger: on_turn_start
      turn: 18
      text: "Beorn in bear form bursts from the south, rending wargs aside."
    - trigger: on_unit_killed
      unit_id: u_b_thorin_1
      text: "Thorin has fallen. The dragon-sickness ends with him."
    - trigger: on_unit_killed
      unit_id: u_r_bolg_1
      text: "Bolg of the North is dead. The goblin host wavers."
