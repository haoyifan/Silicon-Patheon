schema_version: 1
license: fan_work
fan_work_source: "Game of Thrones (George R.R. Martin / HBO)"
name: "The Long Night — Game of Thrones"
difficulty: 5
description: |
  Winterfell, 305 AC. The Army of the Dead marches south. Seven defenders
  of the living — Jon Snow, Daenerys, Arya, the Hound, Jorah, Brienne,
  and Theon — hold Winterfell against eight horrors of the dead led by
  the Night King and his undead dragon Viserion. The only way to end it:
  kill the Night King. Survive twelve turns and dawn comes.
  Inspired by the Long Night from Game of Thrones by George R.R. Martin.

#  MAP LAYOUT  (10 wide × 10 tall, y=0 is north)
#
#  y=0-1  Dark plains (open ground, Dead staging area)
#  y=2    Frozen lake (high move cost, slippery)
#  y=3-4  Open field / approach
#  y=5    Fire trench (impassable — gaps at x=2 and x=7)
#  y=6-7  Godswood forest (center), courtyard flanks
#  y=8-9  Winterfell walls (y=8, +3 DEF — gate at x=4,5)
#         Heart tree at (5, 7) — Red's reach_tile target

board:
  width: 10
  height: 10
  terrain:
    # ── Dark plains (y=0-1) — open, no special terrain ──

    # ── Frozen lake (y=2) — slippery, high move cost ──
    - {x: 2, y: 2, type: frozen_lake}
    - {x: 3, y: 2, type: frozen_lake}
    - {x: 4, y: 2, type: frozen_lake}
    - {x: 5, y: 2, type: frozen_lake}
    - {x: 6, y: 2, type: frozen_lake}
    - {x: 7, y: 2, type: frozen_lake}

    # ── Fire trench (y=5) — impassable, gaps at x=2 and x=7 ──
    - {x: 0, y: 5, type: fire_trench}
    - {x: 1, y: 5, type: fire_trench}
    # gap at x=2
    - {x: 3, y: 5, type: fire_trench}
    - {x: 4, y: 5, type: fire_trench}
    - {x: 5, y: 5, type: fire_trench}
    - {x: 6, y: 5, type: fire_trench}
    # gap at x=7
    - {x: 8, y: 5, type: fire_trench}
    - {x: 9, y: 5, type: fire_trench}

    # ── Godswood forest (y=6-7, center) ──
    - {x: 3, y: 6, type: godswood}
    - {x: 4, y: 6, type: godswood}
    - {x: 5, y: 6, type: godswood}
    - {x: 6, y: 6, type: godswood}
    - {x: 3, y: 7, type: godswood}
    - {x: 4, y: 7, type: godswood}
    - {x: 5, y: 7, type: godswood}  # Heart tree tile
    - {x: 6, y: 7, type: godswood}

    # ── Winterfell walls (y=8) — +3 DEF, gate at x=4,5 ──
    - {x: 0, y: 8, type: winterfell_wall}
    - {x: 1, y: 8, type: winterfell_wall}
    - {x: 2, y: 8, type: winterfell_wall}
    - {x: 3, y: 8, type: winterfell_wall}
    # gate at x=4,5 — no wall
    - {x: 6, y: 8, type: winterfell_wall}
    - {x: 7, y: 8, type: winterfell_wall}
    - {x: 8, y: 8, type: winterfell_wall}
    - {x: 9, y: 8, type: winterfell_wall}
  forts: []

terrain_types:
  frozen_lake:
    display_name: Frozen Lake
    description: |
      A sheet of cracked ice. Treacherous footing — costs 3 movement
      to cross. No defensive benefit on the open ice.
    move_cost: 3
    defense_bonus: 0
    glyph: "~"
    color: bright_blue

  fire_trench:
    display_name: Fire Trench
    description: |
      A ditch filled with pitch and set ablaze. Impassable — the dead
      must find a gap or be funneled through the breaches.
    move_cost: 99
    defense_bonus: 0
    passable: false
    glyph: "="
    color: yellow

  godswood:
    display_name: Godswood
    description: |
      Ancient weirwood forest, sacred to the Old Gods. Dense canopy
      provides cover. +2 DEF, costs 2 movement.
    move_cost: 2
    defense_bonus: 2
    glyph: "T"
    color: red

  winterfell_wall:
    display_name: Winterfell Wall
    description: |
      The ancient granite walls of Winterfell. Grants +3 DEF to any
      defender standing on the battlements.
    move_cost: 2
    defense_bonus: 3
    glyph: "#"
    color: white

unit_classes:
  # ═══════════════════════════════════════════════
  #  BLUE — The Living (7 units)
  # ═══════════════════════════════════════════════

  jon_snow:
    display_name: Jon Snow
    description: |
      The White Wolf, King in the North. Wields Longclaw, Valyrian
      steel that shatters White Walkers on contact. A balanced
      fighter — solid offense, good defense, decent speed.
    hp_max: 35
    atk: 12
    defense: 8
    res: 5
    spd: 7
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "J"
    color: white

  daenerys:
    display_name: Daenerys Targaryen
    description: |
      The Dragon Queen rides Drogon above the battlefield, raining
      fire on the dead. Long-range magic damage mitigated by RES.
      Fragile if caught on the ground.
    hp_max: 28
    atk: 14
    defense: 3
    res: 6
    spd: 5
    move: 5
    rng_min: 2
    rng_max: 4
    is_magic: true
    tags: [dragon, flying]
    glyph: "D"
    color: bright_cyan

  arya:
    display_name: Arya Stark
    description: |
      No One. Trained by the Faceless Men of Braavos. She carries the
      catspaw dagger — Valyrian steel — and moves like a shadow. SPD 10
      lets her double every enemy; MOVE 5 lets her slip through gaps;
      HP 16 means one mistake and she's dead. Get her to the Night King
      and the war ends with a single thrust.
    hp_max: 16
    atk: 14
    defense: 3
    res: 5
    spd: 10
    move: 5
    rng_min: 1
    rng_max: 1
    tags: [assassin, stealth]
    glyph: "A"
    color: white

  the_hound:
    display_name: The Hound
    description: |
      Sandor Clegane. A brutal, towering warrior who hates fire but
      fights through it anyway. Massive HP pool and high ATK make him
      the living's best frontline tank.
    hp_max: 40
    atk: 11
    defense: 9
    res: 3
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 1
    tags: [tank]
    glyph: "H"
    color: yellow

  jorah:
    display_name: Jorah Mormont
    description: |
      Ser Jorah the Andal, loyal to the last breath. Wields Heartsbane,
      a Valyrian steel sword gifted by Sam Tarly. Stays close to his
      queen and protects her from anything that gets past the line.
    hp_max: 28
    atk: 10
    defense: 8
    res: 4
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 1
    tags: [bodyguard]
    glyph: "I"
    color: white

  brienne:
    display_name: Brienne of Tarth
    description: |
      Ser Brienne, newly knighted. The finest sword in Westeros,
      armored head to toe. A defensive knight who excels at holding
      chokepoints — high DEF, strong counterattack potential.
    hp_max: 30
    atk: 10
    defense: 10
    res: 4
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 1
    tags: [knight, defender]
    glyph: "B"
    color: white

  theon:
    display_name: Theon Greyjoy
    description: |
      The last Greyjoy. Ironborn archer guarding the godswood and the
      heart tree with his life. Ranged physical attacker — 2-3 range
      lets him thin the dead before they reach the walls.
    hp_max: 22
    atk: 9
    defense: 4
    res: 3
    spd: 6
    move: 3
    rng_min: 2
    rng_max: 3
    tags: [archer]
    glyph: "E"
    color: cyan

  # ═══════════════════════════════════════════════
  #  RED — The Dead (8 units)
  # ═══════════════════════════════════════════════

  night_king:
    display_name: Night King
    description: |
      The first White Walker, created by the Children of the Forest.
      Commands the dead with a gesture. Ice magic shatters steel and
      raises the fallen. Flying — he rides Viserion or drifts above
      the battlefield. Kill him and every wight drops. VIP target.
    hp_max: 45
    atk: 14
    defense: 8
    res: 9
    spd: 4
    move: 4
    rng_min: 2
    rng_max: 3
    is_magic: true
    tags: [vip, flying]
    glyph: "N"
    color: bright_blue

  viserion:
    display_name: Viserion
    description: |
      The undead dragon, reanimated by the Night King's touch. Breathes
      blue flame that melts castle walls. Long-range magic devastation
      but vulnerable to dragonfire from Drogon.
    hp_max: 40
    atk: 15
    defense: 6
    res: 5
    spd: 4
    move: 5
    rng_min: 2
    rng_max: 4
    is_magic: true
    tags: [dragon, flying]
    glyph: "V"
    color: bright_blue

  frostfang:
    display_name: Frostfang
    description: |
      White Walker general. Carries a spear of living ice that flash-
      freezes anything it touches. His freezing aura slows enemies —
      high RES and magic range make him a control threat.
    hp_max: 32
    atk: 10
    defense: 7
    res: 8
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    tags: [general, freezer]
    glyph: "F"
    color: bright_blue

  bonelord:
    display_name: Bonelord
    description: |
      White Walker general. A necromantic lieutenant who raises the
      fallen mid-battle. High magic ATK and range — he stays behind
      the front line and channels dark power.
    hp_max: 28
    atk: 12
    defense: 5
    res: 8
    spd: 3
    move: 3
    rng_min: 2
    rng_max: 3
    is_magic: true
    tags: [general, necromancer]
    glyph: "L"
    color: bright_blue

  coldhands:
    display_name: Coldhands
    description: |
      White Walker general. An armored juggernaut clad in ancient ice
      plate. Slow but nearly unkillable — the Dead's answer to a
      battering ram. Absorbs punishment at chokepoints.
    hp_max: 38
    atk: 11
    defense: 10
    res: 6
    spd: 3
    move: 2
    rng_min: 1
    rng_max: 1
    tags: [general, tank]
    glyph: "C"
    color: bright_blue

  grim:
    display_name: Grim
    description: |
      Elite wight champion — a fallen Thenn warrior, still wielding
      twin bronze axes. Fast flanker who exploits trench gaps.
    hp_max: 18
    atk: 9
    defense: 4
    res: 2
    spd: 7
    move: 5
    rng_min: 1
    rng_max: 1
    tags: [wight, flanker]
    glyph: "g"
    color: blue

  hollow:
    display_name: Hollow
    description: |
      Elite wight champion — a reanimated giant, towering and slow.
      Massive HP and ATK. A siege unit that smashes through defenders.
    hp_max: 30
    atk: 12
    defense: 5
    res: 1
    spd: 3
    move: 3
    rng_min: 1
    rng_max: 1
    tags: [wight, giant, siege]
    glyph: "O"
    color: blue

  shade:
    display_name: Shade
    description: |
      Elite wight champion — a former Stark soldier, eerily fast and
      silent. Scouts ahead and harasses defenders with hit-and-run.
    hp_max: 14
    atk: 8
    defense: 3
    res: 2
    spd: 8
    move: 5
    rng_min: 1
    rng_max: 1
    tags: [wight, scout, stealth]
    glyph: "s"
    color: blue

armies:
  blue:
    # Jon Snow — behind the trench, commanding the defense
    - {class: jon_snow, pos: {x: 5, y: 6}}
    # Daenerys — rear, dragonfire support
    - {class: daenerys, pos: {x: 4, y: 9}}
    # Arya — hidden inside Winterfell, waiting to strike
    - {class: arya, pos: {x: 6, y: 9}}
    # The Hound — holding a trench gap
    - {class: the_hound, pos: {x: 2, y: 6}}
    # Jorah — near Daenerys, bodyguard duty
    - {class: jorah, pos: {x: 3, y: 8}}
    # Brienne — holding the other trench gap
    - {class: brienne, pos: {x: 7, y: 6}}
    # Theon — in the godswood, guarding the heart tree
    - {class: theon, pos: {x: 5, y: 7}}

  red:
    # Night King — far rear, directing the assault
    - {class: night_king, pos: {x: 5, y: 0}}
    # Viserion — undead dragon, air support
    - {class: viserion, pos: {x: 3, y: 0}}
    # White Walker generals — behind the vanguard
    - {class: frostfang, pos: {x: 2, y: 1}}
    - {class: bonelord, pos: {x: 5, y: 1}}
    - {class: coldhands, pos: {x: 8, y: 1}}
    # Elite wight champions — front line assault
    - {class: grim, pos: {x: 1, y: 3}}
    - {class: hollow, pos: {x: 5, y: 3}}
    - {class: shade, pos: {x: 9, y: 3}}

rules:
  max_turns: 12
  fog_of_war: classic
  first_player: blue

win_conditions:
  # Night King dies → blue wins instantly (the dead collapse).
  - {type: protect_unit, unit_id: u_r_night_king_1, owning_team: red}
  # Red reaches the heart tree in the godswood → blue loses.
  - {type: reach_tile, team: red, pos: {x: 5, y: 7}}
  # All living units eliminated → red wins.
  - {type: eliminate_all_enemy_units}
  # Survive 12 turns → dawn comes, blue wins.
  - {type: protect_unit_survives, unit_id: u_b_jon_snow_1, owning_team: blue}
  # Backstop — if Jon falls but blue still has units at turn cap.
  - {type: max_turns_draw}

narrative:
  title: The Long Night
  description: |
    Winterfell, 305 AC. Seven defenders of the living against eight
    horrors of the dead. Kill the Night King or hold until dawn.
  intro: |
    Darkness swallows the north. Beyond the fire trench, blue eyes
    open by the thousand. The Night King rides Viserion through the
    storm. Somewhere in the dark, Arya grips the catspaw dagger.
    Twelve turns until dawn — if dawn comes at all.
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        The trenches blaze higher — but the wights pile onto the
        flames, smothering them with frozen bodies. The gaps in the
        fire line are all that matter now.
    - trigger: on_turn_start
      turn: 8
      text: |
        The Night King descends toward the godswood. He wants the
        Three-Eyed Raven. Theon nocks another arrow and waits.
    - trigger: on_unit_killed
      unit_id: u_r_night_king_1
      text: |
        The Night King shatters like ice. Every wight on the field
        collapses into dust. Dawn breaks over Winterfell.
    - trigger: on_unit_killed
      unit_id: u_b_arya_1
      text: |
        Arya falls. The catspaw dagger clatters to the frozen ground.
        Without her, no one can reach the Night King in time.
    - trigger: on_unit_killed
      unit_id: u_b_theon_1
      text: |
        Theon Greyjoy falls defending the heart tree. He was a good
        man. The godswood stands unguarded.
    - trigger: on_unit_killed
      unit_id: u_b_jon_snow_1
      text: |
        Jon Snow falls for the last time. There is no Red Woman to
        bring him back. The living lose their king.
    - trigger: on_unit_killed
      unit_id: u_r_viserion_1
      text: |
        Viserion crashes to earth in a shower of blue flame and
        shattered bone. The Night King has lost his dragon.
