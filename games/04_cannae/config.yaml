schema_version: 1
license: public_domain
name: Cannae
difficulty: 4
description: |
  August 216 BC. Hannibal Barca has already crushed three Roman
  armies in Italy; now Rome fields its largest force ever under the
  consul Gaius Terentius Varro. They meet on an open plain near the
  village of Cannae. Hannibal arranges a thin concave crescent; as
  the Roman legions press, his center retreats and his veterans fold
  in from both flanks. The cavalry closes the back. By sunset,
  50,000 Romans are dead. It is the textbook double envelopment —
  still taught at war colleges.
  Inspired by the Battle of Cannae (216 BC), Second Punic War, ancient Rome.

board:
  width: 16
  height: 12
  terrain:
    # ── AUFIDUS RIVER — full north edge, impassable flank anchor ──
    - {x: 0,  y: 0, type: river}
    - {x: 1,  y: 0, type: river}
    - {x: 2,  y: 0, type: river}
    - {x: 3,  y: 0, type: river}
    - {x: 4,  y: 0, type: river}
    - {x: 5,  y: 0, type: river}
    - {x: 6,  y: 0, type: river}
    - {x: 7,  y: 0, type: river}
    - {x: 8,  y: 0, type: river}
    - {x: 9,  y: 0, type: river}
    - {x: 10, y: 0, type: river}
    - {x: 11, y: 0, type: river}
    - {x: 12, y: 0, type: river}
    - {x: 13, y: 0, type: river}
    - {x: 14, y: 0, type: river}
    - {x: 15, y: 0, type: river}
    # River bends down on the NW corner — tightens the pocket
    - {x: 0,  y: 1, type: river}
    - {x: 1,  y: 1, type: river}
    # ── WEST SCRUBLAND CORRIDOR — Libyan/Numidian flanking lane ──
    # Dense brush columns 0-3, rows 2-8. Libyans hide here and
    # wheel inward; cost 2 slows Romans who try to contest.
    - {x: 0,  y: 2, type: scrubland}
    - {x: 1,  y: 2, type: scrubland}
    - {x: 2,  y: 2, type: scrubland}
    - {x: 0,  y: 3, type: scrubland}
    - {x: 1,  y: 3, type: scrubland}
    - {x: 2,  y: 3, type: scrubland}
    - {x: 3,  y: 3, type: scrubland}
    - {x: 0,  y: 4, type: scrubland}
    - {x: 1,  y: 4, type: scrubland}
    - {x: 2,  y: 4, type: scrubland}
    - {x: 3,  y: 4, type: scrubland}
    - {x: 0,  y: 5, type: scrubland}
    - {x: 1,  y: 5, type: scrubland}
    - {x: 2,  y: 5, type: scrubland}
    - {x: 3,  y: 5, type: scrubland}
    - {x: 0,  y: 6, type: scrubland}
    - {x: 1,  y: 6, type: scrubland}
    - {x: 2,  y: 6, type: scrubland}
    - {x: 0,  y: 7, type: scrubland}
    - {x: 1,  y: 7, type: scrubland}
    - {x: 2,  y: 7, type: scrubland}
    - {x: 0,  y: 8, type: scrubland}
    - {x: 1,  y: 8, type: scrubland}
    # ── EAST SCRUBLAND CORRIDOR — mirror flanking lane ──
    - {x: 13, y: 2, type: scrubland}
    - {x: 14, y: 2, type: scrubland}
    - {x: 15, y: 2, type: scrubland}
    - {x: 12, y: 3, type: scrubland}
    - {x: 13, y: 3, type: scrubland}
    - {x: 14, y: 3, type: scrubland}
    - {x: 15, y: 3, type: scrubland}
    - {x: 12, y: 4, type: scrubland}
    - {x: 13, y: 4, type: scrubland}
    - {x: 14, y: 4, type: scrubland}
    - {x: 15, y: 4, type: scrubland}
    - {x: 12, y: 5, type: scrubland}
    - {x: 13, y: 5, type: scrubland}
    - {x: 14, y: 5, type: scrubland}
    - {x: 15, y: 5, type: scrubland}
    - {x: 13, y: 6, type: scrubland}
    - {x: 14, y: 6, type: scrubland}
    - {x: 15, y: 6, type: scrubland}
    - {x: 13, y: 7, type: scrubland}
    - {x: 14, y: 7, type: scrubland}
    - {x: 15, y: 7, type: scrubland}
    - {x: 14, y: 8, type: scrubland}
    - {x: 15, y: 8, type: scrubland}
    # ── SCATTERED BRUSH — narrows the open mouth of the pocket ──
    # A few scrub tiles pinch columns 3-4 and 11-12 at rows 6-7,
    # funneling Romans into the center and making late escape hard.
    - {x: 3,  y: 7, type: scrubland}
    - {x: 3,  y: 8, type: scrubland}
    - {x: 12, y: 7, type: scrubland}
    - {x: 12, y: 8, type: scrubland}
    # ── HILL — slight rise south-center, the Roman camp sits here ──
    - {x: 6,  y: 11, type: hill}
    - {x: 7,  y: 11, type: hill}
    - {x: 8,  y: 11, type: hill}
    - {x: 9,  y: 11, type: hill}
    # Open center (columns 4-11, rows 2-8) is the killing field —
    # no terrain, no cover, no escape once the pocket closes.
  forts:
    # Roman baggage camp — south-center behind the legions.
    # If Carthage seizes it, the encirclement is complete.
    - {x: 7, y: 11, owner: red}
    - {x: 8, y: 11, owner: red}

terrain_types:
  river:
    display_name: River (Aufidus)
    description: The river Aufidus. Impassable.
    move_cost: 99
    passable: false
    glyph: "~"
    color: blue
  hill:
    display_name: Hill
    description: Elevated rocky ground. +2 DEF. Blocks cavalry charges.
    move_cost: 2
    defense_bonus: 2
    blocks_cavalry: true
    glyph: "^"
    color: yellow
  scrubland:
    display_name: Scrubland
    description: Dense brush and dry grass. Slows movement, offers cover (+1 DEF).
    move_cost: 2
    defense_bonus: 1
    glyph: "%"
    color: green

unit_classes:
  # ── BLUE: Carthage ──────────────────────────────────────────────
  hannibal:
    display_name: Hannibal Barca
    description: |
      Carthaginian commander, missing an eye from the marshes of
      Etruria. One of the greatest military minds in history and the
      architect of this envelopment. Blue loses if Hannibal falls.
    hp_max: 30
    atk: 10
    defense: 6
    res: 4
    spd: 7
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [general, vip, commander]
    sight: 5
    glyph: H
    color: bright_red

  maharbal:
    display_name: Maharbal
    description: |
      Hannibal's cavalry commander and finest horseman. Fast,
      aggressive, born to envelop. "You know how to win a victory,
      Hannibal, but not how to use one."
    hp_max: 22
    atk: 9
    defense: 4
    res: 3
    spd: 8
    rng_min: 1
    rng_max: 1
    move: 6
    tags: [cavalry, officer]
    sight: 4
    glyph: M
    color: bright_red

  hanno:
    display_name: Hanno
    description: |
      Carthaginian infantry captain. Steady, disciplined officer who
      holds the line while the cavalry swings wide. Commands the
      center infantry block.
    hp_max: 22
    atk: 7
    defense: 6
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry, officer]
    sight: 3
    glyph: O
    color: red

  numidian_scout:
    display_name: Numidian Scout
    description: |
      Light horseman of North Africa. No saddle, javelin-armed,
      terrifyingly fast. Races around the flanks to close the
      pocket behind the Roman line.
    hp_max: 16
    atk: 6
    defense: 3
    res: 2
    spd: 9
    rng_min: 1
    rng_max: 2
    move: 6
    tags: [cavalry, scout, fast]
    sight: 5
    glyph: N
    color: red

  libyan_veteran:
    display_name: Libyan Veteran
    description: |
      Hannibal's elite African heavy infantry — mercenaries equipped
      in captured Roman armor. The hinge of the envelopment; they
      wheel inward to crush the Roman flanks.
    hp_max: 24
    atk: 8
    defense: 7
    res: 4
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry, veteran, heavy]
    sight: 3
    glyph: L
    color: red

  balearic_slinger:
    display_name: Balearic Slinger
    description: |
      Islander from Majorca, deadly accurate with a lead sling
      bullet at range. Softens formations before the melee closes.
    hp_max: 14
    atk: 7
    defense: 2
    res: 2
    spd: 6
    rng_min: 2
    rng_max: 3
    move: 4
    tags: [ranged, skirmisher]
    sight: 4
    glyph: B
    color: red

  celtic_chieftain:
    display_name: Celtic Chieftain
    description: |
      Tall Gaul in gold torcs, long sword, short temper. Fights
      bare-chested in a berserker frenzy. High attack, fragile —
      placed in the center to bait the Romans forward.
    hp_max: 18
    atk: 11
    defense: 3
    res: 2
    spd: 7
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [infantry, berserker]
    sight: 3
    glyph: C
    color: red

  # ── RED: Rome ───────────────────────────────────────────────────
  consul_varro:
    display_name: Consul Varro
    description: |
      Roman consul and over-confident commander. Eager for a
      decisive battle despite Paullus's advice to delay. Red loses
      if Varro falls — morale collapses.
    hp_max: 28
    atk: 7
    defense: 6
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [vip, consul, commander]
    sight: 4
    glyph: V
    color: bright_cyan

  consul_paullus:
    display_name: Consul Paullus
    description: |
      The cautious co-consul. Opposed this battle but follows duty.
      Solid defensive fighter who steadies the line around him.
    hp_max: 26
    atk: 6
    defense: 7
    res: 4
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [consul, officer]
    sight: 4
    glyph: P
    color: cyan

  tribune_marcus:
    display_name: Tribune Marcus
    description: |
      Young military tribune. Competent officer holding the center
      ranks together. A capable but inexperienced leader.
    hp_max: 22
    atk: 7
    defense: 5
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry, officer]
    sight: 3
    glyph: T
    color: cyan

  centurion_primus:
    display_name: Centurion Primus
    description: |
      Centurion of the first cohort. Scarred veteran with a vine
      staff. The backbone of Roman discipline on the front line.
    hp_max: 24
    atk: 8
    defense: 6
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry, veteran, officer]
    sight: 3
    glyph: X
    color: cyan

  roman_cavalry_commander:
    display_name: Roman Cavalry Commander
    description: |
      Commands Rome's outnumbered horsemen. Brave but slow compared
      to the Numidians. Will struggle to hold the flanks.
    hp_max: 20
    atk: 7
    defense: 5
    res: 3
    spd: 6
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [cavalry, officer]
    sight: 4
    glyph: R
    color: bright_cyan

  velites_captain:
    display_name: Velites Captain
    description: |
      Leader of the light javelin skirmishers. Young, fast, thrown
      out ahead of the main line to harass and screen.
    hp_max: 16
    atk: 6
    defense: 3
    res: 2
    spd: 6
    rng_min: 1
    rng_max: 2
    move: 4
    tags: [infantry, skirmisher, ranged]
    sight: 4
    glyph: E
    color: cyan

  triarii_veteran:
    display_name: Triarii Veteran
    description: |
      Grizzled spearman of the reserve line. The triarii kneel until
      the crisis comes. Heavy armor, long spear, last resort.
    hp_max: 26
    atk: 7
    defense: 7
    res: 4
    spd: 4
    rng_min: 1
    rng_max: 2
    move: 3
    tags: [infantry, veteran, heavy]
    sight: 3
    glyph: I
    color: cyan

armies:
  blue:
    # ── Carthage — Hannibal's crescent ──
    # Hannibal commands from row 1, just south of the river.
    - {class: hannibal,         pos: {x: 8,  y: 1}}
    # Celtic chieftain: the bait. Center-north, bulging toward Romans.
    # He stands in open ground to lure the legions forward.
    - {class: celtic_chieftain, pos: {x: 7,  y: 3}}
    # Hanno holds the center line behind the Celts.
    - {class: hanno,            pos: {x: 8,  y: 2}}
    # Balearic slinger screens from behind the crescent.
    - {class: balearic_slinger, pos: {x: 9,  y: 2}}
    # Libyan veterans — hidden in the scrubland corridors, the hinge
    # of the envelopment. West wing and east wing.
    - {class: libyan_veteran,   pos: {x: 3,  y: 3}}   # west scrub
    - {class: libyan_veteran,   pos: {x: 12, y: 3}}   # east scrub
    # Numidian scouts — far flanks, fastest units on the field.
    # They sweep wide through the scrub to close the pocket behind.
    - {class: numidian_scout,   pos: {x: 1,  y: 2}}   # far west
    - {class: numidian_scout,   pos: {x: 14, y: 2}}   # far east
    # Maharbal's cavalry — starts near the river on the east flank,
    # ready to ride the long arc around to the Roman rear.
    - {class: maharbal,         pos: {x: 13, y: 1}}
  red:
    # ── Rome — tight infantry block, center-south ──
    # Varro commands from the rear, near the baggage camp.
    - {class: consul_varro,            pos: {x: 7,  y: 10}}
    # Paullus in the heart of the infantry mass.
    - {class: consul_paullus,          pos: {x: 8,  y: 8}}
    # Tribune and Centurion hold the front ranks.
    - {class: tribune_marcus,          pos: {x: 7,  y: 7}}
    - {class: centurion_primus,        pos: {x: 8,  y: 7}}
    # Velites screen ahead of the main line.
    - {class: velites_captain,         pos: {x: 7,  y: 6}}
    # Triarii reserve — kneeling behind the block until the crisis.
    - {class: triarii_veteran,         pos: {x: 8,  y: 9}}
    # Roman cavalry on the west flank — outnumbered, doomed.
    - {class: roman_cavalry_commander, pos: {x: 4,  y: 8}}

rules:
  max_turns: 30
  fog_of_war: false
  first_player: red

win_conditions:
  # Carthage wins by seizing the Roman baggage camp (encirclement complete)
  - {type: seize_enemy_fort}
  # Rome wins by killing Hannibal — the army disintegrates without him
  - {type: protect_unit, unit_id: u_b_hannibal_1, owning_team: blue}
  # Either side can win by total elimination
  - {type: eliminate_all_enemy_units}
  # Turn cap reached — draw (Rome held off the envelopment)
  - {type: max_turns_draw}

narrative:
  title: Cannae
  description: |
    The textbook double envelopment. Hannibal invites the Romans
    into a pocket and seals it behind them. The Aufidus River pins
    the north; dense scrubland corridors channel the flanking forces;
    the open center is a killing field. Seize the Roman camp to
    complete the encirclement — or kill Hannibal to shatter it.
  intro: |
    Morning on the Apulian plain. Varro has seniority today; he
    rejected his colleague's advice to starve the Carthaginians
    out. The legions draw up in a dense block south of center,
    their baggage camp on the hill behind them.
    Across the open ground, Hannibal's crescent waits — Celtic
    warriors bulging forward as bait, Libyan veterans concealed
    in the scrubland on both flanks, Numidian riders lurking at
    the edges. The river Aufidus seals the north. The brush
    thickens on east and west, leaving only the bare center
    open. It is a funnel, and Rome is walking into it.
  events:
    - trigger: on_turn_start
      turn: 3
      text: "The Celtic center gives ground. Varro smells blood and orders the legions deeper into the pocket."
    - trigger: on_turn_start
      turn: 5
      text: "Movement in the scrub on both flanks — the Libyan veterans are wheeling inward."
    - trigger: on_turn_start
      turn: 8
      text: "The brush corridors disgorge armored infantry. The Roman flanks are collapsing inward."
    - trigger: on_turn_start
      turn: 12
      text: "Hoofbeats behind the Roman line — Maharbal's cavalry has closed the pocket. The camp is in danger."
    - trigger: on_unit_killed
      unit_id: u_r_consul_varro_1
      text: "Varro falls in the press. Roman morale shatters."
    - trigger: on_unit_killed
      unit_id: u_b_hannibal_1
      text: "Hannibal is struck down! The Carthaginian envelopment unravels."
