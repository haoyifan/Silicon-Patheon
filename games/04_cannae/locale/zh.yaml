# 坎尼会战 — 中文本地化
name: 坎尼会战 — 公元前216年，第二次布匿战争
description: |
  公元前216年8月。汉尼拔·巴卡已在意大利击溃三支罗马军队；
  如今罗马集结了八万大军——有史以来最大的兵力——由执政官
  盖乌斯·瓦罗统率。双方在坎尼村附近的平原上交锋。汉尼拔
  以高卢人和西班牙人排成凹形薄阵；罗马军团推进时，他的
  中军后退，利比亚老兵从两翼包抄，努米底亚骑兵封锁后方。
  日落前五万罗马人战死。这是双重包围的教科书范例——至今
  仍在军事院校讲授。

unit_classes:
  hannibal:
    display_name: 汉尼拔·巴卡
    description: |
      迦太基统帅，在伊特鲁里亚沼泽中失去一只眼睛。
      史上最伟大的军事天才之一，这场包围战的设计者。
      汉尼拔阵亡则蓝方战败。
  maharbal:
    display_name: 马哈巴尔
    description: |
      汉尼拔的骑兵指挥官，最优秀的骑手。快速、凶猛，
      天生的包围者。"汉尼拔，你知道如何赢得胜利，
      却不知如何利用胜利。"
  hanno:
    display_name: 汉诺
    description: |
      迦太基步兵队长。沉稳、有纪律的军官，在骑兵
      大范围迂回时坚守阵线。指挥中央步兵方阵。
  numidian_scout:
    display_name: 努米底亚斥候
    description: |
      北非轻骑兵。无马鞍、投标枪、速度骇人。
      绕到侧翼封闭罗马人后方的口袋。
  libyan_veteran:
    display_name: 利比亚老兵
    description: |
      汉尼拔精锐的非洲重步兵——身穿缴获的罗马铠甲的
      雇佣兵。包围战的转轴；他们向内旋转，碾碎罗马侧翼。
  balearic_slinger:
    display_name: 巴利阿里投石手
    description: |
      来自马略卡岛的投石手，用铅弹远程精准投射。
      在近战交锋前削弱敌方阵型。
  celtic_chieftain:
    display_name: 凯尔特酋长
    description: |
      高大的高卢人，戴金环、持长剑、脾气火爆。赤膊
      狂战。高攻击力但脆弱——被置于中央诱使罗马人
      向前推进。
  consul_varro:
    display_name: 执政官瓦罗
    description: |
      罗马执政官，过于自信的指挥官。不顾保卢斯的拖延
      建议执意决战。瓦罗阵亡则红方士气崩溃。
  consul_paullus:
    display_name: 执政官保卢斯
    description: |
      谨慎的共同执政官。反对此战但服从职责。稳健的
      防御型战士，稳定周围阵线。
  tribune_marcus:
    display_name: 军事保民官马尔库斯
    description: |
      年轻的军事保民官。称职的军官，维系着中军各列的
      凝聚力。有能力但缺乏经验。
  centurion_primus:
    display_name: 首席百夫长
    description: |
      第一大队百夫长。满身伤疤的老兵，手持藤杖。
      前线罗马纪律的脊梁。
  roman_cavalry_commander:
    display_name: 罗马骑兵指挥官
    description: |
      指挥罗马寡不敌众的骑兵。勇敢但速度不及
      努米底亚人。将难以守住侧翼。
  velites_captain:
    display_name: 轻步兵队长
    description: |
      轻标枪散兵的指挥官。年轻、迅速，被派到主力
      阵线前方骚扰和掩护。
  triarii_veteran:
    display_name: 后备枪兵老兵
    description: |
      久经沙场的后备线枪兵。后备枪兵单膝跪地直到
      危机来临。重甲、长矛，最后的依靠。

terrain_types:
  river:
    display_name: 奥菲杜斯河
    description: |
      奥菲杜斯河。不可通行。
  hill:
    display_name: 丘陵
    description: |
      岩石高地。防御+2。阻挡骑兵冲锋。
  scrubland:
    display_name: 灌木丛
    description: |
      低矮灌木和干草。半掩体（防御+1）。

narrative:
  title: 坎尼会战
  description: |
    教科书级的双重包围。汉尼拔诱使罗马人深入口袋，
    然后从身后封死出口。
  intro: |
    平原上的清晨。瓦罗今日有指挥权；他驳回了同僚
    以饥饿拖垮迦太基人的建议。军团列出罗马有史以来
    最厚重的阵型。汉尼拔微笑了。
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        高卢中军开始后退。瓦罗命令军团继续推进。
    - trigger: on_turn_start
      turn: 5
      text: |
        两翼灌木丛中有动静——利比亚老兵正在向内旋转。
    - trigger: on_turn_start
      turn: 8
      text: |
        灌木小道涌出全副武装的步兵。罗马两翼正在向内坍塌。
    - trigger: on_turn_start
      turn: 12
      text: |
        罗马后方扬起尘土——努米底亚骑兵封闭了口袋。
    - trigger: on_unit_killed
      unit_id: u_r_consul_varro_1
      text: |
        瓦罗倒下了。罗马防线四分五裂。
    - trigger: on_unit_killed
      unit_id: u_b_hannibal_1
      text: |
        汉尼拔被击杀！迦太基包围战功亏一篑。
