schema_version: 1
license: fan_work
fan_work_source: "Fantastic Beasts (J.K. Rowling / Warner Bros.)"
name: "Grindelwald's Rally — Fantastic Beasts"
difficulty: 3
description: |
  Paris, 1927. Gellert Grindelwald holds a rally in the Pere Lachaise
  amphitheatre, summoning followers to his cause with visions of
  wizarding supremacy. Newt Scamander and Dumbledore's allies must
  infiltrate the rally and stop Grindelwald before his dark flames
  consume Paris. Credence, the Obscurus, is a wild card of terrible
  power. Defeat Grindelwald to end the rally.
  Inspired by Fantastic Beasts: The Crimes of Grindelwald by J.K. Rowling.

# ─────────────────────────────────────────────────────────────────
#  MAP LAYOUT (14 x 12)
#
#  Legend:  = tier   P podium   ~ fire   . floor   # pillar
#           S stairway          (gap) crossing point in fire
#
#  y0  = = = # . . . . . . # = = =      north perimeter tiers
#  y1  = . . . . . P P . . . . . =      podium row
#  y2  = . . . . . . . . . . . . =      north arena floor
#  y3  = S . # . . . . . . # . S =      pillars + stairways
#  y4  = . . . . . . . . . . . . =      approach zone
#  y5  # . ~ ~ ~ . . ~ ~ ~ ~ . . #      PROTEGO DIABOLICA (3 gaps)
#  y6  # . . ~ ~ ~ . . ~ ~ . ~ . #      fire line continued
#  y7  = . . . . . . . . . . . . =      south approach
#  y8  = S . # . . . . . . # . S =      pillars + stairways
#  y9  = . . . . . . . . . . . . =      south arena floor
#  y10 = . . . . . . . . . . . . =      deployment row
#  y11 = = = # . . . . . . # = = =      south perimeter tiers
#
#  Fire gaps:  x=1 (west gap),  x=6 (center gap),  x=12 (east gap)
#  on y5–y6.  These are the three contested crossing points.
# ─────────────────────────────────────────────────────────────────

board:
  width: 14
  height: 12
  terrain:
    # ── AMPHITHEATRE TIERS (outer perimeter, oval) ──────────────
    # North wall tiers (y=0)
    - {x: 0, y: 0, type: tier}
    - {x: 1, y: 0, type: tier}
    - {x: 2, y: 0, type: tier}
    - {x: 11, y: 0, type: tier}
    - {x: 12, y: 0, type: tier}
    - {x: 13, y: 0, type: tier}
    # South wall tiers (y=11)
    - {x: 0, y: 11, type: tier}
    - {x: 1, y: 11, type: tier}
    - {x: 2, y: 11, type: tier}
    - {x: 11, y: 11, type: tier}
    - {x: 12, y: 11, type: tier}
    - {x: 13, y: 11, type: tier}
    # West wall tiers (x=0)
    - {x: 0, y: 1, type: tier}
    - {x: 0, y: 2, type: tier}
    - {x: 0, y: 3, type: tier}
    - {x: 0, y: 4, type: tier}
    - {x: 0, y: 7, type: tier}
    - {x: 0, y: 8, type: tier}
    - {x: 0, y: 9, type: tier}
    - {x: 0, y: 10, type: tier}
    # East wall tiers (x=13)
    - {x: 13, y: 1, type: tier}
    - {x: 13, y: 2, type: tier}
    - {x: 13, y: 3, type: tier}
    - {x: 13, y: 4, type: tier}
    - {x: 13, y: 7, type: tier}
    - {x: 13, y: 8, type: tier}
    - {x: 13, y: 9, type: tier}
    - {x: 13, y: 10, type: tier}

    # ── PODIUM (Grindelwald's stage, north center) ─────────────
    - {x: 6, y: 1, type: podium}
    - {x: 7, y: 1, type: podium}

    # ── PILLARS (impassable columns) ───────────────────────────
    # North corners (y=0 gaps in tier)
    - {x: 3, y: 0, type: pillar}
    - {x: 10, y: 0, type: pillar}
    # South corners (y=11 gaps in tier)
    - {x: 3, y: 11, type: pillar}
    - {x: 10, y: 11, type: pillar}
    # Inner north pillars
    - {x: 3, y: 3, type: pillar}
    - {x: 10, y: 3, type: pillar}
    # Inner south pillars
    - {x: 3, y: 8, type: pillar}
    - {x: 10, y: 8, type: pillar}
    # Fire-line end pillars (seal the edges of the barrier)
    - {x: 0, y: 5, type: pillar}
    - {x: 13, y: 5, type: pillar}
    - {x: 0, y: 6, type: pillar}
    - {x: 13, y: 6, type: pillar}

    # ── STAIRWAYS (tier-to-floor connections, 1 tile wide) ─────
    # North stairways
    - {x: 1, y: 3, type: stairway}
    - {x: 12, y: 3, type: stairway}
    # South stairways
    - {x: 1, y: 8, type: stairway}
    - {x: 12, y: 8, type: stairway}

    # ── PROTEGO DIABOLICA (blue fire barrier, y=5 and y=6) ─────
    # The fire runs east-west in a ragged double line with 3 gaps.
    #
    # Row y=5:  gap at x=1, fire x=2-5, gap at x=6, fire x=7-10, gap at x=11-12
    - {x: 2, y: 5, type: protego_diabolica}
    - {x: 3, y: 5, type: protego_diabolica}
    - {x: 4, y: 5, type: protego_diabolica}
    - {x: 5, y: 5, type: protego_diabolica}
    - {x: 7, y: 5, type: protego_diabolica}
    - {x: 8, y: 5, type: protego_diabolica}
    - {x: 9, y: 5, type: protego_diabolica}
    - {x: 10, y: 5, type: protego_diabolica}
    # Row y=6:  fire x=3-5, gap at x=6-7, fire x=8-9, gap at x=10, fire x=11
    - {x: 3, y: 6, type: protego_diabolica}
    - {x: 4, y: 6, type: protego_diabolica}
    - {x: 5, y: 6, type: protego_diabolica}
    - {x: 8, y: 6, type: protego_diabolica}
    - {x: 9, y: 6, type: protego_diabolica}
    - {x: 11, y: 6, type: protego_diabolica}
  forts: []

terrain_types:
  tier:
    display_name: Amphitheatre Tier
    description: |
      Concentric stone seating carved into the walls of the underground
      amphitheatre. Elevated position grants excellent defensive
      advantage and sightlines, but the stepped rows slow movement.
    move_cost: 2
    defense_bonus: 2
    glyph: "="
    color: dim

  podium:
    display_name: Stage Podium
    description: |
      Grindelwald's raised speaking platform at the head of the
      amphitheatre. The highest point in the arena — whoever holds
      this ground commands the battlefield.
    move_cost: 2
    defense_bonus: 3
    glyph: "P"
    color: bright_yellow

  pillar:
    display_name: Stone Pillar
    description: |
      Massive columns supporting the amphitheatre vault. Completely
      impassable. They break sightlines and create pockets of cover
      on adjacent tiles.
    move_cost: 99
    passable: false
    blocks_sight: true
    glyph: "#"
    color: bright_black

  stairway:
    display_name: Stairway
    description: |
      Narrow stone steps connecting the arena floor to the elevated
      tiers. Only one unit wide — a bottleneck for anyone trying to
      reach the high ground. Costs extra movement to climb.
    move_cost: 2
    defense_bonus: 0
    glyph: "/"
    color: white

  protego_diabolica:
    display_name: Protego Diabolica
    description: |
      A wall of cursed blue-white flame conjured by Grindelwald.
      Those loyal to him pass unharmed; all others burn. Crossing
      the fire costs extra movement and sears HP from any unit that
      steps through. The defining hazard of the battlefield — go
      around through the gaps, or pay the price in blood.
    move_cost: 2
    defense_bonus: -2
    heals: -5
    glyph: "~"
    color: bright_blue

unit_classes:
  newt:
    display_name: Newt Scamander
    description: |
      Magizoologist and reluctant hero. His creatures are his weapons,
      his empathy is his shield, and his healing touch mends allies.
    hp_max: 20
    atk: 8
    defense: 3
    res: 7
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 2
    is_magic: true
    can_heal: true
    heal_amount: 5
    glyph: "N"
    color: bright_cyan

  tina:
    display_name: Tina Goldstein
    description: |
      MACUSA Auror, fierce and determined. Her wand work is sharp
      and her protective instincts even sharper — she keeps
      Grindelwald's acolytes at bay with precise long-arc jinxes.
    hp_max: 22
    atk: 9
    defense: 4
    res: 6
    spd: 6
    move: 4
    rng_min: 2
    rng_max: 3
    is_magic: true
    glyph: "T"
    color: bright_cyan

  theseus:
    display_name: Theseus Scamander
    description: |
      Head of the British Auror Office and war hero. A disciplined
      duelist who leads from the front with shield and spell —
      his reach with a wand matches Grindelwald's own, letting
      him answer the Dark Lord's bolts at range.
    hp_max: 26
    atk: 10
    defense: 7
    res: 5
    spd: 5
    move: 3
    rng_min: 2
    rng_max: 4
    is_magic: true
    glyph: "S"
    color: bright_cyan

  jacob:
    display_name: Jacob Kowalski
    description: |
      No-Maj baker with a heart of gold and fists of iron. He cannot
      cast spells, but his courage and loyalty rally his allies —
      patching wounds and keeping morale high when the fight looks
      darkest. Tougher than he looks.
    hp_max: 20
    atk: 8
    defense: 6
    res: 2
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    can_heal: true
    heal_amount: 4
    glyph: "K"
    color: cyan

  yusuf:
    display_name: Yusuf Kama
    description: |
      Pure-blood wizard driven by a blood oath of vengeance. His
      dueling skills are honed by years of single-minded pursuit.
    hp_max: 22
    atk: 9
    defense: 5
    res: 4
    spd: 5
    move: 4
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "Y"
    color: cyan

  auror:
    display_name: Auror
    description: |
      Trained dark-wizard catchers from the international magical
      law enforcement. Professional, disciplined, and deadly.
    hp_max: 20
    atk: 8
    defense: 4
    res: 5
    spd: 5
    move: 4
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "A"
    color: cyan

  grindelwald:
    display_name: Grindelwald
    description: |
      Gellert Grindelwald, the most dangerous dark wizard before
      Voldemort. Wielder of the Elder Wand, master of the Protego
      Diabolica — blue flames that consume all who oppose him.
    hp_max: 26
    atk: 13
    defense: 4
    res: 7
    spd: 6
    move: 4
    rng_min: 2
    rng_max: 4
    is_magic: true
    glyph: "G"
    color: bright_red

  credence:
    display_name: Credence
    description: |
      Aurelius Dumbledore — or so Grindelwald claims. The Obscurus
      within him is a force of raw, uncontrolled devastation. Fragile
      in body but catastrophic in power.
    hp_max: 16
    atk: 14
    defense: 2
    res: 3
    spd: 5
    move: 4
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "Z"
    color: bright_red

  queenie:
    display_name: Queenie Goldstein
    description: |
      Tina's sister, a natural Legilimens who joined Grindelwald
      for love. Her mind-reading powers and healing magic serve
      the dark cause now.
    hp_max: 18
    atk: 7
    defense: 2
    res: 8
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 2
    is_magic: true
    can_heal: true
    heal_amount: 5
    glyph: "Q"
    color: bright_red

  vinda:
    display_name: Vinda Rosier
    description: |
      Grindelwald's most loyal lieutenant. A cold, precise duelist
      whose curses strike with surgical accuracy.
    hp_max: 20
    atk: 10
    defense: 3
    res: 7
    spd: 5
    move: 4
    rng_min: 1
    rng_max: 3
    is_magic: true
    glyph: "V"
    color: red

  acolyte:
    display_name: Acolyte
    description: |
      Grindelwald's followers, drawn to his rally by promises of
      wizarding dominance. Zealous but poorly trained.
    hp_max: 18
    atk: 7
    defense: 4
    res: 4
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 1
    is_magic: true
    glyph: "a"
    color: red

# ─────────────────────────────────────────────────────────────────
#  DEPLOYMENT
#
#  Red (Grindelwald's forces) — north half
#    Grindelwald on his podium, Credence nearby, lieutenants on
#    the northern tiers, acolytes spread across the north arena.
#
#  Blue (Dumbledore's agents) — south half
#    Newt and Tina on the south arena floor ready to push toward
#    the center gap. Theseus anchors one flank, Yusuf the other.
#    Aurors hold the south tiers for ranged overwatch. Jacob is
#    near the SE stairway — he needs to pick his route carefully.
# ─────────────────────────────────────────────────────────────────

armies:
  red:
    # Grindelwald on the podium
    - {class: grindelwald, pos: {x: 6, y: 1}}
    # Credence lurking near the podium
    - {class: credence, pos: {x: 5, y: 2}}
    # Queenie on the north floor, near the west gap
    - {class: queenie, pos: {x: 4, y: 2}}
    # Vinda on the north floor, near the east gap
    - {class: vinda, pos: {x: 9, y: 2}}
    # Acolytes spread across northern tiers and floor
    - {class: acolyte, pos: {x: 1, y: 0}}
    - {class: acolyte, pos: {x: 12, y: 0}}
    - {class: acolyte, pos: {x: 7, y: 3}}

  blue:
    # Newt center-south, aiming for the center fire gap
    - {class: newt, pos: {x: 6, y: 9}}
    # Tina beside Newt
    - {class: tina, pos: {x: 7, y: 9}}
    # Theseus anchoring the west approach toward the west fire gap
    - {class: theseus, pos: {x: 2, y: 9}}
    # Yusuf on the east approach
    - {class: yusuf, pos: {x: 11, y: 9}}
    # Aurors on the south tiers for ranged overwatch
    - {class: auror, pos: {x: 1, y: 11}}
    - {class: auror, pos: {x: 12, y: 11}}
    # Jacob near the SE stairway — must navigate terrain carefully
    - {class: jacob, pos: {x: 11, y: 8}}

rules:
  max_turns: 16
  first_player: red

win_conditions:
  - {type: protect_unit, unit_id: u_r_grindelwald_1, owning_team: red}
  - {type: eliminate_all_enemy_units}
  - {type: protect_unit_survives, unit_id: u_r_grindelwald_1, owning_team: red}
  - {type: max_turns_draw}

narrative:
  title: "Grindelwald's Rally"
  description: |
    Paris, 1927. Grindelwald holds court in the Pere Lachaise
    amphitheatre. Newt Scamander and allies must stop him before
    his dark flames spread across Europe.
  intro: |
    The Pere Lachaise amphitheatre stretches out in concentric stone
    tiers, torch-lit and thrumming with dark magic. At the north end,
    Grindelwald stands upon his podium, the Elder Wand raised, his
    voice carrying visions of wizarding supremacy to the enraptured
    crowd. Then the Protego Diabolica erupts — a curtain of blue-
    white fire splitting the arena in two, its unnatural flames
    licking at the ancient stone. Three narrow gaps shimmer in the
    barrier. In the southern shadows, Newt Scamander and Dumbledore's
    agents grip their wands. To reach Grindelwald, they must cross
    the fire.
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        The two sides converge on the gaps in the Protego Diabolica.
        Blue-white flames roar higher as bodies press close. The air
        smells of ozone and scorched stone.
    - trigger: on_turn_start
      turn: 4
      text: |
        Grindelwald's Protego Diabolica surges outward. The blue
        flames test the hearts of all present — those who harbour
        hatred burn, those loyal to him pass through unharmed.
    - trigger: on_turn_start
      turn: 10
      text: |
        Credence unleashes the Obscurus. Dark tendrils of destruction
        lash out in all directions, cracking the stone tiers of the
        amphitheatre.
    - trigger: on_unit_killed
      unit_id: u_r_grindelwald_1
      text: |
        Grindelwald staggers. The Elder Wand slips from his grasp.
        The blue flames gutter and die. His followers scatter into
        the Parisian night. The rally is broken.
