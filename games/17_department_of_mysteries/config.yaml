schema_version: 1
license: fan_work
fan_work_source: "Harry Potter (J.K. Rowling / Warner Bros.)"
name: "Department of Mysteries — Harry Potter"
difficulty: 2
description: |
  Ministry of Magic, June 1996. Harry Potter and five members of
  Dumbledore's Army have broken into the Department of Mysteries
  to rescue Sirius Black — except it's a trap. Death Eaters led
  by Lucius Malfoy emerge from the shadows, demanding the prophecy.
  Six teenagers against eight dark wizards, in a labyrinth of stone
  corridors and shelves of glowing orbs. All they need to do is
  survive until the Order of the Phoenix arrives.
  Inspired by the Battle of the Department of Mysteries from Harry Potter by J.K. Rowling.

