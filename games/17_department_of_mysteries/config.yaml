terrain_types:
  stone_wall:
    display_name: Stone Wall
    move_cost: 99
    defense_bonus: 0
    passable: false
    glyph: "#"
    color: bright_black
    description: |
      Black stone walls of the Ministry's deepest level. Ancient,
      cold, and impervious to most spells.

  veil:
    display_name: The Veil
    description: |
      A tattered black curtain fluttering in an unfelt wind, set in a
      stone archway. The whispers of the dead seep through it. Anyone
      who lingers near the veil fights distracted and exposed.
      Cost 1, -1 DEF. A dangerous shortcut through the heart of the
      Department.
    move_cost: 1
    defense_bonus: -1
    glyph: "V"
    color: magenta

  prophecy_shelf:
    display_name: Prophecy Shelf
    move_cost: 2
    defense_bonus: 1
    glyph: "~"
    color: blue
    description: |
      Towering shelves of glass orbs, each containing a recorded
      prophecy. They glow with pale blue light and shatter
      spectacularly when hit by stray curses. +1 DEF, costs 2 to enter.

  planet_orb:
    display_name: Floating Planet
    move_cost: 2
    defense_bonus: 1
    glyph: "O"
    color: bright_blue
    description: |
      Miniature planets float through this room in slow orbits,
      casting eerie light and shadow. They provide partial cover
      but disorient anyone trying to move through them.

  time_bell:
    display_name: Time Bell Jar
    move_cost: 2
    defense_bonus: 0
    glyph: "T"
    color: bright_yellow
    description: |
      A crystal bell jar containing a hummingbird that endlessly
      cycles through birth, life, and death. Time flows strangely
      near it — movement is sluggish and unpredictable.

  brain_tank:
    display_name: Brain Tank
    move_cost: 2
    defense_bonus: -1
    glyph: "B"
    color: green
    description: |
      Tanks of sickly green liquid containing floating human brains.
      Tendrils of thought lash out at anyone who gets too close,
      wrapping around them and burning. -1 DEF, costs 2 to enter.

unit_classes:
  harry:
    display_name: Harry Potter
    description: |
      The Boy Who Lived. Fifteen years old, driven by a vision
      that may be a lie, wielding a holly wand that has saved him
      before. He fights with more courage than skill — Expelliarmus
      against Avada Kedavra.
    hp_max: 24
    atk: 10
    defense: 3
    res: 7
    spd: 6
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "H"
    color: bright_yellow

  hermione:
    display_name: Hermione Granger
    description: |
      The brightest witch of her age. She knows spells most
      adults haven't mastered — Silencio, Petrificus Totalus,
      Protego. Her mind is her deadliest weapon.
    hp_max: 20
    atk: 9
    defense: 3
    res: 8
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    can_heal: true
    heal_amount: 6
    glyph: "E"
    color: bright_cyan

  ron:
    display_name: Ron Weasley
    description: |
      Sixth son, eternal sidekick, braver than he believes. His
      wand-work is unpolished but fierce. Weasley courage runs
      deep — he walked into a nest of giant spiders for Harry.
    hp_max: 20
    atk: 8
    defense: 4
    res: 5
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "R"
    color: bright_red

  neville:
    display_name: Neville Longbottom
    description: |
      Clumsy, overlooked, and underestimated. But Neville was
      almost the Chosen One, and tonight he fights with the
      stubborn courage that will one day kill a Horcrux.
    hp_max: 26
    atk: 7
    defense: 7
    res: 4
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "N"
    color: green

  luna:
    display_name: Luna Lovegood
    description: |
      Dreamy, strange, and utterly unafraid. Luna duels Death
      Eaters with serene calm, as though cursing dark wizards
      is no more alarming than spotting a Crumple-Horned Snorkack.
      Her Patronus charm mends wounds with gentle silver light.
    hp_max: 18
    atk: 9
    defense: 2
    res: 6
    spd: 5
    move: 3
    rng_min: 2
    rng_max: 3
    is_magic: true
    can_heal: true
    heal_amount: 6
    glyph: "L"
    color: bright_blue

  ginny:
    display_name: Ginny Weasley
    description: |
      The youngest Weasley — and the most talented. Her Bat-Bogey
      Hex is legendary. She fights with a ferocity that surprises
      even the Death Eaters.
    hp_max: 18
    atk: 9
    defense: 3
    res: 6
    spd: 6
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "G"
    color: bright_red

  lucius:
    display_name: Lucius Malfoy
    description: |
      Silken-tongued aristocrat with a serpent-headed cane that
      conceals his wand. He wants the prophecy intact — the Dark
      Lord's orders are clear. Dangerous when cornered, cowardly
      when outmatched.
    hp_max: 24
    atk: 10
    defense: 3
    res: 6
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "M"
    color: bright_red

  bellatrix:
    display_name: Bellatrix Lestrange
    description: |
      The Dark Lord's most devoted servant. Mad, brilliant, and
      cruel beyond measure. She duels to kill, and her Cruciatus
      Curse has broken stronger minds than these children's.
    hp_max: 22
    atk: 12
    defense: 2
    res: 5
    spd: 7
    move: 4
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "B"
    color: magenta

  dolohov:
    display_name: Antonin Dolohov
    description: |
      A veteran of the first war — he killed the Prewett brothers.
      Silent and methodical, his purple-flame curse nearly kills
      Hermione. One of Voldemort's most dangerous soldiers.
    hp_max: 22
    atk: 11
    defense: 3
    res: 5
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "D"
    color: bright_black

  rookwood:
    display_name: Augustus Rookwood
    description: |
      Former Unspeakable who worked in the Department of Mysteries
      itself — he knows every room, every corridor, every trap.
      His specialty is explosive curses hurled from a distance,
      detonating shelves and stone alike. Fights from range and
      punishes anyone who clusters together.
    hp_max: 18
    atk: 10
    defense: 2
    res: 6
    spd: 5
    move: 3
    rng_min: 2
    rng_max: 3
    is_magic: true
    glyph: "K"
    color: bright_black

  nott:
    display_name: Nott Sr.
    description: |
      One of the original Death Eaters — old, slow, and mean.
      What he lacks in speed he makes up for in sheer durability
      and dark-arts knowledge accumulated over decades. He
      absorbs punishment that would drop a younger wizard and
      keeps coming.
    hp_max: 26
    atk: 8
    defense: 5
    res: 6
    spd: 3
    move: 2
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "O"
    color: bright_black

  jugson:
    display_name: Jugson
    description: |
      A lean, vicious Death Eater who closes distance before
      his target can blink. He fights like a duelist from the
      old school — one devastating curse at point-blank range,
      then gone before the counter-spell arrives. Glass-cannon
      speed over everything.
    hp_max: 16
    atk: 11
    defense: 2
    res: 4
    spd: 8
    move: 4
    rng_min: 1
    rng_max: 1
    is_magic: true
    glyph: "J"
    color: bright_black

  death_eater:
    display_name: Death Eater
    description: |
      Masked servants of Voldemort in black robes. Pureblood
      fanatics who revel in cruelty. Individually capable, but
      they're used to fighting people who are afraid of them —
      these teenagers are not.
    hp_max: 20
    atk: 8
    defense: 3
    res: 5
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "x"
    color: bright_black

  sirius:
    display_name: Sirius Black
    description: |
      Harry's godfather, escaped Azkaban prisoner, and member
      of the Order. He fights with reckless joy — the grin of
      a man who has nothing left to lose.
    hp_max: 26
    atk: 11
    defense: 4
    res: 6
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "S"
    color: white

  lupin:
    display_name: Remus Lupin
    description: |
      Werewolf, former professor, and the quiet backbone of the
      Order. His dueling is textbook-precise — Defense Against
      the Dark Arts was always his subject.
    hp_max: 24
    atk: 10
    defense: 4
    res: 6
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "r"
    color: yellow

  tonks:
    display_name: Nymphadora Tonks
    description: |
      Metamorphmagus and Auror. Young, clumsy off the battlefield,
      lethal on it. Her hair flashes pink as she hurls hexes with
      both hands.
    hp_max: 22
    atk: 10
    defense: 3
    res: 5
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "T"
    color: magenta

  moody:
    display_name: Alastor "Mad-Eye" Moody
    description: |
      Retired Auror, scarred veteran of the first war. His magical
      eye sees through walls, disguises, and lies. The most
      paranoid man alive — and the most dangerous.
    hp_max: 28
    atk: 11
    defense: 5
    res: 7
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 3
    is_magic: true
    glyph: "X"
    color: bright_yellow

armies:
  blue:
    # DA scattered across the Department
    # Harry and Neville in the Prophecy Hall
    - {class: harry, pos: {x: 3, y: 2}}
    - {class: neville, pos: {x: 5, y: 3}}
    # Hermione in the Time Room
    - {class: hermione, pos: {x: 3, y: 7}}
    # Ron in the south corridor
    - {class: ron, pos: {x: 7, y: 11}}
    # Luna in the Planet Room
    - {class: luna, pos: {x: 16, y: 2}}
    # Ginny just inside the Death Chamber doorway
    - {class: ginny, pos: {x: 9, y: 6}}

  red:
    # Death Eaters entering from multiple points
    # Lucius and Dolohov through north entrance
    - {class: lucius, pos: {x: 9, y: 2}}
    - {class: dolohov, pos: {x: 11, y: 2}}
    # Bellatrix from the south
    - {class: bellatrix, pos: {x: 10, y: 12}}
    # Rookwood knows the Department — he's in the Brain Room
    - {class: rookwood, pos: {x: 17, y: 7}}
    # Nott blocking the south corridor
    - {class: nott, pos: {x: 3, y: 12}}
    # Jugson flanking from the east
    - {class: jugson, pos: {x: 18, y: 11}}
    # Death Eaters at separate entry points
    - {class: death_eater, pos: {x: 15, y: 12}}
    # Prowls the western south corridor, stalking behind the DA line
    - {class: death_eater, pos: {x: 1, y: 10}}

rules:
  max_turns: 16
  first_player: blue

win_conditions:
  # Harry dies -> blue loses
  - {type: protect_unit, unit_id: u_b_harry_1, owning_team: blue}
  # Harry survives the turn cap -> the Order saved them, blue wins
  - {type: protect_unit_survives, unit_id: u_b_harry_1, owning_team: blue}
  # Either side wins by total elimination
  - {type: eliminate_all_enemy_units}
  # Backstop
  - {type: max_turns_draw}

plugin_hooks:
  on_turn_start:
    - order_reinforcements

narrative:
  title: Department of Mysteries
  description: |
    Ministry of Magic, June 1996. Six members of Dumbledore's
    Army are trapped in the Department of Mysteries with eight
    Death Eaters. The Order of the Phoenix is coming — but
    will they arrive in time?
  intro: |
    The prophecy glows in Harry's hand. Lucius Malfoy's voice
    echoes through the Hall of Prophecy: "Very good, Potter.
    Now turn around, nice and slowly, and give that to me."
    Shelves of glass orbs stretch into the darkness in every
    direction. Somewhere behind the masks, wands are rising.
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        Prophecy orbs shatter in cascades of blue-white light
        as curses fly wide. The whispering ghosts of a hundred
        seers fill the air with fragments of foretelling.
    - trigger: on_turn_start
      turn: 6
      text: |
        The DA retreats through the Department, fighting room
        to room. Hermione falls behind, dueling Dolohov alone
        in the dark.
    - trigger: on_turn_start
      turn: 8
      text: |
        A door bursts open. Sirius Black, Remus Lupin,
        Nymphadora Tonks, and Mad-Eye Moody charge into the
        fray — the Order of the Phoenix has arrived! Four
        reinforcements join the fight for blue.
    - trigger: on_unit_killed
      unit_id: u_b_harry_1
      text: |
        The prophecy shatters on the stone floor. Nobody will
        ever hear its words. The Death Eaters have won — and
        the Dark Lord's victory is assured.
    - trigger: on_unit_killed
      unit_id: u_r_bellatrix_1
      text: |
        Bellatrix's mad laughter is cut short. The most
        dangerous Death Eater in the room falls silent.
