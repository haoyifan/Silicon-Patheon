# 神秘事务司 — 中文本地化
name: 神秘事务司
description: |
  魔法部，1996年6月。哈利·波特和邓布利多军五名成员闯入
  神秘事务司营救小天狼星·布莱克——但这是个陷阱。卢修斯·马尔福
  率领的食死徒从暗处现身，索要预言球。六个少年对十个黑巫师，
  在石头走廊和发光球体架之间的迷宫中。他们只需要撑到
  凤凰社赶来。

terrain_types:
  stone_wall:
    display_name: "石墙"
    description: "魔法部最深层的黑色石墙。古老、冰冷，对大多数咒语免疫。"
  prophecy_shelf:
    display_name: "预言架"
    description: "高耸的玻璃球架，每个球中封存一段预言。发出淡蓝色的光，被流弹击中时会壮观地碎裂。+1防御，进入消耗2移动。"

unit_classes:
  harry:
    display_name: 哈利·波特
    description: |
      大难不死的男孩。十五岁，被一个可能是谎言的幻象
      驱使，挥舞着曾多次拯救他的冬青木魔杖。以比技巧
      更多的勇气战斗——用除你武器对抗阿瓦达索命。
  hermione:
    display_name: 赫敏·格兰杰
    description: |
      她那个时代最聪明的女巫。掌握着大多数成年人都没有
      精通的咒语——无声无息、统统石化、盔甲护身。
      她的头脑是最致命的武器。
  ron:
    display_name: 罗恩·韦斯莱
    description: |
      第六子，永远的配角，比他自己相信的更勇敢。
      魔杖技术粗糙但猛烈。韦斯莱的勇气根深蒂固——
      他为了哈利走进了巨蜘蛛巢穴。
  neville:
    display_name: 纳威·隆巴顿
    description: |
      笨拙、被忽视、被低估。但纳威几乎成了被选中的人，
      今夜他以终有一天会摧毁魂器的顽强勇气战斗。
  luna:
    display_name: 卢娜·洛夫古德
    description: |
      梦幻、古怪、完全无畏。卢娜以宁静的平静与食死徒
      决斗，仿佛诅咒黑巫师和发现弯角鼾兽一样稀松平常。
      她的守护神咒以柔和的银光治愈伤口。
  ginny:
    display_name: 金妮·韦斯莱
    description: |
      韦斯莱家最小的——也是最有天赋的。她的蝙蝠精鼻涕咒
      堪称传奇。她的凶猛连食死徒都感到惊讶。
  lucius:
    display_name: 卢修斯·马尔福
    description: |
      言辞圆滑的贵族，蛇头手杖中藏着魔杖。他要预言球
      完好无损——黑魔王的命令很明确。被逼入绝境时危险，
      被压制时怯懦。
  bellatrix:
    display_name: 贝拉特里克斯·莱斯特兰奇
    description: |
      黑魔王最忠诚的仆人。疯狂、才华横溢、残忍至极。
      以杀意决斗，她的钻心咒击碎过比这些孩子更坚强的意志。
  dolohov:
    display_name: 安东宁·多洛霍夫
    description: |
      第一次战争的老兵——杀死了普威特兄弟。沉默而有条不紊，
      他的紫焰咒差点杀死赫敏。伏地魔最危险的战士之一。
  death_eater:
    display_name: 食死徒
    description: |
      伏地魔的黑袍蒙面仆人。纯血狂热者，以残忍为乐。
      个体能力不俗，但他们习惯了对付害怕他们的人——
      这些少年并不害怕。
  sirius:
    display_name: 小天狼星·布莱克
    description: |
      哈利的教父，越狱的阿兹卡班囚犯，凤凰社成员。
      以无所顾忌的快乐战斗——一个已经没什么好失去的人的笑容。
  lupin:
    display_name: 莱姆斯·卢平
    description: |
      狼人，前教授，凤凰社的安静支柱。他的决斗术
      教科书般精准——黑魔法防御术一直是他的科目。
  tonks:
    display_name: 尼法朵拉·唐克斯
    description: |
      易容马格斯和傲罗。年轻、战场外笨手笨脚、
      战场上致命。她的头发在双手挥洒咒语时闪着粉色。
  moody:
    display_name: 阿拉斯托·"疯眼"·穆迪
    description: |
      退休傲罗，第一次战争的伤痕累累老兵。他的魔眼
      能看穿墙壁、伪装和谎言。活着的人中最偏执的——
      也是最危险的。

terrain_types:
  stone_wall:
    description: |
      魔法部最深层的黑色石墙。古老、寒冷，对大多数
      咒语免疫。
  prophecy_shelf:
    description: |
      高耸的玻璃球架，每个球中记录着一则预言。它们
      散发着淡蓝色的光芒，被流弹咒语击中时碎裂壮观。

narrative:
  title: 神秘事务司
  description: |
    魔法部，1996年6月。邓布利多军六名成员与十名食死徒
    被困在神秘事务司中。凤凰社正在赶来——但他们能
    及时赶到吗？
  intro: |
    预言球在哈利手中发光。卢修斯·马尔福的声音在预言厅
    回响："很好，波特。现在慢慢转过身，把那东西给我。"
    玻璃球架在黑暗中向各个方向延伸。面具后面的某处，
    魔杖正在举起。
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        预言球在蓝白色光芒中成片碎裂，咒语偏飞。
        一百个先知的低语幽灵充满空气中，飘散着
        预言的碎片。
    - trigger: on_turn_start
      turn: 6
      text: |
        邓布利多军逐室后退，边打边撤。赫敏落在后面，
        在黑暗中独自与多洛霍夫决斗。
    - trigger: on_turn_start
      turn: 10
      text: |
        一扇门轰然打开。小天狼星·布莱克、莱姆斯·卢平、
        尼法朵拉·唐克斯和疯眼穆迪冲入战场——凤凰社
        到了！四名援军加入蓝方战斗。
    - trigger: on_unit_killed
      unit_id: u_b_harry_1
      text: |
        预言球在石地板上碎裂。再也没人会听到它的内容。
        食死徒赢了——黑魔王的胜利已成定局。
    - trigger: on_unit_killed
      unit_id: u_r_bellatrix_1
      text: |
        贝拉特里克斯疯狂的笑声戛然而止。房间里最危险
        的食死徒沉默了。
