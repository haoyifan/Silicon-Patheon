# 特罗斯特区之战 — 中文本地化
name: 特罗斯特区之战
description: |
  特罗斯特区，罗塞之墙。超大型巨人踹开墙壁缺口，
  巨人蜂拥而入。调查兵团和驻屯兵团发起绝望的区域防御。
  三笠、阿尔敏和利威尔兵长在前线战斗，等待艾伦在第8回合
  变身。变身后的艾伦必须到达缺口处用巨石封住罗塞之墙。

unit_classes:
  mikasa:
    display_name: 三笠·阿克曼
    description: |
      人类第二强战士。她的战斗本能在同期生中无人能及——
      以阿克曼的冷酷精准战斗。必须不惜一切保护她。
  armin:
    display_name: 阿尔敏·阿尔雷特
    description: |
      体能最弱的士兵，但兵团中最敏锐的头脑。他的战术计划
      拯救的生命比任何刀刃都多。用信号弹和诱敌在远程战斗。
  levi:
    display_name: 利威尔兵长
    description: |
      人类最强战士。旋转斩击技术能切开任何巨人的后颈。
      速度10——在全场碾压一切。
  survey_corps:
    display_name: 调查兵团士兵
    description: |
      自由之翼。装备立体机动装置和超硬质钢刀的精英
      巨人战斗者。快速灵活——天生适合城市战。
  garrison:
    display_name: 驻屯兵团士兵
    description: |
      城墙驻屯部队。技术不及调查兵团但数量更多。
      操作炮台并守住防线。
  medic_corps:
    display_name: 驻屯兵团军医
    description: |
      驻屯兵团的战地军医。在巨人推进时在防线后方
      照料伤兵。
  eren_titan:
    display_name: 艾伦（进击的巨人）
    description: |
      艾伦·耶格尔的进击巨人形态。十五米高的愤怒和
      硬化拳头。他必须扛起巨石到达缺口封住罗塞之墙——
      人类唯一的希望。
  armored_titan:
    display_name: 铠之巨人
    description: |
      全身覆盖硬化巨人皮肤，几乎不受刀刃和炮火影响。
      缓慢但不可阻挡——防御14使其成为行走的堡垒。
  titan:
    display_name: 巨人
    description: |
      普通巨人——三到十五米的无脑饥饿怪物。
      坚韧而强壮但缓慢。只能通过切割后颈来击杀。
  abnormal_titan:
    display_name: 奇行种
    description: |
      行为不可预测的巨人，会奔跑、跳跃，忽略正常猎物
      转而攻击战略目标。比普通巨人更快更难预测。

terrain_types:
  building:
    description: |
      特罗斯特区建筑。调查兵团士兵将其作为立体机动
      装置的锚点，在屋顶之间荡来荡去砍击巨人后颈。
  titan_wall:
    description: |
      罗塞之墙——五十米高的硬化材质，一百年来将
      巨人拒之门外。除缺口外不可通行。

narrative:
  title: 特罗斯特区之战
  description: |
    特罗斯特区——人类第一次反击的战斗。调查兵团守卫
    罗塞之墙的缺口，等待艾伦的巨人化变身。
  intro: |
    特罗斯特上空烟雾升起。超大型巨人出现，踹开城门后
    消失了。现在巨人从缺口涌入，驻屯兵团忙着疏散平民，
    调查兵团投入战斗。
  events:
    - trigger: on_turn_start
      turn: 4
      text: |
        巨人深入区内。建筑在为人类而非十五米怪物设计的
        街道中被它们趟过时崩塌。
    - trigger: on_turn_start
      turn: 8
      text: |
        一道闪电击入墙内。一名士兵站过的地方，一尊
        十五米巨人拔地而起——艾伦·耶格尔变身了。
        他举起巨石。阿尔敏嘶吼着计划：
        "扛到缺口去！"
    - trigger: on_unit_killed
      unit_id: u_b_mikasa_1
      text: |
        三笠倒在巨人手下。104期最强者——陨落了。
        没有她，防御崩溃，撤退变成溃逃。
