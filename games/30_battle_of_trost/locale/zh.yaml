# 特罗斯特区攻防战 — 中文本地化
name: 特罗斯特区攻防战
description: |
  特罗斯特区，罗塞之墙。超大型巨人一脚踢开了墙壁上的缺口，
  巨人从缺口蜂拥而入。调查兵团和驻屯兵团对该区展开殊死防御。
  三笠、阿尔敏和利威尔兵长坚守防线，等待艾伦在第8回合变身。
  艾伦在北墙附近出现，必须穿过巨人出没的城区，
  抵达南方缺口（7, 10）用巨石封堵。

unit_classes:
  mikasa:
    display_name: 三笠·阿克曼
    description: |
      人类第二强战士。她的战斗本能在同期生中无人能及——
      以阿克曼一族的冷静精准作战。不惜一切代价保护她。
  armin:
    display_name: 阿尔敏·阿诺德
    description: |
      体能最弱的士兵，却拥有兵团中最敏锐的头脑。他的战术
      方案拯救的生命比任何刀刃都多。以信号弹和牵制战术
      进行远程作战。
  levi:
    display_name: 利威尔兵长
    description: |
      人类最强战士。他的旋转斩击技能可以切穿任何巨人的
      后颈。速度10——远超战场上的所有人。
  survey_corps:
    display_name: 调查兵团士兵
    description: |
      自由之翼。装备立体机动装置和超硬质钢刀刃的精英
      巨人战士。快速且灵活——天生适合城市战。
  garrison:
    display_name: 驻屯兵团士兵
    description: |
      城墙驻守部队。技术不如调查兵团但人数更多。他们
      操纵固定炮台，坚守防线。
  medic_corps:
    display_name: 驻屯兵团医护兵
    description: |
      驻屯兵团的战地医护兵。在巨人推进时于防线后方
      救治伤员。
  eren_titan:
    display_name: 艾伦（进击的巨人）
    description: |
      艾伦·耶格尔的进击巨人形态。十五米高的愤怒与硬化
      拳头。他必须扛着巨石到达缺口，封堵罗塞之墙——
      人类唯一的希望。
  armored_titan:
    display_name: 铠之巨人
    description: |
      包裹在硬化巨人皮肤中，几乎免疫刀刃和炮弹。缓慢但
      不可阻挡——防御力14使其成为行走的堡垒。
  titan:
    display_name: 巨人
    description: |
      普通巨人——三到十五米高的无脑饥饿怪物。坚韧且力大
      但缓慢。只有切断后颈才能将其击杀。
  abnormal_titan:
    display_name: 奇行种
    description: |
      行为不可预测的巨人，会奔跑、跳跃，无视普通猎物而
      瞄准战略目标。比普通巨人更快、更难预判。

terrain_types:
  building:
    description: |
      特罗斯特区的建筑。调查兵团士兵将其作为立体机动装置
      的锚点，在屋顶之间穿梭以斩击巨人后颈。
  titan_wall:
    description: |
      罗塞之墙——五十米高的硬化材质，百年来将巨人阻隔在外。
      除缺口外不可通行。

narrative:
  title: 特罗斯特区攻防战
  description: |
    特罗斯特区——人类首次反击之战。调查兵团防守罗塞之墙的
    缺口，等待艾伦的巨人化变身。
  intro: |
    特罗斯特上空浓烟滚滚。超大型巨人出现，踢开城门后消失。
    巨人从缺口涌入，驻屯兵团紧急疏散平民，调查兵团投入战斗。
  events:
    - trigger: on_turn_start
      turn: 4
      text: |
        巨人深入城区。它们穿过为人类设计的街道，建筑在
        十五米巨兽的冲击下纷纷崩塌。
    - trigger: on_turn_start
      turn: 8
      text: |
        一道闪电劈入墙内。曾站着一名学员的位置，一个十五米
        高的巨人拔地而起——艾伦·耶格尔完成了巨人化变身。
        他搬起巨石。阿尔敏嘶声喊出计划："把它搬到缺口去！"
    - trigger: on_unit_killed
      unit_id: u_b_mikasa_1
      text: |
        三笠被巨人击倒。第104期最强者——陨落了。没有她，
        防线崩溃，撤退变成溃败。
