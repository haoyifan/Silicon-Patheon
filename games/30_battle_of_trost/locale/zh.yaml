# 特罗斯特区攻防战 — 中文本地化
name: 特罗斯特区攻防战 — 进击的巨人
description: |
  特罗斯特区，罗塞之墙。超大型巨人一脚踢开了墙壁上的缺口，
  巨人从缺口蜂拥而入。调查兵团和驻屯兵团对该区展开殊死防御。
  三笠、阿尔敏和利威尔兵长坚守防线，等待艾伦在第4回合变身。
  艾伦在北墙附近出现，必须穿过巨人出没的城区，
  抵达南方缺口（7, 10）用巨石封堵。

unit_classes:
  eren:
    display_name: 艾伦·耶格尔（进击的巨人）
    description: |
      艾伦的进击巨人形态。十五米的愤怒与硬化拳头。
      VIP——他必须扛着巨石到达y=10的缺口，封堵罗塞之墙。
  mikasa:
    display_name: 三笠·阿克曼
    description: |
      人类第二强战士。她的战斗本能在同期生中无人能及——
      以阿克曼一族的冷静精准作战。不惜一切代价保护她。
  armin:
    display_name: 阿尔敏·阿诺德
    description: |
      体能最弱的士兵，却拥有兵团中最敏锐的头脑。他的战术
      方案拯救的生命比任何刀刃都多。以信号弹和牵制战术
      进行远程作战。
  levi:
    display_name: 利威尔兵长
    description: |
      人类最强战士。他的旋转斩击技能可以切穿任何巨人的
      后颈。速度10——远超战场上的所有人。
  jean:
    display_name: 让·基尔希坦
    description: |
      第104期的天生领袖。战术意识强，压力下冷静沉着。
      全能型战士，直觉出色。
  connie:
    display_name: 柯尼·斯普林格
    description: |
      体型小巧速度快，擅长快速迂回。使用雷枪——对巨人
      的爆炸武器，造成魔法伤害绕过硬化皮肤。
  survey_corps:
    display_name: 调查兵团士兵
    description: |
      自由之翼。装备立体机动装置和超硬质钢刀刃的精英
      巨人战士。快速且灵活——天生适合城市战。
  garrison:
    display_name: 驻屯兵团士兵
    description: |
      城墙驻守部队。技术不如调查兵团但人数更多。他们
      操纵固定炮台，坚守防线。
  medic_corps:
    display_name: 驻屯兵团医护兵
    description: |
      驻屯兵团的战地医护兵。在巨人推进时于防线后方
      救治伤员。
  eren_titan:
    display_name: 艾伦（进击的巨人）
    description: |
      艾伦·耶格尔的进击巨人形态。十五米高的愤怒与硬化
      拳头。他必须扛着巨石到达缺口，封堵罗塞之墙——
      人类唯一的希望。
  armored_titan:
    display_name: 铠之巨人
    description: |
      包裹在硬化巨人皮肤中，几乎免疫刀刃和炮弹。缓慢但
      不可阻挡——防御力14使其成为行走的堡垒。
  titan:
    display_name: 巨人
    description: |
      普通巨人——三到十五米高的无脑饥饿怪物。坚韧且力大
      但缓慢。只有切断后颈才能将其击杀。
  abnormal_titan:
    display_name: 奇行种
    description: |
      行为不可预测的巨人，会奔跑、跳跃，无视普通猎物而
      瞄准战略目标。比普通巨人更快、更难预判。
  titan_crusher:
    display_name: 粉碎者（15米巨人）
    description: |
      巨大的十五米级巨人，抓住猎物后碾碎。缓慢但攻击力
      极高。纯粹的蛮力。
  titan_sprinter:
    display_name: 冲刺者（奇行种）
    description: |
      四肢着地奔跑的奇行种。无视普通猎物，专攻战略
      位置。速度快且不可预判。
  titan_spitter:
    display_name: 喷吐者（远程奇行种）
    description: |
      喷射灼热液体的畸形奇行种。远程魔法伤害——酸液
      腐蚀立体机动装置和铠甲。
  titan_ambusher:
    display_name: 潜伏者（伏击巨人）
    description: |
      隐藏在建筑间伺机偷袭的狡猾奇行种。以其体型而言
      速度和隐蔽性都出人意料。
  titan_siege:
    display_name: 破坏者（攻城巨人）
    description: |
      投掷瓦砾和碎石的十二米级巨人。远程物理攻击，
      摧毁建筑、驱散防御者。缓慢但远程威胁大。

terrain_types:
  rooftop:
    display_name: 屋顶
    description: |
      特罗斯特区屋顶。立体机动装置的锚点——调查兵团士兵
      在屋顶间穿梭，斩击巨人后颈。
  street:
    display_name: 街道
    description: |
      特罗斯特区的开阔街道。无法抵挡巨人的攻击。
  building:
    display_name: 建筑
    description: |
      特罗斯特区的建筑。调查兵团士兵将其作为立体机动装置
      的锚点，在屋顶之间穿梭以斩击巨人后颈。
  rubble:
    display_name: 废墟
    description: |
      巨人袭击后坍塌的建筑和碎石。困难地形，减缓移动
      但提供掩护。
  wall_top:
    display_name: 墙顶
    description: |
      罗塞之墙的顶部。高处射击阵地，为远程单位提供极佳
      的缺口俯瞰视野。防御方的有利阵地。
  titan_wall:
    display_name: 巨人之墙
    description: |
      罗塞之墙——五十米高的硬化材质，百年来将巨人阻隔在外。
      除缺口外不可通行。

narrative:
  title: 特罗斯特区攻防战
  description: |
    特罗斯特区——人类首次反击之战。调查兵团防守罗塞之墙的
    缺口，等待艾伦的巨人化变身。
  intro: |
    特罗斯特上空浓烟滚滚。超大型巨人出现，踢开城门后消失。
    巨人从缺口涌入，驻屯兵团紧急疏散平民，调查兵团投入战斗。
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        巨人深入城区。它们穿过为人类设计的街道，建筑在
        十五米巨兽的冲击下纷纷崩塌。
    - trigger: on_turn_start
      turn: 4
      text: |
        一道闪电劈入墙内。曾站着一名学员的位置，一个十五米
        高的巨人拔地而起——艾伦·耶格尔完成了巨人化变身。
        他搬起巨石。阿尔敏嘶声喊出计划："把它搬到缺口去！"
    - trigger: on_turn_start
      turn: 7
      text: |
        艾伦的巨人形态在蒸汽和裂缝中挣扎前行。
        缺口近在咫尺。
    - trigger: on_turn_start
      turn: 11
      text: |
        缺口近在咫尺。艾伦的巨人形态蒸汽缭绕、遍布裂纹，
        但凭借纯粹的意志力仍在坚持。穿过巨人群的最后一击。
    - trigger: on_unit_killed
      unit_id: u_b_eren_1
      text: |
        艾伦的巨人形态轰然倒塌。巨石滚落一旁。
        人类封堵缺口的唯一机会——没了。
        巨人从缺口源源涌入。
