schema_version: 1
license: public_domain
name: Kadesh
difficulty: 4
description: |
  May, 1274 BC. Pharaoh Ramses II marches north into Hittite
  territory to retake the city of Kadesh on the Orontes. Bedouins,
  paid by the Hittite king Muwatalli II, feed Ramses false
  intelligence; he advances with only one of his four divisions.
  Hittite chariots ambush the strung-out Egyptian column from the
  flank. Ramses, separated from most of his army, rallies his
  household guard and counter-charges in person. Both kings later
  claim victory; the surviving treaty is the earliest recorded
  peace agreement in history. The chariot is the showpiece of the
  Bronze Age, and this is its biggest stage.
  Inspired by the Battle of Kadesh (1274 BC), ancient Egypt vs Hittite Empire.

board:
  width: 10
  height: 8
  terrain:
    # Orontes River — runs east-west across the center (row 3).
    # Mostly impassable with two ford crossings.
    - {x: 0, y: 3, type: river}
    - {x: 1, y: 3, type: river}
    - {x: 2, y: 3, type: river}
    - {x: 3, y: 3, type: ford}      # western ford
    - {x: 4, y: 3, type: river}
    - {x: 5, y: 3, type: river}
    - {x: 6, y: 3, type: ford}      # eastern ford
    - {x: 7, y: 3, type: river}
    - {x: 8, y: 3, type: river}
    - {x: 9, y: 3, type: river}
    # Hills on the western bank — rough terrain, good defensive ground
    - {x: 0, y: 2, type: hill}
    - {x: 1, y: 2, type: hill}
    - {x: 0, y: 5, type: hill}
    # Hills on the eastern side
    - {x: 8, y: 5, type: hill}
    - {x: 9, y: 5, type: hill}
    # Dust cloud on the eastern flank — conceals the chariot ambush
    - {x: 8, y: 4, type: dust_cloud}
    - {x: 9, y: 4, type: dust_cloud}
    - {x: 8, y: 3, type: dust_cloud}
    - {x: 9, y: 3, type: dust_cloud}
    # Open plains fill the rest of the map (default terrain)
  forts:
    # Kadesh fortress — Red-owned, north side of the river
    - {x: 5, y: 1, owner: red}

terrain_types:
  river:
    display_name: River
    description: The Orontes — impassable deep water.
    move_cost: 99
    passable: false
    glyph: "~"
    color: blue
  ford:
    display_name: Ford
    description: Shallow river crossing. Costs 2 movement.
    move_cost: 2
    defense_bonus: 0
    glyph: "="
    color: yellow
  dust_cloud:
    display_name: Dust Cloud
    description: |
      A billowing cloud of dust kicked up by chariot wheels on the
      dry eastern plain. Blocks line of sight. Units inside fight blind.
    move_cost: 1
    defense_bonus: 0
    blocks_sight: true
    glyph: "%"
    color: yellow
  hill:
    display_name: Hill
    description: Elevated rocky ground. +2 DEF. Blocks cavalry charges.
    move_cost: 2
    defense_bonus: 2
    blocks_cavalry: true
    glyph: "^"
    color: yellow

unit_classes:
  ramses:
    display_name: Ramses II
    description: |
      Pharaoh of Egypt, chariot commander and VIP. Twenty-five years
      old at Kadesh, he personally rallies his troops when the line
      breaks. Fast, hard-hitting, and inspires those around him.
    hp_max: 36
    atk: 11
    defense: 6
    res: 4
    spd: 7
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [vip, pharaoh, chariot]
    sight: 5
    glyph: R
    color: bright_cyan

  amenmesse:
    display_name: General Amenmesse
    description: |
      Veteran Egyptian infantry general. Steady, disciplined,
      commands the foot soldiers of the Amun division. Tough and
      hard to dislodge from a position.
    hp_max: 22
    atk: 8
    defense: 6
    res: 4
    spd: 4
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry, general]
    sight: 3
    glyph: G
    color: cyan

  khaemwaset:
    display_name: Prince Khaemwaset
    description: |
      Royal prince and archer captain. Commands the composite-bow
      detachment. Good range and accuracy but fragile in melee.
    hp_max: 16
    atk: 9
    defense: 3
    res: 3
    spd: 5
    rng_min: 2
    rng_max: 3
    move: 4
    tags: [archer, captain]
    sight: 4
    glyph: K
    color: cyan

  nubian_scout:
    display_name: Nubian Scout
    description: |
      Fast Nubian skirmisher armed with a short bow. Excellent
      mobility and sight range; strikes from a distance but cannot
      take a punch.
    hp_max: 14
    atk: 7
    defense: 2
    res: 2
    spd: 7
    rng_min: 2
    rng_max: 3
    move: 5
    tags: [archer, scout]
    sight: 5
    glyph: N
    color: cyan

  sherden_guard:
    display_name: Sherden Guard
    description: |
      Elite Sea Peoples bodyguard in Pharaoh's personal service.
      Heavy bronze armor, horned helm, round shield. The toughest
      melee fighter on the Egyptian side.
    hp_max: 26
    atk: 9
    defense: 7
    res: 5
    spd: 4
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry, elite, bodyguard]
    sight: 3
    glyph: S
    color: bright_cyan

  royal_charioteer:
    display_name: Royal Charioteer
    description: |
      Fast Egyptian light chariot — driver and bowman. Rapid flanking
      and pursuit. Cannot enter hills.
    hp_max: 20
    atk: 8
    defense: 4
    res: 3
    spd: 8
    rng_min: 1
    rng_max: 1
    move: 6
    can_enter_forest: false
    can_enter_mountain: false
    tags: [chariot, cavalry, light]
    sight: 4
    glyph: C
    color: cyan

  muwatalli:
    display_name: Muwatalli II
    description: |
      King of Hatti and VIP. Patient and calculating, he holds his
      reserves near Kadesh and lets his vassal chariots spring the
      trap. Well-armored but not reckless.
    hp_max: 32
    atk: 10
    defense: 6
    res: 4
    spd: 6
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [vip, king]
    sight: 5
    glyph: M
    color: bright_red

  hattusili:
    display_name: Hattusili
    description: |
      Muwatalli's brother and field general. A shrewd commander who
      will one day seize the throne. Strong all-rounder on foot.
    hp_max: 24
    atk: 9
    defense: 6
    res: 4
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry, general]
    sight: 4
    glyph: H
    color: red

  urhi_teshub:
    display_name: Urhi-Teshub
    description: |
      Muwatalli's son, a prince mounted on a heavy chariot. Fast
      and aggressive cavalry striker.
    hp_max: 22
    atk: 9
    defense: 5
    res: 3
    spd: 7
    rng_min: 1
    rng_max: 1
    move: 6
    can_enter_forest: false
    can_enter_mountain: false
    tags: [chariot, cavalry, prince]
    sight: 4
    glyph: U
    color: red

  hittite_champion:
    display_name: Hittite Champion
    description: |
      Elite heavy infantryman in full bronze scale. Slow but
      extremely durable and hits hard in melee.
    hp_max: 28
    atk: 10
    defense: 7
    res: 5
    spd: 4
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry, heavy, elite]
    sight: 3
    glyph: W
    color: bright_red

  hittite_archer:
    display_name: Hittite Archer
    description: |
      Anatolian bowman. Adequate range, weaker than the Egyptian
      composite-bow corps but useful for softening targets.
    hp_max: 14
    atk: 7
    defense: 3
    res: 3
    spd: 5
    rng_min: 2
    rng_max: 3
    move: 4
    tags: [archer]
    sight: 4
    glyph: A
    color: red

  hittite_chariot_captain:
    display_name: Hittite Chariot Captain
    description: |
      Three-man heavy chariot — driver, shield-bearer, spearman.
      Slower than Egyptian chariots but devastating in a charge.
    hp_max: 26
    atk: 9
    defense: 5
    res: 3
    spd: 7
    rng_min: 1
    rng_max: 1
    move: 6
    can_enter_forest: false
    can_enter_mountain: false
    tags: [chariot, heavy, captain]
    sight: 4
    glyph: T
    color: red

  syrian_ally:
    display_name: Syrian Ally
    description: |
      Fast Syrian vassal warrior on foot. Lightly armed flanker
      who excels at speed and harassment.
    hp_max: 16
    atk: 7
    defense: 3
    res: 2
    spd: 8
    rng_min: 1
    rng_max: 1
    move: 5
    tags: [infantry, light, flanker]
    sight: 4
    glyph: Y
    color: red

armies:
  blue:
    # Egyptian column — south side of the Orontes
    - {class: ramses, pos: {x: 4, y: 6}}
    - {class: amenmesse, pos: {x: 3, y: 7}}
    - {class: khaemwaset, pos: {x: 5, y: 7}}
    - {class: nubian_scout, pos: {x: 7, y: 6}}
    - {class: sherden_guard, pos: {x: 3, y: 6}}
    - {class: royal_charioteer, pos: {x: 5, y: 6}}
  red:
    # Hittite force — north side, near Kadesh fortress
    - {class: muwatalli, pos: {x: 5, y: 0}}
    - {class: hattusili, pos: {x: 4, y: 1}}
    - {class: urhi_teshub, pos: {x: 7, y: 1}}
    - {class: hittite_champion, pos: {x: 6, y: 1}}
    - {class: hittite_archer, pos: {x: 3, y: 2}}
    - {class: hittite_chariot_captain, pos: {x: 8, y: 2}}
    - {class: syrian_ally, pos: {x: 9, y: 2}}
    # Ambush chariots hidden in the dust cloud
    - {class: hittite_chariot_captain, pos: {x: 9, y: 4}}
    - {class: hittite_chariot_captain, pos: {x: 9, y: 3}}

rules:
  max_turns: 30
  fog_of_war: false
  first_player: red

win_conditions:
  # Protect your VIP — lose if your king falls
  - {type: protect_unit, unit_id: u_b_ramses_1, owning_team: blue}
  - {type: protect_unit, unit_id: u_r_muwatalli_1, owning_team: red}
  # Seize the enemy fort (Kadesh) to win
  - {type: seize_enemy_fort}
  # Wipe out all enemy units
  - {type: eliminate_all_enemy_units}
  - {type: max_turns_draw}

narrative:
  title: Kadesh
  description: |
    The earliest battle in recorded history with surviving accounts
    from both sides. Chariots in the open at the dawn of the
    Bronze Age.
  intro: |
    Noon on the plain south of Kadesh. The Orontes glints ahead,
    splitting the battlefield in two. Ramses, with only his Amun
    division, faces the river. On the far bank, Hittite chariots
    wait in the dust near the fortress walls.
  events:
    - trigger: on_turn_start
      turn: 2
      text: "Hittite chariots burst from cover east of the river. The trap is sprung."
    - trigger: on_turn_start
      turn: 6
      text: "Ramses rallies his guard. 'Set is at my side!'"
    - trigger: on_unit_killed
      unit_id: u_b_ramses_1
      text: "Pharaoh has fallen. The Egyptian line collapses."
    - trigger: on_unit_killed
      unit_id: u_r_muwatalli_1
      text: "Muwatalli is down. The Hittite line scatters."
