# 卡迭石之战 — 中文本地化
name: 卡迭石之战
description: |
  公元前1274年5月。法老拉美西斯二世率军北上进入赫梯领土，
  意图夺回奥伦特斯河畔的卡迭石城。赫梯王穆瓦塔利二世
  收买贝都因人传递假情报；拉美西斯仅带一个军团冒进。
  赫梯战车从侧翼伏击分散的埃及纵队。拉美西斯与大军
  分离，亲自率领亲卫反冲锋。两位国王后来都宣称胜利；
  留存至今的条约是人类历史上最早的和平协议。战车是
  青铜时代的明星武器，而这是它最大的舞台。

unit_classes:
  ramses:
    display_name: 拉美西斯二世
    description: |
      埃及法老，第十九王朝第三代。卡迭石之战时年仅二十五岁，
      亲自收拢溃兵反击。此后在位六十六年，成为"拉美西斯大帝"。
  egyptian_chariot:
    display_name: 埃及战车
    description: |
      双人轻型战车——车夫和一名复合弓手。比赫梯战车
      更快更灵活，但装甲更轻。不能进入森林或山地。
  egyptian_infantry:
    display_name: 埃及步兵
    description: |
      舍尔登雇佣兵和埃及征召兵。青铜斧，牛皮盾。
      可靠的战线士兵。
  egyptian_archer:
    display_name: 埃及弓箭手
    description: |
      战车屏障后的复合弓手。射程超过赫梯枪兵，
      但近战就完了。
  muwatalli:
    display_name: 穆瓦塔利二世
    description: |
      赫梯之王。将预备队留在东岸，让附庸战车发动伏击。
      耐心、精于算计。
  hittite_chariot:
    display_name: 赫梯战车
    description: |
      三人重型战车——车夫、持盾者、枪兵。比埃及战车
      更慢更容易陷坑，但近战冲锋毁灭性极强。不能进入森林。
  amenmesse:
    display_name: 阿蒙摩斯将军
    description: |
      经验丰富的埃及步兵将军。沉稳，纪律严明，
      指挥阿蒙军团的步兵。坚韧，阵地防御力极强。
  khaemwaset:
    display_name: 卡蒙瓦塞特王子
    description: |
      皇子，弓箭队长。指挥复合弓部队。射程远、
      精度高，但近战脆弱。
  nubian_scout:
    display_name: 努比亚斥候
    description: |
      手持短弓的努比亚快速散兵。机动性和视野出色；
      远程打击但经不起近战。
  sherden_guard:
    display_name: 舍尔登卫兵
    description: |
      法老近卫的精锐海上民族侍卫。厚重青铜铠甲，
      牛角盔，圆盾。埃及方最强近战战士。
  royal_charioteer:
    display_name: 皇家战车手
    description: |
      快速的埃及轻型战车——车夫和弓手各一。擅长
      快速侧翼包抄与追击。不能进入丘陵。
  hattusili:
    display_name: 哈图西利
    description: |
      穆瓦塔利之弟，野战将军。精明的指挥官，
      日后将夺取王位。步战型全能选手。
  urhi_teshub:
    display_name: 乌尔希-特舒布
    description: |
      穆瓦塔利之子，驾驶重型战车的王子。快速而
      好战的骑兵突击手。
  hittite_champion:
    display_name: 赫梯勇士
    description: |
      穿全身青铜鳞甲的精锐重步兵。缓慢但极其坚韧，
      近战打击力强悍。
  hittite_archer:
    display_name: 赫梯弓箭手
    description: |
      安纳托利亚弓手。射程尚可，但不及埃及复合弓部队，
      适合削弱目标。
  hittite_chariot_captain:
    display_name: 赫梯战车队长
    description: |
      三人重型战车——车夫、持盾者、枪兵。比埃及战车
      更慢但冲锋威力毁灭性极强。
  syrian_ally:
    display_name: 叙利亚附庸战士
    description: |
      快速的叙利亚附庸步兵。轻装侧翼骚扰手，
      擅长高速游击。
  hittite_spearman:
    display_name: 赫梯枪兵
    description: |
      安纳托利亚步兵。青铜矛，皮甲。占领战车夺取的阵地。

terrain_types:
  river:
    display_name: 河流
    description: |
      奥伦特斯河——不可通行。
  ford:
    display_name: 浅滩
    description: |
      浅滩渡口——唯一可以涉水过河的地点。
  hill:
    display_name: 丘陵
    description: |
      高地岩石地形。防御+2。阻止骑兵冲锋。

narrative:
  title: 卡迭石之战
  description: |
    有文字记录的最早战役——双方都留下了战斗记述。
    青铜时代黎明，开阔平原上的战车对决。
  intro: |
    正午，卡迭石城南方的平原上。奥伦特斯河在北方
    闪烁。拉美西斯仅率阿蒙军团，走在大军前方。
    赫梯战车在河东的烟尘中等待。
  events:
    - trigger: on_turn_start
      turn: 2
      text: |
        赫梯战车从隐蔽处冲出。埃及侧翼崩溃。
    - trigger: on_turn_start
      turn: 6
      text: |
        拉美西斯收拢亲卫。"塞特在我身侧！"
    - trigger: on_unit_killed
      unit_id: u_b_ramses_1
      text: |
        法老陨落。埃及战线全面崩溃。
    - trigger: on_unit_killed
      unit_id: u_r_muwatalli_1
      text: |
        穆瓦塔利阵亡。赫梯军四散奔逃。
