# 西游记 — 中文本地化
name: 西游记
description: |
  唐僧与三位弟子——齐天大圣孙悟空、天蓬元帅猪八戒、
  卷帘大将沙悟净——护送白龙马一路东行，前往雷音寺取回
  真经。饥饿的妖魔挡住了他们的去路。

  蓝方（取经人）获胜条件：将唐僧送达雷音寺（13, 4），
  或消灭所有妖怪。唐僧阵亡则蓝方落败。

unit_classes:
  tang_monk:
    display_name: 唐僧
    description: |
      玄奘法师，你必须保护的取经人。慈悲为怀的高僧，
      手无缚鸡之力——几乎无法自卫。他若身死，取经大业
      便告终结。护送他活着抵达雷音寺，或消灭所有妖怪
      方可获胜。
  sun_wukong:
    display_name: 孙悟空
    description: |
      齐天大圣——快如疾风、勇猛无畏，手持如意金箍棒。
      队中唯一能翻越山岳地形的成员。无疑是英雄级战力，
      但并非无敌；与妖王正面交锋仍会受到可观伤害。
  zhu_bajie:
    display_name: 猪八戒
    description: |
      天蓬元帅转世，贪吃好色的猪妖。身强体壮的近战肉盾，
      攻击力不俗，但行动迟缓、容易分心。配合沙悟净可以
      稳守一翼。
  sha_wujing:
    display_name: 沙悟净
    description: |
      卷帘大将，挑担的苦行僧。三位弟子中防御最为坚固——
      血量与防御均为上乘，攻击力中等。降妖宝杖赋予他
      一到两格的攻击范围，可以从唐僧身后一步之遥担任护卫。
  bai_long_ma:
    display_name: 白龙马
    description: |
      白龙马——西海龙王三太子，因触犯天条被贬为马形。
      取经队伍中速度最快的成员（移动力6）。战斗属性平庸，
      他的职责是护送唐僧到达雷音寺，而非冲锋陷阵。
  demon_king:
    display_name: 妖王
    description: |
      此方道路上的妖王，统领群妖。令人胆寒的近战强者——
      血量高、攻击高、防御扎实。应先清理其爪牙再行交战；
      唐僧在附近时正面硬拼无异于自寻死路。
  bull_demon:
    display_name: 牛魔王
    description: |
      牛头蛮力妖怪。坦克型前排战士：缓慢、重击、法术防御
      极差。法师型角色或沙悟净的远程攻击可以在不硬碰硬的
      情况下消耗他。
  white_bone_demon:
    display_name: 白骨精
    description: |
      白骨夫人——善于变化伪装成无辜百姓引诱取经人的法术
      型妖怪。身体脆弱，但二到三格的法术攻击能绕过你的
      前排直取唐僧，若不加防范后果不堪设想。
  spider_spirit:
    display_name: 蜘蛛精
    description: |
      洞穴中的蜘蛛妖。速度极快（速度8，移动力5），攻击性
      极强——专门突袭较弱的取经人。单个脆弱但成对出现极为
      危险；绝不能放任其接近唐僧。
  skeleton:
    display_name: 骷髅兵
    description: |
      被复活的山贼骸骨。血量低且迟缓，但数量众多且源源
      不断——第10回合桥头还会冒出增援。适合作为强力妖怪
      的肉盾使用。

terrain_types:
  mountain:
    display_name: 山岳
    description: |
      崇山峻岭。大多数单位无法通行，唯有孙悟空能翻山越岭。
  forest:
    display_name: 树林
    description: |
      密林。妖怪埋伏之所，提供掩护但减缓行军。
  river:
    display_name: 河流
    description: |
      湍急河流，大多数单位无法通行。
  bridge:
    display_name: 桥梁
    description: |
      独木桥，横跨河流的狭窄要道。
  swamp:
    display_name: 毒沼
    description: |
      瘴气沼泽，行动迟缓，久留其中会中毒受伤。
  temple:
    display_name: 雷音寺
    description: |
      雷音寺——取经的终点。佛光普照，踏入此地即可
      恢复生命。

narrative:
  title: 西游记
  description: |
    吴承恩不朽名著的战棋演绎。
  intro: |
    大唐贞观年间。长安向东的官道绵延千里。唐僧骑白龙马
    缓缓而行，孙悟空在前方探路，猪八戒一路牢骚不断，
    沙悟净默默挑着行囊。
  events:
    - trigger: on_turn_start
      turn: 5
      text: 探路回报：东方林中有妖气涌动。
    - trigger: on_turn_start
      turn: 10
      text: 埋伏！桥头碎石中骷髅兵纷纷爬起。
    - trigger: on_turn_start
      turn: 20
      text: 薄雾之中，雷音寺的塔尖隐约可见。
    - trigger: on_unit_killed
      unit_id: u_r_demon_king_1
      text: 妖王伏诛！群妖士气大溃。
    - trigger: on_unit_killed
      unit_id: u_b_tang_monk_1
      text: 唐僧圆寂。取经大业，功亏一篑。
