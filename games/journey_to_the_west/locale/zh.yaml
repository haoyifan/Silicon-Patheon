# 西游记 — 中文本地化
name: 西游记
description: |
  唐僧与三位徒弟——孙悟空（美猴王）、猪八戒、沙悟净——
  护送白龙马东行，前往雷音寺取经。妖魔鬼怪拦路。

  蓝方（取经团）以唐僧到达雷音寺（13,4）获胜，
  或消灭所有妖怪获胜。唐僧阵亡则蓝方失败。

unit_classes:
  tang_monk:
    display_name: 唐僧
    description: |
      玄奘法师，你必须保护的取经人。一位温和的佛教僧侣，
      身体孱弱——几乎无法自卫。他若阵亡，取经之路就此终结。
      护送他活着到达雷音寺或消灭所有妖怪即可获胜。
  sun_wukong:
    display_name: 孙悟空（美猴王）
    description: |
      齐天大圣——快速、狂暴，手持如意金箍棒。团队中
      唯一能穿越山地地形的单位。明确的英雄级战士，
      但并非无敌；与妖王正面交锋会受到实质伤害。
  zhu_bajie:
    display_name: 猪八戒
    description: |
      天蓬元帅转世的猪妖。粗鲁贪吃，却是结实的肉搏手。
      攻击力可观但速度慢、容易分心。配合悟净固守一侧。
  sha_wujing:
    display_name: 沙悟净
    description: |
      挑担的沙僧。三位徒弟中防御最高——高生命值和高防御，
      中等攻击力。月牙铲射程1-2，可以退后一步为唐僧挡刀。
  bai_long_ma:
    display_name: 白龙马
    description: |
      白龙马——被诅咒为马形的龙太子，如今是唐僧的坐骑。
      取经团中移动力最高（移动6）。战斗力一般；
      他的任务是把唐僧送到雷音寺，而不是战斗。
  demon_king:
    display_name: 妖王
    description: |
      妖王，统治这段路途的魔头。恐怖的近战对手——
      高生命、高攻击、坚实的防御。先击溃他的喽啰
      再与之交锋；在唐僧附近正面硬刚等于自杀。
  bull_demon:
    display_name: 牛魔王
    description: |
      牛头魔王。坦克型前线战士；慢，打得重，魔法防御
      极差。法术型角色或悟净的远程打击可以无需换血消耗他。
  white_bone_demon:
    display_name: 白骨精
    description: |
      白骨精——伪装成无辜路人引诱取经团的法术型施法者。
      躯体脆弱，但2-3格的法术攻击可以在你的前线背后
      狙击唐僧，如果你让他暴露的话。
  spider_spirit:
    display_name: 蜘蛛精
    description: |
      洞穴中的蜘蛛精。极快（速度8，移动5）且攻击性强——
      蜂拥扑向较弱的取经团成员。单个脆弱但成对时危险；
      别让一只活着冲到唐僧面前。
  skeleton:
    display_name: 骷髅兵
    description: |
      复活的山贼骷髅。低生命慢速，但量产便宜——
      妖王有很多，第10回合还会有更多在桥上出现。
      挡在强力妖怪前面的好肉盾。

terrain_types:
  river:
    description: |
      湍急河流——不可通行。
  bridge:
    description: |
      桥梁——狭窄的咽喉要道。
  swamp:
    description: |
      毒沼——行动缓慢，站在其中每回合受伤。
  temple:
    description: |
      雷音寺——目标地块。提供防御和治疗加成。

narrative:
  title: 西游记
  description: |
    吴承恩笔下史诗取经之路的战术化重演。
  intro: |
    第一日。从长安出发的大路向东延伸。唐僧骑白龙马；
    孙悟空在前探路，猪八戒抱怨不停，沙悟净背着行囊。
  events:
    - trigger: on_turn_start
      turn: 5
      text: |
        探马来报：东方林中有山贼蠢蠢欲动。
    - trigger: on_turn_start
      turn: 10
      text: |
        伏击！骷髅兵从桥下废墟中爬起。
    - trigger: on_turn_start
      turn: 20
      text: |
        雷音寺的塔尖在雾中若隐若现。
    - trigger: on_unit_killed
      unit_id: u_r_demon_king_1
      text: |
        妖王倒下！它的喽啰们动摇了。
    - trigger: on_unit_killed
      unit_id: u_b_tang_monk_1
      text: |
        唐僧圆寂。取经之路到此为止。
