# 霍格沃茨之战 — 中文本地化
name: 霍格沃茨之战 — 哈利·波特
description: |
  霍格沃茨，1998年5月。最终之战。伏地魔的食死徒
  攻打城堡，哈利寻找最后的魂器。凤凰社、邓布利多军
  和霍格沃茨教授们对抗黑暗。纳吉尼必须先死，
  伏地魔才能被真正消灭。魔法世界的命运今夜决定。

unit_classes:
  harry:
    display_name: 哈利·波特
    description: |
      救世之星。十七岁，背负预言的重担。
      凭征服之权成为老魔杖的真正主人，
      尽管他自己还不知道。他必须活下来才能终结这一切。
  hermione:
    display_name: 赫敏·格兰杰
    description: |
      她这一代最聪明的女巫，经过一年逃亡的磨砺。
      蛇怪毒牙和厉火已在她手中摧毁了魂器。
  ron:
    display_name: 罗恩·韦斯莱
    description: |
      他回来了。他总是会回来。罗恩拿着借来的魔杖
      站在哈利身边，以保护所爱之人的不顾一切的勇气战斗。
  neville:
    display_name: 纳威·隆巴顿
    description: |
      预言本可能选中的另一个男孩。今夜他在伏地魔面前
      昂首不屈，从分院帽中拔出格兰芬多之剑。
      纳吉尼的处刑人。物理攻击——格兰芬多之剑
      能斩破魔法防御。
  mcgonagall:
    display_name: 米勒娃·麦格
    description: |
      副校长，变形术大师，霍格沃茨的钢铁脊梁。
      与伏地魔决斗不落下风，指挥城堡的魔法铠甲骑士。
  kingsley:
    display_name: 金斯莱·沙克尔
    description: |
      傲罗，凤凰社成员，未来的魔法部长。
      深沉的嗓音在战场上回荡，以冷静的权威协调防御。
  molly:
    display_name: 莫丽·韦斯莱
    description: |
      七个孩子的母亲。不要威胁她的孩子。
      她与贝拉特里克斯的决斗以两个字和毕生的母爱之怒结束。
      "不准碰我女儿，你这个贱人！"
  voldemort:
    display_name: 伏地魔
    description: |
      黑魔王。汤姆·里德尔，将灵魂撕成七块以欺骗死亡。
      他以可怕的力量挥舞老魔杖，但魔杖知道它的
      真正主人——不是他。
  bellatrix:
    display_name: 贝拉特里克斯·莱斯特兰奇
    description: |
      伏地魔最狂热的副手。疯狂、尖笑、致命。
      她同时与三个女巫决斗还在大笑。
  lucius:
    display_name: 卢修斯·马尔福
    description: |
      失势者，没有魔杖，用借来的魔杖和破碎的骄傲战斗。
      他来这里只因伏地魔的命令。他的心在别处——在他的儿子身边。
  dolohov:
    display_name: 安东宁·多洛霍夫
    description: |
      老练的黑巫师和杀手。他的紫焰咒在远距离致命。
      有条不紊、冷酷无情，在伏地魔这边经历了两场战争。
  fenrir:
    display_name: 芬里尔·格雷伯克
    description: |
      狼人野兽，即使在人形也用爪牙战斗。
      他渴望人肉的味道。近战恐怖，但远程魔法面前脆弱。
  nagini:
    display_name: 纳吉尼
    description: |
      最后的魂器。一条与伏地魔灵魂绑定的巨蛇。
      身体脆弱但受主人保护——必须在伏地魔能被
      真正杀死之前摧毁她。
  yaxley:
    display_name: 亚克斯利
    description: |
      伏地魔傀儡政权下的魔法执法司司长。
      一个靠恐惧维持权力的残暴执行者。
  carrow:
    display_name: 阿米库斯·卡罗
    description: |
      卡罗兄妹之一，整年折磨霍格沃茨学生。
      虐待狂且胆小——对手无寸铁者危险，对反抗者则不然。

terrain_types:
  castle_wall:
    display_name: 城墙
  great_hall:
    display_name: 大礼堂
  courtyard:
    display_name: 庭院
  covered_bridge:
    display_name: 有盖桥
  lake_edge:
    display_name: 湖岸

narrative:
  title: 霍格沃茨之战
  description: |
    霍格沃茨，1998年5月。第二次巫师大战的最终之战。
    伏地魔的势力攻打城堡。哈利必须摧毁最后的魂器——
    纳吉尼——然后面对黑魔王。魔法世界的命运悬于一线。
  intro: |
    午夜。伏地魔的声音回荡在整个校园："把哈利·波特交出来，
    没有人会受到伤害。"沉默。然后麦格的声音从城垛上响起：
    "霍格沃茨受到威胁！守住边界！保护我们！"
    被魔法驱动的铠甲骑士出征了。
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        有盖桥在纳威的陷阱引爆中轰然炸裂。
        巨人和食死徒跌跌撞撞地穿过废墟。庭院变成了修罗场。
    - trigger: on_turn_start
      turn: 7
      text: |
        "我知道你们很多人想要战斗。有些人甚至认为战斗是明智的。
        但这是愚蠢的。"伏地魔放大的声音再次给出投降的机会。
        没有人接受。
    - trigger: on_turn_start
      turn: 11
      text: |
        纳威从燃烧的分院帽中拔出格兰芬多之剑。
        剑刃闪耀着蛇怪毒液的光芒。纳吉尼必须死。
    - trigger: on_unit_killed
      unit_id: u_r_nagini_1
      text: |
        巨蛇的头颅在空中翻滚。最后的魂器被摧毁了。
        伏地魔尖叫——他有生以来第一次，真正成了凡人。
    - trigger: on_unit_killed
      unit_id: u_b_harry_1
      text: |
        哈利倒下了。老魔杖已经做出了选择，
        活下来的男孩不再活着。伏地魔的笑声回荡在
        破碎的城堡中。战争结束了。
    - trigger: on_unit_killed
      unit_id: u_r_voldemort_1
      text: |
        索命咒反弹了。汤姆·里德尔的身体倒在地上，
        凡人，终结。老魔杖在黎明的光芒中划出弧线
        飞入哈利伸出的手中。一切结束了。
