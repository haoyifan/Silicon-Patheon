terrain_types:
  forest:
    display_name: Forest
    description: |
      Dense woodland flanking the battlefield. Impassable — the
      trees funnel the French into the killing corridor between
      Tramecourt and Agincourt woods.
    move_cost: 99
    passable: false
    glyph: "T"
    color: green

  mud:
    display_name: Mud
    description: |
      Freshly ploughed, rain-soaked earth. Horses founder, armored
      men sink to their knees. Slows movement and leaves anyone
      caught in the open dangerously exposed to arrow fire.
    move_cost: 2
    defense_bonus: -1
    glyph: ","
    color: bright_black
  stakes:
    display_name: Stakes
    description: |
      Sharpened wooden stakes driven at chest-height angles.
      Impassable to cavalry; infantry may pass at high cost.
    move_cost: 4
    passable: true
    defense_bonus: 0
    glyph: "#"
    color: yellow
  cover:
    display_name: Cover
    description: |
      Hedgerows and overturned wagons providing concealment.
      Good defensive ground for archers.
    move_cost: 1
    defense_bonus: 2
    glyph: "~"
    color: green
  camp:
    display_name: Camp
    description: |
      The French baggage camp — supply wagons, pavilions, and
      tethered horses. Reaching this position means the enemy
      line has been routed entirely.
    move_cost: 1
    defense_bonus: 1
    glyph: "T"
    color: bright_yellow

unit_classes:
  # ═══════════════════════════════════════════════
  #  BLUE — English (6 units)
  # ═══════════════════════════════════════════════
  henry_v:
    display_name: Henry V
    description: |
      King of England, twenty-eight, a scar from a Shrewsbury arrow
      across his face. Fights dismounted in the front rank wearing a
      jeweled bascinet. If he falls, the army shatters.
    hp_max: 30
    atk: 10
    defense: 7
    res: 4
    spd: 6
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [vip, king, infantry]
    sight: 4
    glyph: H
    color: bright_cyan

  thomas_erpingham:
    display_name: Sir Thomas Erpingham
    description: |
      Veteran knight, fifty-eight years old, commanding the archers.
      Carries a long-range yew bow personally — his shots arc high
      and strike at extreme distance. Threw his baton into the air
      to signal the first volley.
    hp_max: 16
    atk: 11
    defense: 2
    res: 3
    spd: 5
    rng_min: 3
    rng_max: 5
    move: 3
    tags: [archer, sniper]
    sight: 5
    glyph: E
    color: cyan

  rapid_bowman:
    display_name: Cadwgan's Welsh Bowmen
    description: |
      Cadwgan ap Dafydd's company of Welsh longbowmen — the fastest
      nock-and-loose on the field. They sacrifice range for sheer
      volume of fire, loosing six shafts a minute into the packed
      French column.
    hp_max: 14
    atk: 9
    defense: 2
    res: 2
    spd: 7
    rng_min: 2
    rng_max: 4
    move: 4
    tags: [archer, rapid]
    sight: 4
    glyph: W
    color: cyan

  stakebow:
    display_name: Owain's Stake-setters
    description: |
      Owain ap Maredudd's archers — the men who hammered the stakes
      into the mud before dawn. Good bowmen in their own right, and
      the stakes they planted are what keeps the cavalry at bay.
      Positioned directly behind the stake line for maximum effect.
    hp_max: 16
    atk: 8
    defense: 3
    res: 2
    spd: 5
    rng_min: 2
    rng_max: 4
    move: 3
    tags: [archer, stakes]
    sight: 4
    glyph: O
    color: cyan

  duke_of_york:
    display_name: Duke of York
    description: |
      Edward, Duke of York. Fifty years old, too fat for his armor,
      commands the English right. A seasoned brawler who will die
      face-down in the mud at Agincourt — but not before taking
      several French lords with him.
    hp_max: 26
    atk: 9
    defense: 6
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry, knight]
    sight: 3
    glyph: Y
    color: cyan

  # ═══════════════════════════════════════════════
  #  RED — French (8 units)
  # ═══════════════════════════════════════════════
  constable_dalbret:
    display_name: Constable d'Albret
    description: |
      Charles d'Albret, Constable of France — supreme commander of
      the French army. Dismounted for the assault, weighed down by
      sixty pounds of Milanese plate. Slow but nearly impossible to
      kill in melee. Historically killed in the fighting.
    hp_max: 34
    atk: 10
    defense: 8
    res: 4
    spd: 4
    rng_min: 1
    rng_max: 1
    move: 2
    tags: [infantry, heavy, leader]
    sight: 3
    glyph: C
    color: bright_red

  duke_of_alencon:
    display_name: Duke of Alen\u00e7on
    description: |
      Jean I, Duke of Alen\u00e7on. The finest swordsman in France, the
      man who nearly reached Henry V and struck his crown. Mounted
      on a destrier, devastating on the charge — if he can reach the
      English line through the mud.
    hp_max: 28
    atk: 13
    defense: 5
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [cavalry, heavy, leader]
    sight: 3
    glyph: A
    color: bright_red

  duke_of_orleans:
    display_name: Duke of Orl\u00e9ans
    description: |
      Charles, Duke of Orl\u00e9ans, twenty-one years old. Poet, prince
      of the blood, and nominal co-commander of the vanguard. Wears
      ornate tournament plate. Captured alive at Agincourt and held
      prisoner in England for twenty-five years.
    hp_max: 26
    atk: 9
    defense: 7
    res: 4
    spd: 4
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry, heavy, leader]
    sight: 3
    glyph: U
    color: red

  count_of_nevers:
    display_name: Count of Nevers
    description: |
      Philippe, Count of Nevers — brother of the Duke of Burgundy
      (who sat this battle out). Leads a contingent of Burgundian
      men-at-arms on horseback. Reckless charger. Historically
      killed in the melee.
    hp_max: 24
    atk: 11
    defense: 4
    res: 3
    spd: 6
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [cavalry, heavy, leader]
    sight: 3
    glyph: N
    color: red

  duke_of_bar:
    display_name: Duke of Bar
    description: |
      Edward III, Duke of Bar. Commands the second line. Another
      mounted lord who will charge straight into the arrow storm.
      Good armor, adequate skill — but the mud does not care about
      bloodlines.
    hp_max: 26
    atk: 10
    defense: 6
    res: 3
    spd: 4
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [cavalry, heavy, leader]
    sight: 3
    glyph: B
    color: red

  lord_dampierre:
    display_name: Lord Dampierre
    description: |
      David de Rambures, Master of the Crossbows — commands the
      French ranged contingent. Genoese mercenary crossbowmen under
      his banner. Their bolts punch through English mail, but they
      fire once to the longbow's six.
    hp_max: 14
    atk: 9
    defense: 2
    res: 2
    spd: 4
    rng_min: 2
    rng_max: 3
    move: 3
    tags: [crossbow]
    sight: 4
    glyph: D
    color: red

  french_men_at_arms_left:
    display_name: Picard Men-at-Arms
    description: |
      The common foot of the French left — armored men-at-arms
      from Picardy. Dismounted, trudging through the mud behind
      their lords. Tough and numerous.
    hp_max: 22
    atk: 8
    defense: 5
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry, heavy]
    sight: 3
    glyph: P
    color: red

  french_men_at_arms_right:
    display_name: Norman Men-at-Arms
    description: |
      The common foot of the French right — Norman men-at-arms in
      chainmail and bascinet. Less armored than the Picards but
      faster through the mire.
    hp_max: 20
    atk: 8
    defense: 4
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry]
    sight: 3
    glyph: M
    color: red

armies:
  blue:
    # English position — defending the north (y 0-2).
    # Henry and York hold the line just behind the stakes (y=2).
    # Archers positioned in camp cover (y=0-1) to fire over the
    # stakes into the mud field. Each archer covers a gap.
    - {class: henry_v, pos: {x: 7, y: 2}}
    - {class: duke_of_york, pos: {x: 10, y: 2}}
    - {class: thomas_erpingham, pos: {x: 5, y: 0}}     # long-range sniper, covers left gap
    - {class: rapid_bowman, pos: {x: 8, y: 0}}          # rapid fire, covers center
    - {class: stakebow, pos: {x: 6, y: 1}}              # behind left gap
    - {class: stakebow, pos: {x: 9, y: 1}}              # between center and right gaps
  red:
    # French host — massed at the south (y 11-13).
    # First line: cavalry and leaders on firm ground (y=11),
    # poised to charge up the dry paths through the mud.
    # Second line: infantry and crossbows (y=12-13).
    - {class: constable_dalbret, pos: {x: 7, y: 11}}    # center, leading the vanguard
    - {class: duke_of_alencon, pos: {x: 8, y: 12}}      # mounted, ready to charge center path
    - {class: duke_of_orleans, pos: {x: 6, y: 12}}      # vanguard, left-center
    - {class: count_of_nevers, pos: {x: 10, y: 11}}     # cavalry, right flank
    - {class: duke_of_bar, pos: {x: 5, y: 11}}          # cavalry, left flank
    - {class: lord_dampierre, pos: {x: 9, y: 13}}       # crossbows, covering fire
    - {class: french_men_at_arms_left, pos: {x: 5, y: 13}}   # Picard foot, left
    - {class: french_men_at_arms_right, pos: {x: 11, y: 12}} # Norman foot, far right flank

rules:
  max_turns: 16
  first_player: blue

win_conditions:
  # English lose instantly if Henry falls.
  - {type: protect_unit, unit_id: u_b_henry_v_1, owning_team: blue}
  # French win by reaching the English camp line (y=0).
  - {type: reach_goal_line, team: red, axis: y, value: 0}
  # Either side can win by destroying all enemy units.
  - {type: eliminate_all_enemy_units}
  # If Henry survives to turn 16, the English hold the field — Blue wins.
  - {type: protect_unit_survives, unit_id: u_b_henry_v_1, owning_team: blue}
  - {type: max_turns_draw}

narrative:
  title: Agincourt
  description: |
    St. Crispin's Day. Six thousand sick Englishmen, a muddy field
    between two forests, and the longbow against the flower of French
    chivalry.
  intro: |
    A cold rain fell all night. The field is a bog. Henry kneels with
    his men in the mud, stakes driven in front, forests tight on
    either side. Across the ploughed earth, the French host fills the
    horizon — banners of every great house in France, armor glinting
    even under grey skies. They outnumber the English four to one.
    Three muddy paths wind through the mire toward gaps in the English
    stakes. The French are certain of victory. They begin to advance.
  events:
    - trigger: on_turn_start
      turn: 1
      text: |
        Sir Thomas Erpingham hurls his baton into the air and roars
        "Now strike!" Ten thousand arrows rise from behind the stakes.
    - trigger: on_turn_start
      turn: 4
      text: |
        The French vanguard is mired in the mud. Horses scream and
        fall. Dismounted knights sink to their knees, arrows hammering
        into them from both flanks. Those on the dry paths press
        forward under withering fire.
    - trigger: on_turn_start
      turn: 7
      text: |
        The field is a slaughterhouse. French dead are piled so thick
        that later ranks climb over their own fallen. But the mass of
        armored men pushes ever closer to the stakes.
    - trigger: on_turn_start
      turn: 10
      text: |
        The first French knights reach the stake gaps. Steel meets
        steel. The Duke of Alen\u00e7on cuts toward Henry's banner —
        the King fights hand-to-hand, a piece of his crown struck away.
    - trigger: on_turn_start
      turn: 13
      text: |
        The mud is churned red. Those French who broke through the
        stakes fight in the English camp itself. Everything depends
        on the next moments.
    - trigger: on_unit_killed
      unit_id: u_b_henry_v_1
      text: |
        Henry has fallen. The crown of England lies in the mud. The
        English line breaks.
    - trigger: on_unit_killed
      unit_id: u_r_duke_of_alencon_1
      text: |
        Alen\u00e7on goes down, the finest sword in France silenced.
    - trigger: on_unit_killed
      unit_id: u_r_constable_dalbret_1
      text: |
        The Constable of France is dead. The French command dissolves
        into a leaderless mass.
