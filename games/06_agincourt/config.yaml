schema_version: 1
license: public_domain
name: Agincourt
difficulty: 5
description: |
  October 25, 1415. St. Crispin's Day. Henry V's small, exhausted,
  dysentery-ridden English army is cornered by a French force three
  times its size on a narrow field dotted with trees. Henry plants
  sharpened stakes in front of his line, places his longbowmen on
  the flanks, and waits for the French to charge. The flower of
  French chivalry — knights in full plate — advances under a sky
  black with arrows, picking their way through scattered woodland
  that breaks up the charge. Most never reach the English line.
  Inspired by the Battle of Agincourt (1415), Hundred Years' War, England vs France.

board:
  width: 10
  height: 14
  terrain:
    # Sparse forest patches on flanks — historically the battle was
    # between two forests, but the tree line is thin enough that
    # French knights can push through the gaps to flank.
    - {x: 0, y: 4, type: forest}
    - {x: 0, y: 7, type: forest}
    - {x: 0, y: 10, type: forest}
    - {x: 9, y: 4, type: forest}
    - {x: 9, y: 7, type: forest}
    - {x: 9, y: 10, type: forest}
    # Sparse forest in the central corridor — slows the French
    # advance and gives cover, but leaves enough gaps to maneuver.
    # Slows the French advance and provides cover.
    - {x: 3, y: 5, type: forest}
    - {x: 5, y: 5, type: forest}
    - {x: 7, y: 5, type: forest}
    - {x: 2, y: 7, type: forest}
    - {x: 4, y: 7, type: forest}
    - {x: 6, y: 7, type: forest}
    - {x: 3, y: 9, type: forest}
    - {x: 5, y: 9, type: forest}
    - {x: 7, y: 9, type: forest}
    # Sharpened stakes in front of the English line — impassable.
    - {x: 3, y: 11, type: stakes}
    - {x: 4, y: 11, type: stakes}
    - {x: 5, y: 11, type: stakes}
    - {x: 6, y: 11, type: stakes}
  forts: []

terrain_types:
  stakes:
    display_name: Stakes
    description: Impassable sharpened stakes.
    move_cost: 99
    passable: false
    glyph: "#"
    color: yellow

unit_classes:
  henry_v:
    display_name: Henry V
    description: |
      King of England. Twenty-eight, scarred from an arrow at
      Shrewsbury years ago. Fights in the front rank with his men.
      The "we few, we happy few" speech happens about now.
    hp_max: 32
    atk: 10
    defense: 6
    res: 4
    spd: 6
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [vip, king]
    sight: 4
    glyph: H
    color: bright_cyan

  longbowman:
    display_name: English Longbowman
    description: |
      Welsh and English yeoman with the great war bow. Has shot
      since he could walk. Six-arrow nock-and-loose every minute,
      out to 250 yards. Soft in melee, but rarely lets the enemy
      close.
    hp_max: 14
    atk: 10
    defense: 2
    res: 2
    spd: 5
    rng_min: 2
    rng_max: 4
    move: 4
    tags: [archer]
    sight: 4
    glyph: A
    color: cyan

  english_man_at_arms:
    display_name: English Man-at-Arms
    description: |
      Henry's foot men-at-arms — chainmail, pollaxe, dismounted.
      Anchor of the English line.
    hp_max: 24
    atk: 8
    defense: 6
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry]
    sight: 3
    glyph: M
    color: cyan

  french_knight:
    display_name: French Knight
    description: |
      Heavy plate, lance, spurred horse — the flower of French
      chivalry. Powerful in melee but slow, and the English
      longbowmen will pick them off on the approach.
    hp_max: 26
    atk: 11
    defense: 5
    res: 3
    spd: 4
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [knight, heavy]
    sight: 3
    glyph: K
    color: bright_red

  french_crossbow:
    display_name: French Crossbow
    description: |
      Genoese mercenary crossbowmen — slow to reload, but their
      bolts punch through armor.
    hp_max: 14
    atk: 8
    defense: 2
    res: 2
    spd: 4
    rng_min: 2
    rng_max: 3
    move: 3
    tags: [crossbow]
    sight: 4
    glyph: C
    color: red

  french_man_at_arms:
    display_name: French Man-at-Arms
    description: |
      Lower-tier French foot — chainmail, sword, no horse. Slower
      than the knights but steadier on rough ground.
    hp_max: 22
    atk: 8
    defense: 5
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry]
    sight: 3
    glyph: F
    color: red

armies:
  blue:
    # Henry in the center of his line; longbowmen on the flanks
    # behind the stakes; men-at-arms anchoring the center.
    - {class: henry_v, pos: {x: 4, y: 12}}
    - {class: english_man_at_arms, pos: {x: 3, y: 12}}
    - {class: english_man_at_arms, pos: {x: 5, y: 12}}
    - {class: english_man_at_arms, pos: {x: 6, y: 12}}
    - {class: english_man_at_arms, pos: {x: 4, y: 13}}
    - {class: longbowman, pos: {x: 1, y: 11}}
    - {class: longbowman, pos: {x: 1, y: 12}}
    - {class: longbowman, pos: {x: 2, y: 11}}
    - {class: longbowman, pos: {x: 2, y: 10}}
    - {class: longbowman, pos: {x: 2, y: 12}}
    - {class: longbowman, pos: {x: 7, y: 10}}
    - {class: longbowman, pos: {x: 7, y: 11}}
    - {class: longbowman, pos: {x: 7, y: 12}}
    - {class: longbowman, pos: {x: 8, y: 11}}
    - {class: longbowman, pos: {x: 8, y: 12}}
  red:
    # French column at the north, knights leading.
    - {class: french_knight, pos: {x: 3, y: 1}}
    - {class: french_knight, pos: {x: 4, y: 1}}
    - {class: french_knight, pos: {x: 5, y: 1}}
    - {class: french_knight, pos: {x: 6, y: 1}}
    - {class: french_knight, pos: {x: 3, y: 2}}
    - {class: french_knight, pos: {x: 4, y: 2}}
    - {class: french_knight, pos: {x: 5, y: 2}}
    - {class: french_knight, pos: {x: 6, y: 2}}
    - {class: french_knight, pos: {x: 4, y: 3}}
    - {class: french_knight, pos: {x: 5, y: 3}}
    - {class: french_man_at_arms, pos: {x: 2, y: 1}}
    - {class: french_man_at_arms, pos: {x: 7, y: 1}}
    - {class: french_man_at_arms, pos: {x: 2, y: 2}}
    - {class: french_man_at_arms, pos: {x: 7, y: 2}}
    - {class: french_man_at_arms, pos: {x: 2, y: 3}}
    - {class: french_man_at_arms, pos: {x: 7, y: 3}}
    - {class: french_man_at_arms, pos: {x: 3, y: 0}}
    - {class: french_man_at_arms, pos: {x: 4, y: 0}}
    - {class: french_man_at_arms, pos: {x: 5, y: 0}}
    - {class: french_man_at_arms, pos: {x: 6, y: 0}}
    - {class: french_crossbow, pos: {x: 2, y: 0}}
    - {class: french_crossbow, pos: {x: 7, y: 0}}
    - {class: french_crossbow, pos: {x: 1, y: 1}}
    - {class: french_crossbow, pos: {x: 8, y: 1}}

rules:
  max_turns: 22
  fog_of_war: false
  first_player: red

win_conditions:
  - {type: protect_unit, unit_id: u_b_henry_v_1, owning_team: blue}
  # French win by reaching Henry's camp line — y=13.
  - {type: reach_goal_line, team: red, axis: y, value: 13}
  - {type: eliminate_all_enemy_units}
  # Historical: if the French fail to break the English line by the
  # turn cap, the English successfully defend and win (not a draw).
  # Checked BEFORE max_turns_draw so this rule fires first.
  - {type: protect_unit_survives, unit_id: u_b_henry_v_1, owning_team: blue}
  - {type: max_turns_draw}

narrative:
  title: Agincourt
  description: |
    St. Crispin's Day. English longbows on a wooded field against
    the flower of French chivalry.
  intro: |
    A cold dawn. The field between scattered trees narrows ahead.
    Henry kneels with his archers; the French column forms up,
    lances bright, ready to charge.
  events:
    - trigger: on_turn_start
      turn: 2
      text: "The first French line advances through the trees. Arrows begin to fall."
    - trigger: on_turn_start
      turn: 4
      text: "English archers loose. Sky-darkening volleys begin."
    - trigger: on_turn_start
      turn: 8
      text: "Fallen knights litter the field. The second French line pushes forward over them."
    - trigger: on_unit_killed
      unit_id: u_b_henry_v_1
      text: "Henry has fallen. The English line shudders."
