rules:
  max_turns: 22
  fog_of_war: false
  first_player: red

win_conditions:
  - {type: protect_unit, unit_id: u_b_henry_v_1, owning_team: blue}
  # French win by reaching Henry's camp line — y=13.
  - {type: reach_goal_line, team: red, axis: y, value: 13}
  - {type: eliminate_all_enemy_units}
  # Historical: if the French fail to break the English line by the
  # turn cap, the English successfully defend and win (not a draw).
  # Checked BEFORE max_turns_draw so this rule fires first.
  - {type: protect_unit_survives, unit_id: u_b_henry_v_1, owning_team: blue}
  - {type: max_turns_draw}

narrative:
  title: Agincourt
  description: |
    St. Crispin's Day. English longbows in the mud against the
    flower of French chivalry.
  intro: |
    A cold dawn. The fields between the woods are saturated from
    a week of rain. Henry kneels with his archers; the French
    column forms up across the bog, lances bright.
  events:
    - trigger: on_turn_start
      turn: 2
      text: "The first French line steps into the mud. Lances dip; horses sink to the fetlock."
    - trigger: on_turn_start
      turn: 4
      text: "English archers loose. Sky-darkening volleys begin."
    - trigger: on_turn_start
      turn: 8
      text: "The mud is full of fallen knights. The second French line picks its way over them."
    - trigger: on_unit_killed
      unit_id: u_b_henry_v_1
      text: "Henry has fallen. The English line shudders."
