schema_version: 1
license: public_domain
name: "Agincourt — 1415, Hundred Years' War"
difficulty: 5
description: |
  October 25, 1415. St. Crispin's Day. Henry V's starving, dysentery-
  racked army of six thousand is pinned against a freshly ploughed
  field between two dense woods. Facing them: the cream of French
  nobility — twenty thousand armored men-at-arms and mounted knights,
  so confident of victory they argued all night over who would take
  the English king prisoner. Henry stakes his archers into the mud
  between the treelines, narrows the field to a killing corridor, and
  waits. The French charge. The rain-soaked earth sucks plate boots
  ankle-deep, horses founder, and the longbows fire six shafts a
  minute into a mass that cannot spread out or turn back. Most of the
  French never swing a sword.
  Inspired by the Battle of Agincourt (1415), Hundred Years' War.

