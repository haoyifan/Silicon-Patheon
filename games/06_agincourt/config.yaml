  forts: []

terrain_types:
  mud:
    move_cost: 3
    defense_bonus: 0
    glyph: ","
    color: yellow
    # Knights bog down doubly; per-class override doubles their
    # mud cost. Demonstrates the class_overrides mechanic.
    class_overrides:
      french_knight:
        move_cost: 4
  stakes:
    move_cost: 99
    passable: false
    glyph: "#"
    color: yellow
  forest:
    # Knights in full plate can't fit through the trees.
    class_overrides:
      french_knight:
        passable: false

unit_classes:
  henry_v:
    display_name: Henry V
    description: |
      King of England. Twenty-eight, scarred from an arrow at
      Shrewsbury years ago. Fights in the front rank with his men.
      The "we few, we happy few" speech happens about now.
    hp_max: 32
    atk: 10
    defense: 6
    res: 4
    spd: 6
    rng_min: 1
    rng_max: 1
    move: 4
    tags: [vip, king]
    sight: 4
    glyph: H
    color: bright_cyan

  longbowman:
    display_name: English Longbowman
    description: |
      Welsh and English yeoman with the great war bow. Has shot
      since he could walk. Six-arrow nock-and-loose every minute,
      out to 250 yards. Soft in melee, but rarely lets the enemy
      close.
    hp_max: 14
    atk: 10
    defense: 2
    res: 2
    spd: 5
    rng_min: 2
    rng_max: 4
    move: 4
    tags: [archer]
    sight: 4
    glyph: A
    color: cyan

  english_man_at_arms:
    display_name: English Man-at-Arms
    description: |
      Henry's foot men-at-arms — chainmail, pollaxe, dismounted
      because horses can't operate in this mud either. Anchor of
      the line.
    hp_max: 24
    atk: 8
    defense: 6
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry]
    sight: 3
    glyph: M
    color: cyan

  french_knight:
    display_name: French Knight
    description: |
      Heavy plate, lance, spurred horse — the flower of French
      chivalry. Or, today, a man who can barely walk through the
      mud and can't enter the woods. Will get shot a lot.
    hp_max: 30
    atk: 11
    defense: 8
    res: 3
    spd: 4
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [knight, heavy]
    sight: 3
    glyph: K
    color: bright_red

  french_crossbow:
    display_name: French Crossbow
    description: |
      Genoese mercenary crossbowmen — slow to reload, but their
      bolts punch through armor.
    hp_max: 14
    atk: 8
    defense: 2
    res: 2
    spd: 4
    rng_min: 2
    rng_max: 3
    move: 3
    tags: [crossbow]
    sight: 4
    glyph: C
    color: red

  french_man_at_arms:
    display_name: French Man-at-Arms
    description: |
      Lower-tier French foot — chainmail, sword, no horse. Forced
      to slog through the same mud as the knights.
    hp_max: 22
    atk: 8
    defense: 5
    res: 3
    spd: 5
    rng_min: 1
    rng_max: 1
    move: 3
    tags: [infantry]
    sight: 3
    glyph: F
    color: red

