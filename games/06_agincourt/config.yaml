schema_version: 1
name: Agincourt
difficulty: 5
description: |
  October 25, 1415. St. Crispin's Day. Henry V's small, exhausted,
  dysentery-ridden English army is cornered by a French force three
  times its size in a narrow muddy field between two thick forests.
  Henry plants sharpened stakes in front of his line, places his
  longbowmen on the flanks, and waits for the French to charge.
  The flower of French chivalry — knights in full plate — wades
  through churned bog under a sky black with arrows. Most never
  reach the English line; many drown in mud under the weight of
  their own armor.
  Inspired by the Battle of Agincourt (1415), Hundred Years' War, England vs France.

