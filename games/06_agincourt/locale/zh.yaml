# 阿金库尔之战 — 中文本地化
name: 阿金库尔之战
description: |
  1415年10月25日。圣克里斯平日。亨利五世率领疲惫不堪、
  痢疾缠身的英军小部队，在两片茂密森林之间泥泞的狭窄
  田野中被三倍于己的法军包围。亨利在阵前插下削尖的木桩，
  将长弓手置于两翼，等待法军冲锋。法国骑士精华——全身
  板甲——在箭雨遮天下蹚过翻搅的泥沼。大多数人永远没能
  到达英军战线；许多人在自身铠甲重量下溺毙于泥中。

unit_classes:
  henry_v:
    display_name: 亨利五世
    description: |
      英格兰国王。二十八岁，脸上留有多年前什鲁斯伯里
      中箭的疤痕。与士兵并肩在前排作战。"我们这些少数人，
      我们这些幸运的少数人"的演说正在此刻发生。
  longbowman:
    display_name: 英格兰长弓手
    description: |
      威尔士和英格兰自耕农，持大战弓。从会走路就开始射箭。
      每分钟六箭连射，射程二百五十码。近战脆弱，但很少
      让敌人靠近。
  english_man_at_arms:
    display_name: 英格兰武装步兵
    description: |
      亨利的下马武装步兵——锁子甲、钩斧，因为马匹也
      无法在泥地中行动而下马。战线的支柱。
  french_knight:
    display_name: 法国骑士
    description: |
      全身板甲、骑枪、带刺马鞍——法兰西骑士精华。
      但今天，是一个在泥地里几乎走不动、无法进入
      树林的人。会挨很多箭。
  french_crossbow:
    display_name: 法国弩手
    description: |
      热那亚雇佣弩手——装填缓慢，但弩箭能穿透铠甲。
  french_man_at_arms:
    display_name: 法国武装步兵
    description: |
      低等级法军步兵——锁子甲、剑、无马。被迫和骑士们
      一样在泥地中艰难跋涉。

terrain_types:
  mud:
    description: |
      连续一周暴雨后的泥地走廊。所有人通过都很困难；
      法国骑士更是寸步难行。
  stakes:
    description: |
      英军阵前削尖的木桩——不可通行的障碍。

narrative:
  title: 阿金库尔之战
  description: |
    圣克里斯平日。泥泞中的英格兰长弓对阵法兰西骑士精华。
  intro: |
    寒冷的黎明。两片树林之间的田野被一周的雨水浸透。
    亨利与弓箭手们跪地祈祷；法军纵队在泥泞对面列阵，
    骑枪闪亮。
  events:
    - trigger: on_turn_start
      turn: 2
      text: |
        法军第一线踏入泥地。骑枪低垂，战马陷到膝盖。
    - trigger: on_turn_start
      turn: 4
      text: |
        英军弓箭手齐射。遮天蔽日的箭雨开始了。
    - trigger: on_turn_start
      turn: 8
      text: |
        泥地里满是倒下的骑士。法军第二线踩着他们的
        身体艰难前行。
    - trigger: on_unit_killed
      unit_id: u_b_henry_v_1
      text: |
        亨利倒下了。英军战线动摇。
